body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校記無證庵記余頃得罪謫海外館于開元之上方儼師院日與彌勒同龕頽然聽造化琢削有道人械類叢林款余甚勤曰吾泉南分化至此與語翛然令人忘百事逃空虛者聞足音而喜矧置身蠻夷論效鵙舌衣纏花貝心緒怵然非復中華氣味而見道人哉相從蓋百許日問出世法余曰有亞聖大人出世南州臨濟十世之孫號靈源大士者今為法檀度譬清涼月下矚熱惱天下名緇奇衲龍蟠鳳逸而趨之子可跨海北去無後時矣道人愕曰敢不承教翼日翻然而去余蓋莫敢必其所往後三年余蒙恩北歸館于石門精舍有力持書視其款識乃吾證公也發緘疾讀則知其不鄙棄余言見靈源於龍山兩白矣嗚呼子可謂真有志於道者耳又三年靈源棄學子分化他方余拜塔而至於是見證頎然人群中攀翻追繹海南之人煙樹石紛然落吾目中為留一昔曰吾措庵自藏子當為我記之問庵所在證笑曰以太虛為頂以大地為基以萬象為床榻以天魔外道為侍者舉足下足皆是妙圓密海余心知其戲曰子豈所謂隨身叢林者乎問其名曰無證曰圓覺謂一切衆生皆證圓覺學者以為至矣余笑以為誣之也本無數量不落識情奈何謂之證乎謂之證譬如加首於首名為染污吾又強區分別之無證蓋就學所知言耳若親見靈源於寶覺背觸之拳則當以身為舌為說之尚無證之足云乎余曰有是哉因序其語為之記菖蒲齊記東坡居士性喜推挽後進之士知名當時多公賞識者然以今多士猶未足以飽其欲而雌黃遂及草之微以胡麻杞菊之賢於其類援筆而賦之則名聲亦能光顯於後世暮年又以菖蒲之才為邁秀居以銅盆培以怪石挹寒泉而灌之根須連絡於璀璨之間其色蒼然可玩也天下以公之所玩從而玩之柯山道人如公行雲山中所至不蓄長物獨於菖蒲而友之至以名其齊江南洪覺範見而歎曰菖蒲為物無異味可嗜嚼而君友之無猒非能知東坡所樂之真則尚烏能談此情味乎支遁蓄驊騮以寄逸想慧理呼白猿以發高韻而後世多其風鑒君之所寓其清修絶俗之致豈減遁理哉為之記以示知君者庶亦知余言之非誇也舫齊記宣城李德孚有美才善屬文宣和初與余邂逅於長沙年既相若且同學又相好也久之德孚侍親移漕江左而官之金陵即官舍之東闢室以觀書其室連數楹而戶相重東西而視如在船中乃以舫齊名之有客聿至視其榜揭而疑之曰以子為隱者耶則忠義之色功名之志見施為語言以子為非隱者耶則山水之意嗜好之異與儕輩不侔於是避席而問之曰夫渺漫際天一碧萬頃微風徐來雪浪山湧一葉傲睨其中覆卻陳乎其前而不入其舍者津人之妙也子寧欲從事於此乎曰操舟之為非吾事也害利之域並首而趨憎愛橫生頃刻萬態瓦合流俗與之偕而不與之俱逝是知津之妙也子寧於是有得乎曰問津之學非吾志也然則既不事乎操舟之為又不志乎問津之業而乃列五經之遺編布百家之陳說明窗棐几繼晷然膏冥搜博求探賾索隱與古聖賢相際於百千歲之後若心同而意契德符而道通殆將簡之而弗得所謂吾無間然者其或醉心墳典則直造淵源玩意群書則涉獵涯涘放浪詩書之奧望洋渾灝之間則孔子之所得知之矣其浮游萬物之祖者耶送之者皆目崖而返矣德孚仰而笑俯而應曰吾非放愁也但吾以忠信孝友為煙波隨所遇而安之為舟舫昔馮夷得之以游大川漁父語已緣葦而去意竊慕之如是而已矣客愕然無對明年復來長沙理前事以語余請書以為記於是乎書之一擊軒記宣和元年冬余自臨汝以職事來宜春暇日與客游天寧宮愛小軒修竹解衣磐礡終日不忍去長老德公請名其軒余曰一擊客問其說余曰香嚴間禪師參道於溈山久而不契乃焚畫餅之書歸庵南陽糞除瓦礫擊竹而悟余以是知道不可求也使道而可求則肉飯鷹兕身當坐榻與夫伐冰食玉之貴谷量牛馬之富者皆舉意而得有謀而獲者也客曰然則道終不可見歟余曰吾聞諸雲庵以謂道不可求而可致也如人市黑白暗走嶺海望京師疲歲月於道路卒不能獲居肆於八達之衢不以必得為計則貨也有時而自致昔人嘗嗜草書行則書空臥則劃席夜聞灘聲而得妙曉見蛇鬥而入神與香嚴同科而異致且道豈有粗妙哉學者根有稚敏耳時方貴敏故叢林有思齊之心石霜一年而悟道吾以為敏永嘉一宿而悟曹溪以為敏香嚴一擊而悟庸詎知此君不以為敏乎德公請以為記余知其為雲庵之嗣也故併書載其說宣和元年十一月日忠孝松記宣和元年余謁枯木大士成公於道林是日遊客喧闐喜氣成霧余曰噫嘻登高望遠此日猶然其荊楚舊俗哉成笑曰有異木産吾冢巔非緣佳節也於是導余登清富堂下臨瀟湘如開畫牒千里纖穠一覽而盡得之蓋龍圖聶公以詩眼增損發其天藏也故其形勝冠於湘西暇日必俱賓客燕賞於此堂公所建也想見其風流餘韻不減叔子之峴首而其去思遺愛有類召伯之甘棠之左有奇石狀如覆斛稚松貫石而出初如插秧未閲旬高尺許孤根秀拔分枝調達紫鱗翠鬣之中已有合抱凌雲之氣豈地靈獻瑞著公拔擢之異乎公自荊湖奉使入對未幾年三遷要職遂尹京都實鍾臨川之英氣而其學出於舒王有石之象松為蒼官為十八公玉版之榮金甌之拜跬步可待有松之象丁生夢之猶為後世美談況目睹其異乎成曰心法之妙不可以言傳而著為忠孝之效故種石而玉生知其孝倒植而竹茂知其忠譬如太平無象而出菌芝見麟鳳然彼各得其偏如公則道契主上名落天下富貴追逐之不赦而忠孝之瑞并見於松石之間蓋理之固然於是像公之形儀置堂之上而名其松曰忠孝以慰邦人之思顧未紀其歲月於是使其客甘露滅為之記朱氏延真閣記出高安之西門行五十里山川有佳氣草木有華滋桑林有秀色民俗有古風如武陵桃源如剡溪赤城有隱君子朱堅伯固者世家于此特臨廣陌為危閣以延真為名余自京來歸過而登焉憑欄而睇煙雲杳靄形勝纖穠一覽而盡得之而恨其名未足以副其趨謂伯固曰君風度儒者也年方壯有美材乃不以功名富貴為急甘隱約於山林也而雅志欲延真豈有說乎伯固曰然吾當語子夫功名富貴偶然爾士以身徇惑也何以知之漢武帝見相如賦喟曰吾安得與此人同時及見之止以為上林令富貴若不可必也唐太宗見馬周之論促使召之接武於道及見之談笑而斷國論富貴又若可必也李廣之伎無雙於天下及從二師出征迷失道路竟不得侯而死功名若不可必也薛仁貴白衣從征遼東以三矢而定天山卒為名將功名又若可必也吾以謂人生百歲如駒過隙要當從吾之志耳昔梅子真補南昌尉時放浪此邦有別業之遺基在焉已為道士廬元始中棄妻子歸壽春後人見之於稽山變姓名為吳門卒而傳不書其終其為仙明矣庸詎知其不雜屠沽尚往來故居乎吾為閣以延之儻幸及見又庸詎知不攜吾登毛車渡弱水以游道山哉余不得而答乃敘其說援筆而記於壁思古堂記東坡先生曰孔子孟軻道同而其言未必同何以知之以其言性知之孔子曰成之者性繼之者善蓋善者性之效爾而孟軻曰人之性善孔子之言譬則如珠走盤孟軻之言譬則如珠著氈夫珠非有二者走盤則影跡不留故子貢曰夫子之言性與天道不可得而聞性既有言矣乃曰不聞是其可以影跡求哉著氈則觀者庸詎知不疑簞縟亦可以留珠乎故荀卿又言人之性惡自善惡之論興蓋有不勝其言者聖賢相去百年而其言相遠如天淵況不翅百年而守衆人之言為知道非愚則狂顏淵韓愈異世而同出孔門然其識有深淺何以知之亦以其言知之淵飲水曲肱在陋巷不改其樂此亞聖全德懿行也而愈謂哲人之細事愈且未知顏淵能知孔子乎易曰君子多識前言往行以大蓄其德然言行之精以韓孟之識有不能盡窺學者其可不思乎吾嘗誦之三衢毛庠文仲少有英氣深於學問而善功名富於翰墨而飽籌策以破趙會食為迂伏軾下齊為椎所與游皆天下第一等流遭時外平疆場久空無所施其材蹇寓一官不甘憂患折困袖手來歸圃于衡嶽之下寢處晴嵐夕霏按行春花秋月弄琴閲書以娛賓客枵然與世相忘而名其堂曰思古與東坡之論相表裏如維摩自藏於不言之中以發文殊之義縉紳高之文仲歿其子在庭季子以書抵余曰惟子可以知先人為堂之意強為我記之故余獨載東坡之論以著文仲之高然晉劉實作崇讓論曰世議士名德不逮前人非也時非乏賢士不崇讓耳然則士必生而能賢不由稽古之力為循墻巽床之僞是學使實不死登此堂將逃羞無地尚何論哉季子年二十餘種性工文聽其論古今瞻博絶倫真能世其家者也故樂為書之遠遊堂記宣和元年秋八月朝奉郎夏公自天府謫官祁陽明年三月至自三峴館于靈泉寺寺臨大江江流湍急斷岸千尺萬峰環之如趨如揖如翔如集公構堂其西盡收其形勝靖深以宜茂林修竹虛明以隔囂聲塵氛而名之遠遊重九後二日余從公登焉對立凝睇晴嵐夕暉浮動乎緑疏青瑣之上促榻對語笑響散落乎千巖萬壑之間於是隱几枵然忘言蓋其倚功名於憂患之外玩雲川以自娛心飽新得百想俱滅然知國知兵百未一施而沉冥小邑如對彭澤之狄梁公通泉之郭代公乃名所居之堂為遠遊何哉嗟呼世之識真者寡所從來舊矣袁天綱識武后於襁褓驚曰貴武氏者此兒也使天綱果識真當曰亡武氏可也賀知章果識真當曰游仙可也夫一塵翳目天地四方易位袁賀方眩夢幻以其禍為貴以游為謫要不足怪也公今去國之遠而能酬酢風月安樂泉石酒後耳熱侍兒扶掖而歌則忘其身之為逆旅謂之謫可乎公嘗首肯余論祝余為之記公諱倪字均甫其先江南人嘉祐為名臣之後凜凜有祖風者也普同塔記人之有死生如日之有明暗死生相尋於無窮而明暗迭更未始有既然知其明暗者固自若也生順而死逆衆生當其變則駭異之孔子但曰原始要終知死生之故知其故則知其不駭蓋不欲深言之莊子曰死生亦大矣而不得與之變既不與之變當卓然而獨存者也莊子著其理而未盡其情若西方之教則痛言之而盡其情曰若先有生而後有死者則世未見不死而生若先有死而後有生者亦未見有不生而死譬如尋始末於環輪之上求向背於虛空之中則死生之情盡自佛法入中國奉持之者纜總其法度參差不齊獨百丈大智禪師以禪律之學約之人情折中而為法以壽後世故其生依法而住謂之叢林及其化也依法而火之聚骨石為塔號普同塔諸方皆建塔近僧坊遠不過一牛鳴蓋大衆將送火化則荷薪而臨溈山獨拘於陰陽之說謂近寺不宜為葬地自開山迄今三百年建塔於回心橋之南其去寺十里故親臨之法往往不能繼也空印禪師軾公住山十餘年百廢具興其所以安僧宜有者大備獨以普同塔未建為憂一旦與侍者登山之西崦相其形勝施長材鳩工以為之開大穴以石為宮又屋於其上棟楹翔空雲煙蔽虧萬衆歡呼聲應山谷興修於宣和二年之春斷手於秋八月空印恨未有記以紀其歲月遣侍者覺惠來求文余歎曰叢林之衰諸方皆輕僧厭其多而窘於食空印既成堂宇浩然如江河之無極至者必納又為造塔以待其終其敬僧荷法之心可謂至矣嗚呼僧者佛祖所自出厭僧厭佛祖也安有稱傳佛祖之印而反厭佛祖者能契聖乎空印之意可無書乎溈源記岷江因山為名初發泫然濫觴漫衍而至楚則為際天之雲濤萬斛之舟解風而不敢濟溈山因水為名衆泉觱發於煙霏空翠之間旋紺走碧匯為方淵蒸之成雲雨放之成江河蓋岷江資之者衆而溈水善養其源也住山空印禪師笑曰一法界中無假法者故揭於大仰堂之南榮曰溈源欲學者觀水之有源知自心之靈源未嘗竭也蓋岷江之資衆知衆智之不可不學也然先究自心後資衆智道之序蓋如此故善財童子南詢諸友必曰我先發菩提心如何名菩薩行有人於此因山中之氣候更四時之晴陰人重重法界方其宿霧蒙蔽微見淵色則若凡夫雖有染心而性常明潔霧開而澄滓日光下徹則若二乘已澄諸念定慧超越更昏昕之湛然視纖埃之不隔則若人牛兩忘而蓑笠未徹微風徐來方淵鱗鱗波波之中頓見方淵而波非大方淵遍入衆波而淵非小則若斂目於樓閣之前見三世於一念嗚呼溈山為湘南大叢林而空印道光兩本撾大鼓臨人天萬指圍繞今乃退藏於不言之中借山泉為嶔體聽萬象以說法何也蓋道不可以言傳故前聖賤言語小譬喻又欲學者自得之故設象比興以達其意鞞瑟支羅不言佛身不可以色相求也而供養栴檀塔座多寶如來不言根塵俱寂即是自身也而以寶塔聽經余觀前聖莫不然何獨空印哉宣和二年八月初吉會余於湘西之瀕夜語及山中之勝曰恨子未見吾泉然強為我記之余戲曰師以山泉為舌為衲子說法界自在緣起無生之法而余以翰墨為五色藻辨才而畫圖之他日有尋流而得源悟意而忘象者可以拊手一笑中秋前一日記栽松庵記僧史補曰四祖道信禪師以唐武德七年至破頭山愛洞壑深秀有終焉之志禪者相尋而來遂成叢林有僧不言名氏日以種松為務私請祖曰衣法可以見付乎祖師叱之曰汝能再來乃可耳於是僧出山至濁港見女子浣呼曰我託宿得否女曰我家具有父兄可從問之僧曰汝諾我乎女曰諾女周氏之季也僧即還山中危坐而化周氏之女因有娠父母怒而逐之於衆屋之中日庸紡里閈間已而生子女以為不祥棄濁港中明日視之跏趺波間泝流而上異之收養七歲隨母往來黃梅道中四祖偶見問曰童子何姓曰姓固有但非常性祖曰是何姓對曰是佛性祖曰然則汝無姓耶對曰惟空固無於是四祖笑之乞於其母為剃落二十授以衣法為第五祖即游雙峰見栽松之全身又至東山見周氏之全身濁港周氏子孫之盛殆今甲黃梅三尺童能言其事僧贊寧僧史曰五祖弘忍禪師者姓周氏本河南遷止蘄之黃梅誕生之夕異香滿室此矯誣之詞也然可證佐者母既出於周氏而曰祖師姓周乎僧契嵩作定祖圖亦不能辨何也豈當衲子以常理疑之乎夫聖人之託化豈假父母之緣如伊尹生於空桑寶公生於鷹巢獨不論父母之緣耶自唐至今學者疑信相半不能決也建炎元年十一月記布景堂記宣和三年秋萍鄉文益之還自大梁過湘上會余夜語及里中奇豪而高侯尤其魁壘者侯學精敏而齒少行修潔而材高雖隱約寂寞之濱而名滿縉紳之間所居有風泉雲壑之勝茂林修竹之美四時之景陰晴異態穠纖畢見構亭佳處而名之曰布景余因得其為人而想見其處恨未能與益之從侯相佯乎其上援筆而賦之越明年春以書抵余曰山川之妍美閲古今而不盡萬物之榮謝供四時而無窮然特若為間適者所施設而為悲愁者所乾沒也玉輪流輝蒼崖哀湍天下之清絶也而倚娉婷者不見節絲竹者不聞晝公曰月色靜中見泉聲幽處聞者譏之也紅艷之間美鳴禽之過前物外之奇觀也而憂國者以為悲行役者以為愁少陵曰感時花濺淚恨別鳥驚心者哀之也吾口先王之法言逢至治之聖世勤田園以供伏臘玩琴書以娛賓客偏親慈和而耳目聰明弟昆孝友而樂易賢雅所謂悲愁者於我亦安能神哉以吾之間適較市朝當十倍吾亭雖陋然萬景分布吾前受吾約束真造物之為施設非經營而得招要而至者也子其為我書之余曰昔支遁之愛山乃買沃洲之小嶺賀知章之愛水特上疏以乞鑑湖其風味雖清妙而正所謂經營招要者若之益之則不然偶愛陸渾山水之佳遂留六年余觀高侯之趣味殆亦益之之流乃欣然為記之少陽義井記建炎元年六月蔡陽野墅僧子辰俱潯陽檀越陳璹還自白湖過少陽渴甚須水道傍皆近人積水穢濁不索相與歎曰江淮要衝而地無美泉何以止往來渴心相約出錢開井于湖之左而白湖楊元廣彥隆亦欲協成之有僧祖慶實董其事工畢泉甘涼邦人賴以灌畦飲啜行人盛暑為歸宿之所易曰改邑不改井以象正君子之有恤心雖大行無加窮居不損又曰井者德之地以象有煩心之德虛其中而不自有之也歟嗚呼二三人者不獨為濟衆無窮之利其亦尚德也哉十二月望日記華嚴院記代政和四年春二月余自高安赴官臨汝行豐城境十餘里奇峰秀深沃野自獻有白沙清流茂林修竹之勝望林表出楯瓦路人曰其下華嚴院也遂造焉碧杉修徑苾芻戢戢出迎客廈屋崇成如幻出禪齊風櫺金碧隨目殆應接不暇問住持僧惠訥曰院以父子傳器而服玩不減禪林何哉訥曰教有頓漸道無禪律今兩者相攻以其私而佛法微矣譬如棗中蟲徒自蠹壞出家蓋大丈夫事其說甚高緒餘土苴足以道廣孝慈上助清化今其衰其徒特不足知此如鳶翔青冥而心不忘腥穢求教之興三尺童子知其難余首肯其說而心奇之秋七月訥遣僧抵余曰吾廬居於唐光化之元年名報恩迄本朝治平之三年詔改賜今額嘗燼火廢為丘墟草屋數楹僅蔽風雨者自善明至懷珍七傳訥實繼珍後因淨檀首建三門作兩序屋修普光明大殿前峙雙閣一以像僧伽一以館鐘虡東為香積廚繞以復屋闢典事堂有廩有廁西為三聖堂增其後架設賓客館有湢有廄造演法潮音堂總屋於其中又建華嚴閣於寢室之上以實毗盧法寶之藏高深雄麗吞風吐月凡禪林所宜有者畢備僧至如歸轟轟鼓魚泯泯作息要不墯諸方經始於崇寧癸未之春斷手於政和乙未之冬吾方念能事雖畢而後之來者未知飯僧報佛無窮之意而公適儼然辱而臨之非夙緣乎幸強為我記之余曰今人持左券以取寓物未敢必得然爭毛髮之利斫頭穴胸何知慮刑而訥宴坐一室影不出山能使施者填門不十年之間化瓦礫之墟為梵釋龍天之宮此其才必有過人者視其中渠渠欲置人於慈祥之域而專欲以精嚴自礪與夫裨販如來以自賊者異矣使其聞訥之風亦可以少泚其顙云寄老庵記代高安南州之屬郡地連西山廬嶽之勝俗美訟簡士大夫自為江西道院飛楹畫棟間見層出於茂林修竹往往皆浮圖老子之廬龍城院去郭餘一舍山川精神發於雲泉林壑間如人眉目處余家筠溪之上少時往遊焉窮奇索幽信宿彌日便有終焉之計一行作吏轉徙四方登高臨遠未嘗忘於龍城也政和四年冬余留京師官冷口衆自猒風埃又病痁彌月愈不懌而覺範道人適自高安來夜語及龍城舊游翛然忘紛而痁亦棄余而去問覺範誰從子游有老僧志淳者其為人木訥而靜深易親而難忘今結庵於鳳回峰之西名曰寄老每曰高風頽於無勇白業毀於有纍前聖知之故令比丘一飯日中三宿桑下吾幼知人間情緣為纍故棄之而學道知方外事法為纍又棄之間放然諸餘勃窣飢餐困臥猶纍於老未可棄去故持以寄之因以名吾庵嗟夫世方以纍為榮而爭趨之淳獨超然高蹈賢於人遠矣吾聞天台智者臨終門人問所證答曰我不領衆早淨六根以傳法利生止證內凡五品耳淳之志其以是哉明年上元覺範南還因理其事為之記使歸刻石山中他年當乞身歸田幅巾杖屨以從淳游尚未晚也吉州禾山寺記代始達磨自西來以法授少林慧可而衣鉢為信五傳至曹溪慧能能知其道信於天下也藏其衣鉢而化故世稱曹溪之門得道者不可以數計然獨大長老行思懷讓克肖前懿號二甘露門思眷廬陵山水而老於青原讓亦庵於衡霍之下石頭希遷者思高弟也從讓游思實使之馬祖道一者受讓記莂卜鄰青原久之遂終於石門讓實使之今天下指目江西為禪宗法道之源者以曹溪一子一孫首辱居焉永新為江西山川形勝之地城南有山巋然深秀晴嵐夕暉應接不暇者唐僧達奚棲遲之所也奚不知何許人以文德初始至刀耕火種住成法席致嘉禾之瑞因以名山號大智禪院院僻嶮初未著於諸方吳順義二年僧無殷中興之恢復法度學者趨之如雲殷九峰虔禪師之嗣青原八世孫也方是時禪學之弊巧見異解殷以擊鼓之機脫略窠臼於是宗風大振學者賴之嗣殷者有契雲自雲歿代居者名存實亡大中祥符初詔改賜甘露禪院有楚材者道價重一時法席之盛追比殷時又十世而有德普有高行自黃龍窟中來普歿七世而有妙湛大師法安初以政和元年自祥符移居之五年視前營搆增其所未有者新其所已壞者於是莊嚴紫金光聚則有殿棲稱如實旁行之書則有藏會四海苾芻求寂則有堂辦香積伊蒲塞之饌則有廚像祖師則有閣館鐘虡則有樓升座法施之堂則曰無畏集定傳道之室則曰大智而閣於室之上名善應修廡復屋高深壯麗冬溫夏涼重規疊矩叢林號廬陵第一嗚呼妙湛之游戲於是作可謂集諸老之大成者也安走使京師乞文記其事余方困頓黃塵寄逸想於雲泉杳靄處恨未能角巾梨杖與山中高人游厭飫清境然余非學佛者其詭祕多溟涬然竊嘗論之忠孝碩大如宋王彧唐魏元忠徐有功輩初未必皆深於佛理觀其臨禍福超然自得豈所謂所聞或淺而其義甚高者歟故余於禪學凡鉤章棘句凌跨方等汗漫橫流者則非肉眼所能勘驗至於生死之際有不容其僞者矣無殷將化集衆謂曰後學未識禾山今朝識取因怡然而逝德普之將化飲食畢談笑而寂然其言論風旨無所傳聞妙湛雪竇之後又青原之遠裔吾將觀焉既論之又系之以詞曰龍溪落石雪浪奔萬山環之如虎蹲凌霄白雲相弟昆七十一峰讓其尊煙霏搖空含朝暾微風徐來掃靄氛樓閣時為金碧痕聰明澄泓自吐吞三偉不見陳跡存異哉僧奚貌粹溫澗飲婆娑麋鹿群誰中興之殷澄源咄嗟萬指魚鼓喧普公高喉已語言得法來自黃龍門弟子生奠手自捫放箸蟬蛻撼不聞大士法戰著策勳睨視生死等旦曛君看妙湛願力熏樓觀幻出高切雲美髯說法起機輪自云的骨雪竇孫江山偃蹇驕氣噴不受彈壓無傑文願乞名詩刻雲根導廣孝慈酬帝恩寶峰院記代余家筠溪溪出新吳車輪峰之陽其陰鳳皇幕阜諸峰黛橫玉立娠奇畜秀解楚山而益峻隋朝而來為得道者所廬又黃龍龍安興化雲巖四大剎皆其遺地相去百里叢林之盛冠映諸方自大長老寶覺佛壽相續而興禪學宗天下衲子動成阡陌而寶峰善思院者世以律居然夕燈午梵齊魚茶板與四大剎者爭雄長而鳳皇幕阜之雄深亦讓其形勝余外舅家西安往來聞之熟矣宣和三年罷官臨汝道經雙井而造焉渡溪東望奇峰峻岡墮吾馬首據鞍回視飛楹畫棟翔出林表入重門顧兩廡翼如而入焉禪齊雲堂緑疏青瑣大殿層閣塗金間碧像設之妙服具之華見者知焉登法堂望寢室窅然靖深耆年僧雛倒屣迎客客至如歸焉退視其私則廚庫廩廄莫不整潔遊衲解包頤指如意於是慨然歎曰誰為之者何其材乃爾有餘耶住持僧守道曰院基于唐有田畝山林五代烽火之餘券牒亡失多為比鄰所侵院因荒殘如逃亡人家者二十餘年詔賜今額熙寧之初僧圓智者白官請牒來居焉有恢復之意未幾物故至是化為麋鹿狐豹之區元祐六年縣以玉溪僧子瘦領住持事經畫三年未舉而化守道實傳器於瘦者母李氏憫其頽壞施粧奩以開墾田畝用陰陽家之說下舊院百步代山為基鳩工於崇寧元年之春斷手於政和八年之秋而吾院克成其弟守達者實陰相之余聞曹溪祖師也而腰石夜舂牛頭宗師也而躬自負米皆以供僧也及其衰也稱嗣祖傳法者護食而拒僧道公於是時乃能犯拒僧者之怒而延納之此心日月不能老也道曰吾非有心以時特愛惜普光禪師與衆力耕見金而不取同伴詰之曰今吾未用也俟吾他日把茅蓋頭資以飯僧味其存心與今認十方僧物為己有者異矣道慧敏而老其立事有過人者遣其徒寶宗來求文以記余愛道所論併為書之先志碑記代政和元年余為湘陰令湘陰瀕楚水臨洞庭連檣萬艘天水相接盡獻南楚之形勝愛其風俗之純美民訟之稀少士君子博學而知要篤實而有文窮不忘道富則守禮邑之南郭鄧氏之富至紈褲僮奴谷量牛馬然奉身甚約禮士甚恭邑人皆化其德其子沿循道議論有英氣直諒而勇於為義縉紳高其才今為承直郎余游相好也自余之宦湘陰餘十年無日不思縛屋湘尾分湖山之勝從父老之游且將老焉宣和四年夏循道以書抵余曰天降罪罰不自殞滅上延先考啓手足時則有遺訓吾承祖宗餘慶坐享溫燠族大口衆貧富錯居欲瞻給其貧者未遇皇暇汝其承吾之志言卒而棄諸孤嗚呼沿尚忍言之已於今年元日與族人為約券月給穀一斛男議婚錢十千再婚減其半女議嫁者錢三十千再嫁則減其半備喪者錢十千及葬更給其半歲月弗窮而存沒弗常不敢負標以計數限斛以為額庶其利流百世而不弊子其為我書之將刻石以昭示子孫使無忘先訓且欲族人想見先考餘風遺烈也昔范文正公念族人游宦未歸多厄於飢寒則建義莊於姑蘇以給其伏臘舒王請輸己俸買田蔣山飯僧為王氏之亡者修營冥福文公瞻其生舒王福其死循道獨立券約恩及存沒此其東南賢士大夫多稱其可以無書乎系之以詞曰漢祚中興天所佑篤生奇臣掃穢垢杖策軍門謁劉秀功業千年粲星斗鄧侯受材極奇茂毛骨似之豈其後清明在躬氣渾厚慈祥照人資孝友邑人依之扶老幼楩楠參天覆清晝毫末養之至成就百未一施舟壑走疑侯功名在懷袖取之易然行探手湖山萬頃連戶牖料理風煙課榆柳琴書娛客付杯酒走人之急古或有分財贍族今則否此風移之遍宇宙天子無為千萬壽念爾族人拜稽首恩無貴賤適所受符之弗忘帝汝祐不然鬼亦扼汝脰西山磬石清欲透刻此銘詩傳不朽

body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校疏請悟老住惠林瑞光表裏渾圓珠遺影迹淨慈縱橫無礙玉立精嚴兩翁皆化行京華一旦遂道遍天下每追惟其高韻邈難繼其後塵欲扶雲門已墜綱宗誰決先師未了公案恭惟某人淨慈真子瑞光嫡孫言行信於叢林聲價重於吳越無生之句善嬰兒哆啝法門獨脫之機入師子奮迅三昧願膺睿旨來振祖風施大士法喜之珍洗小根禪誦之垢幸回法馭成就勝緣又諸禪疏常光現前廓周沙界大智成就不隔纖毫自然蟬蛻根塵之間安用龜藏語默之外當有達識共賞此音伏惟某人正眼甚明道根久固綽有遠韻爰自妙齡雲行鳥飛川流嶽峙觀其措置實宗門之爪牙見其施張蓋法窟之頭角以身徇道當無繫於去留為法求人豈有拘於喧寂所期甚大幸母固辭請果老住天寧雲門之句裏呈機粲玲瓏之鉼芥洞山之正中妙協走圓轉之盤珠持臨濟之門風行黃檗之照用奪人境於棒下分賓主於喝中三宗盛集於帝京諸老大揚於佛事伏惟某人道韻拔俗英姿逸群披沙得金剖石逢玉識黃龍窟中頭角振青鸞溪上風雷十年之幽蘭林香一旦之穎錐囊露主張法席厭飫名山每欲晦藏輒自昭著其自治雖無求於世然寓世當循緣而行奚必山林終勝朝市今者覺天梵侶上國寶坊佇法馭以重臨期宗風而大振遙知起定因緣助發慈心想見肯來龍象擁隨高步山門疏嵩山宏別傳之宗終依帝里天台修遠舉之行尚遊人間觀其迹若未棄世緣論其心則深尊法道蓋至人度生初不泥其出處菩薩護念亦將泯其靜喧仰前鑑之昭然宜後昆之取法恭惟某人卓有實行號稱飽參冰霜居懷嚴汵照物平生刻苦於道諸方信服其誠其閲世也如風行空去來無礙則循緣也如月印水成破因時昔懷雲泉終老之歸偶爾西去今念王臣外護之意翻然北來期擊電機鋒重施使正法眼藏不滅請靈源外座香象本狂依寶坊而馴伏怒虎方鬥遇禪者之解紛顧惟齒髮之所慚曾彼性靈之不若聞斯妙義皈命慈嚴恭惟某人如月在天非猒汙而匿照如雷振物豈擇地而發聲鬧傳法馭之肯來故已輿情之喜愜雲山在目何妨掉臂即行龍象擁隨正好逢場作戲副我有求之懇願開無礙之門請一老外座真誠所置聖果證於履聲正信之深空義現於猊座況鄰清淨之境親瞻知識之儀恭惟某人華藏親孫佛印嫡子晨鐘暮鼓揮雙劍之鋒鋩水鳥樹林露臥龍之頭角法不孤起此為時節之因緣大衆必臨願聽緒余之謦咳請山老住雲巖敷演佛乘資延睿算僉求達識成就勝緣振列聖已墜之綱宗行初祖不傳之正令真非掩偽旁徇道俗之言公則生明特用叢林之議伏惟某人隨機説法籍教悟宗名為東林橫枝其實泐潭正脈少時橫行海上老來古寺城隈惟以薪而續床分栽田而博飯然唯雲巖勝剎實曰江國上遊宗旨之淵源緇衲之都會鳳山歸去瓶盂是處為家猊座重登竿木逢場作戲請提雅曲大衆欣聞請藥石榜耆年日已凋喪叢林今遂寂寥王官玉石俱焚學者涇渭不辨謂之受道其實走名賴老成之典刑為後昆之軌範恭以新命某人滴水滴凍知果知因唯顯晦水到渠成使魔外風行草偃一段勝事千目同觀龍蜃沙頭最初解開布袋鳳凰山下末後把定牢關道不虛行法固如是特致溪蘋之具以表山門之儀欣然肯來豈勝幸甚請崇寧茶榜出則為人興化是何心行不如諸佛曹山空熱肺腸雖然二老英雄未免一場敗闕欲圓道眼別有妙門恭惟某人本色鉗鎚逸群聲價現成活計更不覆藏肅道者白牯牛兒騎來露地南褊頭赤班蛇子拈出驚人大光西祖之機上祝南山之壽清風江上孤舟不涉程途明月洲頭一句卻分賓主寶坊在邇香飯具陳將開選佛之場願受最初之供現前法侶同賜證明請逍遙宜老茶榜寶几珍御特興同體之大悲白牯狸奴更入遍行之三昧要當語絶滲漏不令機昧始終如百花醴味絶中邊如三點伊勢分賓主惟靈源洞明此旨坐昭默獨提正宗雅聞宜公禪師久親此老法席長眉尊者爭傳親見佛來大耳沙彌自謂久辭祖矣浮塵滅盡化愛憎為平等之光大用現前投同異入寂滅之海一言相契千里同風敢違十方蘭若之規敬薦一會伊蒲之饌衆所欽佇儼然肯臨幸甚請準和尚住黃龍磨磚庵畔言回智照之光選佛堂前喝下證心之第是續諸佛之壽命為大法荷擔之叢林興自江西家世獨聞天下老南設三關之問勃然中興關西藏一點之機窅然深遠恭惟某人關西真子老南的孫貶剝諸方疏通正脈自石門而遷幕阜如別業而歸故園不離先祖道場旃檀林無別樹復唱舊時雅曲優鉢華已重開便請拈提不勞辭讓請湘公住神鼎道不可傳則釋迦不當饒舌法如可説則維摩豈得無言賴離微不犯之鋒機決祖宗未了底公案要須圓融之士密開方便之門恭惟某人少小偶家溈山寅緣親承空印譬如懶融道者坐致雙峰祖師熏蒸見聞霜露成熟蘊醉顯舉足之辨有白雲越閫之機領神鼎之名山適叢林中興之日行雪竇之正令酬王臣外護之恩請寶覺臻公住天寧佛之法道世所追崇雖外護付諸王臣然荷負必須龍象咨之於衆愛憎或出於人情公則生明真偽難逃於智鑒來膺妙選果得耆年伏惟寶覺大士臻公以禪寂為家鄉以翰墨為遊戲間房古寺甘畢生於折腳鐺中各夢同床曾失笑於破頭山下而判府待制妙於龐老識丹霞初不出門應歎仲尼知伯雪猶資擊目今日重新法席一時共贊天寧演暢宗乘聚三湘之雲衲祝延睿算同萬國之山呼請殊公住雲峰有志於立事而事之竟成無心於求名而名之不捨似水滴石積之以日而石自穿如麝匿香覆之以缶而香愈著非形勢之激爾蓋物理之固然恭惟某人東林廣惠之曾孫南嶽慈覺之嫡子撝謙榮利嘉遁叢林王臣悅聞授以傳衣之職道俗勤請願聞飛錫之來龍象畢臨山川改觀昔時把定俗子涴我白疊巾今日放行真珠撒出紫羅帳請道林雲老住龍王諸山諸方叢社盛莫甚於湘中五派家風傳莫密於洞上號稱法窟指曰道林蓋旃檀林鬱密不與荊棘並生則真虎行藏豈容彪兕止住恭惟某人枯木嫡子芙蓉長孫應緣東吳知名南楚金篦刮膜廓開空劫光明寶鑑當臺頓見今時影迹似暗中之五色如句裏之三玄願布龍王之大身遍施法雨要知曹源之一滴不離覺場雲老送南華茶榜一衲生涯而名聞天子萬夫阡陌而位繼祖師是必於曹溪有大因緣不然乘般若昔所願力時節既至毫髮弗差豈特增宗門之光抑亦為法乳之慶未忘世禮少展輿情恭惟某人恩踰父母故言所不能形容道絶功勳故意所不能測度雲無限礙寧分嶺外湘中月有照臨豈擇曲江楚水暫駐隨軒之法侶願陳薦鉢之溪蘋想蒙哀憐特有肯諾請東明疏雲門之宗風昔中興於雪竇而雪竇之法派今特盛於臨平聲名振於諸方道德冠於列祖登其法席夫豈庸流恭惟某人久遊臨平之門飫聞雲門之曲薄遊南楚混迹東明鉢具笑移大類雲居之簡使符自至未慚溈水之詮朱紫堵觀道俗雲集升堂作象王回旋則是真顧鑒酬機如師子返擲則不涉離微願赴王臣外護之勤為揚針水不傳之妙請方廣珂老住石霜諸相本空真緣相現有言雖幻法自言傳剎那間而遍十方彈指頃而説千偈妙解所寄印證其誰恭惟某人頓悟上乘久臨清衆如月在水而不染似雲出岫而無心車轍峰前復起靈源之浪霜華澗畔重開枯木之華乃知龍象之擁隨定看山川之改觀幸捐謙柄無事巽床請真戒住開福湖南報慈寺天下選佛場萬指犀顱千楹寶構宜得知見絶倫之士重提佛祖已墜之綱竊聞真戒禪師遍領名山久臨清衆受敵八面蓋文關西之家風貶剝諸方有英邵武之膽氣袖丹霞劈佛之手藏黃檗陷虎之機流出自己無窮胸襟來決先師未了公案琉璃瓶含寶月紫羅帳撒真珠大振南宗續千燈於將燼回瞻北闕祝萬壽之無疆請雲蓋奭老茶榜禪門分江西南嶽之五派後世盛雲門臨濟之兩家至於流末之餘馴成戲論之謗師承大壞法道浸微妄庸假我以偷安名實因茲而愈濫坐令洞上之宗風來振湘中之法席果逢神穎為整頽綱恭惟某人芙蓉嫡孫枯木真子疏通蒞衆故遇緣則應折節荷法故律身甚嚴名譽排縉紳齒牙威儀為道俗指目喧譁沙步爭傳孤錫之重來狼藉封雲正賴清風之一掃敢薦蘋藻之饌用慶叢林之儀未離旃檀之林一句百味具足行據狻猊之座三玄五位縱橫又藥石榜坐致王臣之勸請蔚為緇白之榮觀脫煩籠如蟬蛻塵埃遂深隱如豹藏煙霧敢慶常規之苛禮特陳過午之伊蒲恭惟某人滿腹精神實頭聲價不住城隍聚落久藏禪板蒲團要成保社叢林敢負火刀直裰以雲作蓋故我宗得妙以海為印故按指發光挾路通途則一日兩兼名剎回機轉位則四年三易道場重重錦縫解合枯木開花片片赤心果見泥牛入海特迂威重普共證明又疏觀名實無當而萬法本間何必不物於物如天地不言而四時自運是謂無功之功所以有言忌犯當頭自然臨機不留朕迹其妙見於此耳孰能神而明之恭惟某人遍領名藍久臨清衆芬芝蘭之聲譽皎冰雪之行藏衣裓謝聚落之氛談笑有山林之韻一音普證萬指齊瞻海印成章檄祖令於教外寶雲作蓋施法雨於人間嶽麓為溈山茶榜全提祖令則無法無親略在世禮則有恩有義故證真必依於俗諦如解空弗離於色塵故造雨花顯敘法乳自裂衣冠以參道剃除鬚髮而為僧其長養成就之私乃提撕藻飾之意至於曲折皆出愛忘俯顧其微敢稱傳法之嗣仰惟至鑒又貞親教之師伏惟堂頭大和尚道契天衣法傳智海廓沙界之量故能山收海藏示醫王之心亦畜牛溲馬渤蠅附驥而氣吞千里鈴繫鳶而聲登九霄是之固然人則幸矣躬至針水之地特陳蘋藻之羞螻蟻微誠知慈嚴之易感叢林苛禮愧恩大以難酬重煩四海之勝流共慶一時之佳集請圓悟住雲居地號雲居非石梁隔分凡境世傳天上有山神常護法幢須求魁壘之耆年來轄英靈之衲子恭惟某人具豎亞頂門之眼行全提祖令之權舌覆大千入語言之三昧身分剎海為遊戲之神通豈暇奪人境於笑中何止分賓主於句內願垂巧便俯徇時機大震海潮之音用祝後天之算請璞老住東禪寺近雙峰地連七澤觀今法席號古叢林師門挺多開已見之戶牖學者益衆橫臆斷之干戈紛然江淮遂成阡陌賴有人中師子來為病者醫王伏惟某人父事僧龍孫承祖印重建東山法道特弘西祖宗風電馳三要之機霧合六和之衆慈雲先布增覺苑之光華法雨將傾發道苗之種性請璞老開堂曹溪宗於天下而黃梅為得法之源達磨祖於神州而東禪蓋付衣之地歷觀先世勃興皆道大德全俯視今時嗣續多名存實廢思得逸群耆宿追還古格叢林果有老成來膺妙選伏惟某人行業無玷聲稱有聞為佛印祖印之兒孫共東山西山之雲月旃檀林豈生杞雕虎穴不容彪玉聚縉紳雲屯緇衲佇一音之雷震特揚古佛之風同萬國之山呼仰祝後天之算浴佛二首已屆三時之月方議制僧緬惟四海之心皆欣浴佛顧茲堪忍之世復現優曇之花幸瞻貫日之光榮受九龍之雨百神讚歎萬衆歡呼異世今時祈勝緣之無盡人間天上願此會之常逢世尊成道先浴香水天王跪歎首獻乳麋仰前哲之遺塵修後來之故事祈雨秋夏之交豐凶其辨稻粳植而未粒天日融而益蒸乞命真乘肅祈景貺惟覆載之父母將呼吸其風雲願興無礙之慈副此有求之懇謝雨天道難知妄瀆凶豐之請聖慈易感下昭螻蟻之誠天澤不資輿情甚慶唯確然在上者實民父母止忍感而遂通故如世蓍龜果從其願心知其幸詞不勝謝祈晴淹旬積雨方深傷稼之憂歸命至人願遂有秋之樂仰蒙慈惠鑒此悃誠收廓野之層雲照麗天之杲日生民飽暖仰瞻天地之仁詔事簡稀實賴慈悲之力抄華嚴經四天下微塵偈句百河沙光明身雲聚而為祕密之藏傳之於震旦之土二乘所不能了解衆生其安得見聞而棗柏示其悲增以翰墨而為佛事造為大論光贊佛乘方今紙墨之費不及百千而道路之遠才登五驛集百安之道種共開喜慧之福田當施積而能散之心成就卓然不朽之事儻蒙垂允幸注芳銜化藏五天祕軸三藏微言結集本藏於龍宮流傳幸出於人世唯雙峰之福地蟠萬礎之寶坊獨經藏之弗修如面目之有疾議將重建倚辦衆檀願歡喜以聽從庶莊嚴之成就菩提園內共輸一雨春回香積臺前果見十分月滿抄藏經無漏智所演之妙語實世福田有作心所發之志誠乃人道種耒之則善道已為時雨耨之則勝緣蓋其良農致爵祿壽考之有年使子孫慶流之無極視其因果粲如日星儻三世如來為不欺乃一切衆生為有賴幸蒙垂允點筆疾書重修雲庵塔蛙朝遷而莫還弗忘其本烏羽成而反哺蓋知其恩何含齒戴髮之可觀曾哺烏田蛙之不若唯雲庵之居廡棋布名山而卵塔之已頽陵夷蒼野室有朽貫廩有陳紅聞之而弗完已喧餘論欲就而中輟要亦非人重修舍利塔佛書曰應靈牙舍利寶塔所在之地即是衆生植福之田每觀前人之措為莫不皆有深意特建塔於五達之衢旁臨萬瓦豈非欲為此邦植福之地乎而歲久頽毀鳥巢其頂傳曰野鳥入屋主人當去言其居衰寂也今乃巢於闤闠之間豈興盛之兆耶而邦人見之如越人視秦人之肥瘠恬不以為意甚可羞嘆時和歲豐力至施易欲募衆檀重增修之非唯佛事莊嚴之精勤亦為遠人入郭之雅觀垂天之雲起於膚寸千人之帳成就衆毛唯茲勝事豈曰不然天寧修造湖湘巨鎮望最重於清瀟禪律精藍名特推於萬壽作重興之意不淺緣改創之功未完欲鴛瓦之一新擬蜂房之盡撒非棟梁無以資乎大壯非丹雘無以麗乎重明則臣僚祝頌之誠協衆庶歸投之地矧茲勝利須假多仁希趣善者聞風而翕然冀樂施者揮金而不斁天寧節功德右語寶運儲祥驚星樞之夕繞慶雲布瑞睹日轂之朝升仰依有感之慈上祝無疆之壽伏願陛下睿齊舜禹德比堯湯履金輪之福以御天護玉真之道以應世秦和氣為太平之曲登斯民於大有之年率土同誠幸遇千齡之嘉會瞻天鼓舞願同萬國之稱觴化三門唯淮山萃僧之海實祖師選佛之場必由大總持門方踐普光明殿門屋今遂老矣過者疑將壓焉敢罄折干于淨檀祈鼎新為之營建飛簷走棟行看掩映於雲煙間碧塗金想見照臨於巖壑長沙甃街持地聖師以身負土雪山童子布髮掩泥蓋世界平則心地平佛土淨則身土淨豈惟典刑之具在是亦因果之歷然竊見長沙之通衢正當聚落之要處街甃久已頽壞車馬艱於往來願興掩泥負土之勤庶致土淨心平之效然聞洪範八政而以殖貨為先般若三檀而以資生為首豈非財者人所甚愛施者行所甚難苟能易其所難則當施所甚愛妙莊嚴路請同放步而登大總持門要當彈指而入為雙林化六齋寺憑幽谷門對雙峰日陳一味之禪歲仗千家之供金軀灌沐始興離垢之方軟草精持次結護生之禁主事枉拋油醬寒山舉拂以生瞋匿王自恣修營慶喜持盂而啓教象骨輥毬之暇火焰上轉大法輪虎溪種藕之餘橘盤中深談實相六時嘉會百福具崇幸開樂施之心仰贊文明之化化冬齋果子古格叢林新開講席偶屆書雲之節特干指廩之豪營辦勝緣精嚴法供懶納北禪之皮角且戢玄機聊續東林之橘盤未忘世禮化供八首人有潔齋一日則可以祀上帝況終身潔齋者乎施惠於蛇虺尚致銜珠之報況賢於蛇虺者乎石門精舍始以單丁住持盛至于傳器極矣乃者勝侶遽集至十九輩殆於遠公之社盡皆所謂潔齋者也有能施而供之者乎恐不趐銜珠之報也首楞嚴經曰昔有衆生施佛七錢轉身獲轉輪王位嗚呼博施之利其利溥哉審如佛言則施者取福如執左券以取寓物多得之非受者之喜少與之受者田其所增損也唯不於佛語生清淨信而以富貴驕人則是待遊説鋤钁者事非所宜施於雲山高人也施以求福如種須刈雖不可必未能無意凡貴與賤與夫愚智皆能知之無所用説但幸有緣見聞生喜出其誠心則名淨施如其不然詬罵怒恚推擠閉關無所不至設或與之出不得已則施與受皆無福利誠開金石德感天地豈有高明以吝自蔽耶竊聞人莫不有忠孝之心而士君子獨能善用此心故願祝吾君之壽及營其親福祉者皆依佛僧真世之福田也湘中為僧之都會南臺又其要處耒陽禮義之鄉士君子甚衆遠投之必有欣然而施者也解劍指廩當無愧於古人幸甚幸甚柔和不諍清淨自活以三界為寄寓以一鉢為生涯故世尊曰以飲食臥具園林樓觀施之者獲福無量僧蓋為福田所從來舊矣今人欲植福而棄僧如種稻而棄田也著靴人喫肉赤腳人趁兔理有固然非特古語今日若施一錢他生莊嚴自具譬如寓物於人而執左券索取線溜達石衆毛成毬豈可以小善為無益而不積以多福為難致而不求哉南臺鉢飯是生涯近取邵陵檀施家不覺香積路迢遠更過四十二恆沙化油炭二首石霜枯木寒灰都忘世禮藥山草衣橡食略露家風南北隨緣任運尚求冬暖夏涼今歲鬱密堂深猶少炭爐紅火有忠道者潛來獻誠要令坐對紅金實藉十方檀信醉餘一擲之戲化為海衆冬溫它日果證菩提頓超暖忍頂地當寺依山林有原隰以纍年律居皆斫伐荒廢以是逐年油炭尚須干人今歲尤不熟麻油價騰湧樵薪已竭而寒凝日增雖欲安坐其可得乎約用三十千便成光明便化溫暖長生疏九峰院名崇福百年供號長生適丁新年特為吉兆果施桑門之惠如除氈上之毛然衆毛乃能成毬一夫不可勝敵敢于衆力同成大緣化供三首當寺依湘上瀕楚水基於隋朝盛於唐季有道俊禪師者雲門之高弟聚徒於其間語句播於叢林號為水西南臺皇祐間廢為律然古格尚存薦經儉歲住持者棄去山林厄於斤斧屋宇化為草棘至以田丁膺門今年春州郡易以禪者領之於是明白老自鹿苑移居此而衲子追逐而至遂成叢席然懼其有增而無損故分化於四方嗚呼損有餘而補不足天道固爾然以至易犯至難人情所疑苟非己身所私則鬼神且陰相之況賢者乎信心一念諸佛皆知辦供一夫諸天降福此天下必然之理故至誠確意皈投願施積而能散之心成就遠劫無窮之利明白庵在何許舊日水西南臺粥飯雖未飽足大言要接方來水盈科而必進箭在弦無返回不愁天廚香積但願施者心開德士復僧求化二首寺雖律名堂乃衲子續香燈於永夕紛禪誦以成群坐使古風行於今日一昨教門小有更變加以冠巾朅來聖恩大為發揚再除鬚髮歡聲震於夷夏喜氣動於龍天著舊僧衣雖限一歲換新度牒必輸五千而家在異鄉客於賢里清淨自活望之如登天之難檀信可干成之若反掌之易必有深憐之者願施不報之恩去年春朝廷以鉢食膜拜為西國之儀乃詔僧尼令衣褐頂冠從中華之俗比奉聖恩許還舊觀人神交慶夷夏增歡仰惟聖主之心實通天下之志然每一名之度牒必輸五緡於有司如須必濟之舟如望及時之雨顧惟齒髮之外凡皆檀信可成敢領衆一登高門願因時以成勝事所施雖少其利甚豐求度牒僧衣五首竊念生於七閩長遊三楚以檀施為依仗以佛法為家鄉十載事師共憫忠勤之效一心荷衆咸稱勞苦之先念國恩澤之未洽僧寶數之難墮萬里之行起於初步千人之帳藉於衆毛願成出塵之姿將赴選佛之舉既蒙開意而諾矣幸為點筆而疾書蓋聞相如以資為郎釋之輸粟入仕冠於終古赫為名鄉欲我緇衣結髮佛教既買僧不許選佛則用財不得守官念某生於東甌長於南楚倚妙典求登三聚值聖王暫罷三年終營道儀依倣俗慮仰冀仁惠成就夙心三塗升濟終賴佛慈六度莊嚴先依檀信仁人難值如盲龜之木欣然易感如磁石之針獲披廣大福田之衣而入清淨和合之衆酒酣樂極棄一擲呼盧之資願遂志酬成三寶出塵之相報恩有在唯佛證知出家報四重之恩為一大事剃髮墮三寶之數豈是小緣須千祇樹之檀披此福田之服千里之水本發於濫觴六合之雲實起於膚寸恩遺有四而檀信居其一福慧有二而富貴居其先但某生於寒鄉客於華里欲遂選僧之志敢忘擇富之求成就勝緣恩非同日經營妙善道不虛行三界火宅衆苦業城既無了期實堪驚歎返復以念無可依投親舊欲與謀婚心志乃願棄俗年將遲莫事恐滯留敢投淨信之檀圓滿六和之相成佛作祖始自今朝異世他生終期報德誓將焚誦之志用酬提挈之恩雲蓋智和尚設粥今晨香粥普告大衆圓明體上離見離情安立諦中有恩有義智和尚三月七日現全身於雲蓋甘露滅五月三日提綱要於石門佛法現前恩義俱報又几大祥看經姪苾芻某伏遇亡叔協律大祥之晨預誦金文宣持祕號所集殊因並申資薦往生淨國者謹具功德疏于後右伏以恩愛別離同謂之苦死生壽夭已定於緣欲洗濯其苦因必依投於僧佛某人伏念俱緣利國致禍及身豈意一朝遂成千古脫瘴鄉其偶爾登堂室之闃然諦想音容疑遠遊之未返難居歲月俄大祥之已臨寡嬸弱孤持骨函而若絶偏親幼弟拜奠酌而長號皇天唯豫善人此理殆成虛語疾方增熾哭不成聲仰仗真乘用資冥福伏念亡叔協律依如來無畏慈力生菩薩有緣悲心摧落業障之山倍增功德之海一念透脫六根頓明已在人間聰明更益其念尚留惡道慧明即觸其身決結龍華之後期同副靈山之夙願酬經願近緣脫身海島犯難來歸所經歷州縣僅三十城出入瘴鄉餘四千里無秋毫之恐有太山之安皆神之休成己之幸唯所許願敢昧初心已延佛僧預開經法以八月之朔對三寶之前敘事之因設齋以懺恭惟十身滿覺萬德貞慈俯賜哀憐為之作證薦經三藏祕詮一乘妙義真寫法界之圖牒絶苦海之舟航特延清淨之苾芻群誦旁行之貝葉庶憑此利上逮我先伏願妙具信心深依法力超登覺苑導從願王獲聞迦陵頻伽之音親瞻閻浮檀金之相脫有為之塵垢證無量之聖身生辰四首大行所熏如春與物等慈無礙似谷應聲虔當誕慶之辰特集延祥之福誦持法藏增益壽祺伏願追迹喬松比功契稷和氣作生民溫暖朴忠為社稷垣牆永護佛僧不忘願力瑞應草之迎春方開八葉優曇華之出水果秀一枝仰祝壽祺用延福祉伏願與民溫飽為國蓍龜天上風霜難老娑婆之桂人間歲月敢移道德之容永護佛乘早調相鼎令節屆辰過中元之七日美名瑞世鍾爽氣於三秋仰祝壽祺實依法力伏願吉祥協相戩穀茂滋輔明主𡎺太平之基與生民作溫飽之具自計臺而進拜追還大范之遺風由館職以超遷恢復小蘇之故事八葉瑞蓂冠三春之淑景一枝優鉢間千載之榮期歸命佛乘上延台算伏願勤勞王室護衛法門詔自三湘即受金甌之拜便登二府果膺玉板之榮瞻仙風道骨以祝壽祺比太山黃河而增福祉追薦四首精誠之極必感真慈冥福所資實依法力唯賢明之秉志享福壽而有終然夜壑山舟寧沒終天之痛而風枝淚眼難忘罔極之思願乘淨供之因超薦往生之路大慈至悲實作生靈之祐他心慧眼必昭螻蟻之誠仰賴真乘用資冥福伏願一靈不昧六用潛通瞻眉際白玉明毫禮天中紫金光聚諸天證樂異趣頓超歲月易流永抱終天之痛音容如在難忘罔極之悲歸命真乘式修冥福伏願頓脫三塗之苦長辭五障之軀清淨諸根瞻萬德紫金光聚熏蒸衆善拜十身白玉明毫聞妙法以洗妄緣悟無生而登彼岸舟移夜壑驚諱日之俯臨蟬蛻塵埃睇道山之日遠欲資冥福實賴真乘伏願熏菩薩知見之香依如來功德之力滌除千障清淨六根親瞻白玉之明毫敬禮紫金之光聚餘緣未盡他生願會龍華惑習既空應念頓超覺路次平赴省試設水陸代清淨寶王永作人天之護圓明慧眼必昭螻蟻之誠某比下侍親望希薦舉果諧素志已協庸情稽首真慈虔誠歸命更願學增通力筆助神奇庶榮白首之雙親必取青衫之一第

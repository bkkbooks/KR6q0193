body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校序五宗綱要旨訣序傳曰人能自重然後可與言學余以謂自重者必其天資才全而識遠何以知之張子房三世相韓韓為秦所滅時年二十許弟死不葬袖鐵椎擊始皇誤中副車走匿下邳乃能跪履於父老及佐高帝定天下漢業已成秕粳王侯掉頭不顧思與赤松子遊韓信微時自藏於怯淮陰少年易之使出跨下一市大笑而色不怍及為高帝大將一軍盡驚而氣不矜談笑而破趙名震天下得亡虜而師事之子房勇擊始皇而謙辭封爵韓信智出跨下而明師亡虜非材全者能自重如是乎邴原詣安丘孫嵩學嵩以書相分原得書不讀曰夫學者以智高者通書何為哉藏書於家遊學四方學成以書還嵩解不傳書之意嵩服其敏徐曠學於太學時沈重講授門弟子常千人曠所質問數日辭去或問其故曰先生所講紙上語耳若奧境彼所未見尚何觀重知之憚其能根矩智識粹美不在糟粕文遠巧妙非止準繩非識遠者能自重如是乎吾故曰必因其天資也夫刻志功業傾心名節者世間之學耳若離三界出五有者非夢幻功業戲劇名節可盡而天資無張韓邴徐之英余竊憂之諸佛三昧謂之甚微細智粗浮心識其能至哉菩薩行海謂之旋陀羅尼門鄙陋志操其能入哉學者之才如蓬芒之微而所授之道如萬鈞之重雖至愚知其不可然猶紛然不知愧可笑也為弟子者心非其師而貌敬之為師者實鄙弟子而喜授以法上以數相羈縻下以諂相欺誑慢侮法道甚於兒戲嗚呼昔清辨菩薩以芥子擊修羅窟而隱候龍華道成乃問未決之事謂今彌勒未具遍知也辨之求師何其難也達摩達恨師子尊者不令嗣祖渡溪見女子浣露其足念曰此脛乃爾白皙耶師子忽至曰今日之心可嗣祖乎師子之求弟子何其審也大法寢遠名存實亡其勢則然蓋嘗中夜起喟為之涕零余少遊方所歷叢林幾半天下而師友之間通疏粹美者尚多見至精深宗教者亦已少矣又三十年還自海外罪廢之餘叢林頓衰所謂通疏粹美者又少況精深宗教者乎百丈法度更革略盡輒波及綱宗之語言如雲門綱宗偈曰康氏圓形滯不明魔深虛喪擊寒冰鳳翥已飛霄漢去晉鋒八博擬何憑雲門非苟然作也而昧者無地寄其意識輒易以循其私曰晉鋒八法審如易者之意則康氏圓形魔深虛喪又何義哉洞山渡水見影偈曰切忌從他覓迢迢與我疏吾今獨自往處處得逢渠渠今正是我我今不是渠應須與麼會方始契如如其言契如如但一文殊無二文殊故曰渠今正是我我今不是渠旨甚明白而昧者易之曰渠今不是我我今不是渠遂令血脈斷絶豈曹洞旨趣乎仰山臨終付法偈曰一二二三子平目復仰視兩口無一舌即是吾宗旨兩口無一舌溈山之牛一身兩號之意而昧者易之曰兩口一無舌審如易者之言則是共功時功尚何論哉臨濟付法偈曰沿流不止問如何真照無邊説似他離相離名人不稟吹毛用了急須磨吹毛劍也用即磨之意不欲犯鋒耳而昧者易之急還磨旨趣安在哉而以之不疑可謂陋哉獨法眼未遭更易行恐不免耳昔阿難聞誦佛偈曰若人生百歲不識水潦鶴未若生一日而得決了知謂曰吾從佛所聞異於是應曰不善諸佛機非水潦鶴也誦者告其師師應曰阿難耄矣所記錯謬夫諸佛機久而尚為水潦鶴豈渠今正是我我今不是渠不作梁武喧爭之語晉鋒八博不作右軍草書乎因編五宗機緣以授學者使傳誦焉華嚴同緣序余聞一切衆生識種皆具十法界性謂佛菩薩緣覺聲聞四聖天人傍生餓鬼地獄阿修羅六凡是十種性本無性隨所熏起任運成就有人於此為諸人等談無上道解脫知見一切衆生皆證圓覺則識性熏發佛種如是乃至為諸人等談不義語毀謗三寶一切障道之法則識性熏發惡道種是故如來世尊每謂衆曰善男子善知識者是汝等最大因緣能令汝輩明見佛性離苦成道事彼知識不惜身命又菩薩願力願與衆生為不請友其所立誓惟欲衆生悟心成佛然諸衆生自棄自賤貪戀生死飄流諸趣不能逢遇善知識善友如萬頃波尋一瓦礫今惠臻道人欲以是毗盧藏微塵章句不思議妙義結萬人同觀看其設心欲熏發一切衆生佛乘之種是其願力為不請友而我大衆同得值遇譬如盲龜值浮木孔當生難遭之想起增上善心使易成就俟其畢作為卵塔書萬人名各藏於塔中虛空可殞而此願力如爍迦羅惟願剎剎塵塵證明我説嗚呼六道以憂畏飢餓之火所逼燒尚不聞有佛安得聞經哉唯人道一切成就既已見佛又復聞經而不請友曲折誘導更復惰慢作跛驢心是真自棄凡我見前法界性侶幸同進道惠臻道行高潔而飽叢林受持願力久矣成熟是故今同普告大衆是日已過命亦隨減唯加鞭此道是真知恩政和五年二月十九日書洪州大寧寬和尚語録序但識綱宗本無實法又曰若以實法與人土亦難消巖頭説法指人甚要而語不煩亦何嘗鉤章棘句險設詐隱務為玄妙哉故其得友如雪峰有子如羅山於生死之際如洞視戶庭未嘗留情近世叢林失其淵源以有思惟心爭求實法唯其以是為宗也故高則妄見勝妙之境下則波為世諦流布而綱宗喪矣余猶及見前輩能言老黃龍同時所遊從有若楊岐會翠巖真大寧寬皆一時號明眼而會與真所得法子照映江左語言布寰宇獨寬公少見機緣有石門宗杲上人抗志慕古俊辨不群遍遊諸方得此録讀之而喜曰雖無老成尚有典刑此語老宿典刑也其可使後學不聞乎即唱衣鉢從余求序其所以命工刻之嗚呼杲之嗜好可謂與世背馳彼方尊事大名譽者傳授其語而杲獨取百年物故老僧之語欲以誇學者不亦迂乎雖然會有賞音者耳臨平妙湛慧禪師語録序傳曰雖無老成尚有典刑典刑且次之則老成蓋前人所甚貴也又曰惡夫碔砆之亂玉則似之而非者又其所甚疾也貴老成疾似之而非者一人之情千萬人之情是也近世禪學者之弊如碔砆之亂玉枝詞蔓説似辨博鉤章棘句似迅機苟認意識似至要懶惰自放似了達始於二浙熾於江淮而餘波末流滔滔汩汩於京洛荊楚之間風俗為之一變識者憂之俄有叢林老成者嶄然出於東吳説法於錢塘諸方衲子願見爭先川輸雲委於座下法席之盛無愧圓照大通於是天子聞其名驛召至京師住大相國寺智海禪院是謂妙湛禪師慧公未嘗貶剝而諸方屈伏不動聲氣而萬僧讓雄彼似之而非者不攻而自破如郭中令之單騎見虜孔北海之高氣讋魏以其荷負大法故稱法窟龍象以其搏噬邪解故稱宗門爪牙也余與禪師遊舊且少相好不見之二十年宣和三年十月初吉有仲懷禪者過余湘上出其示徒語為示昔蓮花為聰道者作禮曰雲門兒孫猶在余則以手加額望臨平呼曰豈雪竇顯公復為吳人説法乎何其似之多也僧寶傳序曹溪之道至南嶽石頭江西馬祖而分為兩宗雲門曹洞法眼皆宗於石頭臨濟溈仰皆宗於馬祖天下叢林號為五家宗派嘉祐中達觀曇穎禪師嘗為五家傳略其世系入道之緣臨終明驗之效但載其機緣語句而已夫聽言之道以事觀既載其語言則當兼記其行事因博採別傳遺編參以耆年宿衲之論增補之又自嘉祐至政和之初雲門臨濟兩宗之裔卓然冠映諸方者特為之傳依倣史傳各為贊辭統八十有一人分為三十卷書成於湘西之南臺宣和五年正月八日伏遇判府安撫大學降貴令辰繕寫呈獻仰祝台算許旌陽白日仙去天詔書曰赦汝不事先祖之罪佳汝施藥咒水之功夫施藥咒水期於活人者也活人而能致飛仙況壽考乎余觀安撫大學其牧民臨政皆得佛法之至要和而為生威而為殺生殺皆以活人為本嘗生瀏陽囚徒十有二人於死中佛法之見於和者也戮一賀文而億萬生齒安堵佛法之見於威者也其妙用活人之功較之旌陽殆相萬矣惟其得法之淵源實出於圓照本禪師而不可誣也故余特以禪書為獻伏冀燕間之暇少賜披覽豈勝幸甚嘉祐序禪師諱契嵩字仲靈藤州人也少從洞山聰禪師遊出世湖山乃嗣其法其道微妙而末法學者器近而不能曉悟而公亦不肯少低其韻以俯循其機因歎曰吾安能圓鑿以就方柄哉聞之聖賢所為得志則行其道否則言而已言之行由是為萬世法使天下學者識度修明遠邪林而遊正塗則奚必目擊而受之謂已之出邪即閉關著書以攻正祖宗所以來之之迹為十二卷又別定祖圖書成攜之京師因內翰王公素獻之仁宗皇帝又為書先焉上讀至呂固為道不為名為法不為身歎愛其誠旌以明教大師賜其書入藏書既送中書時魏國韓公琦覽之以示歐陽文忠公公方以文章自任以師表天下又以護宗不喜吾道見其文謂魏公曰不意僧中有此郎邪黎明當一識之公同往見文忠與語終日遂大喜由是公名振海內遂買舟東下居永安精舍而歸老焉公雖於古今內外之書無所不讀至於安危治亂之略當世同人少見其比而痛以律自律其身其學端誠為歸宿之地而慕梁惠約之為人以其學校其所為未見少差其考正命分於賢聖出處之際尤為詳正觀學者循奇巧而不知本也乃作壇經贊亡孝背義又循養其欲也乃作孝篇十二章士大夫不顧名實多是已非他乃作輔教編學者苟合自輕不貴尚以修德也乃題遠公影堂記其所慕也乃作茨堂序因風俗山川之勝欲以拋擲其才力以收景趣乃作武林志至於長詩贊而已殆所謂太山之一毫芒耳公終於湖山而火化不壞者六物天下聞其風者為之首東長想嗚呼一匹夫雲行鳥飛天地之間視萬乘之尊其天地之遠也顧巨公貴人雲泥之異也而一旦以其所為之書獻天子為之動容天下靡然向其風而卒能酬其志豈非其所自信修誠之效歟後之學者讀其書必有掩卷而三歎者也元符元年中秋日高安某序陳尊宿影堂序陳尊宿者斷際禪師之高弟也嘗庵於高安之米山以母老於睦遂歸編蒲屨售以為養故人謂之陳睦州臨濟至黃檗衆未有知之者而公獨先知之嘗指似斷際曰大黃之門必此兒也雲門祕傳於公人所知之而公更使謁雪峰曰當嗣之不然吾道終不振矣雲門臨濟能不忘其言故宗一代天下古今依此以揚聲其德澤方進未艾也夫二子方其匿耀也其施為未有以異於人而卒不能逃公之言何也古之人篤聞其信已故其處心也公惟其公是以自知之審而知人之詳也今之世雖有通人遠才不小同己則橫議疾之不掩則謗之而已通人遠才固自負而群小又工於為謗宜乎其贅隅於世也而庸下之徒能阿其所好故爭厚恩之環目遲以為嗣庸下者固欲顯於人而好名者素快同於己宜乎其豐隆於時也吾行四方有年矣見此種人何限而恬然不知怪世衰道微一至於此使其聞公之風見公之像其何以施眉目耶嗚呼期臨濟必大黃檗之門而其嗣方大盛知人之詳也祝雲門嗣雪峰庶未其詰自知之審也傳曰知人則哲自知則明吾於睦州公見之矣公之影堂在高安南之四十里所謂米山者也昭默禪師序李北海以字畫之工而世多法其書北海笑曰學我者拙似我者死當時之人不知其言有味余滋愛之蓋學者所貴貴其知意而已至於蹤迹繩墨非善學者也豈特世間之法為然出世間法亦然黃檗運公師事百丈大智禪師而迅機大用每凌壓之百丈固嘗歎曰見與師齊減師半德見過於師方堪傳授玄沙備師從雪峰真覺禪師最久備遂為談根門無功幻生幻生法門其論皆揭佛祖之奧雪峰亦嘗撫其背曰豈意衰暮聞此妙法汝再來人也吾所不及然雪峰百丈之道益尊而黃檗玄沙得為的嗣初未嘗印脫其語言順朱其機因以欺流俗此道寂寥久矣乃今於黃龍清禪師見之公為晦堂老人侍者而名聲已鬧聞叢林其超情獨脫之論無師自然之智當機密用人不敢觸其鋒雖晦堂唯知加敬而已雙井徐禧德占黃庭堅魯直此兩翁世所謂人中龍也往來山中與公語未嘗不屈折咨嗟以為不及以故天下士大夫悅慕願見想望風采公名惟清自號靈源叟世為洪州武寧陳氏子童子時誦書日數千言伊吾上口有異比丘過書肆見之引其手熟視大驚勸其父母使出家公即欣然往依高居某為師幾何為僧受具足戒即起遊方初謁法安禪師欲傾心受法法安曰子他日洗光佛日照耀末運苦海法船也一壑豈能畜汝行矣無自滯公因遍歷諸方晚歸晦堂久之初開法於舒州之太平衲子雷動雲合而至未嘗謹規矩而人人自肅江淮叢林號稱第一洪州轉運使王公桓迎公歸黃龍欲以繼晦堂老人未幾晦堂化去公亦移病乃居昭默堂宴坐一室頽然人莫能親疏之然見之者皆各得其歡心至於授法鉗椎鍛煉則學者如煙菟視水車然莫知罅隙其提唱議論初不許學者傳録有得其片言隻句者甚於獲夜光照乘然余於公為法門昆弟氣宇英特慎許可獨首肯余可以荷擔大法頃於山中日有異聞嘗曰今之學者多不脫生死者正坐偷心不死耳然非學者過也如漢高帝詔韓信以殺之信雖死而其心果死乎今之宗師為人多類此古之道人於生死之際遊戲自在者已死卻偷心耳如侯景兵至建鄴武帝御大殿見之神色不變軟語撫慰而侯景汗下不敢仰視退謂人曰蕭公天威逼人吾不可以再見也侯景固未嘗死而其心已滅絶無餘矣古之宗師為人多類此吾觀今諸方説法者鉤章棘句爛然駭人正如趙昌畫花寫生逼真世傳為寶然終非真花耳其應機引物以曉人皆類此大觀三年秋余以弘法嬰難越明年春病臥獄中公之的子德逢上人以書抵余曰昭默病遂有書付禪師使人不能候而去余矍然而起坐念公平生奇德美行恐即死後世莫得以聞故為疏其略以授逢使往謁道鄉居士求文刻石於山中以傳信後世云大觀四年正月二十五日石門某序潛庵禪師序法道東來授受之際必因師弟子之賢苟非其人道不虛行如雲起而龍隨鶴鳴而子和其周旋之久機緣之著而特以侍者稱者如鳥窠之有會通南陽有應真趙州有文遠南院有守廓慈明有海善翠巖有慕哲而黃龍有公公諱清涼洪州新建鄧氏子世力田幼超卓短小精悍去依洪崖法智為童子年二十一落髮受具足戒時武泉常寶峰月雲居舜道價壓叢林公遊三老間皆蒙器許而疑終未決謁黃龍南禪師南曰昔洞山見雲門門問近離甚處云查渡夏在何處曰湖南報慈曰幾時離八月二十五云放汝三頓棒公聞之大驚南公又曰洞山又問適來祗對有何過而蒙賜棒門云飯袋子江西湖南便恁麼去商量公大笑南公問何笑對曰笑者黃面浙子憐兒不覺醜耳自是容為入室父子言論久即令坐于旁去遊南嶽時先雲庵方出溈山與公復造積翠公為侍者七年南公歿隱迹西山西山有惠嚴院僧死屋無像設露坐公見而喟曰古人斫山開基致無為有忍懷不舉哉乃求居以修完之不五年而殿閣崇成百具鼎新即棄去遊廬山南康太守徐公聞名延居南山清隱寺寺在大江之北面揖廬山公門風孤峻學者皆望崖而退以故單丁住山十有八年元符二年秋余與弟希祖自南昌舟而東下訪之晨香夕燈升堂説法如臨千衆而叢林所服玩者莫不具時時钁地處置為余言先師初事栖賢諟泐潭澄更二十年宗門奇奧經論要妙莫不貫穿及因文悅以見慈明則一字無用設三關以驗天下禪者而禪者如葉公畫龍龍見即怖余曰每疑三關語垂示平易而人以為難何也公曰衆生為解礙菩薩未離覺大智如文殊師利欲問空王佛義即遭擯出以其墮艱難故起現行耳嗚呼自墮艱難故起現行學者大病如人開眼尿床平地喫攧然今化去三十年猶有悟其旨者不無損益也有僧衣十有二年公舉令住淨衆寺辭行謂曰汝雖在此費歲月實不識吾家事儻嗣法當不以世俗欺誑為心其人乃嗣翠巖機焉南昌隱君子潘延之與為方外友延之迎歸西山而州郡文爭命居天寧衲子方雲趨座下一時名士摳衣問道公以目疾隱居龍興寺房戶外之屨亦滿上藍忠禪師雲蓋智公之子於公為叔姪移公居寺之東堂事之如其師叢林高其誼余政和四年冬證獄太原拴縛在旅邸人諱見之而公冒雨步至撫慰為死訣明年南歸幸復見之軒渠笑曰吾不意乃復見子公壽八十四目盲復明此其精敏於道志願叢林所致嗚呼佛法寢遠壞衣瓦器之人亦有侈欲為人師者爭慕華構便軟暖公獨舉頽壞而新之爭欲致弟子不問智愚欲出門下而公獨精粗之爭欲坐八達衢頭以自賣其道而公獨居荒遠以自珍之爭好勢利惡醜而公獨犯衆惡自信而力行之每謂弟子曰無事外之理理外之事觀其措置豈其真然之者耶定照禪師序達磨之道六傳而至曹溪自曹溪派而為江西石頭二宗既昭天下學者翕然從之由二宗以列為五家于今唯臨濟雲門為特盛洞山悟本禪師機鋒豎亞而出年代寢遠惜其無傳元豐中有大長老道楷者赫然有聲于京洛間問其師承乃投子青華嚴嫡嗣青公為大陽真子蓋洞山七世玄孫也大觀元年京師大法雲寺虛席有司以公有道行請于朝願令繼嗣住持奉聖旨可其請未幾開封大尹李孝壽表公談以禪學卓冠叢林宜有以褒顯之即賜紫方袍號定照禪師左璫持詔至法雲楷謝恩已乃為表辭曰伏蒙聖慈特差彰善閣祇候談禎賜臣定照禪師號及紫衣牒二道臣戴睿恩已即時焚香升座仰祝聖壽伏念臣行業迂疏道力綿薄嘗發誓願不受利名堅持此志積有歲年庶幾如此僧道後來使人專意佛法今雖蒙異恩若遂忝冒則自違素願何以教人豈能仰稱陛下所以命臣住持之意所有前件恩牒不敢祇受伏望聖慈察臣愚悃非敢飾辭特賜允俞臣沒齒行道上報天恩上閲之以付李孝壽躬往諭朝廷旌善之意而楷執拗不回開封府尹具以其事聞上大怒收楷送大理寺吏知楷忠誠而適批逆鱗有憐之之意問曰長老枯悴有病乎楷曰無之吏曰有疾則免刑配楷曰平時有疾今實無豈敢藉疾僥幸聖朝欲脫罪譴耶吏歎息久之竟就刑縫掖其衣編管緇州都城道俗觀者如市皆為之流涕而楷神和氣平安步而去如平日至緇州僦屋以居而四方衲子爭奔隨之接武于道嗟乎禪師粹然一出支洞山已頽之綱道顯著于時矣而聖朝方以道治天下海內肅清旌表有德天時人事適相偶如此而楷獨罹此禍可疑也夫豈斯道疑獨間關至此卒不能以振興之耶抑亦夙殃成就緣會如是耶聞之者莫不長喟余因疏其事以授嘗識禪師者使學者知道固如是而視欲勝天滅命者可以發一笑也邵陽別胡強仲序多言乃致禍器滿苦不密人有兩三心安能合為一河壞蟻孔端山隤有黿穴生存多所慮長寢萬事畢此孔北海臨終時詩也而其意乃若自悔何也教汝為惡邪則惡不可為教汝為善耶則我平生未嘗為惡此范滂臨刑語其子之辭也而其意乃若自疑何也徐有功方視事吏泣白曰有詔公當棄市有功置筆安步而去曰豈我獨死而諸人長不死乎三坐大辟當死不憂三赦之不喜其明見自性不悔不疑而卒以榮名終吾聞成就世出世間法特一切能捨耳有功其亦知此乎余學出世間法者也辭親出家則知捨愛遊方學道則能捨法臨生死禍福之際則當捨情頃因乞食來遊人間與王公大人遊意適忘返坐不遵佛語得罪至此重賴天子聖慈不忍置之死篆面鞭背投之海南平生親舊之在京師者皆唾聞諱見雲散鳥驚獨吾友強仲姁嫗守護如事其親自出開封獄冒犯風雪繭足相隨三千餘里而至邵陽猶不忍去嗚呼臂三折而知醫閲人多而曉相事更疑危而識交態有交如子何必多為然強仲每見余蓬頭垢污在束縛中飲食談笑如平日言涕俱出曰子殆不知世間有恥辱憂患乎抑真石肝鐵腸也余笑曰死可避乎心外無法以南北論中外則謂之失宗以僧俗議優劣則謂之迷旨失宗迷旨前聖所呵吾方以法界海慧照了諸相猶如虛空大千沙界特空華耳何暇置朱崖於胸次哉強仲高義密行追配古人宜若知此子持此語為我謝鄉里故人此去死生一決死不失為谷泉脫或無恙尚不失為車中王尼他日緑錦江頭相見追惟今日則尚可軒渠一笑也政和元年十二月十九日海南逐客某序送強仲北遊序洛生郭玉得程高方脈六微之技陰陽不測之術漢和帝時為大醫王多有應效性仁愛雖賤如廝養必盡其心力而醫貴人時或不愈帝使貴人衣廝養服問醫輒效問狀對曰醫之為言意也腠理至微隨氣用巧針石之間毫芒則垂存神於心手之際可得解不可得言也夫貴者以高顯臨臣臣以怖懾承之其為難也有四焉自用意而不任臣一也將身不謹二也骨節不能使藥三也好逸惡勞四也針有分寸時有破漏重以恐懼之心加以裁慎之志臣意且猶不盡何有於病哉此其所以不愈也嗟乎人之理患不能知之知之患不能行之觀玉所論甚明而竟不能用雖得之亦失之之謂也玉蓋所謂有技之醫非有道之醫也有道之醫如庖丁之解牛但見其理不見其全牛也如孫武之誅二隊長但見其法不見吳之寵姬也吾友強仲少任俠喜立奇節赴人之急難義形於色慕太史子義王義方之為人中年學道一飯奉身為伊蒲塞之行雖摧縮鋒角而劇談滑稽每每絶倒坐客強仲蓋寓於技以遊人間世者也而喜醫貴人聞強仲跫然足音即其疾不辭而去余嘗問之對曰吾治貴人有三易方視其疾以投藥不知有富貴如承蜩也不以天下易蜩之翼一也貴人必聰明可曉以避就之理二也且吾期於活人而非事於名一醉之外無所恤三也玉以四難自藏而強仲以三易自顯殆所謂有道之醫也王城貴人之都會強仲往遊焉明年山林間聞京師有異人能生人於死中如秦越人華他者必強仲也送李仲元寄超然序余至海南留瓊山太守張公憐之使就雙井養病在郡城之東北隅東坡北渡嘗遊愛泉相去咫尺而異味為名其亭曰炯酌且賦詩而去其旁有堂名曰疏快渠渠高深吞風吐月堂之後有軒名曰俱清倚欄東望山海之勝一覽而盡得之太守又構庵于後其名至遠余既居之乞橄欖于旁舍判荔樹於沙岸作詩其略曰整藍乞橄欖斷樹判荔枝日昨東坡羹有佳客至饌山谷豆腐以餉之崇寧寺有經可借郡有書萬卷太守使監中之余時乞食于市作息之餘發首楞嚴之義以為書他日以寄吾弟祖超然使知余雖困窮於萬里不能忘道也仲元將渡海不欲更作書如到京為我一至天寧見因覺先為余録之以寄超然且發萬里一笑夢徐生序余竄朱崖三年既蒙恩澤釋放政和三年十一月十九日自瓊州登邁北渡將登舟有兩男子來附載佐舟者識之曰此泉州徐五叔兄弟也往來廉廣歸宿於瓊以販檳榔為業且見之二十年矣遂與俱載曉渡三合流無恐未及雷州岸次日北風不可進乃定石留赤岸半月日以一掬米轉手送徐生為營炊余時時弄筆硯又臥看左傳徐生默坐久之則去十二月五日風自南至天海在中日出瑩碧間舟行如鏡面未及晡抵廉州對岸館於蛋叟之舍徐生盡以其販具付偕載者使自至廉收米曰此吾女兄之子也道人脫死地萬里獨行庸詎知無意外憂乎願護送歸筠即為買馬顧力步隨余走七十驛而至南嶽方廣寺余曰子可還此山吾家也衲子皆故人雖至筠無以異此徐生固請一到高安纍日不去已而曰道人樂居此則可乃拜辭問所欲曰止求舟中臥讀之書余曰此春秋左傳處處有之曰第與我耳因授與之五年秋八月十二日晝臥夢徐生如平日懷其人乃書以示超然曰蜀先主嗜結眊魏明帝好斧鑿之聲夫結眊與斧鑿之聲有何好而人君嗜之未易詰其所以然吾意人之相合以氣亦以是哉然徐生特商賈者何從知覺範而所為如此可不怪也李德茂書城四友序政和五年余自太原還南州過都下上元夕宿故人李德茂之館德茂環積墳藉名曰書城日與筆硯紙墨為四友余曰公通藉金闕名聞縉紳而取友乃止是乎德茂笑曰昔周公誅管蔡張陳解刎頸吾未嘗不置卷長嘆夫疏親利害雖大聖不能保其親矧以衆人之器登功名之場而欲全交乎吾家濬之知之故棲遲林麓圖梁鴻老萊子之像為友太白婆娑江湖結明月為無情之遊吾以為白失之誇而渤失之誕也管城子吾益友也直諒多聞每與之語娓娓不倦燕卿吾德友也氣清而骨輕知白而守黑固膠漆之義重知見之香楮先生吾畏友也悃愊無華見地明白吾見之未嘗不展盡底蘊石虛中吾端友也天姿剛徑琢磨以成溫潤而有容知言而能默是四子從吾遊神交道契忘義忘年久矣子今乃見問何哉余曰蘇易簡常輔此四人之賢為文房四寶意非其所好也德茂不名而友之宜乎同居于書城之間無厭也請書以為序使士大夫知有友四君子者自德茂始連瑞圖序崇仁為撫屬邑山川清華民俗茂美然封連南康廬陵熏蒸之習珥筆之風或波及之以故訟繁號稱劇邑自昔及今政有能聲者才可倒指而數比歲仍飢令佐非正官苟簡歲月以氣相勝而去者數矣今年春奉議彭公思禹通佐仇公彥和聯翩下車思禹風力敏強鑿姦鏟猾撥煩摧劇吏民驚縮以為神號霹靂手而彥和又能詳明練達照了罅隙以裨贊之卯衙退砌無人迹木陰覆庭終日而囹圄殆可羅雀於是令丞抵掌清語而罷卒以為常春夏之交雨連旬早稻登場已而又雨無日民歌於阡陌之間所至相和六月癸亥有千葉白蓮雙葩並幹生於縣之西池乙丑有芝三莖紫穎黃英生於丞署之後堂邦人聚觀不厭嗚呼天下之令佐其才賢使民畏服敏妙勵精者所至尚多有之至興居一室淡然無為而使百里之內風雨時若禾黍豐登奇祥發現於花木如斯邑者寡矣使吏民畏服者人也而奇祥於花木者天也傳曰人無所不至惟天不容偽蓋理有固然余聞精誠之至各以類感二師將軍拔劍刺崖而飛泉湧忠之至也李善白乳其主人之子而乳湩義之至也古初護柩以身捍火而火滅孝之至也蔡順之母齕指以呼順而順至慈之至也夫忠義孝慈之應如形附影如聲赴響則兩公推誠以蒞民勤政以報國而嘉瑞並見者和之至也今同治一邑氣和且爾則異日坐斷國論以康濟斯民宜如何哉邦人圖二物以誇四方稱頌令丞之賢故余樂為之序墮齋偈序圓覺經云居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實如人言蜂醞百花之香為甜耳永嘉曰若以知知寂此非無緣知如手執如意非無如意手若以自知知亦非無緣知如手自握拳非是不拳手亦不知知寂亦不自知知不可為無知自性了然故不同於木石如手不執物亦不自握拳不可為無手以手安然故不同於兔角如人言所以甜者為蜜耳而南泉曰三世諸佛不知有狸奴白牯卻知有如人見蜜及親嘗耳曹山以墮統三法如人以蜜觸舌自知純甜無中邊味耳南州道人本忠聞之擊節賞音余曰此郎殆人類精奇追友其人於百年之上遂名其所居曰墮齋請余記之為説三偈曰生在帝王家那復有尊貴自應著珍御顧見何驚異又曰紛然同作息銀碗裏盛雪若欲異牯牛與牯牛何別又曰有聞皆無聞有見元無物若斷聲色求木偶當成佛政和六年正月日

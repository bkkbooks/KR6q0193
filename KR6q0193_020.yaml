body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校銘明白庵銘并序余世緣深重夙習羈縻好論古今治亂是非成敗交游多譏訶之獨陳瑩中曰於道初不相妨譬如山川之有飛雲草木之有華滋所謂秀媚精進余心知其戲然為之不已大觀元年春結庵於臨川名曰明白欲痛自治也瑩中聞之以偈見寄曰庵中不著毗耶坐亦許靈山問法人便謂世間憎愛盡攢眉出社有誰瞋於是堤岸輒決又復滾滾多言然竟坐此得罪出九死而僅生恨識不知微道不勝習乃收招魂魄料理初心為之銘曰雷霆發聲萬國春曉聞者不言心得意了木落霜清水歸沙在忽然震驚聞者駭怪合妙日用如春雷霆背覺合塵如冬震驚萬機俱罷隨緣放曠尚無了知安有倒想永惟此恩研味其旨一庵收身以時臥起語默不昧絲毫弗差蒙雜而著隨孚于嘉圓同庵銘空印之庵圓何所同睨而視之同太虛空弗設戶牖無南北東而庵中人來無所從廓然現前以道為容我此法界遇緣即宗自受用境出生無窮使令服玩地獄天宮各各無礙如空行風我非文殊齒豁頭童以問法來罄折其躬而師應機如隨扣鐘聊觀此老游戲神通不起于座瞬兩漆瞳以大千界置于針鋒以香水海藏于睫中一切人天之與魚龍不覺不知如盲如聾萬像歡呼聲摩蒼穹天魔外道以手搗胸欲折困之面為發紅如環輪上尋其始終於是雌伏仰此法雄我雖衰退氣猶如虹未甘見刪終依禪叢斯文之作蕩除執封當以理勝文則非工溈山之陰磐石可礱書以刻之昭示童蒙覺庵銘并序道人聞公以四威儀為庵而以覺名之隨身叢林之別名也余游此庵中微塵數劫適今始讀其號如人靜坐忽見鼻端心知之而不可以語人名之所解又如風中鼓橐雖有神禹之知莫能分別特相視一笑而已銘曰明暗色空成住壞即大寂滅究竟覺居以名庵是增語而我銘之添注腳如湯消冰無別冰冰湯之相未全脫何如睡足百事懶軒納林光鳥聲樂當知今在衡嶽中門外今無覺衡嶽道人撫掌笑軒渠注經不必居牛角如庵銘并序吾鄉日公謂余曰吾以經行座臥為庵以分別塵勞為如且求銘銘曰日用現前隨眠煩惱去之即生如石下草蓋其妄覺取舍顛倒小根怖之冰炭懷抱我以慧眼燕坐默觀一切異相如珠走盤是時日公非內非外是非死生合成一塊朴庵銘履長老禪而色貴白老禪有終白不受色道人游方學至無學如役六用則思返朴有山可看有飯可飽乃笑諸方何必百巧罏煙未殘跏趺袖手雪窗無塵鳥啼清晝夢庵銘并序弛擔假寐入大槐之宮嘗王者樂覺來缺申炊未及熟耳輟薪得鹿翳諸隍中俄而忘之意以為夢且行且詠路人用其語而得鹿一以為虛一以為實此世間之論也夢中無女色而欲成辦非實非虛此出世間之論也衡嶽素公高行著叢林寄傲一庵而以夢名銘曰一境圓通而法成辦五根不行而意自幻晝思夜境塵劫無間而睫開斂初不出眼知誰妙觀鏡于心宗以世校夢乃將無同為魚泳波為蝶翔空在素曲肱吉祥止躬即庵是夢問井得水即夢是庵緣飯識米於一意地無能無二若見主人夢庵俱棄癡庵銘并序衆生以貪瞋癡為三毒三毒之過能致生死諸佛以戒定慧方便觀照而用治之余至龍山翊道人引余坐於明窗淨室之間曰此吾癡庵也翊頎然秀發論議精到余不見其癡之相山雲朝升璧月夜挂翛然無營余不見其癡之理禪者方以精嚴黠慧自矜機辨逸群勝物其肯甘為癡哉顧虎頭之癡於畫王述之癡於不言率為世傳是好名之癡也上人泯泯與衆臥起不知人間是非榮辱貴賤功利如三世諸佛之白牯可謂之癡雖以自志然余以謂其未能絶對余為之銘又可乎上人之癡不事於名則余之銘於義未失銘曰導師黠慧出三界癡於無癡中致衆生疑未若翊禪淡然無為以癡為庵聊以戲之亦有癡侶論癡要訣若見大智紅罏片雪懶庵銘并序放似狂靜似懶學者未得其真而先得其似山林雲壑之人狂放一致靜懶同川然胸次涇渭笑時真率瞭然得於眉睫之間融懶亦能負米瓚懶亦能拭涕安懶亦能牧牛未能真懶也者南州仁公以勃窣為精進以哆和為簡靜以臨高眺遠未忘情之語為文字禪然則結庵自藏而名以懶殆非苟然甘露滅為作銘曰惟融與安品坐客瓚於禪林中是謂三懶秀媚精進辨慧擔板唯道人仁俱透此患水不洗水眼不見眼以之名庵蓋亦泡幻烏啼華笑曰用成辦睡起密傳露牙一盞墮庵銘心非言傳則無方便以言傳之又成瑕玷蓋言不言俱名污染飲光華笑智海簟卷非言不言驚如掣電異哉曹山法幢特建以墮一字雪諸情見在聖非貴在凡非賤雜之不藏著之難辨二乘骨驚十地魂戰而解空子乃圓笑靨善刀藏之不露鋒焰不動聲氣降伏魔怨喧寂庵銘并序高安居士王詢溫甫和易寡欲靖專無營特刻意事佛精嚴弗懈雖年運往矣而視聽聰明惟履無玷故聲稱閭里雲庵道價值天下元豐間游金陵舒王施第為寺以延叢林號內外護元祐初退休來歸說法於洞山九峰溫甫忘冠巾而師事之其法嗣佛照禪師惠泉者與之交善自泉住上都名剎士大夫有稀見之者而與溫甫日親法喜偈語酬唱不絶豈所謂千里同風者乎政和七年秋結制對其所居名曰喧寂余適以事至訪之溫甫方負暄閲經置卷坐語語少而理多於是自愧羈官四方畏首尾思蟬蛻垢紛縱浪閒曠而不可得乃銘其庵而去銘曰孰談無生唯老居士孰為聽徒團欒妻子以諸塵勞而作佛事視其家風老龐是似名聞諸方流輩追崇餘四十年一節保躬老則結屋置闤闠中即喧而寂蓋將無同賢哉斯人不二於物蹇寓于世莫知歸宿我睨而視亦見倣佛出生太虛陶鑄魔佛破塵庵銘并序道人堪師庵於水西南臺之下名曰破塵為之銘曰一大經卷破此一塵何以破之智為斧斤塵非斷空可破非有了然而知空亦不受異哉湘麓庵此老堪視其庵名如車指南堪雖可即語默弗及如指自觸如眼自覿報慈庵銘并序武寧西峰達上人年方妙而孝思度越流輩父母喪則重于墳所旦夕誦唄以時臨遂自名其庵曰報慈嗚呼達可謂知如來大師律我比丘之意經豈不曰孝名為戒乎余謂其所為有補於名教乃為之銘曰竹叢生謂之慈竹烏返哺謂之慈烏豈吾含齒而戴髮乃彼烏竹之不如故有終天之痛心再折而情枯蒔松楸以上雲雨就樹陰以縛屋廬營出世之冥福生五濁之芙蕖知輪珠以行道明月白皎其影孤念此風之可尚聊以起精進而激懦夫甘露滅齊銘并序政和四年春余還自海外過衡嶽謁方廣譽禪師館于靈源閣之下因名其居曰甘露滅道人法太請曉其說余曰三祖北齊天平二年得法於少林隱于𡷗山終身不言姓氏老安隋文帝開皇十年括天下私度僧尼驗勘安曰本無名遂遁于嵩山二大老厭名跡之纍而精一其道蓋如此余實慕之乃為之銘曰吾聞甘露食之長生而寂滅法乃有此名寂滅而生谷神不死唯佛老君其意如此我本超放憂患纏之今知脫矣鬚髮伽梨安遁嵩少璨逃潛霍是故覺範老于衡嶽山失孤峻玉忘無瑕當令舌本吐青蓮華明極齊銘并序太原王健伯強名臣惠公之子皇叔嘉王之壻方壯年則能棄官學道閲首楞嚴經至餘塵尚諸學明極即如來歎曰此如來之訓而余之志也願以明極名其齊而乞銘於余銘曰有而尋求癡暗所囿得而驚異智濁之咎濁澄暗徹自覺成就如人目睛一塵不受開睫譬生明發寄根斂睫譬死暗不能昏聖師真慈開此妙門睥睨不入夫豈知恩枵然丈室中置匡床經行宴坐晨燈夕香勿使邪念蔽常寂光夢蝶齊銘并序龍舒陳顯仁和粹而喜客慈祥而樂善宗族朋友皆稱之余以怡然居士之齊為夢蝶而為之銘曰浩蕩之春萬物發飾淮山花開麗其風日蛺蝶何為栩栩自適朱門青鞍群色棋布富貴鼎來賓客鴛鷺居士缺申蘧然而寤歲時獻壽舉杯怡然墮幘一醉其樂也天紛紛萬緒成我日用睨而視之開睫之夢明極堂銘并序道人法太少年追隨翰墨所與遊多一時顯人晚居衡嶽一衲窮年垂涕捫蝨猥衰坐睡守糞罏煨芋直名其所居為明極取首楞嚴餘塵尚諸學明極即如來義欲以道人坐進此道為之銘曰見明之時此見明者緣明開達則見暗時此見暗者不明自發見則常明寄根成就見豈明生暗能昏否我觀明暗尚難掩藏豈生死門乃欲存亡惟道人太以壁為口全機現前不落滲漏昭昭堂銘并序虎城永上人游方晚館漳水上藍余適還太原見之話臨川舊游纍日不厭時方解王事縱望雲山神魂若飛動而亦有落葉之興曰欲於崆峒之下作堂昭昭名之而乞言於余為之銘曰維塵勞海是無明窟衆生以之生死出沒而此昭昭首出萬物廓然十方寂湛遍周月惟可見而不可求倩汝名之為物之尤一堂收身丈尋之闊斂目大千都寄毫末乃欲見見如鹿方渴大哉此法明白坦夷昧者迷失知者得之故甘露滅為作銘詩要默堂銘并序南楚山水湘西為甲湘西法席保寧為甲余既幸館于其中無別職事一堂窅然終日臥聽樓鐘而已則又以今寂為甲乃名其堂曰要默為之銘曰此無比法如難信珠雖曰得之非實非虛默而未說豈有說乎虜中吾趾矢貫其膺即烹汝父遺我杯羹直中有曲令爾當行是法平等無有高下定當作佛普告來者而常不輕乃遭詬罵其珠圓徹內外俱定自牖見子呼之聽瑩顧其糞除則肯受命自是而觀則有綱宗以火觸火鍛凡聖銅縱使自返窒使求通面壁而坐理鉏而扃要使求者鼻直眼橫是為大智破滅無明提婆祖以無所嗜好祈神求信自貶其道校此兩士則為顛倒湘西之麓古屋數椽臥聽樓鐘餞吾華顛謂終不說夫豈真然一麟室銘并序南臺禪師昭公住山之明年新其丈室而以一麟名之使叢林想見哲人之遺風餘韻也甘露滅某為銘曰麒麟之性不可繫羈非如犬羊可驅東西有大比丘人類精奇在驅烏中服勤祖師及其將化使之尋思賞其神駿思則有辭衆角一麟遷其以之禪師昭公來自大溈分空印澄名譽日馳顧瞻山川憮然嗟咨想其高風屋宇故基以麟名室非苟然為佳羽百鳥宗教日衰庶異人出支此頽隳耆闍倚天勝氣華滋當磨雲根刻此銘詩宜獨室銘金沙僧道明勤道如智海事師如小朗機陪清衆於宿德寮之後別開小室僅可容膝日晏寂其中昔偉禪師在黃檗親老積翠其靜住政如此人問其故答曰聚語藏六軒銘并序端首座從吾磊苴兄遊有年方埋光彩禪林而學者已相仍矣開軒於室之後乞名於余余為名曰藏六且以諷後學事虛名為實效者耳銘曰寡欲養心以直養氣抱其德全龜以蟬蛻情緣崢嶸欲犬怒吠端方藏六攫摶無地學者闐門佇思擬議如大火聚不宿蚊蚋我觀此老非愚非慧人趨所爭師取其棄俱清軒銘曉雲滅盡群山蒼然倚杖凝睇如開青蓮夜籟以寂繞除流泉曲肱而聽如鳴朱絃有大禪衲不礙見聞以雲門印印空成文對是淨境深炷爐熏人牛兩亡蓑苙具存解空閣銘以色礙眼鏟其雲山以聲聒耳惡禽閒關有大開士倚欄微笑以眼聞色以耳觀鳥石屏玉立泉以珮鳴乃知解空不離色聲宜獨巖銘并序余性喜笑傲不了人之愛憎比坐譁衆人所鄙棄飯餘曳杖山行路窮則反會意植杖莞然一笑響應山谷之西崦幽奇可愛有巖西向洞如側磬中有石砧僅容坐臥而附巖左右偏生修竹余每至此終日忘歸既久因名其巖曰宜獨乃為之銘銘曰幽巖如磬側立山腹中有石床砥平而緑我來忘歸臥聽風竹夫物得宜如眉映目幽居情間乃名宜獨一頃之陂清飲兩鵠得其所哉此詩可録座右銘行與邪分途居與正為鄰於中有取捨此外無疏親此為朝市者言之肥家以忍順全交以簡恭好學如不及求名如儻來此為山林者言之大丈夫當期出生死生死皆由心所造心滅生死乃壞心滅則髑髏是水心生則爪皮是罪淵乎妙哉一念不生即入無垢三昧延福寺鐘銘并序梁武帝假寶公神力見地獄相問何以救之寶公曰衆生定業不可即滅唯聞鐘聲其苦暫息耳武帝於是詔天下佛廟擊鐘當舒徐其聲欲以停苦也宜豐李元與弟施延福院大鐘願資延母夫人周氏壽祺且雪夙障余以謂李氏知所施矣晉許遜白日仙去天詔書曰赦汝不事先祖之罪佳汝施藥咒水之功夫施藥咒水脫人於苦者也唐崔祐甫本貴且壽以任情殺戮囚繫不釋遂不壽囚繫殺戮置人於苦者也嗚呼壽固無象脫人之苦則增置人於苦則損夫鐘之功利博大昭著者也以之為施周氏之罪滅壽延理有固然者矣因為銘曰衆生大夢營黑業玲瓏擊鐘與開睫功德之大吾敢喋願移慈母離障結如聲度垣即超越孝哉伯仲俱勇決依仗佛力等痛切如取寓物執券牒願壽慈母春在頰如鐘常撞無盡竭政和甲午夏五月誰為銘之甘露滅童耄竹銘并序霜筠粉節貫四時而不凋者竹之性也然憐孝子之泣則為之冬茁憫忠臣之誓則為之倒植余聞心之精微不可以言傳而可以事著是二者非忠孝之著乎潛庵老人戲植獨竹於庵南之壁陰期月而筍茁蓋老人以虛心集道以高節荷法所致亦精誠之驗也余以童耄名之又為之銘曰渭川千畝潛庵一竿俯視盛衰凜然歲寒筍茁于夏解籜穎異頎然扶疏如老攜稚根豈終獨乃生橫枝如其道茂有子嗣之高情不群安樂霜雪風來有聲是隨宜說魯公玉器銘二乘馬麥為法忍饌我觀是法縱橫轉變皆即一心靈妙所現覺知見聞一一成辦色空明暗一一如幻設物譬道古聖所羡初無大小之與貴賤是故此輪真淨所建李德茂家坐中賦諸銘阮咸銘有晉奇逸製為此器以姓名之蓋琴之裔物趣幻假形因變遷但餘至音則無陳鮮琴銘材出餘燼桐生晚林見之意消矧聞其音朱絃發越夜堂秋深如見古人如得我心鏡室銘種性清瑩出塵風度開扉見之真常流注妍者所欣媸者所惡勿使癡兒呵出昏霧端硯銘破韜玉之蒼石出孕金之晴川解碧溪之封褁割紫雲之芳鮮從連眉之仙子供倒流之詞源歙硯銘二首并序東坡得唐林夫歙硯絶妙然其心甚隆坡惜之以向林夫曰琢硯者欲磨平其隆百年之後用之方為妙耳外儼豐碩中含清堅而質常潤如舌有泉滑足金光碧生霧曉平其微隆多年方妙體切玉潤膚刷絲文書城之友歙溪之珍貌貴端重德貴粹溫是故覺範於硯亦云五老硯銘并序杜季楊奉使湘南過九江見廬山而愛之得拳石於九嶷山之下類五老峰有坳其痕如硯季楊欣然置几案間名之曰五老硯余觀之於南楚門舟中為之銘曰廬山五老寒翠倚天公嘗過之望見垂涎朅來幽夢時歷其顛九嶷之下得石如拳二三君子聚首比肩豈其遊戲分身則然下有坳處形如玉淵疑有神龍風雷播掀以當吾硯刷其芳鮮醉中落筆粲然雲煙我作銘詩擘窠為鐫袖歸中朝為好事傳王裕之求硯銘為作此吾聞大梁之東郭有硯臺焉而自然成坳淵挽九江之水以為滴聚桐柏之色以為煙借溫江卓筆之峰以蘸其尖展青天以為紙書吾餞君之詩情與曠野以相連吾輩留滯南楚思上國而未得以還轅雖然會當與君握手州橋踏月以話湘川是時君必折蟾宮之桂我亦腰金紆紫揖讓于人主之前此言蓋理有固然非狂且顛也詞和陶淵明歸去來詞歸去來兮是處有山皆可歸念纏綿其世故忽感悟而增悲精誠炯而未泯齒髮逝而莫追想比鄰之驚愕疑昔人而竟非逢斷橋而植杖涉淺瀨而搊衣轉犖確之深壑開機杼於尋微宿雨初霽山氣如奔紛然落葉滿我衡門少喜翰墨餘習尚存如撫無絃如持空樽有詩情以寄目無憂色之在顏皆遇緣而一戲則何適而不安顧風物之間美欣幽鳥之關關掩殘書而意消偶斂目而深觀還諸緣以俱盡廓然獲其無還譬如人經故鄉情戀戀而盤桓歸去來兮請畢生於此游佳退藏於不言使來者之自求如薪竭則火滅知愛盡而無憂雖鯤鵬之小猶聽其自化則此道其可以告於朋儔笑我閲世如川行舟少折困於憂患老安樂其林丘嗟學者之畏影蓋餘波之末流苟就陰則影滅妄自釋而心休已矣乎吾吐斯言非其時聞者聽瑩皆遲留以針投水今無之古人不可見來哲亦難期省雜念之妨道如良苗之日耔當閉關而觀壁盍捐書而止詩不取於人而自信如子得母復何疑溈山空印禪師易本際庵為甘露滅以書招豫歸隱復賦歸去來詞歸去來兮溈山有人呼我歸碧暮雲之凝合空夜鶴之怨悲省一念之有差雖百悔其何追探蟻穴之意適俄夢覺而知非幸牛羊之弗踐有墜露之霑衣恨無前知之明及未著而知微緬懷萬峰如蹲如奔而煙霏開窈窕其門東庵西井古跡猶存俯拾枯松旋安茶樽並兩山之寒翠煮萬仞之潺顏想鍤鍬之寂子對牧牛之懶安妙機鋒之雖觸無生死之相關挹前輩之宏規揆今事而默觀唯空印之中興取高風而追還耿終力之弗寐心欲絶而桓桓歸去來兮永結無情之游蓋大欲之已去復於世而何求笑朝三而莫四紛衆狙之喜憂愛芙蓉之倚天勢獨立而無疇昔尚反顧今則覆舟弓精盡於九年履考祥於一丘卷正宗而懷之悲末學之橫流如韓信之已死而其心豈真休已矣乎溈山吾歸今其時如魚縱壑不可留今而不歸欲何之行以到為是食以飽為期雖靈根之深密護空慧以培耔聽耆年之夜語誦諸衲之清詩知沙纕之非飯情斷意訖復何疑賦王舍人宏道家中蓄花光所作墨梅甚妙戲為之賦水蒼芒而春暗村窈窕而煙暮忽微霰之濺衣驚一枝之當路蒂團紅膏之蠟色染薔薇之露柔風飄其徐來暗香滅而復著待黃昏之雪消看東南之月吐何嬋娟之殷勤獻清妍之風度方其開也如華清之出浴矯風神其轉顧蓋天質之自然宜鉛華之不御也及其落也如朝陽之奏曲學回雪而起舞乃仙風之體自輕非臭夷之藥能舉也怪老禪之游戲幻此華於縑素疑分身之藏年每開卷而奇遇如行孤山之下如入輞川之塢念透塵之種性含無語之情緒豈君王寵我太甚致我不得仙去者耶龍尾硯賦并序豫所蓄龍尾硯比他硯最賢龔德莊從豫乞曰此石宜宿玉堂豈公所當有耶既以與之又戲為之賦其詞曰柳子嘗有言曰硯之美者唯青石最賢而絳石次焉自絳青而下蓋亦不數而世亦無傳何溫然之子石出高要之晴川方其始造也祠中牢以胸祐犯驚湍之洄漩探萬仞之崖腹取徑石之堅圓褁碧草以徑出割紫雲之明鮮縈金縷於廓岸張鴝目於坳淵於是房以玉室而綈以錦衣名以虛中而以居默字之適風櫺之春晝偶莫逆於書幃管城子方蒙茸而落帽燕客儼峨峨之豐頤愛知白之盡展其底蘊而看君答煙霞之談詞粲古今於立頃而觀者若未始與聞而有知以其有是之德故君子見録而不遺也蓋嘗罥網而出鯉昭以佳瑞而生之涸於順山而鴿致浴於越池而水緇姿端重而有墨侯之封腰微坳而作郎官之狀逸于闐青鐵之群秀蟾蜍玉器之上又嘗污盧攜之怒裾印太真之醉掌泮紫金於藥鼎鎗清聲於書幌殆其棄而弗用也猶贐餘骸於弟子瘞朽骨於草莽而狂生乃以鐵竊其名而市工仍以瓦肖其像由此硯之難致故紛謬僞之欺誑也顧豫此硯之清堅出於歙溪之湄水乃陋南荒之彘肝而竊自比於龍尾勻數寸之秋光溫一片之和氣疑初得於魯祠何朴美之如此從豫游亦有年愛其忍垢之類己嗟所值之不遭紛白眼之相視獨一龔之可人輒傾蓋而見喜將提攜而去歸置玉堂之棐几稔亨奮而逃窮脫怒罵之焚毀終未免腹洞於暮年而猶勝支床於壯歲子行勉矣豫將觀子與管城輩耕於無所不知之鄉而至豐年之義理也已

body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校排律次韻曾候見寄客食石門寺而今僅兩年衰遲嗟我老邂逅識君賢聖域人稱亞儒林秀譽先未揎攀桂手已許買山錢壟麥秋期近庭槐晝影圓方思歸去日忽得寄來篇意合蒙推獎情親出愛憐格幽凌雪徑詞錦照人鮮把玩欣無猒行吟卻悵然句追工部袂氣拍翰林肩世已驚殊異名宜改半千永懷風露重繞遍舊池蓮王舍人路分生辰貴出賢王裔宗連母后因秋容漱毛骨春色照簪紳報國忠誠著驚人句法新慣看青禁月屢夢玉關塵博古知無敵窮經亦絶倫後宵通七夕今日是生辰佳氣凌湘浦非煙壓楚闉緑醽浮白蟻綺席繞花輪壽綴諸天獻詞容野客陳不凋蟾窟桂難老海山春已作瞻雙闕行看據要津功名先入手圖畫在麒麟閻資欽提舉生辰節序春將半風光過上旬人間識英物地上見麒麟凍雨晴還暗非煙夜達晨歡聲動湘楚和氣滿簪紳孝友疑無比恢疏亦絶倫一身渾是德終日不違仁夢已游青禁行當侍紫宸立朝知大體博古見全醇詩妙終聯鼎文高類過秦公廉清似玉剛正凜如神幕下名流集堂中綺宴陳貫珠歌白雪浮蟻皺紅鱗自幸承顏舊仍容造膝頻何時渡弱水同看十洲春陳奉議生辰華國生賢俊江山孕秀靈鴨頭淦水緑螺髻玉筒青敏捷收科第奇豪見典刑笑談回暖律詩句挾風霆官偶求彭澤才宜在漢庭麒麟橫逆氣鸑鷟斂修翎民訟多閒日棠陰自滿亭浪傳書課奏須看鼎彝銘仲夏逢佳節非煙聚杳冥數蓂餘一葉推道間千齡阡陌登豐後笙歌爛熳聽綺筵環妙麗壽斝捧娉婷歡洽連更燭情高促畫屏九衢花照夜萬井月開扃風颭銀河動天驚玉露零三台星密處旁有老人星次韻曾伯容哭夏均父青松傲霜雪事誤亦迍邅或脫斧斤厄則遭藤蔓纏北渠材砢礧聳壑色芳鮮不作千楹棟終為萬斛船那知過華屋長慟搖空鞭增擊疑仙去超搖棄我先但餘殷枕淚無復對床眠憶昨游湓浦曾同上紫煙春光隨杖履笑響落雲泉尚想登臨處仍哦唱和篇暗驚生死隔默數十三年臺憲登群彥秋風吹一鸇誅姦志未舍謀國疏空傳醉馭毛車度誰推日轂旋歲時嗟易得力命古難全報施徒云爾功名信偶然清忠光竹帛英氣斂山川哭子如臨敵當勾失短鋋五言律詩湘上閒居夜清暑雨過四壁草蟲鳴一枕幽人夢半窗閒月明摧頽弘法志老大住山情忽憶陳尊宿編蒲度此生西齊晝臥餘生已無纍古寺寄間房睡足無來客窗空又夕陽叢蕉高出屋病葉偶飄廊起探風簷立飛蚊鬧晚涼秋夕示超然夜色已可掬林光翻欲流一鉤窺隙月數葉攪眠秋清境扶歸夢殘缸替客愁搜詩時畫席忽覺此生浮早春山中春尚淺風物麗煙光澗草殷勤緑巖花造次香浮根爭附絡細葉正商量好在幽蘭徑無人亦自芳送僧還長沙去袂不容挽子規真滑唇煙村相送處風物更撩人麥浪空翻日花房尚鎖春遙知到湘浦蘆橘恰嘗新次韻真覺大師瑞香花淺色鬧花堂清寒熏夜香應持燕尾剪破此麝臍囊有恨成春睡無人見洗粧故山煙雨裏寂寞為誰芳次韻誼叟悼性上人井美泉先竭犀殘角有通斯人難再得陳跡已成空麈尾夢應寄楞伽寫未終平生說禪口不見怒號風除夕和津汝楫今夕亦常夕人偏故國思不堪槎凍耳聽誦未歸詩家室喧譁後深簷雨雪時爐香待清旦此意有誰知啓明軒次朗上人韻澄滓動精色開軒萬象分光無回避處眼自覆藏君霞縷縈經軸煙絲減篆文個中無賸語題目是先聞回光軒暮色眩紅碧登臨聊倚欄日終猶返照坐穩可深觀夢幻諸緣寂圓明一顆寒洞然無向背莫作轉頭看次韻黃元明靜室依清几開書映隙光悟迷初不隔語默故難藏妙可忘情會深無以意量臨機辨神駿正要略玄黃寓鍾山生涯如倦鳥棲息此山中睡足誰呼覺煙消篆已空翻經欺眼力斜日借窗紅臥聽銅瓶泣青松萬壑風讀中觀論平生智眼濁塵劫著心深長向環輪上空將始末尋十方真寂滅一念去來今妙觀調琴指知誰解賞音對雪嘗水餅雪粲羅敷喜報春呈舞腰旋風寒正密到地暖還消輕薄凌梅蕊蹁躚攪柳條幽欣嘗水餅舉箸一長謠清明前一日聞杜宇示清道芬籬外花如海閒軒小寢驚最先聞杜宇更覺近清明雲怒必為兩風和拗得晴阿芬甘劣我笑裏恰詩成閒門杯飯終永日一裘支千秋餘生已無纍此外復何求懶出門常閉欣眠榻可休拋書方手倦啼鳥破深幽四月十一日書壁夜久茅齊靜階泉繞珮鳴行高人莫識道遠自深明掃榻酬間味依蒲任性情叢林終不負一衲傲平生次韻雲庵老人題妙用軒開軒閒隱几萬象競趨陪風揭松聲去雲推山色來觀身真作夢視世一浮埃日暮庭陰轉幽禽接翅回讀瑜伽論此生已無纍一席可窮年細嚼寶公飯飽參彌勒禪懶修精進定愛作吉祥眠夜久山空寂唯聞繞砌泉鍾山有花如比丘狀出穠葉間王文公名為羅漢花僧請賦詩通力元無礙隨緣自應真此生花上露故現葉間身知見幽香在伽梨翠色新一枝聊把玩未愧鷲峰人寄題行林寺照堂聞說行林寺杳然叢秀間堂清開水鏡山好理煙鬟有霧窗呵暗無塵扉自關人牛今不見蓑苙兩俱間與性之物外不可必相看一笑休好山終入手墮甑懶回頭知復何時見聊為此日留定難瞞道眼得喪兩浮漚僧求曉披晚清二軒詩二首披衣汲南澗落葉在庭除獨立無人見幽行偏自如嫩寒冰齒頰精色到衣裾卻倚蒲輪坐橫看貝葉書旋螺堆空青重疊不容數夕陽穿貫之濃薄自呈露數點沒煙鴻一聲伐雲斧殷床鐘未消流螢自開戶春日溪行側布寶坊地白沙楊柳灣憶曾嬰死禍不自意生還已覺無鄉夢今真是故山溪花眠霧雨春在有無間送僧歸故廬投名新入社臥病偶思歸渡澗脫芒屨扶藤下翠微寒松猶帶雨瘦骨不勝衣若見翁鑽紙當施百丈機焦山贈僧二首白下門連寺清游入夢中骨驚誰囓指世事謾書空梵行芙蕖淨天寒晝火紅曉窗應破夢臥聽鳥呼風對床聽夜雨佳約是當年放曠隨緣去間心不習禪倚蒲趺足坐擁衲蓋頭眠今識君歸處齊餘有澗泉題反身軒盡力覓不得歸來題反身平生未解沒寧解救滔人有纍路岐遠無求滋味親養心唯寡欲妙物久如神宿本覺寺一宿路旁寺霜清夢亦寒憶曾游覽處來覓舊題看病衲成新塔層樓隱敗垣青山猶不老千疊似翔鸞題芝軒軒下亦何有靈芝駢秀生山川呈美瑞草木被光榮清甚紫檀露色深黃菊英武陵續遺事應著此軒名次韻王安道節推過雲蓋秀傑長沙幕高才自敏強同僚推俊逸黼坐畏剛方慣吐珠璣句宜便宴寢香秋來能過我聽雨夜連床題含容室斂足脫雙屨間房倚瘦藤百川朝巨浸一室納千燈至味寧分別常光絶減增剎塵彰帝網妙觀現層層人日雪二首今年人日雪更在末山巖瀉行想堆垛打窗時兩三夢回清語默寒重壓衣衫面壁孤風坐知誰繼夜參律管未回暖春先到曉巖與君清作對得月便成三秀色報虛幌幽欣宜衲衫相看超語默覿露不須參次韻周運句見寄頑鈍世推鄙而君偏切磋借神觀有漏騎氣到無何昔共飲臨汝今同家汨羅衡門似長吉軒蓋幾時過重會雲叟禪師氣味似前輩見之長眼明間須研法味老不減詩情草聖因蛇鬥禪枝解虎爭一堂聊寄傲疏快餞餘生次忠子韻二首湘雲刺世眼獨可著間蹤鷗迥千尋雨江寒一風旋鑽新火後初脫夾衣重坐客經年別蘭芽茁舊叢新秧翻翠浪青子退紅英穫麥風光近絡絲歡笑聲亹勝幽夢破醞造小詩成好在歸來燕營巢占畫楹和曾逢原待制觀雪魂清寒妥帖寺近汨羅江夜迥疑生月夢驚聞打窗地罏無宿火經閣有殘缸起望兜綿界誰推墮陋邦初過海自號甘露滅本是甘露滅浪名無垢稱欲知遭鎖禁正坐忽規繩海上垂鬚佛軍中有髮僧生涯何所似崖略類騰騰早登澄邁西四十里宿臨皋亭補東坡遺天下至窮處風煙觸地愁村囂聞捉拗岸汁忽西流鳥道通儋耳鯨波隔萬州趁雞行落月悽斷在蠻謳過淩水縣野徑如遺索縈紆到縣門犁人趁牛日蛋戶聚魚村籬落春潮退桑麻曉瘴昏題詩驚萬里折意一消魂楊文中將北渡何武翼出妓作會文中清狂不喜武人徑飲三杯不揖坐客上馬馳去索詩送行作此蘭叢聚貴客花輪環侍兒三杯吾徑醉四座汝為誰但覺眩紅碧了不聞歌吹翩然上馬去海月解相隨渡海萬里來償債三年墮瘴鄉逃禪解羊負破律醉檳榔瘦盡聲音在病殘鬚鬢荒餘生實天幸今日上歸艎夜坐分題得廊宇一雨餞殘暑瘴痾穌簟涼臥聞山果落起覺斛蘭香幌內水螢入階除露葉光知誰愛清境步屧響修廊出獄李生來謁出百丈汾陽二像為示因而摹之作此時即欲還谷山一鉢寄城市皤然鬚鬢長風埃窮百丈翰墨老汾陽家在青松岸門連白鳥行知誰施舟尾載我下沅湘次韻周倅大雪見寄二首萬瓦粲清曉披衣挂北窗春先歸楚國誰獨釣湘江瘴熟甘欺得詩嚴合受降更憐風絮比想見髻鬟雙白晝通紅火蕭蕭驚打窗折綿寒未透兀夢睡先降那敢犯詩壘自然摧慢幢重看寄來句呵手剔殘缸次韻卻子中學句出巡安石性夷粹公今亦重遲追惟理髮處領略辦裝時高節貫終始寸田齊坦巇功名恐未免才業係安危次韻鄧公閣睡起歸計寬為約山行短作程旅亭驚午夢布穀正催耕翰墨堪華國雲泉負此生一篇敘間適細味有餘情次韻衡山道中嶽色墮馬首嵐光忽滿襟眼寒知意適句苦覺愁侵沃野獻新緑殘晴釀晚陰天涯驚去鴈料理欲歸心贈鄒顏徒肉眼倒皮相高才多陸沉火知三日玉貧試一生心世路多追逐雲山獨見尋聖賢酌古力勸子手勤斟投老庵讀雲庵舊題拜次其韻二首但覺意清淨不知山淺深年華暗凋落老境已侵尋三世樓鐘舊一生香火心高風難補綴永愧壁間吟道鄉歸路晚世跡陷泥深老死先通耗病衰今見尋規模高世意料理住山心月在孤峰頂凍猿時一吟熏上人歸雲溪聞道衡峰北寺當猿叫村夜樓千嶂月晝榻一溪雲我慣蹈憂患君方蛻垢紛莫嫌林下石蘚涴褶衣裙題使臺後圃八首諦觀室優入聖賢域湛然觀道真一身渾是德終日不違仁深靜啼林鳥虛明見隙塵篆畦凝碧縷紅燼白灰新賞趣堂胸次有丘壑笑談無俗氛幽懷常自得佳趣與誰論曳履尋花圃扶笻卓蘚痕地嚴賓謁少卻坐看罏熏會心堂稱意有余樂幽歡常會心小山供賦詠危榭每登臨下視千峰月聊揮一弄琴尚嫌間適少富貴苦相尋阜安堂禮義成風俗豐登民阜安此堂共僚屬把酒聽吹彈地富湖山美宵晴風月寒勝游無俗韻意適有余歡戲彩堂承顏忘勢位喜懼兩遲回堂上綵衣舞樽前笑靨開金鐶應學探竹馬欲相陪未必稱純孝高風獨老萊獨秀堂天質自奇峻千尋紫翠重謾煩君獨秀不願掩群峰與客共秋晚搜詩到暮鐘夕陰寒欲滴倚檻見纖穠清音樓霧暗軒窗失風高簾幕低夜晴湘笛起樓迥嶺猿啼憑檻人如玉搜詩氣吐霓還驚一聲鴈翻影月平西蒙齊妙物雜而著深藏一默中誠為反身樂蒙亦聖人功客至風生麈吟餘月挂空莊周稱社櫟神拙意無窮次韻李方叔游衡山僧舍道鄉見城郭世路謾升沉寺勝增佳氣壁間餘醉吟僧殘過客少山好為誰深寧識通泉尉獨懷經濟心次韻謁子美祠堂顛沛干戈際心常系洛陽愛君臣子分傾日露葵芳醉眼蓋千古詩名動八荒壞祠湘水上煙樹晚微茫次韻達臣知縣祈雪遊嶽麓寺分韻得遊字叢祠香火罷山寺偶同遊爐撥紅金湧窗空碧縷浮旋敷自疊布暖甚紫茸裘試作吉祥臥夢清如素秋題夢清軒小軒人不到修竹過墻生眼倦經長掩身間夢亦清微風吹篆縷活火發茶鐺遙想佳眠夕蕭蕭雨葉聲題一擊軒閒把松枝篲掃除門徑塵驚聞一擊竹頓見十方身煙翠連窗暗霜筠解籜新老禪搆軒意應欲悟來人次韻胥學士筆下慣生春年高句法新還將吐鳳語來寄牧牛人敏若盤珠妙深如社櫟神長哦答清境璧月上重闉題曾逢原醉經堂酌古有深意開編中聖人百家笑糟粕六藝飲全醇兀若墜車適盎如浮盞春淳于吞一石同味不同塵隱山照上人求詩落髮道林寺隨師家隱山萬緣都放捨一衲遂安閒璧月照宵定金風掩晝關平生無愧業塵世許誰攀龍山亦名隱山余宣和五年十一月中浣日過焉有浙道人鴻公乞偈為作迷路不知遠但知寒日斜過溪逢菜葉西崦有人家斫額驚來客拄鋤方種畬鴻禪效古者當效此生涯游靈泉贈正悟大師支徑入山寺雲林如見招小軒臨絶壑危閣礙層霄瓶泣地罏暖屋晴巖雪消大師京國舊放意話州橋七月初九夜坐西軒雨止月出不勝清絶夜雨止還作小軒清有餘暴寒吹客夢殘響滴階除明滅青燈在簾櫳璧月孤故山歸未得千里漫平蕪甲辰十一月十二日往湘陰馬上和季長見寄小春二首雨暗書雲節梅偷破臘春里閭相餽餉風物近袁筠吳語知無伴楚衣聊試新忽驚身是客流落老湘濱風埃九十里霧雨濕馳裘鴈過回詩眼江寒聚晚愁魂清方怯雪句冷更含秋殘岸連孤嶼依稀似橘洲題閲世軒江水似人世倚欄歸思多無窮流歲月可畏易風波此與老僧看不妨間客過為君聊借榻清夢到無何雲庵生辰探手取空劫瓜分破一塵洞然無空缺獨立不鮮陳試問聲前見何如頂後親死生浪遮掩漏泄是今辰次韻濟之和劉元老偶成之句世亂驚流落名高子可依元龍謝襁負叔冶冒重闈黃屋方回望青山敢問歸三橋伏道几應嘆眼中稀贈成上人之雲居天上歐峰寺人間無事僧偶從白沙岸步入碧螺層服匿連空鉢敷羅挂瘦藤遙知雲起處一室掩香燈四月二十五日智俱侍者生日戲作此授之與佛同生月猶遲十八朝參禪唯自肯求法轉相遼谷響千斤重虛空五采描布毛吹起處豁爾萬緣消謝大溈空印禪師惠茶鐘鼓五千指翔空樓殿開不知大溈水何爾小南臺讓子鈯斧信閒禪春露杯故應念岑寂先寄出山來愈崇二子求偈歸江南人笑南臺小難安十八僧日貧因日富宜減不宜增忽去兩禪衲如分一室燈床寬齊頂禮睡快免相憎曹教授夫人挽詞禮敬良天性求賢比孟光搢紳聞懿淑閭里發慈祥饌按今誰舉山衣尚篋藏榮名增史牒有子類鸞皇贈尼昧上人不著包頭絹能披壞墨衣愧無灌溪辨敢對末山機未肯題紅葉終期老翠微余今倦行役投杖夢煙扉興闌春晚忽憑檻滿眸佳景來鴨頭波蕩漾螺髻色崔嵬苔嫩錢無數花殘錦上堆一甌雙井釅何必酒盈杯與海兄春寒真料峭久客厭江城雲重欲為雨風和尚未晴意隨飛鳥去事逐亂埃輕畢竟閒居好煩君念此情題靈鷲山側徑入招提回峰據極西雲虛籠殿閣地僻絶輪蹄啼鳥棲高木飛花泛碧溪誰當學龍濟垂手接群迷燈花偶書岑寂一間僧春宵清興增竹窗催夢雨蘭室對祥燈世事知虛幻人情剪愛憎短長都分定不恨百無能懷友人不見鄰峰友還同楚越遙每勞孤枕夢時過小溪橋憑檻疏簾卷臨風細雨飄何當奉一笑令我此情消賦竹龍孫盈檻秀天柱聳雲奇陰鎖安禪石根侵洗硯池瓏璁伸粉節偃蹇鬱蚪枝敢謂桃兼李羞鄰雪後姿早行失枕驚先起人家半夢中聞雞憑早晏占斗辨西東轡濕知行路衣單怯曉風秋陽弄光影忽吐半林紅賢上人覓偈懶修枯骨觀愛學文字禪江山助佳興時有題葉篇相逢未暇語輒復一粲然豈須究所學覓偈亦自賢黃蘗佛智道譽聞寰宇光華照錦江祇園居第一佛智果無雙鳳闕帝恩厚柏庭禪將降僧中真領袖傳法瑞堯邦題溈源臨機不墮照如水已知源從此常流出其聲離語言算沙嗟意馬捉月笑情猿若解提空印休登立雪軒

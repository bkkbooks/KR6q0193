body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校古詩送賢上人往太平兼簡卓首座我昔遊潛山空翠插晴煙至今清夜夢猶能歷層顛天柱如玉立貴氣朝山川下有童師廬雜遝皆奇賢卓途龍山子靖深波間蓮近聞亦分座道眼照人天道人使吳來衣裓餘芳鮮願求奇嶮句庶使大法傳一拳無背觸何處見靈源送一上人子從大梁來會我秦淮道十年三度別此別吾甘老學道如牧羊敗群者則鞭一切但仍舊自然常現前子初不衣綿而今便故絮山舟日夜逃美貌豈長住時至不相待勿恃骨肉間要當自努力譬如人上山游龍王贈雲老正中妙協百怨門寶鏡孤風天下聞緇州道價直乾坤毛骨真是延公孫楊廣山頭草木熏公獨深密護靈根衲子雷動雲崩奔暗中明露涇渭分醉李有叟笑臉溫膽大三世一口吞枯木能花為誰春春光化為吳山雲即今住山典刑存木蛇且無刀斧痕我游山隈野水濆松間見之鬢為掀留我更宿聽啼猿人間行役膏火煎公特見戲非誠言頽綱已墜引手搴乃欲奔走鞭短轅要當努力續烈焰大興洞上追曹源三月二十八日棗柏大士生辰二首大千微塵偈章句妙難求公為疏通之如海決江流堂堂鬚垂膺漆點橫清秋十虛圓當念三世集毛頭平生說禪口想見光迸浮世間眼久滅法寶空海洲年年春欲暮禪室清香留迷途指南車戴恩負山丘願從清涼山威光作依投行當方山見跬步披衣裘思慮不及處但曰剎那際不曰剎那際寧當有三世於此剎那中尚不容擬議安得有死生一切諸怖畏苦樂欣厭情及分心境異是名顛倒想不名隨順智如人游夢中所歷經千歲及其夢覺已不過食頃耳稽首願悲幢發此不傳祕願分無盡燈酬此四弘誓送常上人歸黃龍省侍昭默老心花發明照十方死生窟宅無隱藏此老唾笑生馨香法中骨髓僧中王平生一子傳餘芳譬如少林有神光只今孤憤昭默堂天魔外道走且僵夢寐想見猶清涼況子徑歸侍其傍明日扁舟浮渺茫我不得俱空歎傷但餘一句煩寄將暮阜山前為舉揚仰山久不見臨濟瘦損法身三尺長運禪人求偈石室如仄磬春雲如翠被翛然無事僧來此時枕臂無求即無憂有身還有纍永懷彭尊宿一席曾遁世天子不得臣公卿不敢致高風不可攀百世猶興起運禪佳少年杖錫成戾止偶從城郭來衣裓滿空翠覓歸如子規掉頭須去耳山林與聚落蜜無中邊味子心有分別動息若差異録以贈其行不語開笑齒餞枯木成老赴南華之命正中妙協如何會羅仙隱身露衣帶芙蓉克家桐城孫海上閒名聞至尊天書夜到道林宮大鐘橫撞山𤤮瓏山容光澤鳥聲樂一番佳氣生巖叢曹溪寶林甲天下樓觀翔空盤萬瓦夢中先已逢祖師異世曾同香火社人言骨清辟瘴霧隘詞一律撩人怒大陽直裰果有靈所至自有天龍護寄語山頭錫杖泉久枯遽湧寧非天老師不作奇特想已脫聖凡情量纏送禮禪歸臨川已披出世衣影莫落塵俗何山無叢林棲息一枝足奈何清淨心甘受熱惱毒譬如伏櫪馬心不忘馳逐又如火鐵丸氣焰不可觸禮禪客湘山山翠在眉目蓋嘗視此輩高笑一捧腹今亦欲還鄉當戒前車覆吾聞真實心不受罪與福精進緣不懈此語君勿恧送顓街坊水西南臺小精廬名雖是律禪者居粥魚茶板如指呼履聲童首鳧鴈趨分身香積太闊迂食時至則當持盂養師反哺如烏雛荷衆司更如鴈奴逢人若問明白老為言病起加清臞寄南昌黃次山次山心地平如鏡照海照毛無少賸劉公訶之昏霧蒙張公磨之復清瑩張劉皆是善知識大黃甘草各醫病驚起荷山大字遂𤤮瓏撞鐘山答應夜燈午梵賽心願望歸引領如鶴頸一朝骨祖在面前笑不成聲兩目瞪小兒化去聊折災婦翁告殂適其命但得夫妻各身健回觀閣中夜鳴磬欲知成佛妙法門不與人爭是捷徑寄題紫府普照寺滿上人桃花軒武陵源深並溪入無數桃花鬧春色水面紅雲欲崩壞波間爛錦光相射昔人誤行偶見之歸來醉眼眩紅碧秦時雞犬不聞聲但覺曉窗煙霧白那知紫府亦仙源此華萬樹燒晴川少年苾芻誰教汝照花作意開幽仙靈雲說悟被花笑南泉欺客花不言何如睡足無一事倚欄紅雨春風顛愁來想見故山路未歸先作山中篇宋迪作八境絶妙人謂之無聲句演上人戲余曰道人能作有聲畫乎因為之各賦一首平沙落鴈湖容秋色磨青銅夕陽沙白光濛濛翩翻欲下更嘔軋一十五五依蘆叢西興未歸愁欲老日暮無雲天似掃一聲風笛忽驚飛羲之書空作行草遠浦歸帆東風忽作羊角轉坐看波面纖羅卷日腳明邊白島橫江勢吞空客帆遠倚欄心緒風絲亂蒼茫初見疑鳧鴈漸覺危檣隱映來此時增損憑詩眼山市晴嵐宿雨初收山氣重炊煙日影林光動蠶市漸休人已稀市橋官柳金絲弄隔溪誰家花滿畦滑唇黃鳥春風啼酒旗漠漠望可見知在柘岡村路西江天暮雪潑墨雲濃歸鳥滅魂清忽作江天雪一川秀發浩零亂萬樹無聲寒妥帖孤舟臥聽打窗扉起看宵晴月正暉忽驚盡卷青山去更覺重攜春色歸洞庭秋月橘香浦浦青黃出維舟日暮柴荊側湧波好月如佳人矜誇似弄嬋娟色夜深河漢正無雲風高掠水白紛紛五更何處吹畫角披衣起看低金盆瀟湘夜雨嶽麓軒窗方在目雲生忽收圖畫軸軟風為作白頭波倒帆斷岸漁村宿燈火荻叢營夜炊波心應作出魚兒絶憐清境平生事蓬漏孤吟曉不知煙寺晚鐘十年車馬黃塵路歲晚客心紛萬緒猛省一聲何處鐘寺在煙村最深處隔溪修竹露人家扁舟欲喚無人渡紫藤瘦倚背西風歸僧自入煙蘿去漁村落照碧葦蕭蕭風淅瀝村巷沙光潑殘日隔籬炊黍香浮浮對門登網銀戢戢刺舟漸近桃花店破鼻香來覺醇釅舉籃就儂博一醉臥看江山紅緑眩汪履道家觀雪鴈圖水落陰湖洲渚生風折敗荷枯葦莖白沙鑿鑿墨雲重熟視滿空翻玉英湖邊兩鴈誰教汝穩臥自多高世情惠崇逸想巧圖畫定應愛汝夢漏清穎皋楚山堂秋景兩圖絶妙二首一鷗低飛落平湖一鷗驚顧行炯如紅衣脫盡蓮蓬緑翠蓋凋殘荷柄枯更有數蓬臞已老無人折之欲傾倒陌上殘紅空自好為誰點綴湖邊草溪邊兩鴨自夫婦生而能言似相語婦先浮波喜轉顧夫欲隨之竟先去水際清蘋各占叢風撼荷花已退紅不見清香雲錦段空餘霜葉伴枯蓬和李令祈雪分韻得麓字何處軥輈叫雲木植杖松間逢白足一牛鳴地兩禪叢窗戶青紅照林麓江寒雲怒相摹胡雪意欲作先停蓄連空推下翻玉英想見軒渠笑捧腹和李班叔戲彩堂李侯何以悅其親戲著彩衣覓梨棗間騎竹馬畫堂前慈顏一笑自忘老毛義捧檄難忘客茆容殺雞終得道愛公純孝配古人甚欲卜鄰安井灶送隆上人歸長沙湘中樂哉山水國道人歸去正秋色拭目重看雲蓋雲搓手新嘗橘洲橘湘西幽居多故人松下相逢應倚策開軒萬頃鴨頭青睡起一聲風月箔六月十五日夜大雨夢瑩中希夷先生海門住久不見之想眉宇夢中相見荔枝村覺來一枕芭蕉雨行藏顧影應自笑世事吞聲不容數從欲若士為遠遊莫作雲中隱身去豫作海棠詩曰一株柳外墻頭見勝卻千叢著雨時寓居百丈春晴上南原縱望萬株浩如海追前詩之失言相隨苾芻請記其事春晴積雨分陰晦林光山色生精彩間上南原看野棠一川零亂紅如海柳外一株何足道戲語謗花今日悔道人請我重賦詩倉卒煩詞為刪改山寺早秋千本蒼杉俱合抱夕陰相映寒蟬噪殘僧獨歸清入晝秋色滿庭濃可掃霜鐘初歇月未生但覺篝燈一點明階除環珮走流水樓閣誦經童子聲送僧歸雲巖和氣津津出眉宇平生快活隨緣住憶昨思山林下來如今卻向城中去燕子初飛簾幕風海棠睡重清明雨重唱龍山諸佛機紅塵動處雲成縷至撫州崇仁縣寄彭思禹奉議兄四首去年歲飢民減口晨無炊煙閒甑缶面餘菜色短氣中經營有錢易升斗抱孫買鋤今歲豐黃雲䆉稏村村同東林鼓聲是誰致聰明慈惠隴西公吏姦今古同一律邇來間見復層出一邑雀息行鏡中公則生民無別術放衙下簾調索絃來禽青李浴清泉吾儕呈押日課辦亦作岸巾相對眠我年政如牧民術敗群者去羊蕃息向來盜竊如有盟飛躡垣墻度窗隙下車夜戶民不閉終夕四鄰無犬吠一歡醉倒不須歸以磚支頭路傍睡爭歌來為民父母百里民心始安堵外臺選才第薦之何必知賢奪而去當持馬足臥車轍報汝百年終有別蹄涔不著橫海鯨簿書那容萬人傑余還自海外至崇仁見思禹以四詩先焉既別又有太原之行已而幸歸石門復次前韻寄之以致山中之信云北去憂如會澠口危甚相如跪瓦缶南歸喜勝脫鴻門那恤范增撞玉斗筠溪野寺鄰新豐亦與叢林魚鼓同懸知他日君念我定作少陵尋贊公脫桔寧知縛禪律但欲閉門長不出死禍平生九蹈之痛恨防身苦無術此言了如意在絃此心炯如月臨泉山中樂可驕稚世一榻暑風清晝眠平生心懷濟時術百未一施空歎息庭閒晝永僧至門心回酒醒月窺隙東方先生語開閉投骨心知致群吠千金珠在九重淵儻能得之必龍睡飄零乳兒失慈母來歸家山在阿堵瘴痾蒸洗百念空但有詩情磨未去虛名實禍車覆轍道鄉端與人間別膝穿木榻五十年君看此翁亦雄傑信上人自東林來請海印禪師過余湘上以贈之五湖東歸風轉柂柔櫓聲中飛鳥過開蓬不信是廬山忽驚落瀑從空墮道人箇中三十秋那知今始載歸舟白藕池邊月初吐應對鄰房說舊遊忠子移居忠子壁觀永皇暇移居自提雙不借借車祭灶非我事可聽夜舂響西舍人言渠儂大類我試手作詩便聲價我詞勿學郊島寒謫仙筆端能造化楞伽端介然見訪余以病未及謝先此寄之楞伽劇談喜高笑一鉢安巢在雲杪我游廬山二十年聞名常多識面少道林過我古南臺路逢泥軟手提帶臺輿瓦合今果爾更呼鄰僧相與來次韻雲居寺行盡崇岡與峻嶺今朝又入緣雲徑世塵已覺蛻埃輕道心遂作燖雞淨小軒容膝俯千里磨錢作鏡江山映平生林壑竟成癖南來獨覺茲遊勝無學點茶乞詩政和官焙來何處雪後晴窗欣共煮銀瓶瑟瑟過風雨漸覺羊腸挽聲度盞深扣之看浮乳點茶三昧須饒汝鷓鴣班中吸春露如未沾著則鮮趣巴川衲子求詩水西南臺底氣象緑疏青瑣湘江上門人俯檻看諸方笑聲散落千巖響巴音衲子夜椎門要識汾陽五世孫問渠何所見而去峰高難宿孤飛雲十月桃雪中桃花夜來折兒稚犯寒爭欲摘老仙呵手撚吟筆指以謂余還歎息已作匆匆十月開人間安得千年枝李端叔誕辰未見犯寒梅已有催春雨催春春未歸卻有曇花飛飛香塞世間何人知鼻處遙知與世且同波隨分盤飧付兒女雨後得無象新詩次韻雨餘步林幽松風初到面寒蟬相應鳴小立無人見但愛東南山色作旋螺轉入門庭院度飛螢梵放哀聲滿深殿用韻寄誼叟識君童牙中豈止論半面雖同萬頃山經年不相見平生草頭露蜂月跳珠轉永懷終夜不成眠但見突兀遊霄殿任價玉館東園十題涵月亭亭外物清曠人間多熱惱夜晴登此亭水月相媚皓多君心鏡空光明寫懷抱憑誰持此意舉似寒山老覽秀亭尚記登臨時風日初盎盎忽驚無邊春登我眉睫上情歡鳥聲樂意適游絲放我非連眉郎搜詩聊植杖四可亭四注開野亭面面可人意我來俯危欄蹇傲成縱倚應接迷向背轉顧風掠耳鄰寺一聲鐘墟落孤煙起第一軒名園富家致此軒冠群目檻次狀元紅窗橫尊者竹坐客定無雙試茶谷簾緑願聞聖諦義飛辨橫塵玉如春軒檻前搖緑玉杯面吹紅鱗主人飽談笑和風熏坐賓但覺天宇迥塵滓欲清辰雖非曲水會自是斜川人寒亭欲問春消息蒼茫嫩日斜茅簷聚喧雀栗林棲暮鴉絮袍裹足坐得句往往佳忽起步微月呵手拗梅花浩庵水勝萬斛舟至剛柔繞指丈夫養浩然其略蓋如此朝登青雲上正色決大事暮歸臥此庵捫虱口如耳方便堂虛空亦何有領略四時事君看繁盛時中有凋零意然省可自觀那作明日計當游無所還自住三摩地覺庵念起則為凡覺之則為聖人言此為覺此覺未真正但了一切空聖凡皆幻影宴坐不言中心波如古井鑒止軒小軒臨止水一泓湛寒碧瞭然見眉須洞徹塵不隔夫子作止觀涇渭不相入跏趺學僧禪諦視鼻端白書華光墨梅一枝已清妍交枝更媚嫵見之已愁絶那復隔煙雨錢塘千頃春想見西津渡他日到南屏莫忘孤山路惠侍者清夢軒小軒面層崖叢蕉手自種高風追二朗生涯與師共默坐每觀身爐煙作雲湧蕭蕭半夜雨亦足清君夢次韻性之一笑形骸外便能攜手行雲容與山靨今日眼偏明共坐松下石仰聽松上聲古人亦何遠安用社中名筠溪晚望小溪倚春漲攘我釣月灣新晴為不平約束晚來還銀梭時撥剌破碎波中山整鉤背落日一葉軟紅間和杜撫勾古意六首一尾掣電去萬蹄讓雄長邇來隨磨驢驅逐付廝養頓塵忽驕嘶逸韻發奇想公眼如支遁神駿蒙擊賞歲月走舟壑不能老喬松何如取塵劫安置彈指中我老世不要閉關師道蹤自欣方得計人笑伎之窮長松援丈蘿無事登青冥因緣偶然爾初非出經營我受氣類似掄材置勿聽翟公亦癡絶書門議交情午夢清斷續殷鬢飛蚊鳴微風亦見戲故掩讀殘經相見洞天曉霧重花冥冥秀句吐奇麗乃爾未忘情秋晚凋紅翠幽懷到眉峰玉纖弄彩筆落紙翩驚鴻道山歸計好高情付疏慵何獨謝夫人特有林下風暮年一杯春愁邊賴開拓醉鄉歸路穩城郭見隱約萬事付頽然破幘風墮落胸次竟何有八窗洞空廓了翁有書與謝無逸云覺範真是比丘墮馬哭淮王牧羊仗漢節古人守忠義視死如棄禊吾是真比丘死生見窟宅一飯不願餘孤坐閲歲月題延福寺壁在山為遠志出山為小草龍潛蟠則神雞雌伏知道人情難把玩過眼如電掃留雲峰下寺白髮歸去好棗柏大士生辰因讀易豫卦有感作此人間解纕沙開視兒眼前鉢飯度永日一裘支十年月巖與雲壑佳處輒留連誰云道林黠猶覓買山錢次韻周達道運句大澤深壑間難藏舟與山此身唾霧中安得長朱顏講公如夙昔婁永嘗追攀定作甕中畫磨衲映青綸次韻遊水簾洞清夜讀君詩思豁神亦傾豈惟折慢幢要已倒降旌重哦水簾句纖穠開畫屏想見落筆時繞紙走風霆游廬山簡寂觀三首廬山覺未老儼然舊風姿樹石亦仙骨逢春更華滋瓜分煙翠層千丈垂白霓貪看讓爭席舍者爾為誰蒼石大如屋古木出虯枝四注陰其下地坐黃冠師山行倦日永聚話遂忘疲行看洞中境都是寂音詩怒龍鬥未已角尾相攀牽巨石為解紛背腹遭虯纏千年毒不死槎牙帶雲煙樹間宜畫我乞與人間傳送人相送復相別不異人間月無心去復來有魄圓還缺此別興何如西風秋月初暮鴻千里至能寄八行書別人尺水未到海茲行多嗚咽病客未還家回腸蘊千結水有到海期病客歸何時臨岐一揚袂落日寒風悲信師相別子昔送我日出岫雲無心今我捨子行窮猿瞑投林勿歌行路難勿效兒女泣處處得逢渠千江共一月白日有閒吏青原無惰民為韻奉寄李成德十首李侯端自重不肯下南璧君看英特氣自可凌太白小邑試牛刀乃有政和色舉筆濡大千揮斤隘八極置之臥病軒翻身觸破壁起來一調笑庭樹掛斜日地生金色光女作師子吼此軒初不然風日穿窗牖莫作兩頭看空花竟何有客來清對榻客去閉深關聊為文字飲酬唱相往還朝來公事少白日吏長閒少年韻如春才可供十吏故人半青雲隱几肘門寐行看登玉堂清坐追陸贄朅來民訟少槐影覆閒庭看山久成癖詩眼耐空青長憐謝安石箇中著娉婷花光浮縣郭麥浪漲郊原吏散僧投謁詩成月上軒何妨橫麈尾相對兩忘言密室調弦索晴軒較畫圖撿書憑錦瑟背句遣奚奴一歡同煮茗此興不能無深原曉犁耕隔溪夜春簸竹間伊余行童稚供日課入境觀化風親視民勤惰單衣試嫩寒花下愛清晨不恨簿書惡何妨閒岸巾定應懸睿想憂樂自同民雨中聞端叔敦素飲作此寄之但見杯中春潑面不知門外雨翻盆人間萬事一虻蚊正恐卷氈為鱉飲何妨跨頃作猿蹲此生隨處有乾坤短李貌和髯似棘王郎耳熱氣如霓不知今日是何時醉鄉城郭無關鑰世路風波太嶮巇且看相枕爛如泥端叔見和次韻答之俊詞方覺春照眼秀句忽驚絲出盆睡餘兩鬢尚殷蚊行樂風軒須痛飲窮吟空屋笑愁蹲筆端浩蕩吐乾坤落筆新詩敏風雨撚鬚豪氣劃虹霓侍兒扶掖醉吟時靖節田園尋窈窕謫仙風味自嶔巇何如春甕揭黃泥再和復答道鄉是宅扶歸路法喜為妻笑鼓盆蟭螟膽大敢巢蚊遊戲秋毫鋒際立卷藏法界眼中蹲自然函蓋合乾坤醉裏兩篇開爛錦雨前千丈挂彎霓楊梅櫨橘恰嘗時自笑此生真逆旅人情何處不同巇禪心且作絮沾泥睡起又得和篇幽夢驚回煙霧帳清泉起弄雪花盆風簷斜日一區蚊淮水雨開縈練淨鍾山雲卷露龍蹲癡禪剛道屬乾坤緑髮筆端能吐鳳雪髯胸次尚盤霓道山歸去定何時身外聲名徒暴曜夢中憂患自臨巇鳥靴長恨涴塵泥復次韻句健未須纏法律飲豪那暇較瓶盆疾雷破柱一聲蚊吟狂不覺跨驢穩醉臥都忘對虎蹲箇中別是一乾坤八篇俊逸狂時語五色光芒雨後霓清吟要不負明時嗟我拙詞傷弄巧愛君難韻解平巇且歌滑路雨成泥晚歸自西崦復得再和二首人歸西崦步翠麓月出東峰湧玉盆詩如琥珀妙藏蚊摩頭長詠笑自語劃席冥搜臥復蹲筆端三昧撼乾坤衆人俯看旋磨蟻忠義平生貫日霓也知用舍各由時各處山川非設險笑中陷阱卻藏巇此時擬議轢中泥世事回頭驚破甑年華脫手墮空盆機鋒火聚不容蚊蠅蠓未欲乘風去捫虱間為抱膝蹲掌中訶子是乾坤營寨詞鋒盤屈劍吸川酒膽倒垂霓脫巾露頂笑狂時任意清閒饑得食關心名利醉登巇濁流心念已澄泥肇上人居京華甚久別余歸閩作此送之毳帽駝裘一尾輕半開便面氣如春醉歸穿市月隨人此境要非吾輩事摩頭忽憶海山濱蕨芽荔肉齒生津十分春壓能眠柳一再風撩解笑花故山應摘雨前茶從我覓詩如觸鹿為君肥字作棲鴉句中有眼莫驚嗟送因覺先南澗茶香笑語新西洲春漲小舟橫困頓人歸爛熳晴天迥游絲長百尺日高飛絮滿重城一番花信近清明妙高墨梅日暮江空船自流誰家院落近滄洲一枝閒暇出墻頭數朵幽香和月暗十分歸意為春留風撩片片是間愁

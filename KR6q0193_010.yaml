body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校七言律詩十五日立春千年像教唐朝寺雪後新年晴復陰殘僧無事春又至游客不來山自深長廊掃葉望空翠小閣卷經橫水沉三生白業有言說一念淨心無古今晚步歸西崦屋除有路入深壑曳履翛然獨往還播穀風光寒日近摘茶時節亂出間花枝重少人甘老燕子空忙春自閒歸晚斷橋逢野水更能揎手弄潺顏宗公以蘭見遺風葉蕭散蘭芽並茁一幹雙花鬥開宗以為瑞乞詩記其事深林忽見蘭芽茁不謂無人亦自賢數葉橫風作纖瘦雙花含雪吐明鮮照人秀色雖堪畫入骨真香不可傳今日東君應擇壻誰家兄弟鬥清妍黃幼安適過豫所居題詩草聖甚妙懷袖功名手未探亂頭睡美厭朝參筆端五色藻萬象胸次大千供劇談山寺尋僧宿風雨水軒見月出東南題詩滿壁龍蛇動盛事他年說草庵元夕讀書罷夜寐燈下文章已倦看欲憑詩苦洗辛酸世途忽起風波易富貴不忘貧賤難姚塢路迷安石冢桐川水落子陵灘臥聞屐響東廊靜催粥華鯨吼夜殘示忠子夢冷寒庭半夜雨幽欣臨曉一番晴柳嬌困頓欲眠去禽作清圓喚起聲曳履點殘山寺靜開經拾得紙窗明去年今日岐亭路吹鬢塵埃研足行訪鑒師不遇書其壁獨自來游微雨後道人乞食及清晨應門童子能迎客滿地榆錢欲買春花醉發狂風日釅柳眠喚起語音真政當借榻酬無事熟鼾從教聒四鄰資國寺春晚龍鄉戒曉月空斜喚起清圓響絡車燒筍餉田村窕窈拾薪煮繭語喧譁美欣崖蜜嘗新果香識山樊稱意花歸去路迷光已夕浸門春水一池蛙聞龔德莊入山先一日作詩迎之夢暖不知窗霧白寒初愛縠羅輕欣聞明日一龔至想見隨軒二李行夜雨曉晴寒食近水流花發子規聲披襟散坐青林下依約斜川萬古情晚秋溪行熟路沿溪過石橋掃除秋晚淨迢迢幽尋忽見蘭芽茁小立仍逢柿葉飄撲摝水飛雙去鳥𤤮瓏山響一聲樵歸來半掩殘經在燕寢香凝碧未消張氏快軒草樹分明天遠大酒闌登賞更從容眼寒數點鴈橫雨耳熱一窗風度松光滑紙開秋色闊淋漓墨潑暮煙濃欲傾蛟室瓊詞句試借溫江卓筆峰一作替秋晚同超然山行諸方游遍渾如夢古寺歸來獨掩扃無復詩篇雲錦段但餘心境木蛇形高秋霜葉魚腮赤落日遠山螺髻青步盡松陰忽回首緑蘿疏處見溪亭送淨心大師住溫州江心寺萬鍛爐中百怨門哲人雖往典刑存掃除臨濟實頭謗稱賞黃龍的骨孫夢澤於菟三口視丹山雛鳳九苞文還鄉妙曲誰能聽一笛波心兩岸聞和清上人駒兒墮地已汗血毛骨蕭森落眼中今見馬群方弄影會看雷電疾追風媒龍何止十倍價凡馬終當一洗空我是道林能賞駿識君語妙到無同升上人過石門門巷榆錢疊紫苔十年心事首重回暑風院落書籤響煙雨江村畫牒開瓦枕藤床初破睡蔗漿冰碗欲生埃風簷獨立看遺照忽有溪僧犯犬來夏日偶書二首碧縷橫斜試水沉紅腮甘冷嚼來禽含風廣殿聞棋響轉日回廊暗柳陰強撚冰紈餘睡色倦憑棐几適閒心攀翻涴衲黃塵事過眼雲蹤不可尋偏地知誰柳際門消間自掃竹西軒井花曉汲聞餘滴篆燒風摧覓舊痕夢境消磨驚歲月道鄉倣佛見藩垣寶書半摺山房寂臥聽嬌鶯說怨恩鄒必東竹枕黑甜誰欲當閒味此枕令人穩稱心風骨子猷居處竹典刑元亭醉時琴宜籠霧鬢清圓語聽學朱絃發越音不用製囊裁古錦春寒長搭鬧花衾竹爐博山沉水覺塵埃旋斫凌雲緑玉材自拭錦繃含淚粉要焚銀葉返魂梅意消未掩黃庭卷火冷空餘白雪灰應把熏衣閉深閣流蘇想見畫屏開七月四日晝夢雲庵和尚教誨久之而覺作此示超然夏窗午睡誰呼覺院靜惟聞繞砌泉夢裏緒言猶可記壁間遺像尚依然襯珠定使拳披見坐榻當令膝處穿塔在層峰衰眼力何時同汝掃頽磚雲庵塔有雙桐作此寄因姪十年不掃先師塔聞有雙桐護石根多寶佛應分半座主林神對現前身詩成坐對南州祖寫寄山中玉澗因他日就陰當縛屋歲時香火願為鄰中秋對月好天涼夕病衰餘散步中庭瘦策扶禪客相逢宿山寺玉輪同看上雲衢十分歸思懸江國一半秋光入鬢鬚草露濕衣香霧重更將毛骨洗冰壺至上高謁李先甲會淵才德修先甲志大性重遲是中可築平生基心期功名定不赦未識所與游從誰淵才人間汗血驥德修天上麒麟兒知君懷中有卿相探手但未忙取之次韻睿廓然送僧還東吳征夫應為指柴扉湖水當門可濯衣飛鳥已知今日倦舊鄰那悟昔人非山情已作燖雞淨世味真如嚼蠟微遙想夜航無管束棹歌應載月明歸送瑩上人游衡嶽紫蓋峰頭樓閣生朱靈洞口水雲晴盤空路作驚蛇去落日人如凍蟻行重郭老師今健否藏年珍木但聞名定應自掃巖邊石時發披雲嘯月聲寄草堂上人首夏年芳尚可尋興來芒屨恣登臨回頭故國煙波闊分袂幽人歲月深落日杜鵑山館靜熏風芳草柳塘陰知君宴坐忘機地謾寄新詩話此心酬潛上人滿鉤疏箔卷簷楹秋靜江天刮眼明梵冊已翻千偈妙爐香未散一堂清沾衣菊露情難釋風搖松聲夢不成我與道人緣分熟可能朝夕厭逢迎贈為上人游方昭默之子也年少辭師作遠游人言虎穴不生彪家聲自古能名世氣宇如今已食牛奪得我機方肯住從教棒打不回頭雲山萬疊翛然去江漢無風一葉舟鄧秀才就武舉作詩美之丈夫氣自磨牛斗正似豐城獄屋刀富貴豈終憑鐵硯功名先看擲霜毫蘆華未稱迎風帽紫綬從來賽緑袍杖策軍門君記取祖宗漢室舊勳勞崇勝寺後竹千餘竿獨一根秀出呼為竹尊者高節長身老不枯平生風骨自清臞愛君修竹為尊者卻笑寒松作大夫不見同行木上座空餘聽法石為徒戲將秋色供齊鉢抹月披雲得飽無童子名道員年五歲餘不茹葷隨母往來禪林旦夕稍長即與落髮覓詩作此授之氣與秋容一倍清出塵風骨自天成逢僧論性人皆說指佛高談母亦驚已覺君家鍾善慶從來我法付豪英他年勘遍諸方老古寺編蒲更道情題水鏡軒小軒明快照巖阿得道幽人喜氣多但視世間如水鏡方知夢境有山河佳眠不礙林光入清坐何妨夜月過我亦思歸老丘壑結鄰西崦肯容麼同吳家兄弟游東山約仲誠不至東山重到讀題名勝踐清游此合并霧雨開晴秋滿眼暮雲欲合句先成走禪璧月寒林靜來客蘭叢玉樹清我老吐詞如朽木蒸成芝菌報升平器之示巽中見懷次韻折腳鐺尋穩處安對君此夕久盟寒狐裘不合須羊袖藥簏何妨缺夜千秋壟此時驅健犢道山何日跨歸鸞仙爐只隔數丘耳上水船方厄瀨湍書鑒上人香嚴堂堂前叢玉知誰種叢下高人自掃除未論擊聲回顧眄先欣秀色上眉鬚隨宜萬偈風宣說頓現千身月寫摹就地對誰曾畫餅當年饞水救飢無冷然齊以身為舌毗尼藏儼此空齊鏡面清蟬蛻塵埃軒蓋集蝶成魂夢篆煙輕蘆圖世界分遺境玉麈天花委落英鉢在道山歸去好摩挲風馭笑平生謝性之惠茶午窗石碾哀怨語活火銀瓶暗浪翻射眼色隨雲腳亂上眉甘作乳花繁味香已覺臣雙井聲價從來友壑源卻憶高人不同試暮山空翠共無言訪友人二首海棠雨過尚嬌春袖手來尋林下人未話柳條堪結紐且欣梅子可嘗新孤蹤袞袞風中絮萬事紛紛夢裏塵他日別山重會面定知談笑絶鮮陳日暮荒城倚瘦藤江南春思倍添增那知淮水黃塵路忽見廬山緑髮僧乞食久辭煙際寺連床今對夜深燈明年我亦尋君去同陟天池最上層石臺夜坐二首故鄉乃有此叢林下板何妨著寂音永與世遺他日志尚嫌山淺暮年心凍雲未放僧窗曉折竹方知夜雪深琢句自應清似玉更宜坡字硬黃臨歲晚山深過客稀一燈清坐夜同誰滴階寒響雪消後通火活紅灰陷時斂目舊游真可數蓋棺前事尚難知古今不隔諸緣淨畫出巖中道者詩胡卿才時思亭祗今冢木上雲雨想見音容無恙時竟作懷歸戀雲舍空餘淚眼看風枝功名未洗終天恨歲月難忘罔極悲已覺夜林無觸鹿但看几硯出靈芝題此君軒解知無竹令人俗日報平安候起居所以此君揖冰雪長吟餘翠滿衣裾瘦行清坐搜詩處雨葉風枝解籜初試作小軒聊寄傲愛君生計未為疏喜文首座至機鋒不減矮師叔聞說叢林最飽參無暇對人收泠涕卻能為我出寒巖春江柔櫓何時聽夜雨山房且對談掣電一歡端可貴此生俱是再眠蠶超然自見軒叢林爭致致不得繭足徑來尋儼師幽境自能情外見高懷獨出世間癡清晨倚檻臨黃卷五月亂山關子規夙習尚嗟消未盡壁間時録和陶詩清大師還姑蘇塔其師骨石弔之兼簡其弟聞說高懷照雪霜道容一見自清涼今隨生死晦心月空使湖山藹德香故紙不堪看竹籠凝塵那忍拂繩床安門弟子真持遠獨為斯人未始亡閩僧不食已四十年贈之銀髮齊眉衲半肩相逢古寺獨欣然自云出嶺三千里人見空餘四十年擬欲就君求此術預憂臨食必流涎何如萬事隨緣過飢即須飧困即眠元祐五年秋嘗宿獨木為詩以自遺今復過此追舊感歎用韻示超然二首獨木江頭纜客船暮江秋色雨依然落霞片段紅繃水危岫參差碧挂天名利到頭成底事田園歸得是何年崢嶸壯志消磨盡滿目西風只自憐蹤跡漂流不繫船舊游曾到意茫然玉笙哀怨初涼夜秋月嬋娟落木天往事已嗟如昨夢壯懷無復似當年爐峰當眼空相向因念區區想見憐與客啜茶戲成道人要我煮溫山似識相如病裏顏金鼎浪翻螃蟹眼玉甌絞刷鷓鴣斑津津白乳衝眉上拂拂清風産腋間喚起晴窗春晝夢絶憐佳味少人攀宿香城寺夜晴風細月華清繞寺霜筠雪竹聲錫響僧歸帝青寶夢香人宿水沉城古今不隔塵都盡心境俱忘鏡對明枕臂曉猿三叫絶小窗燈暗讀殘經自張平道入瑤溪衝虎曾經落照村千峰盤盡始登門慣聞跛腳阿師法喜見橫行道者孫愛客精神清入畫游方蹤跡夜重論杖藜又入層雲去知有安公舊隱存九峰夜坐千峰萬峰自雲雨一宿兩宿心頽然不知人間歲云暮但覺澗風吹夜泉地爐火焰水正泣篝燈委昏僧未眠古人去我不甚遠何必想像臨遺編同世承世英世隆三伯仲蔡定國劉達道登滕王閣承英連璧光照坐更著阿隆如鼎安老兵先馳啓關鑰西山奔走登欄干劉郎端默自凝遠蔡侯奮髯牙齒寒但餘衰老百無用搜句倚欄方細看寄李大卿瓶盂又復寄西州彌勒同龕古寺幽睡起忽殘三月夏朝來拾得一簾秋浮雲世事慵料理斷梗間蹤任去留投老山林多勝概杖藜何日復同游余居百丈天覺方注楞嚴以書見邀作此寄之二首風定晴雲欲墮崩林梢樓閣旋添增一生高世清間侶千尺當門紫翠層對客不妨拴壞衲倦禪時作靠枯藤暮年古格叢林在重撥塵龕大智燈三世如來尊頂法覆藏深密碧螺寒通身是眼自不見擘面出頭窺更難四義僅能分肉髻八還終恐隔花冠爭如劈佛丹霞手揭露從教覿體看寄龍安照禪師隨分叢林古格存龍安真是泐潭孫獨持一節無求世勘破諸方不出門石虎已忘蹲草見木蛇久滅住山痕遙知百事俱衰落尚有工夫虱自捫聞龍安往夏口迎張左丞遂泝流至鄂渚相別還山作此寄之無盡龍安兩勍敵大梅龐老是同參近聞赤壁同登賞想見清風助笑談已作泛舟游夏口又成橫錫過江南歸來萬壑松聲在依舊間雲沒草庵別龍安朅來幕阜峰前寺彌勒同龕兩見秋今日他山生遠念何年此地復重游主人有道忘欣厭間客無求任去留索紙題詩聊贈別更哦江海一沙鷗次韻無代送僧歸吳春掠湓江緑染眸多情還解向東流故應夜夢清蒼勝欲趁春光爛熳游飽學尚嗟心未死痛吟已覺鬢先秋何當一棹華亭上間唱波寒月滿舟懷友人尋常輕別尚消魂何況交情過弟昆孰謂此身間日月自慚疏跡信乾坤泠泠小雨江邊路薄薄浮煙竹外村回首舊游方契闊孤舟何處宿黃昏汪履道家觀古書風流前輩已成塵筆跡猶為世所珍促膝猛觀驚盛事臨風長想見斯人氣生偉逸龍蛇動秀發精神點畫新破篋尚能多此物且欣汪子未全貧悼性上人三年三過龍安寺亹亹清談解逼人顧我偷間久無侶與君數面自成親轉頭忽作幽冥隔彈指空驚夢寐新病眼看秋欲淒眩攀翻投老一傷神秋日還廬山故人書因以為寄風葉鳴廊夜色晴隔雲微月稍分明下簾徒怯衣裳薄拂榻空驚枕簟清病眼得秋還少睡壯心於世尚多情何時卻作廬山去渡水穿雲取次行誠上人求詩我昔車輪翠裏行只今懷想似前生那知古寺僧窗下偶見高人眼倍明秋月半鉤留客意凍雲千頃欲歸情杖藜笑出千峰去添得蒼崖響答聲雪夜讀涪翁所作愛之因懷其人和韻奉寄超然溪雨初收岸草微柳絲堪入緑羅機望中情遠恨煙樹何處暖多嫌衲衣卻信真人還有夢豈關禪子未忘機春風痛與傳消息教憶舊山新翠歸公亮超然見和因寄復答之高人秀句入幽微濯出秦川錦一機剪製未為春步幛暗投先作夜行衣語尊九鼎真難荷意的千鈞善發機早晚杖藜松下見應疑劉遠谷中歸瑞香花靈根聞是花中瑞可憐亦肯乘春開色深卷肉淺巴錦香濃入骨生秦梅也知秀麗不群品最宜陰潔幽庭栽落英紅葉不忍掃從教狼藉蒙蒼苔別靈源禪師平生風骨秀琳琅水鏡胸懷未易量聲利光中忙趣少煙霞影裏淡心長雲泉隱德無情動猿鳥侵身不亂行他日定歸當卜築青藜紫蕨壯詩腸贈許秀才虯髭鐵面鶴精神水鑑心胸不受塵吹耳松風靠藜杖敞衣山月岸綸巾虎頭猿臂成何事道骨方瞳亦可人他日西湖如過我飲君一味武林春送軫上人之匡山何處高人雲路迷相逢忽薦目前機偶逢菜葉隨流水知有茅茨在翠微瑣碎夜談皆可聽煙霏秋嶺欲同歸翛然又向諸方去無數山供玉麈揮與晦叔至奉新欲去未成還執手西風疏雨晚絲絲暗驚歲月行飄忽那更人生苦別離君已到心工筆語我今歸計老茆茨冷齊後夜誰同宿莫向燈前讀此詩送敏上人密林病葉強翻紅已覺清秋夜氣濃懶復小窗邀獨秀卻應歸夢挂雙峰水分淮甸當懸席路繞匡山可振笻若見虎溪溪上月為言相憶作衰容過孜莫翁禹穴朝來散晚參一程隨便達雲巖南山任把浮雲蔽西嶺猶將落日銜幽徑野花開舊菊石床楸子下高杉投宵夜永寒無寐良憶真僧衣不蠶次韻二僧題永安壁上二休書壁詩爭妙促席吟時愧不同豪句大鯨秋駕浪俊才細馬曉追風支笻放蕩千峰裏萬事收藏一笑中約我清溪老蓮社茅茨相映小橋東贈王司法輕帆已有渡江期高會清游惜此時水閣揚煙晴試茗雪窗剪燭夜論詩衝寒遠鴈來橫浦弄色新梅半糝枝林下自知無一事亦應風月動關思和許樂天滄溟曾見化微塵花發桃源幾度春俗眼莫輕狂道士此身應是謫仙人清彈一曲悲風遠絶唱千章白雪新異日三茅成卜築卻因瓶錫得為鄰師復作水餅供出五詩送別謝之草堂野飯蜀江濱妥貼寒光刻削人忽展五篇爭疾讀便驚四座暖生春已欣蓮社風流在更覺溪山氣味新放箸翛然廬嶽去門欄他日夢應頻贈鑒上人毗尼藏出清淨寶精進林生功德香但得身心常寂靜自然毛孔發靈光蒼苔不厭芒鞋弊空翠偏宜壞衲荒好在虎溪長不出阿持何意尚遊方贈靜上人雪摧枯慮默如瘖秋壓寒松老不禁一室閉門稀識面半窗斜照自拴針重城此日留詩別疊巘何年結伴尋衰退寧堪久塵土相看滿眼是歸心表上人久事雲庵過余石門凍折枯杉已死灰豈宜安著在塵埃偎衰不入今人眼精進曾親古佛來愛子渠渠念綈惠為余得得出巖隈蒼顏華首供衰暮未死重逢更幾回次韻超然翠寒空覺此生浮歲月催人鬢易秋忽憶倚天廬嶽去更尋清境武林游情親愧與高人別興發徒煩夜月留他日西湖遠相憶為君一笑散沙鷗寄楷禪師龍蛇頭角混埃塵臨死方知老淨因三度傲辭天子敕一生甘作淨名身虎皮羊質成何事牛馬襟裾亦謾陳須信屈原千載後空門猶有獨醒人璲首座出示巽中詩左手不仁右手明懷情亦復棄藜床不知門外山花發但覺君來笑語香頎紹神情掃秋晚瘦權詩句挾風霜兩翁杖屨相追逐此夕因依夜話長贈李秀才門掩青山相並居愛君家法不蕭疏錦囊舉子能佳句瑞鳥隱公多諫書學士八磚聲價在謫仙千首笑談餘清朝第一他年事且看歸來著翠裾贈修上人我愛修公亦自賢未欣城郭愛林泉醉騎鯨背詩遺落間把牛毛字細編還我青山當夏晚乞君佳句著床前雨餘獨憑煙雲上目送孤鴻落照邊次韻超然竹陰秋夕月脅雲行夜未深滿庭風露葉辭林知誰墻外千竿竹分我窗西一畝陰山好已無歸國夢老間猶有讀書心剩題詩句酬幽隱歲月翩翩接趐禽廬山寄都下邦基德祖諸故人勢占江南三百里煙霏相映出層樓芒鞋竹杖山兼水坐看行吟春復秋浮世萬途成底事吾生一飽更何求故人京洛風埃地能信山中此樂不送宗上人歸南泉燈外佳眠試冷齊欲成歸夢暗驚回一軒秋色侵衣重半夜波聲拍枕來江國潮平人獨令海山家在意徘徊倚藤明日秦淮上看子風帆十幅開晚坐藏勝橋望石門好山千葉青蓮曉斫額令人意已消微出樓臺知有寺倦行雲樹忽逢橋此生未覺叢林負肯處真教日劫超閒拾墮薪成淺立細泉幽澗響寒蜩至圓通僧覓詩漱霧跳珠響澗泉千峰秀出雨餘天共驚繡帽銅腮老重到香罏石耳邊清境荒涼歸歎息故人迎笑尚依然明年過此還相見應及春風社燕前送僧遊南嶽古寺閒關聊作招夏秋歸思謾迢迢枕中柔櫓驚鄉夢門外秦淮漲夜潮想見舊房生薜荔不堪疏雨在芭蕉何時卻理緣雲策峰頂同誰看石橋送隆上人人生聚散等兒戲夢境紛然此一時老去漸知為客味秋來長作送人詩感君義色分心曲慰我年華兩鬢絲想見故鄉霜菊後屋頭千樹橘纍垂次韻諒上人南軒避暑人間酷暑推不去愛此南軒一榻空眼倦拋書成午睡夢悠誰復羡王公豈知塵土隨肥馬但覺熏風掠壞桐起步西園閒倚杖石榴花出數枝紅贈吳山人已得希夷旨趣深平生蹤跡任浮沉壺中景待和煙臥海上山須帶鶴尋月裏一枝慵舉手人間萬事肯關心出塵風骨憑誰識且枕焦桐混世吟東溪僧聽泉堂諸方游遍歸來晚閒構虛堂贖世紛雷轉空山動林葉雪飛亂石濺溪雲石橋舊處龍湫吼漱玉曾看嶽色分拄策眼高雙耳聵上方白塔卻親聞送莊上人歸雲居青鎖曉開殘雨上煙鬟春解笑聲中叢林今日猶雌伏膺簡當年是法雄露碗憶嘗安樂味錦籠曾著瑞香濃何時玉鉢青林下與子婆娑小立同上元宿百丈上元獨宿寒巖寺臥看篝燈映薄紗夜久雪猿啼嶽頂夢回清月在梅花十分春瘦緣何事一掬歸心未到家卻憶少年行樂處軟紅香霧噴京華次韻黃次山見寄君詩清絶似沅湘寫妙宣心氣味長地僻且為三徑樂才高真是萬夫望隨流我自分涇渭賞駿誰能略牝黃自古豐城匿神物斗牛應覺動光芒

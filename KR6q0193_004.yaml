body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校古詩同敦素沈宗師登鍾山酌一人泉鍾山對吾戶春曉開煙鬟白雲峰頂泉紺碧生微瀾經年未一酌對客愧在顏兩翁亦超放瘦策容躋攀大千寄一瞬境靜情亦間是時天慘憺佳處多遺刪立談共嘲謔豪氣破天慳臨川冰玉清風流繼東山茲遊適所願但恨無弓彎東陽丘壑姿癡絶膽亦頑孤坐巉絶處掉頭不肯還天風吹笑語響落千嵒間歸來數清境但覺毛骨寒從君乞秀句端為刻斕斑敦素坐誦公袞烏臼樹絶句歎愛不已其詩云三年逐客弄湘流華氣遮欄兩鬢秋秪有荒寒江上樹尚成詩句聚眉頭成此寄之我不識公袞時時見醉墨愛其吐詞氣人品極英特君看句中眼秀卻天下白前輩風流盡尚復餘此客世議隘不容道山歸未得三年謫湘楚妙語敵山色歸來大江南聲價長籍籍我亦不羈人夢境聊戲劇要當徑尋君已辦登山屐想見一禿翁攫攘吾輩側提舉范公開軒面鍾山名曰寸碧索詩湖山煙翠層千葉青蓮拆公家蓮菂間如眼不自覿一登功名途富貴相追迫開軒延爽氣拄笏望秀色鍾山盤萬丈雲破見尾脊殷勤度邑屋分此一寸碧升空帶青小撑漢螺髻出我亦個中人登覽增眼力知公寓逸想喧不礙岑寂給札令賦詩相顧愕坐客愧無莫雲詞涴公雪色壁次韻彥由見贈華亭富文物最後機與雲妙年翰墨場唾手立奇勳萬物鼻一堊馳掃數揮斤道人出塵者一見過所聞置之緇衣林玉石宛自分能將霅溪晝解追青龍氳超然徑高節冰雪看此君故應知見熟玉骨久受熏天眼視浮俗爭奈空煎焚我尋住山侶識子吳江濆人生各有適未易分黠嚚風物亦自私草木俱欣欣何當斷岸塢賡歌蒼石垠我詩無傑句愧子才逸群此篇頗尚有句意雅而文把玩值清月林影白紛紛高懷亦自放豈以我輩云君看功名事真如過耳蚊行將挂社籍蓮沼開奇芬勞君讀此詩正如蕕與薰與嘉父兄弟別於臨川復會毗陵君家兄弟萬人傑何止才容誇兩絶憶昨江南山盡頭西津渡口曾相別君時慘然縗制中行將扶護歸吳越我亦買舟還故山社燕秋鴻那忽説客中不覺舟壑走邇來飄忽經歲月毗陵那料又相逢喜君美髯冰玉頰竹軒堆髻話臨川清論無窮如鋸屑意消已覺在秋鄉坐令五月失炎熱歸來喜甚不成寐起步空庭聽風葉念君姓名懸睿想吳江未可停舟楫欲看騕裊付王良相鼎煩君為調燮平生無求任所見往往撩人面紅冽恃君猶作故人看此詩聊當名紙謁法雲同王敦素看東坡枯木此翁胸次足江山萬象難逃筆端妙君看壁間耐凍枝煙雨楂芽出談笑想當卻立磐礡時醉魂但覺千嵒曉恨翁樹間不畫我擁衲扶笻送飛鳥併作玄沙息影圖禪齋長伴爐煙裊王郎自是玉堂人風流合受鶯花繞何為愛此枯瘦櫱嗜好果超凡子料為君援筆賦新詩詩成一笑塵寰小送訥上人遊西湖西湖招提三百六佳處如春在眉目一番雨過吞青空萬頃無波鴨頭緑望湖樓閣獨自登煙霏向背攢寒谷想見襄陽孟浩然此中有句不容續道人生長西山阿骨清氣明韻拔俗久居京國厭塵土一夕歸心俊如鵠明窗為君研破硯落筆轉頭風雨速龍山深處如定居就彼結鄰容我卜送僧遊泗洲濁流一千里快寫如建瓴解舟東灣橋晝夜不得停忽驚萬頃碧一舉當眼青自推舴艋窗出步楊柳汀精神覺蕭散鶴雛生趐翎僧伽坐閲世層崖登青冥生涯亦何有隨處懸盂瓶洗心依老宿湛意終殘經回頭大梁夢塵迹俱雕零余亦厭久客行趁東揚舲會宿淮山陽話此遭熏蒸看君新句法霜刀新發硎余過山谷時方睡覺且以所夢告余命賦詩因擬長吉作春夢謠芭蕉莫寒心欲折密燭華光清夜白春風吹夢正扶搖樹高墮落銀蟾穴青鸞睡穩雲委地桂葉初齊香不竭千門萬戶金碧開時時忽見如花妾心清別殿聞鐘音覺來殷枕哀怨聲月廊花影無人問金鴨香消風過亭郭祐之太尉試新龍團索詩政和官焙雨前貢蒼璧密雲盤小鳳京華誰致建溪春睿恩分賜君恩重緑楊院落春晝永碧砌飛花深一寸門下賓朋還畢集碾聲驚破南窗夢高情愛客手自試春霧腳縈雪花湧聚觀詩膽已開張欲啜睡魔先震恐我有僧中富貴緣此會風流真法供定花磁盂何足道分嘗但欠纖纖捧七杯清風生兩腋月脅澄魂誰與共戲將妙語敵甘寒詩成一弔盧同冢戒壇院東坡枯木張嘉夫妙墨童子告以僧不在不可見作此示汪履道雪裏壁間枯木枝東坡戲作無聲詩霅川謫仙亦豪放酒闌為吐煙雲詞鬧傳秀色絶今古正如四月出盆絲老僧遮護不許見敲門遊客遭慢欺我來擬看亦乘興興盡卻還君勿嗤次韻太學茂千之君詩清絶若冰壺讀之六月失煩暑我雖好吟無逸才空有千篇俗於土料君肺腸飽清秋馭風騎氣無何遊投毫欲和先噪吻詩源慳澀勞拔搜吾廬題者遍今古今古當以君為優我今即死且無愧先生未識真吾羞蔡老有志好學識面于京師作此示之道人西嶽來氣與秋爭曉讀書如壁月罅隙必委照當從賢俊遊運斤端得妙儻明句中眼王良控騕裊嗟余老漸衰緑髮亦加少喜君解妙處見博而知要録余一千篇正可付一笑同歸漳水垠乘月答清嘯睡起山花開脫履萬事了金陵吳思道居都城面城開軒名曰橫翠作此贈之醉穩琴無絃乃得琴中意詩髯軒無山而有看山味青山隨意有那復問城市醉眼看雉堞便覺是橫翠因以名吾軒坐臥增爽氣春花解言語風松中宮徵我來不能辨夕陰滿窗几頗怪靈鷲峰顛狂復飛至清嘯呼白猿愧我非慧理戲題五字詩平淡出奇偉君應意挑戰詎敢摩其壘大勝賦豫虛誇詞託亡是余將北遊留海昏而餘祐禪者自靖安馳來覓詩莫煙重山翠微風壯松悲吾為五頂遊稅駕修水湄阿餘幽國來細路盤顛危褁飯夜兼程杖笠寒相追入門一調笑如獲璧與圭問來何所欲雅意在詩詞念余緑髮日不減子輩癡是中有何好迷著不自知敗煤磨破硯凍筆時呵之詩成思掀豁熟讀忘倦疲乃知少年病根蒂老未移雙林古禪宇檀越多孝慈明年東遊還買山縛茅茨市蔬近易致紅飯熟夜炊得飽即甘寢萬事付兒嬉子輩當從我林麓相追隨十年何足道樂死以為期遊薦福題淺沙泉六月稻田龜兆坼十日愁霖潦翻室試來嵒下酌此泉奇寒一泓無減溢以杯浮之著沙石戲投鮒魚露尾脊誰令空階響環珮臥聽泠然心境寂詩成窗戶濕空翠便覺西山排闥入嶽中暴寒凍損呻吟由心有癡愛癡愛乃有業因業疾病生痛此百骨節聲相成呻吟齒頰空咬齕側眠看圜扉以手枕匣褉觀此心無形安得有業結業結如空華病寧有枝葉方作是念時顛倒想即滅心造古佛樣路入法界轍稽首甘露味銷此煩惱熱御手委廉訪守二監勘釗慶裕二十三日復收入禁將入獄憂無人供飯有銀一兩錢六百以付來勝甫勝甫曰此止可辦半月過此如何余默計曰有官飯耳出嶽未兩月單身寄孤館別甑容搭餾酬以滌碗盞那知復入獄親舊無半眼但餘半月糧何以供歲晏摩娑沒柄杓準擬喫官飯來生空斂眉其室亦喟歎叢林明白老寰宇洪覺範所至神物護爾輩見不慣我説此偈已萬象俱稱贊與黃六雷三我覓應傭者忽得黃與雷結束頗精悍拱喏駭吾儕從余今幾日臨事見肺懷立身守中直勿自無疑猜為奴不欺主乃是廊廟材何必弄筆語然後為賢哉紛紛貴與賤百年同一杯弛擔坐亦汝萬事付浮埃超然攜泉侍者來建康獄慰余甚喜作此堂堂福德相凜凜龍象威天神護戒足山鳥曾巢衣彌天並輿載清涼七帝師其徒今日榮渠心終笑之一鉢遊人間不言行四時胡為肯至此驚定心愈疑乃知明月淨曾不憎污池異哉月旁星隨逐相因依群囚手加額雀息瞻梵儀吾亦失沉痾一笑歡解頤次韻雲居詮上人有感招謗坐多談近稍遵寡語仰嗟濁惡世友道終愧古君獨淡無營誦經如布穀見人作白眼此意吾亦與十年雲水間所至每同處舊遊雖陳迹歷歷尚可數更期秋風高結伴湘山去我生無寸長百事仍莽鹵不知獨何修得與君輩伍無乃造物者不殺念癡魯雲居無所為粥飯聽鐘鼓不材獲飽暖此德荷佛祖詩成自誇笑聞者亦驚顧已決寡語隄事過乃知誤畢卓臥甕邊謝琨挑鄰女見之獨傲然真情人不怒君能識此意吾語亦可恕大圓庵主以九祖畫像遺作此謝之大圓庵中亦何有但有草座枯藤枝朝來壁間亦圖畫何從貌此寧馨兒髮光抹漆膚琢玉坐睡俯然方拄頤當時兩腳不肯舉今雖有口如當時知誰逸想寓此意必也高人非畫師我遭俗瞋坐多語坐客厭處終不疑興來曳杖出門去路窮回反無澗溪見之心怍有愧色君以贈我聊針之亦知褊心當服韋命車何必先鋒為從今靖然痛堅捍正恐習氣時決隄細看忽憶孔北海曾讀曹瞞禁酒詞送凝上人我生風韻無塵埃揚清激濁心不回少年不忍混白黑出言動輒為身災突汀出岸水必拍喬木穎林風必摧乃知此世要不免毀譽於吾何有哉君今欲脫此等憂獻君一策真良謀人言白璧為石頭唯唯慎莫分劣優坐中亦復發一語衆將環視如仇讎此策簡截君牢收飽食熟睡且隨流泛然四海無不可人將愛與君同遊謝李商老伯仲見過破屋如馬廄楚囚亦王尼名士連璧來下馬氣吐霓論高玉屑鋸意妙雞駭犀君看八尺姿一尾抹萬蹄弟昆清淨妍俱當藉金閨胡為披白帢作隊趨塵泥漏風駝止臥跨海鶻方棲何時對陛下道與稷離齊功成歸修水春風雨一犁嗟余世不要所至值澗溪願從諸郎遊日涉長灌畦別潛庵源禪師寶公禁鎖尋常事形如聚墨非實然潛庵去眼十五白再見敬仰加拳拳黃龍今代南陽老而公不減真耽源眉須俱荒氣深穩幻滅都盡光渾圓公登八十我才半道義乃爾相忘年西山無時渡漳水洞壑儼在眉目前祝公勿學亮座主興來徑往呼不旋宿宣妙寺衝虎困頓歸投枕眠爛熳夜晴霜月苦睡美不知旦日高披曉緑萬事付衰懶百年炊黍久強半得憂患起臨清淺流白髮不可揀此生終一壑形勝已入眼明年定來歸茅屋並崖瞰掩門無營為一味工寢飯次韻我昔度漳海夜浪光熳熳經旬困掀簸飲食借日旦動輒值墻壁更覺歸心懶平生百念灰但有身為患臥看生與死兩者無可揀那知故園山秀色長在眼愛此清洌崖中有山房瞰會當持老齒嚼此無沙飯三月喜超然至次前韻楊柳風蕭蕭芙蕖晴熳熳水閣試新涼披衣快清旦幽居非養高一榻聊醫懶默觀四大空吾復有何患上人超詣姿叢林得精揀勿嫌白兆村真是人天眼穿雲得得來其他空非瞰遂為信宿留與子同朝飯謝忠子出山道人棄家年最少毛骨稽山冰雪妙為余遠出仙廬峰雲晴水寒秋自曉孤風峭世鳳增擊高誼映人珠自照嗟余苦遭夢幻纏龜囚蠶縛何時了明朝定向舊廬歸想見盤空雲露小當期半夜立西風月中拾取吹來嘯示忠上人啞羊苾芻紛作隊口吻遲鈍懶酬對猛公來自知足天南山爽氣增十倍為公放意談海山神頎透出形骸外八月中秋滋露華千嵒尺璧生光彩正當刻志從爐峰看子穩騎元氣背懷忠子昏花委篝燈夜雨集梧井空房嚙飢鼠壞壁咽寒蚓有生獨多艱念極淚殷枕親朋勢宜絶醜惡諱聞聽棄遺等苦李零落如斷梗忠也新數面義已到刎頸願留廣推擠守護輕軀命逐臭寧有理嗜痂亦天性人情骨肉離道義燕秦并相逢百憂中如熱啜甘冷氣清秋潑山韻勝月夕鏡何時一丘壑攜子脫塵境風林作清嘯追步千峰頂次韻彭子長劉園見花我昔海山度寒食雖有花看非故園今年寒食花又見已在故園疑夢魂虛弦喪氣念前痛瘴面敢辭增唾痕此生流落坐曠達晚悔坦率加辛勤覺城老子天乞我人品秀拔高摩雲定應分身在絳闕想見珮璫裙褶纁君看翰墨吐秀句緑楊春重含朝暾袖中功名未暇探且復行樂追幽欣陋邦忽見洛陽面為誰扶頭清露翻殘春風日太醇釅發粧初罷爭迎門豐肌忍調獺髓醫笑渦尚初紅潮溫謫仙點筆風雨疾少陵眼寒煙霧昏公獨寓之一戲耳寧用解語方佐尊夜深秉燭花不睡飲到落月窺金盆情鍾耳熱意一折賦詩繞紙風雷奔詩成我讀輒起舞自忘首禿衣紲柈泠然馭風欲仙去引手便覺天可捫歸來僵臥數屋角萬象困頓天不言石門中秋同超然鑒忠清三子玩月三年竄南荒兩過中秋夕月不棄羈囚高義照罅隙凜如寢雪霜但覺炎瘴失夢清不敢歸鯨浪濺天白中原一轉首心折數弟嫉遙知亦念我看至玉輪側有生窮至此甘作死生隔今年又中秋氣味如夙昔筠溪繞茅廬波影登几席危磴通石門高眺屢顧陟空山夜氣升草木正蓊鬱超然凜清臞可即不可及華紛落無餘但見霜露實三子新間舊學問川增益駿氣不受羈奔帆初伏櫪人生一大夢聚散兩戲劇境豈妍鄙哉而心自南北忽驚西樓高含光下注射林葉動流永楯瓦粲佳色翩然步修徑杖履草露濕地坐闃無人但聞蟲唧唧清境難抱石秀句為收拾明年當復和勝踐要綴續晴陰萬里同世路致欣戚付與市朝人舉酒相歎息月雖默不言涇渭視喧寂見蔡儒效一昨海外歸盡見故山侶夫子獨未見夢想識風度今日復何日乃獲抵掌語猶疑是夢中驚定無所睹欣然誦新詩句法雜今古初如涉微波沙石俯可數忽驚鋒刃攢凜然為毛豎可讀不可識森嚴開武庫百態出俄頃春破賴綴補詞高殆天得那借江山助人間有此客而使衣涴土君看絳闕姿矯不受控御大言蠢上商坐此得齟齬天公聊戲之一官良蹇寓天風吹緑鬢醉眼蓋寰宇閻浮一漚耳是身等唾霧功名付揶揄富貴我劇具道山弱水上凝睇隔煙雨夜晴覺天多月好笑起舞引手挽醉袂恐騎紫雲去余自太原還匡山道中逢澤上人與至海昏山店有作凶衰不祥憂患變臥念余生真自厭向時衣裓識天香朅來唾痕餘瘴面故人訶譏豈忽聞新交推擠不容喘子獨心翔異衆人追逐南來不辭遠重逢難取夢中物一歡且喜身俱健忽憶南荒海外時敢料北山松下見鶯唇清滑柳困頓醉人春色初醇釅莫涼香霧滿村落軒包到榻眠山店我已歸休萬事足但餘老眼遮黃卷靜時頎紹痛誡我先須從此焚破硯念子懷親渡大江枝葉行復登淮甸分攜一語有精神行藏直使圭無玷十六夜示超然山深久不晴領略三伏暑夜涼聞風泉疑作空階雨但覺紙窗明不知山月吐階除偶獨立滿庭浩風露室間門未掩時有飛螢度餘生願俱子萬壑千巖處艱難百憂中長恐此心負今宵復對榻樂事遽如許地偏心亦遠喜俗憂自去風光如輞川窈窕辛夷塢以短暴弟長正坐功名誤何如廬山陰一水斷世路持遠兩鏡臨於中可無睹此詩若散緩熟讀有奇趣便覺陶淵明倣佛見眉宇瑜上人自靈石來求鳴玉軒詩會豫斷作語復決隄作一首道人去我久書問且不數聞余竄南荒驚悸日枯削安知跨大海往反如入郭譬如人弄潮覆卻甚自若旁多聚觀者縮項膽為落僻居少過從間庭墮鬥雀手倦失輕紈扣門誰剝啄開關忽見之但覺瘦矍鑠立談慰良苦兀坐敘契闊誰持稻田衣包此翦翎鶴遠來殊可念此意重山嶽悃愊見無華語論出稜角為余三日留頗覺解寂寞忽然欲歸去破裓不容捉想見歷千峰細路如遺索相尋固自佳乞詩亦不惡而余病多語方以默為藥寄聲靈石山詩當替余作便覺鳴玉軒跳波驚夜壑余所居寺前有南澗澗下淺池每至其上未嘗不誦柳子厚南澗詩又恨東坡不和乃和示超然駮雲漏微日諸峰猿曉時飛簷寄木杪晴瓦暗差差意行愛倉涼地坐休頓疲哀蟬尚泣露積水欲生漪瘴痾餘睡色破裓老垂垂心事世途誤風神丘壑宜高標誰對我白鳥深自知重來應邂后歸去不須期追和帛道猷一首并序山陰帛道猷詩寄道一有相招之意曰連峰數千里修竹帶平津雲過遠山翳風來梗荒榛茅茨隱不見雞鳴知有人間步踐其徑處處見遺薪始知百世下亦有上皇民政和六年正月十日余已定居九峰而超然輩皆在已無所羡特味猷詩追繼其韻使諸子和之永懷山陰老漱流味餘津幽尋見蘭叢蒼然出荊榛便欲即之語忘其千歲人歸休正吾志理順如析薪夜舂博飯喫猶勝海南民次韻公弱寄胡強仲念昔謫海南路塵吹瘴風未即棄溝壑尚在拴索中親朋半天下萬里不一逢髯胡豈有罪乃肯與我同情親等昆弟使令惟西東時為解我語道大自不容邵陽雨中別涕淚落無從我伴有形影渠歸無僕僮三年鍛百巧遂成瘖與聾今日復何日嶽寺聞樓鐘聚觀迎萬指登睫排千峰黃泉天復見白骨肉已重髯雖未對面音問已喜通夫子佐岣嶁有道如葛洪筆力扛九鼎奇語出遽匆長篇春爭麗送我歸新豐且約老南嶽幅巾追瘦笻拊手輒大笑此計隨虛空山林當付我君事侯與公麒麟未易系健鶻那可籠重陽後同鄒天錫登滕王閣間中過卻重陽節江城風雨吹黃葉與君來遊亦偶然聚立西偏讀豐碣憑欄眼界得天多雨腳明邊飛鳥滅西山向人亦傾倒犯雲爭來獻層疊未歸負負無可言相視心知慚在頰會當卻立雲生處縱望晴江生雉堞尚喜清遊不屬人故作此詩相暖熱次韻天錫提舉攜僧登芙蓉想見緑雲徑天風吹笑語響落千巖靜戲為有聲畫畫此笑時興夙習嗟未除為君起深定蜜漬白芽薑辣在那改性南歸亦何有自負蘆圌柄舊居懸水旁石室如仄磬行當洗過惡佛祖重皈命念君別時語皎月破昏瞑蠅頭録君詩有懷時一詠次韻吳提句重九朝來多爽氣柱笏望西山看君此標致合在臺閣間賴有宗之輩文字相往還遙知醉九日紅潮生玉顏嗟豫抱瘴痾古寺長閉關亦復把霜蕊行嗅賞餘間琢詩償清境索句常苦艱愛君吐雲詞端為破天慳氣勝起疲墮語妙鐫老頑正當作小字明窗寫斕斑勸學次徐師川韻揭陽濱瘴海苦霧搏蠻煙自古無衣冠安得禮義傳韓子見而歎豈是終棄捐選士得趙德講學與周旋遂為鄉里榮士慕舊而先卻後三十載才者森排肩東甌贅華夏西漢為邊沿民俗號殷富亦有佳林泉黠者事商販朴者工力田自隋迄于唐稍知慕華軒乃有歐陽主粹然而出焉古文有師法學問知淵源其後賢者至雜遝盛中原至今號多士富貴爭熏天江南佳麗地南昌富山川幽谷抱歐峰西山秀氣連地靈祕奇運當有命世賢山輝玉韜石水媚珠懷淵君看烏衣裏俊雅爭清妍治朝開三舍精揀無遺篇幸當勤燈火無忘臨簡編會看起白屋寧遭犯青錢大當到三事小當步八磚趙德歐陽生豈獨令居前努力各自勵請視徐子言窮耕有惡歲惰農無豐年言小可喻大歲晏宜勉旃送文中北還瘴海夜成焰鬼關晝常陰柵廬餘百家間見椰子林居人例椎髻豹狼而衣襟語言不可讀冥目以意尋居然不可解欲問返如瘖君持使者節風彩動雲岑軒渠笑時語萬籟轉笙琴余方臥圜土跫然欣足音相逢春脫手歸意不可擒便覺暮雨山掃空煙翠深袍褲洗羊負項背逃芒針乃爾徑去亟翩翩出籠禽津渡已撾鼓高帆摩天心行矣勿作惡萬事付醉吟當會西林下相對説如今次韻彭子長僉判二首我窮親舊絶君來殆天遣度關一句妙不撥機自轉令人意頽然盎如醉黎衍黎人謂飲酒為衍也新詩麗吳姬霧鬢風前卷細看發豪放川奔驚地喘才高那可妒默念耳自反不禁數餘年三眠蠶欲繭思君誰與同月度微雲淺愁如羊公鶴氋氃費推遣心如旋磨驢日夜團欒轉夫子為譏訶譬説頗蔓衍愁心得少休忽作象鼻卷出門無所詣地坐息疲喘路窮輒一笑興盡復回反風光聞布穀人家初煮繭倚藤望九峰層疊分濃淺重會大方禪師霜顱玉骨眉有稜孤風照人虔敬增寒松撼空夜瑟瑟古井吞秋波不興天柱峰前額加手一別十年彈指久嗟豫塵土化征衣愛君坐中舟壑走繩床為拂兩頭塵響答空巖笑語新人間何從得此客解令寒谷夜生春大方寺送祖超然見道林方等禪師道林一身渾是德別來遙知頷髭白尚記山房夜語時睡笑訶譏盡秋色黃龍開二甘露門靈源方等真弟昆道林真珠撒羅帳昭默霧豹方埋文鵝王自應能擇乳飛黃頷得王良馭東風吹散嶽山雲道人明日當歸去故人若問老垂垂為言肘骨露麻衣赤頭已作齊眉雪自提風帽海山歸義牯快山山淺亦有虎時時妥尾過行路一豎地坐牧兩牯以箠捶地不知顧虎搏豎如鷹搦兔兩牯來奔虎棄去回往荷庠挨老樹牯相喘視同守護虎竟不能得此豎豎雖不救牯無負一村囂傳共鳴鼓而虎已逃不知處嗟乎異哉兩大武高義可與貫高伍令走仁義名妤古臨事真情乃愧汝此事可信文公語為君落筆敏風雨

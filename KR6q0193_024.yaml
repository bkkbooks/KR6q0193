body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校序送僧乞食序曹溪六祖初以居士服至黃梅夜舂以石墜腰牛頭衆乏糧融乞於丹陽自負米斛八斗行八十里朝去暮歸率以為常隆化惠滿所至破柴制履百丈涅槃開田説義墜腰石尚留東山破柴斧猶存鄴鎮江陵之西有負米莊車輪之下有大義石衲子每以為遊觀不可誣也世遠道喪而妄庸寒乞之徒入我法中其識尚不足以匡欲其可荷大法也方疊花制襪以副絲絢其可夜舂乎纖羅剪袍以宜小袖其可破柴乎升九仞之峻僕夫汗血不肯出輿其可負米乎方大書其門云當寺今止挂搭其肯開田説義乎余嘗痛心撫膺而歎者也屢因弘法致禍卒為廢人方幸生還逃遁山谷而衲子猶以其嘗親事雲庵故來相從余畜之無義拒之不可即閉關堅臥有扣其門而言者曰雲庵法施如智覺愛衆如雪峰出其門者今皆不然道未尊而欲人之貴己名不耀而畏人挨己下視禪者如百世之冤諂事權貴如纍劫之親師皆笑蹈此污而去庶幾雲庵爪牙矣於是蹶然而起曰然則無食奈何曰當從淨檀行乞亦如來大師之遺則也老人肯出則庶使叢林知雲庵典刑尚存余嘉其言因序古德事以慰其意當有賞音者耳簷蔔軒序法輪齊禪師開軒于不思議室之西薝蔔林之間因以為名門弟子告語曰吾師以異方便附物顯理蓋其華萼六出所以殊衆卉如心花發明諸地故其葉之寒茂所以傲雪霜如道根深固抑魔外故其色至潔因地法行盛明淨故其實至黃慈悲攝物道中利故余疑其説而造焉目擊而坐了無問答微風披拂枝葉參差異香郁然純一無雜鼻觀通妙聞慧現前譬如兩鏡相臨於中無像而燈忽舉知相攝入雖接武至者雲擁而集當又如百千鏡中各納燈體圓備同徹更為主客融通自在成法解脫昔黃龍三關神通遊戲於語默之外寶覺之拳獨體全露於背觸之間今禪師乃宴坐不言之中使來者嗅薝蔔焉乃翁乃祖皆以舉手動足為佛事克家之子又以清芬轉法輪非縱非橫非同非異如伊之字摩醯之目非化變諸幻而開幻衆者乎師之所示如月標指我作是説如繪虛空指非月體則此軒之所以構也空無受繪之曲則言語文字獨何傷乎禪師撫掌大笑因戲録為序使登之者援筆而賦蓋自石門某始送因覺先序覺先佛照禪師高弟也佛照於世有勝緣方其在山林也則領匡山鸞溪及其遊城郭也則住上都崇寧是望剎皆天下之冠蓋梵釋龍天之宮從空而墮者也余嘗館丈室之東見巨公要人入門下馬氣摩雲天金朱日塞門如市佛照者裙才及膝吉貝纏其脞勃窣趨迎權不韻甚矣然杖拂之下萬指隨之雖往來城郭山林二十年牧僧行道如一日者覺先陰相之也覺先有智仞能立事數蠢其師爭曲直竟袖手還江南佛照思其賢曲折呼之覺先堅臥不動政和七年春詔易天寧為神霄宮佛照以老病景德房寺覺先曰噫吾西矣秋八月朔來別坐有獻言者曰子去京三白矣乃復往如山林桎梏之機何余折之曰慈明吾祖也而以李公故西遊寶覺吾大父行也以王晉卿故亦西遊是二大老天下之奇德意有所合千里從之矧覺先以師老病而西乎行矣子於義得矣覺先欣然曰敢不受教然吾之所識皆公故人能嗣音乎余以屏迹巖叢棧絶世路寧當交公卿大夫哉脫有見問者為言未能為世收寒涕是矣中秋前三日某序送秦少逸李師尹序余久厭大梁車馬之塵而思江湖漁樵之樂故自淮宋之郊再遊匡廬南窮蒼梧休于衡山之下愛其洞壑深邃願為終焉之所林間有人焉望之如瓊林玉樹恍然如行金明緑野之郊見狂遊貴公子揖而問之則此邦賢者秦少逸李師尹輩也徐扣其所蓄蓋亦無所不觀因結為友與之遊久而益敬會天子詔下將校藝於有司送別於碧巖之阿而告之曰前志多云并汾汝洛之間土厚水深淺井十餘丈清涼甘滑土無橫文色如蒸麵故其俗重遲美茂士君子博學而知要古今光明秀傑之士排肩而出不可勝數大江之南荊湖之間其地卑濕人心輕浮偏急多爭故士君子學問苟簡切觀前代能以功名富貴終始者無幾後生未進皆以其風俗素輕浮故甘自廢棄余切以為過矣昔謝安有鼻疾故詠書之音重濁當時名流慕其為人皆掩鼻效之楊綰以清約自律而當時貴人有為減騶從者是皆以天姿嗜好成一時之風俗東甌之民朴野不學自古鮮有仕於朝者歐陽詹以秀才倡之至今號為多士潮陽在瘴海之隅民未知學韓文公以趙德為之師其俗稱為易治以是又激厲學行成兩邦之美化今之學者能知之而莫能行之行之而不見其效何哉自信之不篤自重之不至耳使其能自信雖簀中之死人足以自致青雲之上能自重其材則跨下之餓夫足以建立而稱孤豈奔走仁義有王佐之略者而以風俗為病哉蓋士能成天下之風俗而風俗有不能為士之病明矣諸君勉之吾將見君輩角立齒列出於卑薄之地仕而達發其毫末猶能無愧王謝不幸而窮蹇則猶不失為歐陽詹趙德而已其勿以吾言為誇也送修彥通還西湖序東吳山川清勝甲於天下而湖山深秀正如美丈夫之眉目大通禪師淡然無營於林石之間而聲光照曜於四海之外如曉天之日從而遊者睿郎廓然焉其高秀之韻爛然相映如長庚之星吾友彥通既以父事大通而其德友廓然又如無心之雲往來於湖山之上從容二老之間舒徐容曳油然自得其直諒多聞之實道德光華之言與夫幽尋清討之趣固已厭飫平生矣而又周遊淮海浮飄大江經行於爐峰之下久之南窮衡嶽遼繞數千里弔古聖之陳迹覽林壑之形勝求諸宗故老而扣之其異家入道之智差別之旨無所不聞於是浩然有歸歟之興為余留於湘江道林者一月既旦行余執其手而語之曰昔雪峰道經祝融人勸其一登絶頂掉頭掣肘曰青山長在知識難逢且山林雖佳於道無所益也明矣馬祖謂紫玉曰山水之秀可居益汝道氣是若有益於道者何也及觀興化之論乃曰吾雖嗣臨濟而發藥之友者大覺是已山林未暇論也而師且後之是勝侶之德其不可不重如是其甚也嗚呼是三者古之人有得於一則固已誇談於叢林而傳誦於後世矧吾彥通兼取而有之可謂盛哉獨余奇窮侵尋老境得一而志二相視無所逃其羞雖然於其私則若不足而能喜彥通之樂有餘也諸公咸賦詩而余敘此為贐彥通其見憐乎送演勝遠序余昔遊大梁經陳蔡之郊郊多美木類皆修幹矗矗上干雲漢浮陰纖穠蓊鬱垂布時方溽暑畏日流金而影不至地弛擔休於其下俯仰嘆愛念封植之勤而痛恨其何以至於此而吾不能曉也旁有薪者欣然笑曰子欲知是木所以臻此乎江南荊楚淮甸西洛山水深秀茂林碩材所至叢生年大枯倒蒼崖亂壑之旁者何限而人初不知貴陳蔡之地彌望皆鹵荒之壤民知美木不易有也爭治其地以蒔之日夕覷邏不啻如望嬰兒之長也方其童及尋漿液四達枝葉欣欣向榮時旁幹橫柯舉剪去唯餘直根根之漿液不得旁之也聚而成美材乃今之蒼然可觀仰者舉前日之剪洗封護者也余愛其語有理致嘆曰夫斷木為棋丸革為鞠亦皆有法士之志於學其可以外是乎故余見苦學者必語以此廬陵演勝遠方妙年志於為道然患其才多不知收拾聞經論之可以遊心則思奪席見文章之雄偉光秀則思倒志筆硯聽開拓正宗則思呵佛罵祖才多之過也今過余語別且欲自匡山渡大江以問其所以出生死之要而余患其才多故録蒔木之説以贐之庶他日林下爭誇臨濟之木有再茂者定吾勝遠也夫送圓上人序百丈為天下福地禪宗振于茲歲月之久寺廢為荒丘大長老肅公來中興之其子古公又能興其家昔之敗瓦朽楹今丹碧層出鐘魚轟轟衲子自遠而造晨香夕燈如安養土能回心植福於茲以其殊勝之報將如谷之答呼聲也惜乎大殿之下地荒未治有榮州圓道人慨然欲階之使登殿者入離塵三昧得佛土淨登之者且爾況施帛為之者耶圓公既出山余挽衣告之曰一切殊勝皆心所成當勇猛勿惰必有喜施之者今雖檀林吹葉會看明月滿輪一人聞之發心三道便從天降圓笑之曰有是哉因書以為送送鑑老歸慈雲寺龍安禪師之門有高弟其驚群之辨掣電之機如古風穴三聖之流元祐之初開法於西安嫚罵佛祖貶剝諸方聞其風望崖而退者不可勝數而登其門者皆一時之奇秀永安常龍安照慈雲鑑又角而出無盡居士張公嘗問道於師自稱得法上首公以文章功業為時名臣天下想其風采而不可得是二三友者獨與之周旋忘形何脫略勢位豈弟法乳之深耶崇寧二年冬公罷政府還荊南照老迎於夏口載與之俱至鄂渚而歸江山清華足以供談笑而賡酬妙語多法喜之樂余時遊湘中聞之作詩與照老曰無盡龍安兩勍敵大梅龐老是同參近聞赤壁同登賞想見清風助笑談已作泛舟遊夏口又成橫錫過江南歸來萬壑松風在依舊間雲沒草庵又聞鑑老去慈雲從公於傳慶清遊勝賞厭飫其平生士大夫聞之高其為人曰鑑公此邦之福田其可終聽其去也遣使自江陵迎還以慰邦人之思遂取道西安拜塔於山與照老經行於乳峰之下而余適在焉山谷聞鳥聲歌呼林泉津津有喜色而鑑老亦戀戀纍日不忍去余歎曰悅公雖不幸短世門弟子何其多賢也方無盡居士國論其門可炙手也獨淡若及聞其歸山林則千里與相從之又皆造不忘其師背道好利者肯如是乎作兩詩送之曰故人罷相歸田野相見遙知一粲然陌上青山嘗識面歸來白塔掃頽磚勤勞世外功名事領略僧中富貴緣又作慈雲傾法雨斬新精彩照人天其次曰悅老解為荼毒鼓平生得妙不施功欲令聞者偷心死自是群生兩耳聾兄弟赫然追父迹叢林籍爾説家風相逢一笑投針地俱是當年百衲翁此詩又敘所以南歸之意而告之曰禪師天骨開張豐顏美茂奇韻逸發談笑如雷虎穴中自不生彪然方今之世正宗甚危邪法甚熾至誠惻怛無使龍安法道下墮于地禪師其勉爾送一上人序無盡居士崇寧二年自政府謫毫蘄兩州以宮祠罷歸舟而南時龍安照禪師自西安往迎之至夏口遂與無盡俱載登赤壁余聞之作詩寄之曰無盡龍安兩勍敵大梅龐老是同參近聞赤壁同登賞想見清風助笑談已作泛舟遊夏口又成橫錫過江南歸來萬壑松聲在依舊間雲沒草庵明年夏無盡來招住峽州天寧辭之已而問來僧嘗記覺範言句乎僧誦前詩無盡欣然和之曰心月澄澄映碧潭曾參錯認作曹參若非臨濟具隻眼爭得維摩相對談萬象森羅皆拱北百城迢遁謾遊南直須取惜眉毛落燒卻山頭洛浦庵宣和四年十二月十四日龍安之門弟子義一持無盡所作照公塔銘語句來時無盡亦歿逾年矣余遊二老蓋三十年今俱成千古獨余身在然亦折困於夢幻數矣是夜義一先寢於坐念舊遊如前身事録兩詩以授之使歸舉似山中之耆年庶其哀余之志也送嚴修造序南昌千嶂深秀處忽生水沉奇材而萬峰繞之遂名香城顯觀基肇而來老頤嗣事而後殿閣如幻出唯潮音演法之堂斬新營構四方衲子鴈次猊座下而恨香花之館未具有道人嚴公犯衆請行曰吾將化十方男女檀波羅蜜之光以藻飾之使蓬萊道山萬國春回香積城頭十分月滿於是瑛禪師拊手曰諾使其客甘露滅以序送之四絶堂分題詩序宜和三年秋七月青社張廓然罷長沙之教官十五日渡湘將北歸館于道林寺攜家遍遊湘山勝處如人經故鄉戀戀不忍去門弟子相守不捨又如癡兒之嗜蜜日追隨於晴嵐夕暉之間笑語於千巖萬壑之上二十二日會于四絶堂者十人而余適至廓然顧嗟嘆息曰愛山吾天性所以遲留未發者眷此邦之多奇士也不然吾何適而不可乎余曰東坡嘗曰故山去千里佳處輒遲留此語殆為公今日之遊説也於是分其字以為韻賦詩紀其事未及點筆會余有急客至馳歸廓然與諸公登清富堂汲峰頂之泉試壑源茶下鹿苑寺散坐於青林之下久之並岸而北遂經檞林塢至南臺莫夜矣呼燈小酌劇談賦詩詩成而情不盡飲少而歡有餘是夕風高月黑萬樹秋聲廓然長揖飄然而歸道林余使人秉炬追送之明日諸公皆以詩來廓然曰湘西蓋冠世絶境而吾客皆韻人勝士茲遊也無愧山陰冶城子宜序以冠群詩之首余曰唯唯待月堂序宣和四年二月辛亥湘西真身禪寺新堂成余同道林真教禪師鹿苑希一禪師往登焉堂臨晴湖日光下徹俯見遊魚聚立縱望湘西山雲之纖穠草木之深密一覽而盡得之真教拊欄哦曰山邊水邊待月明暫向人間借路行而今卻向山邊去只有湖水無行路語未卒住持禪師妙德欣然曰吾經行諸方倦矣既老來歸將為終焉之計此句是吾心也希一請以待月名其堂而使寂音記之德公得法於智海佛印清公臨濟十世孫世為泉南人朴茂而歷落者也德效字序皇天無親常與善人是耶非耶司馬子長視德無效疑為善未必有祐之辭也伯夷叔齊死越千載有耿光蕭梁武帝亦以餓終而自瑀及遘八葉為相與唐室相終始司馬子長見於天未定之時酌其理則天之常與善殆不可誣矣譬如松柏之稚厄於牛羊雜於蒿萊人固易而疑之及其天定則傲雪霜而上青冥也南州之西嶽九江之廬阜兩者之麓山川之秀氣所鍾善人隱德之淵藪意功名富貴者輩出而近世特未有著者士論多司馬子長之疑安知盡出僧中乎高氏世為右姓詩禮世其家有奇比丘出焉石門權巽中是已吾畏友也以高才卓識振於叢林一時賢士大夫加手足之敬其姪善祐熏蒸見聞惠敏出其天姿老杜所謂毫髮無遺恨波瀾獨老成者也巽中使余字之余推為德之理以酌山川之勝盛高氏之遺慶字之曰德效巽中拊手稱善人序以授之無住字序珠之為物體舒光而自照置於盆而未嘗定衡斜圓轉不留影迹衆生妙心如之圓實無住龍女獻之達麼悟之良有以也君名悟珠圓明妙心之表也當以無住為字作字説云師璞字序充耳琇瑩瑛之珮珥夫珮珂之與琇瑩皆玉之成器者也玉之在璞其質弗妙則難以致用然則能琇瑩珮珂者必在璞而已矣學者質之不妙其安受道吾所以字僧妙瑛曰師璞彥舟字序大繹持海於淨土為親聞如水傳器鳩摩羅什於真丹為四依如印印泥其荷負大法提攜有情之功可書法王之凌煙耶舍尊者閲重翻維摩經歎曰什公真苦海法船也不然何形容不傳之妙乃爾昭著耶當時從之以遊者稱四聖與之上下議論校微爭妙聲振後世覺天之日月苦海之雲雷摩肩並首趨而出可謂盛矣殆從中世陵夷賢聖竄伏迄今咸無焉可謂衰矣於佛法衰殘之秋有一比丘粹然而出以法什自名其志可以支已墜之玄綱續將滅之慧焰吾未究其才觀其志亦可以擊節矣耶舍以什為法船余字法什為彥舟坐客肯首以為然於是乎書耳無染字序起信論曰智淨相者謂依法力熏習如實修行滿足方便故破和合識相滅相續心相顯現法身智淳淨故又曰法出離鏡謂不空法出煩惱礙智礙離和合相淳淨明故夫破和合識滅相續心則曰淳淨智出煩惱礙智礙離和合相則曰淳淨明首楞嚴曰淨極光通達寂照含虛空皆太淳故淨而明矣故太淳宜字無染易季真字序季真少儼三十歲儼入新年五十三疑我滿懷揣佛法解腰抖擻破裙衫大贍終老同香火小朗平生共石巖深炷罏香待清旦偶聞殘雪落高杉宣和五年問覺慈幾何年齒對曰二十三時湘山雪晴五更清可掬而啜也覺慈本字敬修取以慈修身吾以謂慈皆不若真因易為季真老儼書穎孺字序草木之英楩楠蘭蕙也鱗羽之英鳳鳥麒麟也然則人類亦有英乎公卿士大夫也而僧之英則異是以心空為登第以果位為階品頽然無求者出世間之相也橫肩勃窣者大福田衣也彌天之俱載者永之孤步世莫能貴賤蓋所謂穎然而出者也五羊僧名惠英年二十餘能折節讀書工作詩而未有字余以穎孺字之妙宗字序頃遊鐘山定林讀王文公壁間所書信心銘作橫風斜雲勢知為宗門之光嘆愛久之山中故老謂余言文公絶嗜此文與衲子語必誦之曰歸根得旨隨照失宗諸法要妙八言足矣有而弗知則失宗知而弗信其迷旨余偶客石霜與客夜語及之余曰文公聞絃賞音妙合雅曲如此乃知法以不生故一如以虛明故自照唯以自照故如如知白矣如珠之光還自照珠非妙心宗不能爾也坐有嘉禾上人欣然笑曰如照我名也而適捨其義豈偶然也哉余曰嘗有字乎曰未也請妙宗字其名妙宗佳妙年東吳叢林號飽參者一杖翛然如無心雲殊可人也録其序以遺之無諍字序聖如孔子老聃其言不過曰後其身而身先三人行必有我師焉偕三人必欲求師之交四海必欲後其身是其致德之隆知道之奧豈止於不與物諍而已耶曰始於不與物諍故終於天下不與己諍能與夫自堯舜以來未有不知之者何特二君子為然雖吾教亦然契經曰我得無諍三昧人中最為第一祖曰忘機則佛道隆夫與物諍者能忘機乎隆之字於文從降從生王文公曰降者隆之道是降屈自下者所以致隆也彥隆宜字無諍無諍生於極南志學之年則其藝已秀出流輩校于有司如探懷而取之今未壯歲又能訪道四方期有所豎立以端正頽綱其才敏惠如泉之稚蒙如雲之膚寸有雨天下達于四海之理固吾子字之而已尚恐其以氣自多故為字説因以告之獨不知是其意否乎寂音自序寂音自敘本江西筠州新昌喻氏之子年十四父母併月而歿乃依三峰靘禪師為童子十九試經於東京天王寺得度冒惠洪名依宣祕大師深公講成唯識論有聲講肆服勤四年辭之南歸依真淨禪師於廬山歸宗及真淨遷洪州石門又隨以至前後七年年二十九乃遊東吳明年遊衡嶽又三年而真淨終於庵自湘中歸拜塔將終藏於黃龍而顯謨朱彥世英請住臨川北禪二年退而遊金陵久之運使學士吳开正重請住清涼入寺為狂僧誣以為偽度牒且旁連前狂僧法和等議訕事入制獄一年坐冒惠洪名著縫掖入京師大丞相張商英特奏再得度節使郭天信奏師名坐交張郭厚善以政和元年十月二十六日配海外以二年二月二十五日到瓊州五月七日到崖州三年五月二十五日蒙恩釋放十一月十七日北渡海以明年四月到筠館於荷塘寺十月又證獄并門五年夏於新昌之度門往來九峰洞山者四年將自西安入湘上依法眷以老館雲巖又為狂道士誣以為張懷素黨人官吏皆知其誤認張丞相為懷素然事須根治坐南昌獄百餘日會兩赦得釋遂歸湘上南臺以宣和四年夏釋此論明年三月四日畢停筆坐念涉世多艱百念灰冷時年五十三矣追繹達摩四種行作四偈無求行曰形恃美好今已毀壞置之世路自覺塞礙始緣飢寒致萬憎愛欲壞身衰入此三昧隨緣行曰此生夢幻緣業所轉隨其所遭敢擇貴賤眠食既足餘復何羡緣盡則行無可顧戀報冤行曰僧嬰王難情觀可醜夙業純熟所以甘受受盡還無何醜之有轉重還輕佛恩彌厚稱法行曰本無貪瞋我持戒忍食不過中手不操楯風必頓息而浪漸盡離微細念方名見性既説是偈併載於此時省觀焉嗚呼孫思邈著大風惡疾論曰神仙傳有數十人皆因惡疾而得仙道何者割棄塵纍懷穎陽之風所以因禍而取福也寂音之禍奇禍也因禍以得盡窺佛祖之意不能文以達意以壽後世則思邈之論可信也記語記西湖夜語余舊閲洞上語句知悟本禪師一宗蓋神明石頭之道者也石頭為物之旨見於參同契而法眼所箋盛傳世間讀其詞與余昔所聞多異同因跋于後以自志而吾友睿廓然見之謂余曰公以法眼之玄悟尚未為知石頭之論駭人視聽業已出其語曷不亟談其故而微出疑論於其後何也余曰古之聖人有所示其言未嘗不略也非痛愛其法也以謂不略則學者不思不思而得者聞異論則惑非居之安之意余非敢上配作者然立言之體要自不得不爾雖前設未能別白其意者當試廣之夫正傳至六世而大振天下謂之宗門宗門所趣謂之玄旨學此道者謂之玄學當時之人根性猛利臻其妙者不可勝數雖石頭大恐後世不能完聞其説故見於語言此參同契之所由作也所謂宗旨者以三句標準之乃體中玄意中玄句中玄自靈源明皎潔句意相綴延至於然於一一法依根密分布處乃體中玄出又自本末須歸宗開達錯綜至乘言須會宗勿自立規矩處乃句中玄也如宗門所論以明暗相對如步之前後以理事如函蓋箭鋒之相應則非無功至玄之旨故反破曰萬物自有功物之有功則可名求之乎故終其言曰乘言須會宗以此也言有上中句有清濁暗則合其言明則亦不違其句此其所以門門之境華參錯回互而寂然依位而住也自是而論蓋石頭以三玄旨趣示於此所明法眼所談但體中玄而已故追逐其句辭而即解之而不復顧首尾立言之意也昔薦福古禪師論三玄旨趣號為明眼亦曰體中玄甚合法眼宗枝以其言印余之心合者甚多但不欲亟言之也今廓然之言為駭人視聽且使亟言之其知我愛我之深亦以之惟今不復詳論之則聞者安得不以余為誇也古之人其身可以折辱困窮之而不能屈其言者以有理也余之所談者求理之所在初不謂有法眼也法眼而之理之所在非余之所能也人之觀聽雖駭亦非世所恤也廓然笑曰安得起法眼與子辨吾不能曉子矣余歸述其語以連前説以示同學云記徐韓語徐師川曰達磨西來自五天無別職事欲傳法度生耳既不契梁高祖即北遊魏面壁坐者九年得可祖而後去初不聞張大其聲名聚千百間漢為部曲見王臣高尻而揖循廊而趨不敢仰視夫荷擔如來祕密大法得如達磨乃可稱嗣祖沙門也韓子蒼曰真宗皇帝嘗欲廢太平興國寺為倉詔下之日有僧唐突以謂不可廢真宗使中使諭旨曰不聽廢寺即斬仍以劍示之祝曰僧見劍怖懼即斬不然即赦之中使如所誡僧笑引頸曰為佛法死實甘甜之有如是僧乃可稱衲子也徐韓二公今縉紳之望皆留神內典而見識議論如此聽之令人如雪中見西河諸峰不勝爽氣季子夢訓湘山逸人毛文仲蓋東坡蘇公江湖遊舊也公歿餘十年而文仲之子學成更其名曰在庭已而夢公授以字曰季子季子喜忘寢飯客疑以問余余曰孔子夢周公因慕周公晚而嘆曰吾衰也久矣吾不復夢見周公則平日所常夢也明矣季子慕公而夢見之固其所也又何疑焉然孔子削迹伐樹不以為衰而以不夢周公為衰季子僮依紈褲谷量牛馬不以為悅而以夢東坡為悅夫聖賢之受材相遠如天淵而其好善之同弗間毫髮也客曰以季子字在庭謂何余曰世莫知其説余獨知之公於西漢尤愛賈生蘇子卿非直愛其文如盎盎之春藻飾萬物與其屹若砥柱蕩磨驚濤也愛其知為臣之大體而已生為懷王傅王墮馬死生哭泣至死寧獨不知哭泣不能生王於死中耶其心以謂職傅而王終非其道也子卿使虜不肯辱命雖餐氈寢熅牧羊海上起止仗漢節李陵諷使降則請效死于前子卿寧獨惡其生耶其心以謂職稱奉使敢愛死哉東坡意若曰至士立朝之節而遠有不同然其學同出於吳季子而不可誣也季子挂劍徐公之墓不以死生背其心則稽之操履何嘗以用舍背其心今死向千載其蹇蹇凜凜之姿未嘗不在漢庭也公以季子字之如易之垂象意於不言之中使學者自求之耳客噫嘻曰使東坡復生不能自解免矣遂去答郭公問傳燈義太尉都丞旨問所謂傳燈録是何義對曰昔達磨大師佩佛心印於梁普通之初至震旦時學者方以講觀相高達磨大師乃曰吾不立文字直指人心見性成佛如來教外別行傳上根輩人始疑之久而疑信者相半艱難險阻六傳而至曹溪大鑒禪師當唐神龍中天下之疑卒不疑勝信者之多於是源分派別而為南嶽青原兩宗枝派蔓衍而為雲門臨濟曹洞溈仰與大法眼之五家其道遂大振於聖朝景德中東吳僧道原披奕世之祖圖集諸家之語録由七佛以至大法眼禪師之嗣凡五十二世一千七百一人成三十卷目之曰景德傳燈録詣闕上進奉冀流布章聖皇帝詔翰林學士右司諫知制誥臣楊億等同加刊削俾之裁定夫所謂佛心印者衆生靈智之府也其體本自妙而常明雖萬類紛然日用殊趣而文彩粲然明了不差毫末其知之者謂之神通光明藏謂之光嚴住持其不知者謂之生死趣謂之無明始自故證發雖悟如釋迦文佛亦緣然燈記莂則師承機語之自其可廢也法華經曰世尊放眉間白毫相光照東方萬八千世界而彌勒發問文殊決疑以謂日月燈明佛本光瑞如此持是經者妙光法師得其證者普明如來維摩經為魔女説法曰有法門名無盡燈汝等當學無盡燈者譬如一燈然百千燈冥者皆明明終不盡如是諸佛菩薩開導百千衆生令發阿耨多羅三藐三菩提心於是其道意亦不滅盡隨世説法而日增益一切善法是名無盡燈此其義也又問如何是傳燈旨要曰晝夜分明瞞他一點也不得記福嚴言禪師語余既至衡山福嚴長老言公曰今年五月當有災不可逃過是乃畢世安適耳問其故曰運厄於珀鬼耳五月二十八日太原造大獄來追對驗十月六日得放夜宿溝鎮中中夜行荒陂陰晦迷失道路有光飛來照行坐休則光為止起進則導之至榆次凡百里而曉光乃沒於是口占曰大舜鳥工往盧能漁父歸神光百里送鬼事一場非明年春見超然於海昏夜語及之書以示素所辦送者因覺先忠無外政和五年三月二日題

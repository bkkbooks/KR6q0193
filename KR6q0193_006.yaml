body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校古詩寄彭景醇奉議我庵湘山麓君家湘江尾共看湘山雲同飲湘江水君有負郭田飽食驕稚世小兒探井臼大兒了租稅我獨生事拙饘粥每不繼君如李大夫時時容乞米永懷湖山堂風物自閒美楞嚴初讀罷篆冷空窗几微風拾殘紅幽鳥妨春睡蒼苔滿門巷榆柳陰覆砌杖策亦窺園悠然望層翠歲時無營為祭奠修家禮自覺去幼安正復不遠耳遙知讀此詩欣然開笑齒宿湘陰村野大雪寄湖山居士夢回聞打窗曉起喜覆瓦江山驚晝永秀色玄相借升鞍風便旋浩蕩春隨馬不憂江瘴生更喜麥連野湘山宜可老慶弔同里社乃爾廢推擠眷此多賢者湖山薝蔔林為我花連夜想見老居士擁衲清入畫山陰興未盡玉麈思對把政恐觸機鋒怒遭握拳打遙知和此詩呵筆意閒暇妙語鬥清妍正圍紅紛寫景醇見和甚妙時方閲華嚴經復和戲之夫子和雪詩放意如注瓦手搏華嚴界笑中已見借高詞師棗柏寧暇數班馬如登妙高峰如游廣莫野怪公個中人亦入此保社朝來誰扣門寂音老尊者扶笻坐山堂詩眼不知夜不入人閒世誰將作圖畫但缺維摩女玉骨無一把紛紛散奇英梨花風雨打湖山晚多態應接殆未暇此詩聊戲公詩成還自寫雪霽謁景醇時方𡎺堤捍水修湖山堂復和前韻𡎺堤蓋南堂雪霰響新瓦我踏雪泥至自攜雙不借愛公有俊氣句法洗凡馬清婉繼彭澤寒陋笑東野願為西崦鄰投名入詩社餘年吾事濟過從有公者何時聞折竹燈火共清夜曉堂人未掃如開輞川畫平生學牧牛鼻索嘗自把而今失所在寧復事鞭打吾詩一寄耳雕琢特未暇且欣兩俱健意氣要傾寫和景醇從周廷秀乞東坡草蟲周髯迂闊亦自笑安樂飢寒奈嘲誚東坡墨戲偶得之保藏更作千金調自言吾富可坪國癡病已深那可療坡初畫此適然耳髯以夸人無乃勦彭侯滿腹是精神翰墨行藏兩俱妙應嗟玩物非尚德未欲奪攘投火療乞之如易紫香囊豈弟高風珠自照此詩醇釅等佳醞為君滿引那辭釂題萬富樓賢為萬人英筆力挽萬牛寶帶腰萬丁封及萬戶侯彼富一二數其實富未周君看清曲江傑立萬富樓山川占形勝佳處橫高秋丈人披白帢憑欄清兩眸凜然無求姿一洗驕氣浮郿塢癡肉臠金谷酒色囚名均謂之富涇渭實異流余窮蓄一喙得飽事事休貧富若天淵飽豈有劣優此詩如橄欖初嚼欲棄投終然成可口味永當見收湘西飛來湖武林散煙鬟一峰螺髻孤煙雲有奇態華木秋不枯理公何許來望見輒軒渠曰此靈鷲峰何年來飛乎個中有白猿為子抵掌呼至今呼猿澗飛波跳碎珠竭來楚國南萬山爭走趨精廬開橫塘清可照眉須高人家武林致此從東吳那知湘水西乃有飛來湖連蕩滿秋色小艇藏菰蒲閒來倚危檻對立鷗炯如我與湘峰色俱堪入畫圖次韻周達道運句二首問人欲買山便應知官情詩眼豔秋水袖手望空青家蓄不貪寶寸田常自耕永懷柴桑歸悠然見真誠不甘口腹纍折腰求乳腥偶題五字句醉墨半欹傾麒麟入圖畫鼎彝書姓名何如癭瓢中獨酌郎官清鳥啼春寂寂院靜花冥冥懸知睡足處衾暖紙窗明朱門連大藩知是故人宅登門一笑歡忘其身是客叢林斷岸西聚落一水隔欲知往來數雞犬亦相識人情改朝夕世議苦迫窄公輩月輪高不涴濁流色撥書臥清曉井汲聞餘滴職嚴賓謁少境靜意自適嗟余眷閭里邊風馬嘶北公賢義當親此外吾何擇瘴痾蘇晝簟小寢喧鼻息夢驚哦公詩清歡洗岑寂大雪寄許彥周宣教法弟湘西雪連日荒寒發明鮮誰持華藏界墮我宴坐邊遙知毗耶老薝蔔開滿前想見散華女笑頰微渦旋不受禪律縛尚遭富貴纏遊戲翰墨中骨清聳詩肩白灰紅麒麟玉液黃金然醉眼豔秋水落筆驅雲煙放意吐秀句與雪爭清妍我詩出寒餓苦語秋蛩煎定作笑拊掌望空鬚一掀臥病次彥周韻臥便午簟袪殘暑誰令殿閣風鷗語君來談笑破岑寂尉此經旬攜手阻湘山解事不須招數峰入座爭翔舞心知清境世不要勝踐從來數支許戲將平時說禪口貶剝諸方呵佛祖眼高叢林不見人但許南臺稱法乳忽驚詞鋒亂斫伐披靡千人如項羽詩成相對兩咨嗟此生俯仰成今古次韻朝陰二首轆轤曉汲罷幽響聞餘滴不知雨毛空但覺炊煙濕閒居少過從屋角寒藤入夫子獨念我問訊常絡繹時來歎柴扃飢飽共休戚此詩麗如春妍暖破岑寂如追薊子訓可望不可及稻田翠浪翻風葉朝露滴按行阡陌閒歸來袍褲濕駮雲漏日腳窗戶空翠入當年走京塵日莫馳山繹此生彈指閒強半是悲戚朅來效支遁買山老閒寂君真許詢輩詩語時見及余病脾氣李宜中教余服仙茅乃從彥周乞之彥周祖肩荷臨濟呵余鈍根敗闕病輒服藥是以生死為二耶得藥作此謝之嗟余早衰人多病良業疾脾勞禁晚餐腿重怯下濕爾來又增添冷氣攻脅脊愁坐如蹲猿呻吟喧四壁聞世有仙茅溫中等金石恐能袪吾疾僥幸延餘息我家小郎君道眼窺罅隙恐余偷心在指數煩口擊負負無可言頽然慚道力檢密念慧遠誦咒憶羅什兩翁例一笑顛倒不足惜世尊病須乳侍者遣行乞達磨五遭毒知毒乃敢食佛祖豈貪生避就唯恐失二者如不坐吾罪亦可釋想見讀此詩笑中和易色彥周見和復答既有疾可示非是都無疾如春有陽焰渴鹿想為濕以君足疾苦例我痛腰脊忍痛而曰空觸墻為無壁此論蓋四座聞者皆屏息吾聞有漏軀有病資藥石漏盡病乃除其神則無隙譬如出礦金萬鍛受鎚擊妙哉迂開老辨博見才力種性能文章怒罵成詩什荊山玉抵鵲而為路人惜此詩不辭和而藥不厭乞又如夢中人飢而獲飲食覺來輒大笑飢飽兩俱失以是知法空妄盡方自釋解空如佛言不許離聲色彥周以詩見寄次韻兩詩護宗旨萬仞仰峻嶺攀緣不可及妙語出鋒穎鈍根遭譏訶正坐不勇猛譬如策疲羸強以扛九鼎頑冥雖難化豈不發深省坐令跛驢心奮迅起馳騁愛君辨縱橫又畏面嚴冷直諒有如子敢不加虔調尚記笑語時水軒同煮茗池閒如鏡空倒蘸垂楊影歸來渡湘江一葉浮萬頃舟中亦曬藥欲以駐頽景君儻終不嗔藥盡更當請送彥周虞卿脫魏齊拼意與俱去公卿一破甑掉臂不復顧蕭何追韓信棄車遂徒走貪賢如攫金不見市人聚會合意傾寫掩書想風度彥周雖緑髮風味映前古高論傾座人能破萬毀譽獨立傲世波屹然如砥柱令人每見之不敢發鄙語推墮吾法中偃蹇揖佛祖死生人所怖玩之於掌股此生幾離別此別覺酸楚夜寒衆峰高獨看霜月吐明日解歸舟西風白蘋浦君去我獨留蒼茫煙水莫長沙邸舍中承敏覺二上人作記年刻舟之誚以詩贈道人天姿心匠妙漆瞳含秋看飛鳥氣和不減華林風韻高勝卻霜巖曉心胸冰壺不隔塵爭傳落筆如有神不畫凌煙大羽箭來寫山林夢幻身清秀摩雲洞冰雪更將已素稱三絶不作能癡顧虎頭定為露頂王摩詰傳神寫照誰與功吾聞成在阿堵中擬將萬匹鵝溪絹為寫漚中勝義空王仲誠舒嘯堂隔岸莫山秋翠重少焉月作冰輪湧閒披白帢登此堂絳闕神清氣深穩齒應銜環舌卷桂兩鬢西風心一寸此中不著絲竹耳但覺清圓林葉動餘韻夫須百里聞風露清冥人跨鳳恐君夜殘亦仙去棄米叫雲空目送贈周廷秀周郎南州俊毛骨特英拔結髮翰墨場聲光先逸發上書論國事人危泰山壓居然竄南陬風埃到鬚髮平生拙生事寒饑坐曠達相逢湘水湄清甚等苕霅書近庾西臺詩如王右轄解尋磨納禪仍領凌波襪春露試晴窗舌頰增脫活澆公剛直胸搜攪醫國法氣當宿玉堂絲絢八磚踏當分買山錢放開痛一掐次韻吳興宗送弟從溈山空印出家身心俱出家豈復論家世一念斷攀緣即入三摩地珍重大願王此法端可恃若能訓此心是畢丈夫事君看宏覺師後身是曇諦儻欲貯甘露先將潔令器自當福人天豈止能自利譬如雞出燖真復生厭離空印法門傑淨慈數高弟初不荷吾法亦自為佳瑞汝能傾心事建此平生志淨中有浮念何異目有翳內外俱一如乃稱真正士以此談妙法要使天華墜百里半九十良醫三折臂果解信此言不愧甘蔗裔張野人求詩醉看湘山二十春杖藜疾趨旋路塵兒童拍手呼不住並行磨之不怒瞋人間禍福本無象引手按之如有神草鞋不踏公卿門術中玉石兩俱焚不知世上有憎愛一味但覺山林尊得錢行沽付一醉兒啼妻號了不聞孔仲山為阿里卒吳門亦藏梅子真何年笑跨紫雲去舉手山頭謝世人寄卻子中學句剛疏觸時怒髮之投海山沛恩出意外縲囚遂生還湘西谷量雲結屋清蘋灣舉手弄雲水意適情自閒大藩英俊地翰墨相追攀聚話蘭叢秀吐氣雌霓彎我窮世諱見所至特見刪但餘遭夫子時時客扣關邇來又識公喜忘雙鬢斑夷粹韻拔俗簡重語不煩人品有如子合在臺閣閒歸來夢西津五峰解煙鬟故人訝歸晚負負愧在顏此詩雖夢語亦足發天慳乃知憂患烈不能鐫冥頑遙想為一笑秀句出飢寒子中見和復答之世味嘗已遍嚲著匿雲山為問何能爾鳥倦自知還湘西一千頃分我楊柳灣時為理魚蓑人眠舟自閒公真功名人高韻不可攀譬如秋無雲璧月挂一彎我詩聊寄耳猥語憑見刪峻句乃見辱嶮如履潼關細看秀爭發紅英微雨斑坐令十年心清涼去煎煩竹林在何許延頸佇望閒遙知醉逃暑玉纖侍丫鬟得句有奇趣笑渦印朱顏引紙欲續和自歎才澀慳應當恕不逮鄉閭念疏頑把卷味長哦松風嗽齒寒次韻游衡嶽結髮功名場吾豈厭朝市風埃涴袍褲樂事嗟無幾那知望耆闍舉手弄雲水山空答清嘯一洗風埃恥赤岸橫落日孤煙起墟里陰晴故多態風物自閒美歸來說佳處尚復喜見齒為作鶴腦側失床忘而趾平生嘉遁心衍挽車輪起拭涕師懶瓚多事笑曇始次韻游方廣萬峰纏煙霏一線盤空路丹楹出翔舞半在生雲處海人猿臂上哀湍不堪泝夫子英特人自是幹國具醉耳厭絲竹來此良有故臨高賦新詩妙語發奇趣便欲抱琴書亦作東家住山靈應拊掌笑公入窘步自當眠玉堂蓮燭夜枉顧偶此愛山爾戲語亦瓦注富貴本縛公雲泉寧可付置卷發遐想湘月微雲度游白鹿贈大希先昔人隱臨湘解跨白鹿游公來弔陳跡但有林壑幽春風掃夕陰雌霓飲澗湫披晴望形勝衣裾空翠浮道人高尻揖自陳語和柔烏猶為人好草亦能忘憂矧汝家臨川共飲西津流欣然為題詩清絶如霜秋詩成又自録小字如蠅頭意重恐難荷鄉義良已周遙乘知興耳興罷夫何求我和無好語效顰增歎羞次韻題兀翁瑞筠亭大圓鏡空越數量是中豈容男女相風橐俱聲未易分前身後身翻覆掌種石玉生硯出芝人亡物在何足奇請看襄母千里至庭竹駢根生瑞枝人言親少而子老異事相傳爭絶倒心法之妙傳以粗此理難與俗人道雲居的孫難共語辨如建瓶空氣宇不將雙腳踏城闉卻侯詩句能寫真次韻思忠奉議民瞻知丞唱酬佳句兩詩清於玉堂臥氣如漢軍爭祖左高軒想見連璧來輾我門前碧苔破為君哦此萬籟簧楚音變盡餘微些文章自然真吐鳳句拙見之那敢和高才要當萬錢食小邑折腰坐飢餓仲弓曾為太丘令義方亦作吉陽佐丈夫功名未入手行樂莫嫌詩酒涴次韻思晦弟雙清軒門前無俗駕籬外有青山不出已成趣懶惰心所安鳴鳩驚午夢意消風物閒可憐修竹林遮我茅三間兄每緣詩來有時忘巾冠永愧隔壁呼束帶酬問端此詩可三復句挾風霜寒令人想見之恨身無羽翰壽子一杯水世隘軒獨寬會福嚴慈覺大師慈覺初見我背呼仰而應遂同宿湘上夜語如建瓴犀顱氣不讋虎頷目有稜精彩類澄觀突兀掩萬僧喬嶽占南極寒翠知幾層此老家此山親分漳水燈寶坊天雨華午梵盤清冥欲知法席盛但看道價增破夏出山來乃爾忘規繩蓋皮為之災公卿慕聲稱我幸無子纍癡鈍人所憎平生寢飯外摩挲一枝藤少年入三吳題詩遍西興歸來舟彭蠡浪山雪崩騰匡廬落笑中萬疊橫空青又嘗游并汾趼足渡河冰衝虎上太行雞鳴見日升此樂墮渺莽坐睡頭髯鬠朅來湘西塢倦鶴整羽翎只待秋風健祝融期再登慈覺見訪余適渡江歸以寄之黃沙橫吹意儻恍江色摸胡迷背向刺舟開岸風掠耳日莫歸來說驚浪旋添榾柮火蒙密堵立咨嗟羅少長碗楪鏗然野炊熟井稅未輸夜舂響少年信腳蹈憂患幾同叟埋煙瘴歸來閒散贖辛勤老住江村無雜想夢回書几有青燈雞一再鳴布衾暖遙想老禪讀此詩應作掀髯笑拊掌次韻蘇通判觀牡丹東風背立知誰家扶頭醉韻中流霞天涯也識洛陽面露叢幽蕊生奇葩兩翁賦詩皆妙語讀之令人欲仙去坐閒亦著白髮禪勝游且願追支許擁毳同看聊自娛春歸不肯略踟蹰解空勿憶南泉老但言如夢不言無次韻元不伐知縣見寄我讀元侯詩嶮若過驚浪忽於旋渦中濺雪湧千嶂又如曹征西唾手縛袁尚又如花間春熟視迷背向何從得此客要是萬夫望少年翰墨場開口取卿相低摧牛刀中軒特見雅量君看風月湖自是無盡藏應手物華妙纖穠見情狀平生冥搜眼已照鮑謝上自當走奇勳豈止稱師匠嗟余衰退者那敢論輩行正如羊叔子堅臥答陸抗詩成急雨來掃盡層雲障重慚無傑句酬君語豪壯和元府判遊山句舉手弄雲泉濺衣作跳波側耳聞遺音仰看幽鳥過兩公作妙語清絶類陰何氣爽如南山晴嵐掩峨峨意快如落暴萬仞崩銀河秀如華林風嫣然散微和而余獨朴拙欲登選佛科十年類馬駒鏡謂磚可磨楓瘤或見取此事古亦多噪吻成綺語寧恤犯尸羅送不伐赴天府儀曹長沙解嶺海浩壤冠南楚豈止風物繁山水亦清富然以余觀之兩者未足數雖曰大藩地要以多賢故元侯汝穎奇家世工酌古朅來簿書中見此廊廟具三年令小邑野鶴翦翎羽側腦望雲漢奮躍思遠舉忽聞除書至當得贊天府婢僕想京華一室譁兒女便覺駝鐸聲吹帽黃塵路舉首望絳闕金碧礙雲雨富貴本自天車馬氣成霧遙知念舊遊笑與同僚語送友人幽人獨負三尺琴自謂羲皇得意深經年不肯鼓一曲欲造千里求知音夕陽渡口西風起黃葉紛紛墜秋水送君默默上孤舟片帆忽舉風波裏此去吳中風物好重復江湖我曾到桂子落時雙澗秋白猿啼處孤松老卻入苕溪凡幾里連天震澤無窮已紅蕖苞折流水香紫蓴絲軟鱸魚美何時興盡見歸舟古今客路多飄流孤雲別鶴無縱跡空聽蟬聲野渡頭聽道人諳公琴道人貌臞骨藏年漆瞳照人方而淵家住湘山湘水邊氣清日應嚼芳鮮羅浮飯石性所在定林飲澗老更堅子其徒歟寧果然抱琴過我亦自賢玉徽按抑朱絲絃借絃為舌傳語言誰家恩怨餘妒憐綺窗鶯燕春風顛顛風盤空攪蒼煙蕭蕭吹鬢人未眠清都絳闕斷世緣骨飛不到夢所傳秦箏心知是響泉置之髯鬚一笑掀蕊珠三疊舞胎仙坐令遺世如蛻蟬何年醉騎紫雲去此琴枵然成棄捐你能禪三鄉俊宿山湘西春色無人要萬頃鏡空飛白鳥小閣披衣眼力衰一聲款乃酬清曉芒鞋閒穿聚落來此岸緑陰行不了南臺老未忘鄉井抵掌清談輒高笑烹茶煮筍未當勤放意賦詩語奇峭此生何處不戲劇萬事隨緣真道妙何當借子西齊宿共看湘月千峰表陪張廓然教授游山分題得山字先生如梁鴻德耀亦愛山湘西十月留笑語煙雲閒弄泉石梅塢喚舟青蘋灣藉草飲松下松風當吹彈二妙生清妍山花插雲鬟粲然起為壽舞袖相翩翻先生墮幘醉頗覺天地寬醉語忽成詩為題蒼壁顏城郭遙相望但見千峰寒又得先字青山隨處有見之輒欣然獨於湘上山欲買歸休田此邦多君子故欲吾終焉先生人品高白鷗春水前弟子亦秀發玉樹相明鮮頗怪翰墨場亦著白髮禪分題得難韻下筆風雷旋詩成愕衆口不復較後先閒中有此樂安用食萬錢紫芝愛陸渾遂為好事傳悠然見眉宇寧復羡遺編送廓然長沙古都會何以冠荊楚但曰財富強山水最佳處那知號大藩實以英俊聚張侯官雖冷藉甚有名譽心胸高崔嵬萬卷相撐柱君看逸群姿嬌不受控御罷官當北歸一室譁兒女想見駝鐸聲桑棗黃塵路倚馬草十制贍氣見眉宇此職誰當之夫子無愧負璧門黃金閨獨宿無晤語時應夢湘江醉臥聞柔櫓大溈山外侍者求詩湘南古叢林鐘梵百世傳大圓百丈來縛屋巖石邊煥然成寶坊服用如諸天經今成幾何已逾三百年誰為中興者卓哉空印賢大鐘日夕撞圓音答山川衲子自成群晝誦而夜禪道人舊未識眉目何淵然乞詩亦不惡篝燈臨網箋人生等浮雲達者無後先我亦一戲耳走筆成長篇送珠侍者重修真淨塔清涼寂滅塔三世無鮮陳巋然塵塵中現此光明身尚無有祖成寧當說有壞憫此情見者亦驚世議隘泐潭道人珠願力無礙限行看蒼煙叢一切俱成辦狐死必首丘馬嘶必望北蓋皆不忘本人豈宜忘德秋風淨湘楚萬里浩無垠嗟豫頽然臥羡子如孤雲英大師年二十餘工文作詩勉之英公南海來眉宇靜而淵少年辭海山腳力生雲煙已能弄翰墨句好自可傳君看嵩仲靈骨瘦聳清堅平生護教心光與星斗懸化去四十載凜然長在前文章一技耳幾不減市廛要求出世法道眼照人天吾言激後生君俊無忽焉千峰開宿雨蒙頭作深禪古人亦何遠何必羡遺編崇禪者覓詩歸江南去年社燕前道人江南住一笑寒鴻來又在龍安浦今年寒食後歸心忽飄絮不知換秋菊能復如期否此生付浮雲忽散還復聚要之不可必恐作人閒雨行藏類隱峰兩踏石頭路故山有遺恨缺典念馬祖落日頽金盆蒼茫煙水莫離情渺難收摹寫入凝佇送悟上人歸溈山禮覲亂峰踢卓不容數寶構翔空盤萬礎溈源水作青蓮香攧雷濺雪出煙雨住山老如大雄虎暗谷行藏文彩露說禪不費絲毫力以空為印印諸祖道人乃是小烟菟氣已食牛難共語悠然蹤跡似孤雲羡儂先我山中去會當出鉢螺頂閒見此頎然秀眉宇贈珠維那湘雲遮世路閒客此閒行彌日不忍去眷此山水清暖窗欲春色茗碗雪花輕道人舊不識一見意已傾人生無根蒂聚散如流萍聊炷返魂梅將以熏道情此詩亦偶爾夫用四座驚瑀上人求詩道人江南來快作臨川語立談當夕照鄉間問安否坐令十年心想見西津渡少年游諸方乃欲追佛祖清韻不可摹倣佛見眉宇豈止義中龍當作文中虎西風健行李暫會還徑去我如社後燕並立理歸羽或似天上雲風約聊復住勿長應深溪當作人閒雨送上人往臨平兼戲廓然鶻腦骨緊腳力健生雲疊數一萬里捷於臂屈伸肉佛不譏訶稱之返云云坐誦覺範詩抄録亦甚勤群兒爭欺之僞雜以他文獨頷不語飯沙俱一吞湘西雪達旦萬樹吐奇芬凍行如鷺鷥雪泥濺衣裙解包呵直指又作飢猿蹲放意說臨平想見禪誦群坐令冷齊中忽然變春溫明朝別我去掣肘徑出門便覺西湖月夜坐生夢魂

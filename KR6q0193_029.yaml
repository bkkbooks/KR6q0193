body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編錄毘陵天甯法雲堂校書上張無盡居士退崇寧書某啟誦相公佳句願見二十年矣每念威德崇重辯才無礙未易酬對顧省鈍根無異能解非所堪任以是久不敢行詣耳不謂比來照禪師書中過辱緒言見及如佩黃金良藥之賜閣下昔與雲庵兜率神交道契為內外護雖當時從游之人如某者亦蒙記錄愛人而及屋烏謂徒虛語今始信然又蒙辱以崇寧見召尚未識門屏而據授以師位衲子驚怪莫不改觀實以鄙陋恐臨事失職有累閣下知言耳故不敢輒受謹課成拙頌六首繕寫呈上聊供閣下千里法喜之游干冒鈞重不勝愧悚荅張天覺退傳慶書某啟某青山白雲之人其蹤跡不願上王公貴人之齒牙縱浪大化飽飯足矣不虞閣下過顧千里惠書以崇寧見要挽至人天之上使授佛之職責以重振西祖已墜之風其以閣下所責甚重某之材力甚薄不敢輒冒寵命作偈辭免意閣下必憐其誠從其所欲棄置之久矣而禮意益勤三返其使欲一相見而已某翻然改曰無盡居士道大德博名聲遍華夏獨立四顧為我家門墻又先雲庵之執今區區於一愚比丘其可終不往也故間關而來閣下一見過有稱賞嘗謂天下之英物聖宋之異人撥置形骸傾瀉意氣奇章妙諦嘉譽曷以克當茲復懇陳尚乞從容辭謝代雲蓋賀北禪方老書清淨燕居雖聖師之明誨流通法藏乃釋子之本心于其可為之時蓋亦何膠於跡遠公老矣竟不過於虎谿南陽翻然乃肯來於鳳闕觀其以道自重則或異惟其以身徇法則皆然伏惟某人清明在躬淳化接物以淵才雅思之三昧資淹通博識之兼能比自雲山徙居城郭蓋叢林之故老傳聲名於此邦金斗城中舊挽浮山之九帶汨羅江上重揚臨濟之三玄光壯吾宗提攜後學凡於聞見無不懽譁屬叨疾衰尚稽展對謹奉啟陳賀春色向暄尤冀珍重代荅溈山評老書竊承已辭惠日咸爭瑞鳥之先瞻欻然道風遽與珍緘而並至悃誠特厚文彩甚華俯思衰殘交增喜愧顧茲溈水寔甲熊湘前豪峻大雄之風近世茂霜華之嗣欽承禪師游戲法窟熟爛叢林飄然而來故將有意於先覺發其所蘊行看施益於後昆豈惟拙者之與榮抑亦輿情之所望謹奉啟上謝代法嗣書某聞惟師弟子系時因緣雖遷流於人天或契闊於生死不謀而合妙於磁石之鍼適然而逢特類盲龜之木方相視而一笑歎再來之尚存披掌發異世之珠後身附前生之植載之傳記炳若丹青然望道固有淺深受材不無大小沿從中世非復古風名存實亡力微習重寂無奮起幾至陵夷如某者志節願追古先識慮皆居人下契無悟花之敏迷有摘葉之愚自離七閩謾游三楚夤緣養育則恩均親教提攜收拾則人固戶知非止見聞之熏烝蓋亦琢磨之厭飫誓同小朗斷笻不下三生敢料大溈踢缾遂辭百丈恭惟某人道傳熊嶽派出虎溪聲華久著於叢林誠寔可開於金石游戲翰墨爛熟教乘屢讓名山倦臨清眾而宗門道廣學者日親機比疏山敢犯腹中之鱗甲辯如慧日寧逃口內之雌黃蓋其要妙淵深高明廣大而某應量而休蚊蚋亦名飲海登高未已女蘿適幸依松敢不永棄世緣長依淨社激昂志節報效恩私然力甚纖埃敢助培於佛種光猶爝火徒僭續於祖燈瞻望門闌馳心師範過此已往未知所裁代荅書伏審光膺顯命榮遂素心輿情欣聞士論增氣竊謂仕宦無大小當各行其志窮達有義命則不必言時較今竹帛所傳如漢文武之盛觀其至鑒大不可誣相如之賦甚工止於為令李廣之藝絕類竟不得侯蓋功名出於偶然故用舍置諸度外然有是語未見若人恭惟某官深於文詞綽有標韻言行信於閭里聲稱著於搢紳袖手來歸餞華顛於詩酒挂冠閒暇登清嘯於雲泉方慚贄賀之未緣遽辱函封之先及獲窺筆力概見平生習俗移人鄙後來居士之論天資近道有急流勇退之風陳誼甚高把卷增慨驚文彩之奪目挹謙光之照人永為巾笥之珍愧乏瓊瑤之報其於欽佩莫究頌言代上太師啟君子立邦家之光固難親炙忠臣在社稷之衛豈易皈依幸逢濟濟辟王之朝共遇赫赫師尹之貴豈無巨筆用贊元勳故巨壑縱魚王褒著漢武得賢之頌在坰牡馬史克陳僖公有道之詩敢當搢紳先生作者之前願聽狂簡小子斐然之語雖牖中窺日未盡光輝然爨下梧桐亦堪聽采恭惟某官文章宗伯道德真儒會逢千載一遇之時協贊一日萬機之政股肱周室首居尚父之尊左右商王自任阿衡之重一持政柄大振朝綱李逢吉十六子之奸回悉歸竄逐崔祐甫八百員之英傑盡入搜揚恢雝泮以興賢奠幾千人經明行修之士設庠序而化邑復數百年鄉舉里選之科鑄鐵錫子母以利便公私弛山河茶鹽而通行商旅興水利則俶載南畝得施十千維耦之勤勸農田則平秩西成俱獲三百其囷之望恤貧置院凶年無溝洫之憂漏澤開園枯骨免狐狸之噉天寧建寺祈明明天子壽考萬年敦宗立官使振振公子本支百世以至乎九鼎鑄而百神受職八寶獻而萬福攸同大晟作而足以動天地感鬼神四輔建而足以利國家興社稷王道平而百川理黃河於是乎清元氣回而萬物春靈芝於是乎秀遂致一人有慶四海無虞三階平而風雨時五穀熟而人民育天垂甘露地產嘉禾山川草木之裕如鳥獸魚鱉之咸若民躋壽域俗樂春臺一方無鼠偷狗竊之驚四境有犬吠雞鳴之喜遠人率化荒服來王萬邦共惟帝臣天地莫非王土開關受吏梯航遠走於蠻中獻地稱蕃璵璇幾半於天下皆是八柱擎天之力益知四時成歲之功昭昭簡在帝心籍籍頌諸人口前房杜而後姚宋何以加諸左稷契而右皋夔不能過也此皆公議豈但私言自從往古來今無不光前絕後雖禿千毫之兔難紀宏規縱捽萬楮之皮莫形魯頌某備員官業托質洪鈞望南山之維石嵒嵒幾年注目仰北斗之台星兩兩每夜勞魂歎無路以掃門徒有心於投刺鳳衰已甚敢興楚接之歌牛喘非時終冀邴吉之問特書悃愊上瀆高明造化罏中敢希陶鑄燮調手內全藉提攜果蒙自卵及翼之恩不忘摩頂至踵之報代上少師啟伏審光膺大號榮二三公凡屬生成舉同抃蹈竊以大臣謀國元帥行師深惟用兵之難近請以唐為喻裴度之誅元濟名蓋准西子儀之備吐蕃威宣關內然而軍旅屢失歲月薦更或碎韓愈勒銘之碑或置朝恩疾功之沮紛然異議沸於外庭未有纛祭朝陳散犬戎於沙幕捷書夜奏復萬貢之山河服功於談笑之間紀績於鼎彝之上雖曰天之時數豈非人之力為恭惟藥宮先生蘊德方剛受材宏大以山甫補袞之手應高宗協夢之祥惟都惟俞可曰千載之遇知文知武是謂萬人之英當巍巍乎有道之朝建岌岌乎無前之業父子俱登三事君臣慶同一時四世五公何足道也一門萬石竊且陋之已收玉版之榮行遂金甌之拜某猥緣望履獲預執鞭永懷剪拂之私未效涓埃之報終當為之殞首且將依以揚聲身處江湖遐想平津之館職拘飛挽遙稱北海之觴代東林謝明府啟右某啟准使符授前件職事已祗受者竊以冠世名山道德所在出塵淨社緇白同欽近偶厄於妄庸坐幾見其傾覆宜得神穎以整頹綱上以副王臣外護之勤下以副叢林中興之漸如某者蒞眾猶晚涉道未深五逢楚國之秋三涉湘山之剎特以宗風之盛誤為學者所推偶預總提良出徼倖恭惟某官斯民先覺當世偉人世殿侯藩名獨簡於睿想入聯清禁道每格於君心期必代於天工蓋久從於人望某已次治境行瞻履商獲聞謦咳之餘倍切敘崇德厚謹具啟陳謝伏惟台慈照察代上湖南使者書某聞趙清獻公奉使西州以一琴一龜自隨坐則撫琴玩龜蜀人莫測寓止成都以書抵中朝故人曰成都全蜀之地沃野千里而多江山登臨之樂齋閣事簡時有山僧野人投詩而去諸公顧此吾事豈不流哉嗚呼山僧野人固無用於世然一造大人君子之庭飾鄙陋之詞敘棲遲之蹟則遂為公卿美談恭惟某官文章之卓越風節之高特冠於搢紳雖功名事業之效未收而人主倚眷天下之屬望販夫乳兒莫不知頌詠盛德其遺風餘烈初不減清獻公而好賢樂善出於至誠則又過之方持使者節來蒞三湘以萬壑之松聲為琴以自養之靈智為龜當其酒酣客散頹然墮幘聽江風之度曲觀湛然之發光若傲睨萬物之表而與造物者游其高韻脫落當十倍西蜀但山僧野人之詩文未至庭下猶以為缺典某頃在丹陽獲陪今儀府相公苻寶舍人父子遊自南還頗獲翰墨切聞公蔡氏臥內客也敢自山中攜至持以呈獻無所干求惟閣下憐其誠而進之爾代上宣守書某聞癡蠅附驥氣凌千里兔絲依松勢登九仞兩物至微陋也而其氣勢特能榮耀於昆蟲草木者蓋其所遭之時所託之地適幸而已矣某寒鄉賤微人不比數賦命數奇臨事金注困窮極矣所幸少游上庠識閣下一人耳時閣下蔚然自持如喬松之稚蒿萊養精蓄駿如騏驥之困車軛某因得時交足以緣僕絡根以蔓衍也嗚呼閣下以冠冕道德鼓吹六經聲名橫翔捷出搢紳之右富貴昂然聳壑青雲之上方掇天子近侍出鎮大邦道顯著作某塵埃寒乞面目可憎輒敢冒重湖涉大江千里至前引物連類敘平生游從之好欲以駭動視聽聞者多竊笑坐睡然區區之心終欲一望履舄者其情有真可哀者耳某既為功名誤罪大不孝二親之喪四弟之柩皆在淺土家貧族陋默計之不一泣訴於門下是畢世不能舉矣杜甫寒餓流離至食橡栗嚴武鎮兩川甫依之得不死郭元振為太學生家送貲四十萬會有縗服者叩門自言五世未葬元振舉以與之嗚呼嚴武之忠厚元振之節義蓋如此每讀其傳竊欣慕之恭惟閣下忠厚不棄故舊有嚴劍南之風度節義喜施有郭代公之奇豪而某無杜甫之才有不質名縗服者之喪某之辭家里巷聚送或疑或信疑者多而信者少此不足怪蓋節義未嘗有故也願閣下哀憐之使信者增氣而疑者沮氣矣代求濟書某聞金以自獻致不祥之名鴈以不鳴蹈必死之禍者莊生寓意於兩物蓋所以配士之自獻亦又以罪士而不可不言也夫士臨死禍而不言世必以為誇若困蹇之辱飢寒之憂已切諸身不翅如臥積薪之上而下焚之猶不以為意鉗默不言使莊子不呵之三尺童子且聞以為笑也某幸以諸生得侍師範瞻承顏色熏蒸見聞一年于茲日月不為不久而質疑受訓義在徑造面稟而已然特飾鄙陋之詞為之書遂及私門之猥以上累聽覽者其情有可哀者耳儻蒙霽嚴有和則請畢其說于前某讀漢傳見司馬長卿之還成都家四壁立又讀唐帖見顏魯公從李侯乞米嗚呼漢唐人物如長卿魯公者可謂碩大而秀傑者且屋廬不完饘粥不給況下者乎然兩人者風流餘烈可以想見以某之不肖駑鈍聲遺沉下蓋其智愚之不移貴賤之相遠無可企羨然猶有羨於長卿魯公者羨其當耳長卿固倦遊而歸所累者文君耳而猶有四壁可誇如某干祿而祿未及親今親皆老無以為養弟妹職職及婚嫁二十餘口伏臘叢於一身而家無置錐之地魯公雖曰舉家彌月食粥而有祿可仰有畜米者容其乞如某者族寒里陋無強盛可依之親誰當告者聞古有魯肅指廩借周瑜則以為癡郭元振推錢四十萬與不言姓男子以為狂則有羨於司馬魯公未足為過也某前此賃屋而居今有屋者取以自用一家幼稚將至露地臥起矣恭惟先生識妙如蓍龜納污如山澤剛而有禮人不得而疏親明而無私士實樂於求懇昔劉政往役邴原窮鳥入懷原曰安知此懷之可入耶原之言蓋喜之也某恃先生之恩竟敢與劉政之謀干犯妄意先生必有原之喜而憐之塔銘夾山第十五代本禪師塔銘并序師諱智本筠高安郭氏子生五歲大飢有貴客過門見其氣骨留萬錢與其父母欲攜去祖母劉適從旁舍歸顧見怒曰兒生之夕吾夢天雨華吾家吉兆也寧飢死不以與人推錢還之既長大遊報慈寺聞僧說出家因緣願為門弟子劉氏喜曰此吾志也年十九試經為僧明年受具足戒即往遊方時雲居舜老夫開先暹道者法席冠於廬山師往來二老之間久之聞法華端禪師者深為法窟氣壓叢林蓋臨際九世之孫也而楊歧會公之的嗣也師往謁之遂留十年名聲遠聞舒州太守李公端臣請說法於龍門辭去之日端領眾送之師馬逸而先顧端曰當仁不讓端笑謂大眾曰國清才子貴家富小兒驕其父子法喜遊戲多類此未幾屏院事乃還廬山時曾丞相由翰林學士出領長沙以禮迎居南嶽之法輪學者爭宗向之遷居南臺自南臺遷居道林自道林遷居雲蓋自雲蓋遷居石霜凡十三年道大顯著勸請皆一時名公卿師既老矣而湖北運使陳公舉必欲以夾山致師師亦不辭欣然曳杖而去人登問之荅曰係情去留豈道人事湖南湖北真一夢境爾何優劣避就之耶以大觀元年上元夕沐浴更衣端坐終於夾山之正寢閱世七十有三僧臘五十有二闍維齒骨數珠不壞葬於樂普庵之西師性真率不事事膽氣蓋於流輩作為偈語肆筆而成亦一時禪林之秀者余未識師聞清涼洪禪師言其為人甚詳後二年門人處曉出開福英禪師所撰行狀來乞銘銘曰定慧圓明力無所畏顯於湘南遂起臨濟學者如雲異人輩出唯會與南絕群超逸號末法中二甘露門唯夾山本寔會的孫七移法席籍其聲華迅機雄辯能世其家放懷清真亦足風味睥睨死生蓋其一戲白塔林間矯如飛鶴不涉春緣碧巖花落鹿門燈禪師塔銘并序西蜀世多名僧而魁奇秀傑者尤見於近代有如寶梵大師昭符者弘經解義足以增光佛日太史黃公稱之曰知文知武染衣將相者也嗣承其學有如圓明大師敏行者家聲辯才足以舟航苦海內翰蘇公稱之曰能讀內外教博通其義以如幻之三昧為一方首者也兩公今朝第一等人意所與奪天下從之而寶梵圓明特被賞識兩川講徒增氣四海縉紳想見風裁也鹿門禪師蓋嘗以父事圓明以大父事寶梵觀其規模弘大教觀淹博熏烝見聞有自來矣師諱法燈字傳照成都華陽王氏子也自幼時則能論氣節工翰墨逸群不受世緣控勒年二十三剃落於承天院受具足戒即當首楞嚴講耆年皆卑下之時黃太史公謫黔南與圓明遊相好每對榻橫塵師必侍立看其談笑公撫師背謂圓明曰骨相君家汗血駒也他日佩毘盧印據選佛場者必此子也常夜語及南方宗師公曰今黃龍有心泐潭有文西湖有本皆亞聖大人曹谿法道所在或欲見之不宜後於是圓明棄講出蜀師侍其行至恭州而歿師扶護歸葬成都辭塔而去下荊江歷淮山北抵漢沔遍謁諸老所至少留機語不契振策即行登大洪謁道楷禪師楷問如何是空劫自己對曰靈然一句超群象迥脫三乘不假修不落有無更道取一句曰待某甲無舌即與和尚道楷駭之師乃伏膺戾止承顏接辭商略古今應機妙密當仁不讓師資相懽不減溈山之與寂子趙州之與文遠也太觀之初楷公應詔而西三年坐不受師名敕牒縫掖其衣謫緇州師趼足隨之緇之道俗高其義太守大中大夫李公擴虛太平興國禪院以居之於是洞上宗風盛於京東政和元年楷公得釋則東遁海瀕千餘里太湖中而止草衣澗飲若將終焉豈非厭名跡之為累也歟師猶往從之楷以手揶揄曰雲巖路絕責在汝躬行矣師識其意再拜而還七年解院事西歸京師名聞天子俄詔住襄陽鹿門政和禪寺師謝恩罷退飯丞相第堂吏抱牘至白曰江州東林寺當改為觀從道士所請師避席曰廬山冠世絕境東林又其勝處世為僧居如春湖白鷗自然相宜今黃冠其中絕境其厄會乎丞相大以為然東林之獲存師之力也既至漢上郡將諷諸山辦金帛詣京師作千道齋師笑曰童牙事佛有死無二苟非風狂失心輒以十方檀施之物千里媚道士耶郡將愧其言而止然天下叢林聞而壯之鹿門瀕漢江斷岸千尺寺嘗艱於水師坐巖石下念曰吾欲叢林此地為皇朝植福而泉不能贍眾山靈其亦知之乎師以杖擿草根俄眾泉觱發一眾大驚山中之人目之曰燈公泉師初依夾山齡禪師齡道孤化而無嗣之者僧惟顯得其旨隱於南嶽師以書抵長沙使者迎出以居龍安禪寺聞者伏其公貴其行初惠定禪師自覺革律為禪開刱未半而逝螘藏蜂聚故窠遺垤十猶七師為一新之長廡廣廈萬楚蟠崖冬溫夏凊崇堂傑閣十楹照壑吞風而吐月椎拂之下五千指十年之間宗風大振人徒見其婆娑勃窣若遊戲然不知其中至剛峭激也篤信所學雖威武貴勢不敢干以非義性喜施不計有無傾囷倒廩以走人之急靖康二年春金人復入寇兩宮圍閉驚悸不言謝遣學徒杜門面壁而已門弟子明顯白曰朝廷軍旅之事何預林下人而師獨憂念之深乎師熟視徐曰河潤九里漸洳者三百步木仆千仞蹂踐者一寸草豈有中原失守而林下之人得寧逸耶五月十三日中夜安坐戒門弟子皆宗門大事不及其私泊然而逝檢其所蓄道具之外書畫數軸而已閱世五十有三坐三十夏度門弟子明顯等七十餘人受心法蒙記莂潛通密證匿跡韜光者甚眾二十二日全身塔于山口別墅惠定塔之東明顯狀其平生來乞銘銘曰空劫日用易知難分汝欲分之如聲與聞何嘗有間月遍谿谷何嘗有斷風偃松竹於一毫端捏聚古今粲然明了而不可尋無功之功無位之位為物作則無容觸諱唯此正傳洞上所宗當有神穎振其頹風堂堂燈公龍象回顧負戴之重徐行安步漢南盤本兩坐道場枵然一室名聞諸方孝於事師忠於事佛俯仰無愧雖化不沒聞名在世決不可除則於心外法有遺餘竟欲除之出以示我笑而不言如冰在火蘇嶺萬仞蕩摩雲煙曰塔其下望之巋然緬懷高風叢林殞涕我作銘詩以笵來世蘄州資福院逢禪師碑銘并序自達磨入中國授二祖心要而以衣為信故六世為之單傳至曹谿藏其衣故諸方得者輩出其魁壘絕類碩大光明有若衡山觀音廬陵清原者特為學者之所宗仰天下號二甘露門令逢禪師者清原九世之嫡孫黃龍機公之高弟也此先蓋福州閩縣人生於陳氏自其少時英特開爽不愛處俗耆年敬愛之唐乾元初落髮於隱真寺明年受具足戒即策杖遊方聞黃龍參出巖頭門風孤峻自荊楚舟漢江抵鄂渚而機公杜門卻掃棧絕世路學者皆望崖而退師獨扣其戶俄聞疾呼曰擊門者為誰荅曰令逢曰未來此間亦不失荅曰若失爭辭與麼來曰來底事作麼生荅曰昨日親自渡江黃龍於是開扉笑而器許之師從容遊詠日聞智證雖不事接納而戶外之屨常滿痛自韜晦而人間之譽益著以順義癸未之秋辭黃龍北遊戾止祁陽月峰之下刱為茅茨一飯奉身跏趺終日學者追隨而至川輸雲委前刺史奇章公拜謁受法要而請升座道俗懽呼謂一佛出世遂成叢林號南禪男子張宏甫施宅為寺莊嚴之妙疑絳闕清都從空而墮也歲在戊子夏淨髮更衣而坐謂門弟子曰吾委息後衣麻饌客號踊哭泣皆不可為苟違吾言則非吾法侶於是以書遍辭檀信六月八日示微疾泊然而化閱世五十有一坐三十四夏塔于郡城之北太和中忽見夢於父老曰吾欲出塔大作佛事於是啟塔而顏貌如生萬眾作禮龕而供事之自是則能指揮造化縱奪禍福使雨暘時若百穀茂遂民建寺其旁世以父子傳器夜燈午梵自唐迨今不替政和之間禪林易之更兩代荒殘如逃亡人家宣和太守林公以嘉祐寺彌勒院僧擇文主之從檀之請也文疏通解事材智有餘道行信於邦人初至之夕適大雨九徙其床一年而施者填門冠蓋無虛日二年而修廡密室綠疏青鎖三年而崇殿傑閣間見層出遊僧過客摩肩仍袂已至者忘去方來者如歸余嘗與林敏功子仁過焉仁曰寺以律名而禪規不減諸方廩無餘粟食堂日集千指非有以大過人何以臻此余曰昔臨濟北歸仰山歎曰此人它日道行吳越但遇風則止溈山問有續之者乎對曰將此深心奉塵剎是則名為報佛恩故世稱念法華為仰山後身庸詎知文非逢公邪子仁曰彼以荷擔大法此方從事有為仰山逢公若是班乎余曰昔普淨禪師不務說法庵於王城之東日浴萬眾曰時機淺昧難提正令姑使善法流行足矣又安知逢公之意不出於此乎明年冬遣其徒來乞文又系之以辭曰我懷巖頭僧中之龍本無寔法但識綱宗乾笑德山怒呵雪峰如師子吼香象失蹤又如麒麟不可繫霸羅山控勒明招追隨逢則晚出天骨權奇振鬣長鳴萬馬不嘶清侯之上駐我巾瓶笑示死生洞開戶庭意行出入不施鎖扃至今城北白塔亭亭寶鈴和鳴上千層霄下有全身百神來朝劫火洞然大千焚燒而此堅固無有動搖咨爾邦民當加敬虔蓋此大士是汝福田如黃琳公如和褒禪刻此銘詩以壽山川三角劼禪師壽塔銘并序禪師道劼生謝氏邵武人也得法於洪州石門乾禪師初住臨川之景德寺後住長沙之角山道望著三湘學者至如歸十餘年遂為終焉之所門弟子為建壽塔于白雲衝之陽甘露滅某宣和五年十月初二日過焉劼導余至塔所乃為銘之銘曰東林法道盛於石門在元祐間歸者如雲後三十年三角有聞石門嫡子東林諸孫道如平地世不舉步陟危值谷自為險阻有來求者弗荅弗顧但以此心一酬佛祖白雲之衝卵塔已成如魚千里時遶之行千巖月色萬壑松聲欣然而笑誰為死生嶽麓海禪師塔銘并序代師名智海姓萬氏吉州太和人也幼靜專無適俗韻去事普覺道人楚金為弟子年二十一剃髮受具辭金遊方金出鄧峰永公門父子道價逼亞東林總玉澗祐故師依玉澗東林最久然無所契悟晚抵仰山陸沉於眾佛印元公獨異之師方銳於學喜翰墨元呵曰子本行道反從事語言筆畫語言筆畫借工於道何益矧未工乎師於是棄去經行湘南諸山依止大溈十年真如門風號稱壁立學者皆望崖而退師獨受印可輩流下之真如赴詔住上都相國寺師雅志不欲西首眾衲於衡陽花藥山分座說法元符己卯開法於城東之東明崇寧乙酉遷居於湘西之嶽麓勸請皆一時名公卿明年正月八日麓火一夕而燼道俗驚嗟以死弔師笑曰夢幻成壞蓋皆戲劇然吾恃願力宮室未終廢也於是就林縛屋單丁而住雜蒼頭廝養運瓦礫收燼餘之材造床榻板隔凡叢林器用所宜有者皆備曰棟宇即成器用未具是吾憂故先辦之聞者竊笑而去師自若也未幾月富者以金帛施貧者以力施匠者以巧施十年之間廈屋崇成盤崖萬礎飛楹層閣塗金間碧如化成梵釋龍天之宮人徒見其經營之功日新而不知其出於閒暇談笑宣和己亥七月九日以平生道具付侍者使集眾估唱黎明漱盥罷坐丈室聞粥鼓命門弟子因敘出世本末祝以行道勿懈說偈為別有智暹者進曰師獨不能少留乎師以手搖去復周眴左右良久右脅而逝閱世六十有二坐四十有二夏又七日闍維收骨石塔於西崦舜塘之陰余官長沙始款師雖其道眼無分別相而州里情親若出自然故知其為人惠敏有智略恤孤老赴急難常器人於羈賤中屢折不困其尊禮賢者樂於人為善則其天性嘗叩其論於宗門號飽參於教觀甚博而知要不見十日而以計聞嗚呼余聞論事易成事難捨生易處死難師皆返是豈無德而然耶南牧齊公狀其平生乞銘於余因為之銘曰臨濟綱宗遇風則止昭憂其讖得念而喜湘南有圓汾陽之嗣遂興其宗克肖前懿衲子方來歸之如雲南真兩俊絕塵逸群海公於真蓋其的孫獨敢袒肩荷擔宗門天資慈祥一目貴賤幻出寶坊實依淨願冤親贊毀初莫能辨及其將化則有明驗人死之難如登焚輪師獨易之如臂屈伸塔曰無縫豈有新陳我作銘詩昭示學人石塔銘并序溈山空印禪師軾公與余登芙蓉謁長老從公于潮音堂同遊東澗道人師粲法欽文顯預焉空印使同遊者以石絫塔于澗之曲從笑曰連日群鵲翔鳴豈此勝緣之祥耶空印請甘露滅某銘曰萬峰之顛乃有流泉迸兩石間雪渦回旋嶮于三峽下臨玉淵上有危石其大如屋可坐百夫蘚封蒼玉同來六僧五七童僕妍鄙俱笑響荅山谷唯大士軾約束長幼疊石為塔團團層秀於一食頃談笑而就其願伊何天子萬壽山禽何知群飛和鳴物不虛應勝事克成咨爾東阿地祇山靈護持此塔使長聽經馮氏墓銘并序洪州布衣高天倪弟沖賜紫沙門善機傳法沙門善權以政和五年十月某日葬其母馮氏於幽谷山之陽附于皇考隱君之塋沖茹哀具書曰禍釁鏖罰不自殞滅上延慈侍沖尚忍言之先妣於正月三日棄諸孤於正寢享年七十有三願請文以昭後世三反而不得辭乃敘曰夫人靖安馮氏年十六歸同邑隱君子高廣仲容入門和敬動履規矩懿淑而敏出於天姿媼御喜之與奪從之時皇舅春秋高臞而盲夫人行立必掖食必嘗姑有風痺疾夫人視臥起進劑餌皆畢世不懈里閈稱其孝仲容三弟稚幼夫人皆自櫛沐縫紉之以至成立擇師使授學典婚使納婦有勞有恩夫人幼孤未嘗學隱君好與禪衲游屏聽其論而悅之遂能誦經曉字義隱君無經世意多往林墅屏處五子皆夫人教之訓嚴色莊衣冠取法焉初幼子善權俊發夫人曰此兒非仕林可致也施以從石門道人應乾游以文學之美致高名於世第三子善機亦授筆與之俱叢林期以起東林之道長子天倪粹溫而厚誠款而文里巷往來稀識其面第四子沖久遊太學以能文舉于禮部所與交皆一時偉人次子怛廓落有奇節不幸早世而孫楷學成而鄉貢之夫人喜燕賞酒酣沖必利髻為童子戲婆娑起舞皆中部節弟姪以次上壽觀者歡譁夫人為笑而罷率以為常邑人慕之女一人適貢士劉杭孫九人皆嶷嶷爭秀曾孫兩人尚幼銘曰俊發矯士母數責孟軻廢學母斷織凜然夫人嗣遺則子孫繩繩詩與書名聞縉紳榮里閭何以訓之孚威如膝下時聞裂縫掖頷之而笑無吝色衣冠三彥僧連壁死生亦大能了然誦經而化如蛻蟬我作銘詩騁其賢

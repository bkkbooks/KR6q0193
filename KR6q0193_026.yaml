body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校題題才上人所藏昭默帖傳曰雖無老成尚有典刑然則老成典刑所不逮也豫還自海外叢林頓衰心不為之動者恃昭默在耳今又棄我而先惟之不自知涕零也宣和元年八月遊法輪見東甌才公道人出此軸為示知師弟子之間蓋如是衲子動成阡陌而才獨軫念昭默豈妄與人者乎豫既見其筆迹又得與才遊彌日茲遊也豈虛行哉題靈源門榜靈源初不願出世隄岸甚牢張無盡奉使江西屢致之不可久之翻然改曰禪林下衰弘法者多假我偷安不急撑拄之其崩頽跬可須也於是開法於淮上之太平豫時東遊登其門叢林之整齊宗風之大振疑百丈無恙時不減也後十五年見此榜于逢原之室讀之凜然如見其道骨山谷為擘窠大書其有激云嗚呼使天下為法施者皆遵靈源之語以住持則尚何憂乎祖道不振也哉傳曰人能弘道非道弘人靈源以之題昭默墨迹余還自海南館于道林道人朱公破雨自雲蓋來坐未定出昭默書一軸豫久去針誨初見必輒輟熟視之不自覺意消也秦少遊至錢塘見功臣山政禪師書歎以為非積學所致其純美之韻如水成文出於自然昭默暮年臻妙其以是哉顏平原有大節於唐而以書名識者惜之豫以謂斯人德高而名往就之耳借使此老書不工尤當寶祕況工乎愈可寶也然與其門人書語多以見及余衰退流落又自恨生所知遇不能不短氣耳題昭默自筆小參遊東吳見岑邃為豫言秦少遊絶愛政黃牛書問其筆法政曰書心畫地作意則不妙耳故喜求兒童字觀其純氣昭默自臥疾後無他嗜好以翰墨為佛事如示衆以小參之語皆肯自筆此殆清間有餘又性不違人豈一代宗師而作許兒戲事此所謂大慈過人之行非近世栽培聲名高自摽致所能及也誠侍者出以示豫覽之涕泗橫流某年月日題昭默與清老偈昭默孝友於昆弟而以謙自牧不如是法道何由興乎豫觀其贈洞和禪師法句曰志有常守誠無外求及疑其語瞻其風度此老為作實録耳未見洞和令人莫測其為人及見之坐使人意消也韓子蒼曰真本色住山人子蒼豈欺豫哉題昭默遺墨昭默老人道大德博為叢林所宗仰雖其片言隻偈翰墨遊戲學者爭祕之非以其書詞之美也尊其道師之德耳豫遊諸方處處見之開卷輒識其真精到之韻骨枯老狀蓋其退居時筆也南嶽見方廣圓首座出此為示噫圓知敬慕昭默其亦賢於人遠矣題真歸誥銘宗師之於生死之際説法作偈者有之未有自作銘誥者也豫觀昭默此文奮激頓挫精到無餘雖鳩摩羅什道安輩平時作為且不能及況病與死鄰者能爾乎蓋其道眼高妙唯道是視初不知其有死生之烈也不然何以卓絶高勝如是之盛哉拜讀不勝增氣題潛庵書傳曰有國者非謂有喬木也謂有世臣也豫亦曰有禪林者非有四事之傳也謂有耆年也潛庵今九十一歲矣而筆語如此真叢席之大老人也年月日某題題佛鑑僧寶傳禪者精於道身世兩忘未嘗從事於翰墨故唐宋僧史皆出於講師之筆道宣精於律而文詞非其所長作禪者傳如戶婚按檢贊寧博於學然其識暗以永明為興福巖頭為施身又聚衆碣之文為傳故其書非一體豫甚悼惜之頃嘗經行諸方見博大秀傑之衲能袒肩以荷大法者必編次而藏之蓋有志於為史中以罪廢逐還自海外則意緒衰落魂魄遺失其存者無幾宣和改元夏於湘西之谷山發其藏畜得七十餘輩因倣前史作贊使學者概其為書之意書既成有佛鑑大師淨因者曰噫嘻此先德之懿也願首傳以為畢生之玩因以父事佛照以大父事雲庵而視余為季父也因生廬山之陽遊方飽叢林參道有知見恭謹孝友蓋其天性而醞藉雅尚若出自然與余遊餘二十年久而益敬故余欣然授之因以謂此書當得妙於筆札者傳之於是憑川道者敏傳願施其能傳以伯父事佛照以兄事佛鑑其能書乃夙習筆楮不擇精粗飛翰如蠶食葉俄頃千字其衡斜布列擘窠棋畫非特字工而已工詩善丹青兼衆妙而有然未嘗以自多長坐不睡一食終日者十二年矣人以為難而傳以為易久遊靈源之門得其旨要者也六月二十五日佛鑑攜此書來請記其本末而以謂先覺之前言往行不聞於後世學者之罪也聞之而不能以廣傳同志之罪也今豫既以傳次之而因又善傳傳公又成之嗚呼後世學者讀之當想見法席之盛也題誼叟僧寶傳後清涼大法眼禪師出世行道三十年其所示徒皆勸勉之語未嘗以法傳人非有法而祕惜實無有法耳譬如無病而飲藥病從藥生故曰一切文字語言學者嗜著是名壅蔽自心光明然前聖指道之轍入法之階後世不聞而學則又如無田而望有秋成無有是處豫初成此書於谷山時出塵庵師宜公誼叟在焉命南州傳道者録之以衆編參定特為善本明年春豫遊嶽還復過誼叟出以為示其裝寫之精竄較之完非用意之專信道之審莫能臻是豫知其閲而仰思當助發其光明侔倡其智證去先德亦何遠哉則清涼以文字語言為壅蔽者蓋治疾之藥耳覽者其以是窺出塵可也題珣上人僧寶傳豫初遊吳讀贊寧宋僧史怪不作雲門傳有耆年曰嘗聞吳中老師自言尚及見寧以雲門非講學故刪去之又遊曹山拜澄源塔得斷碣曰耽章號本寂禪師獲五藏位圖盡具洞山旨訣又遊洞山得澄心堂録書谷山崇禪師語較傳燈皆破碎不真於是喟然而念雲門不得立傳曹山名亦失真崇之道不減巖頭叢林無知名況下者乎自是始有撰敘之意凡經諸方三十年得百餘傳中間忘失其半晚歸谷山遂成其志時長汀璲珣二衲子來從豫遊録此副本易曰多識前言往行以大畜其德是録也皆叢林之前言往行也能不忘玩味以想其遺風餘烈則古人不難到也二子勉之題宗上人僧寶傳豫撰此傳方定稿上淨三昔而東甌道人將還石門自溈水過谷山款豫見其書曰噫嘻此一代之博書先德前言往行具焉願手録以示江南道侶即挂巾屨坐夏四月二十三日録畢以示豫豫歎曰夫彈冠必整衣心敬必形肅宗非至誠愛重法道其謹楷精嚴渠能至是哉歐陽率更以書畫名世見鍾太傅碑愛其筆法臥其下三昔不忍去率更嗜世間法且爾況出世間法乎宗為法坐夏賢於率更遠甚題圓上人僧寶傳仰山初見耽源所傳六祖圓相即以焚之及其授法也則有默論雲門不許録語句而遠侍者以紙為衣遂傳于今以是論之非離文字語言非即文字語言可以求道也臨川圓道人少遊方有志學道一鉢經行諸方其孤征絶俗雪鴻戾天仰不可及而骨董中有此録小字薄紙畫畫精誠可以見其志也題淳上人僧寶傳問如何是火性答曰熱是火性問如何是水性答曰濕是水性問者欣然而有得水火之義盡於此矣又問何以謂之恕答曰如我之心以待人則恕矣又問何以謂之慎答曰心之一具德見於慎耳問者又欣然有得蓋恕慎之理極於此矣此世間義理之論也義理者心之塵垢也其去佛道不翅如百億天淵然昔者有問竹林如何是法身答曰法身無相又問如何是法眼答曰法眼無瑕為道吾衆中所失笑者宜矣近世邪師相與傳授謂無有悟但直問直答謂之於法中不生異見紛然棋布名山稱嗣祖沙門學者例無英氣往往甘心屈伏每為之流涕宣和四年九月二十七日夜為衆説參同契至本末須歸宗尊卑用其語處曲折引譬以發明先聖之意使忱信而虔敬者一洗其矯誣宗旨之氣而福唐太淳上人適出此編示豫燈下為書以付之淳能識宗則知尊卑之語不出義理之域而悟首山獨坐無尊卑從上無一法與人為太老婆饒舌矣題其上人僧寶傳長沙益陽白鹿大禪師門弟子季芳福唐人純靜寡言笑年二十餘侍其師宣和四年夏于湘西南臺寫此書三十卷寫畢以示豫豫曰汝師出雲蓋西堂之門西堂為臨濟九世之嫡孫而黃龍南公之真子也禪家辨才叢林畏仰之汝能自勤自誦習此書玩味其旨蹤迹其行事繼之以不休則古人豈難到哉如寫而不讀讀而不味其意徒欲粉飾清興於道何有題範上人僧寶傳蚍蜉細字欲闌斑病眼臨窗看亦難八十一人間鼻孔那盧穿在一毫端且道有鼻孔從範上座穿只如懷禪師無鼻孔作麼生下手若也道得西川漏籃子一錢買三個若道不得南臺門外是湘江題端上人僧寶傳臨川志端上人宣和四年夏於長沙之谷山谷山有衆而領袖者魯暗不通曉世事叢林以是凋落端律身益敬日誦經行道暇則寫僧寶傳同學勸經行他山要與之俱端辭以山水未暇觀正以白業未辦為憂同學怒棄去端怡然勿恤也明年正月上浣日端袖此書來求題其後豫告之曰一精想中十法界種子皆具隨其所熏發而起譬之田有稻種藉時雨以芽孽之十法界者六凡四聖謂也今端屏絶諸緣日唯録佛祖之語味佛祖之意則亦熏發佛乘之種與夫遊談無根疲精神於莊孟為陳言腐説以欺無知者異矣然能窮究其所自使所言所履如傳八十一人者則可謂出家知恩者豫視端精緊板而聲圓若可語此者聊及之端其勉之題隆道人僧寶傳古之學者非有大過人者惟能博觀約取知宗而用妙耳唐沙門道宣通兼三藏而精於持律持律小乘之學也而宣不許人呼以為大乘師棗柏長者力弘佛乘而未嘗一語及單傳心要方是時曹溪之説信於天下非教乘之論所當雜宣公甘以小乘自居棗柏止以教乘自志竟能為百世師者知宗用妙而已禪宗學者自元豐以來師法大壞諸方以撥去文字為禪以口耳受授為妙耆年凋喪晚輩蝟毛而起服紈綺飯精妙施施然以處華屋為榮高尻罄折王臣為能以狙詐羈縻學者之貌而腹非之上下交相欺誑視其設心雖儈牛履狶之徒所恥為而其人以為得計於是佛祖之微言宗師之規範掃地而盡也豫未嘗不中夜而起喟然而流涕以謂列祖綱宗至於陵夷者非學者之罪乃師之罪也以苟認意識為智證為師者之門望見以輕慢之心萌矣非特然也又執己是而去取諸方賤目睹而尊信傳説故不見至道之大全古人之大體因編五宗之訓言諸老之行事為之傳必書其悟法之由必載其臨終之異以譏口耳授受之徒謂之禪林僧寶傳書成而九嶷道人道隆閲之一月而𡵻𡵻上口兩月而娓娓成誦三月而能為末學者舉紐領夏於雲蓋閉門寢飯之外口誦而録之非誠著於學志存於道何能臻是哉然其為人不甘為啞羊苾芻混處疾之甚至於詬罵喜與有識博聞者遊意所合則不問道俗千里從之嗚呼叢林博聞者既不可人求之而啞羊苾芻動成阡陌隆雖口受吾文抱吾所集以遊諸方亦安能忘詬罵之喙乎宣和二年秋得得自山中來出此編為示豫佳其好學為書其本末以告未知隆者題休上人僧寶傳泰山之鳥巢於木末九淵之魚託於沙罅嗚呼魚鳥之微亦知附託於高深安有毀髮學道之徒而自棄於淺陋乎季休福唐人也而得業於湘上之南臺其師太公與豫為兄弟行其熏蒸見聞有自來矣初太遭橫逆坐圜扉中百許日他法屬皆畏酬酢之而休服勤不敢失禮逮其釋余勸度之宣和四年正月也既受具陪衆遂寫此傳除夕捧以來豫佳其能自脫淺陋而趨高深為題其末明年元日也明白庵題題英大師僧寶傳老子曰為學日益為道日損者理之序也博觀而約取厚積而薄施多識前言往行者日益之學也如春夏之水方增川浩然不可測其際思之又思之以至於無思如之在頂蓋造形之極不可以數量情識得孔子晚乃悟曰天下何思何慮如秋冬之水縮廓然見其涯涘嗚呼叢林法道之壞無如今日之甚非特學者之罪實為師者之罪也學者方蒙然無知而反誡之曰安用多知但飽食默坐雖若甚要然亦去愚俗何遠豫所録僧寶傳先敘其悟道之緣又書其死生之際欲學者法前輩為道之精而惠英大師年二十餘生海上獨挺然有志不肯碌碌而啞羊者固已憎之如十世讎矣手寫此書攜以過豫豫佳其勤扶此心以自此趨無上佛果如順風揚塵耳宣和四年十一月題題所録詩海南道人惠英字穎孺生十有二日而失母年七齡而為沙門二十歲從豫遊豫所作語言遍叢林未嘗收録而英編兩巨帙為示既有愧於九祖欲焚去之又念英之好學為一笑而置之然流俗寡聞見少年嗜筆硯者不背數必腹非之以謂禪者不當以翰墨為急寧知龍勝詩流震旦好學者首論其動以億萬篇多為言哉英勉之老子言為學日益為道日損使其未嘗學也何所損哉如川之增者學也水落石出者損也然未易與粥飯僧論此也題佛鑑蓄文字禪余幼孤知讀書為樂而不得其要落筆嘗如人掣其肘又如瘖者之欲語而意窒舌大而濃笑者數數然年十六七從洞山雲庵學出世法忽自信而不疑誦生書七千下筆千言跬步可待也嗚呼學道之益人未論其死生之際益其文字語言如此益可自信也今三十八年矣而見雲庵平時親愛之人佛鑑大師淨因於湘中頽然相向俱老矣而故意特未老又出余少時詩句讀之想見山林之舊遊處誦白公詩曰手把楊枝臨水坐間思往事似前身題弼上人所蓄詩往時叢林老衲多以講宗為心呵衲子從事筆硯豫遊方時省息衆中多習氣抉磨不去時時作未忘情之語隨作隨棄如人高笑幸其不聞過廬山見弼上人出一巨軸讀之茫然不可諱為多言之戒昔殷浩喜作詩不甚工當出示桓溫溫戲曰子勿犯吾儻見犯即出豫詩示人弼上人不見惡願勿傳乃幸題言上人所蓄詩豫幻夢人間遊戲筆硯登高臨遠時時為未忘情之語旋踵羞悔汗下又自覺曰譬如候蟲時鳥自鳴自已誰復收録寶山言上人乃編而為帙讀之大驚不復料理其訛正可為多言之戒然佳言之好學雖鄙語如豫者亦收之世有加豫數十等之人其語言文字之妙能録藏以增益其智識又可知矣夫水發岷山其濫觴至楚國則萬物至滿則合之者衆也善學者其能外此乎言公其勉之題自詩寄幻住庵淵明作訓子詩可以想見其愷弟而杜子美乃曰有子賢與愚何其挂懷抱作間情賦足以見其真而昭明太子曰白璧微瑕正在此耳癡人面前不可説夢豈子美昭明亦真癡耶豫自居海上及南歸寄意於一戲故語不復料理其當否今録數首以寄幻住庵主杜子美梁昭明猶未脫癡病幻住其能不癡耶題自詩豫始非有意於工詩文夙習洗濯不去臨高望遠未能忘情時時戲為語言隨作隨毀不知好事者皆能録之南州琦上人處見巨編讀之面熱汗下然佳琦之好學雖語言之陋如僕者亦不肯遺況工於詩者乎因出示輒題其末題權巽中詩世稱唐文物特盛雖山林之士輒能以詩自鳴以余觀之如雙井茶品格雖妙然終令人咽酸冷耳巽中下筆豪特之氣凌跨前輩有坡谷之淵源豫見之未視名字輒能辨大率句法如徐季海之字字外出骨骨中藏稜讀者當置軸紬繹想見瘦行清坐時也使巽中聞此語當以豫為知言題自詩與隆上人余少狂為綺美不忘情之語年大來輒自鄙笑因不復作自長沙來歸舍龍安山中無可作做學坐睡法飽飯靠椅口角流涎自喜以謂得其妙旁舍有道人隆公雅好豫昔所病者時時過豫終日而未嘗倦問豫昔所作尚能尋繹乎豫引紙為録此數篇以遺之而戲之曰昔達觀禪師居京師士大夫相從者皆以能詩答話多之觀笑曰解答諸方話能言五字詩二般俱好藝只是見錢遲隆公曰果爾吾不復耳坐客皆笑之隆字默翁湘中清勝者也題珠上人所蓄詩卷豫於文字未嘗有意遇事而作多適然耳譬如枯株無故蒸出菌芝兒稚喜爭攫取之而枯株無所損益寶峰珠上人湛堂公之高弟其為人精敏能辦事於佛事欲營之蓋不知艱嶮為何等物在叢林中為衆推蓋其氣不受控勒日涉園夫李商老每於人物特慎許可而贈珠以詩曰噴玉渥窪種者佳湛堂之有子也題華光鑑湖圖豫建中靖國遊西湖航西興遊浙東以病不果甚以為恨讀東坡詩見山川之精神如兒稚對蜜知其甜今觀鑑湖圖如華光戲以蜜置舌書間耳涌師俄收之而去兒稚雖癡然亦知蜜不可如飯嘗食之也題墨梅山水圖華光老人眼中閣煙雨胸次有丘壑故戲筆和墨即江湖雲石之趣便足春色不可收畜也而此老人藏於耐寒凍枝頭一時高韻譁於士林而其所畜又其尤精選也以病舉以付其子湧湧如獲夜光照乘千里以書誇於豫不有是父安得此子哉歐陽率更見索靖碑因留不去竟寢其下三昔文字畫刻是中安得美味而嗜好有如此者豫初大怪之及視湧之好尚率更要不足怪也題墨梅華光作此梅如西湖籬落間煙重雨昏時見便覺趙昌寫生不足道也題蘭無人自芳之態此老何從見之豈胸次有此風葉蕭散乎題公翼蓄華光所畫湘山樹石豫習湘山者也日與樹石為伍華光畫樹石而不畫我何哉公翼仕宦三十年而貧在我上簏中唯墨梅樹石數軸其人品可以想見題橘洲圖公翼愛橘洲而使華光圖之豫家於湘西開門則漁汀斷岸不呼而登几案間蓋湘西皆吾畫笥書此以誇公翼云題平沙遠水圖五首公翼詩云蕭然野趣忽在手倣佛江南煙雨村此殆筆端能生煙雲非胸次有江山何能作此語又題公翼所畜歐公嘗語客曰坐而隱者不知巖石雲泉之妙王公貴人圖江山臥而披之蓋荊山之人以玉抵鵲而秦乃割其十五城以求璧豈世以希見為貴初無定情耶豫生長山林而目不自觀公翼賢士大夫也其希見而盡畜之宜矣又宣上人所蓄華光滴露寫寒枝幻出平遠士大夫厭飫富貴之餘見之收蓄可也道林清富宣師開軒瀟湘江山不呼而登几案間步林麓嗅梅尋柳嘗應接不暇乃袖而寶祕之也好事無乃太多乎哉又惠子所蓄好在華光真子過于雲屋之間春色都隨談笑袖中仍有湖山宣和元年十二月初五日惠子出其師所作湖山平遠曰此蓋老人得意時筆也豫平生無所嗜山水少年遊戲錢塘眷湖山之勝欲老焉以詩寫之不能肖逮今衰暮雖與華光善得其戲筆必為人持去惠子呵豫不能善祕之豫曰凡四海九州山川煙雲皆吾畫笥也奈何為兒戲畜紙墨間乎惠子笑曰公戃恍大言蓋其天性然為題此紙於是書六言付之又稱上人所作宣和元年十二月初吉日里道人稱公絶湘來過豫時江寒欲雪小室喧譁良久出畫一軸蓋橘州斷岸平遠之圖華光墨梅別館之兒稚也稱妙思如此力之不已當不減華光口占曰袖裏兩枝煙雨門前一片瀟湘題華光梅華光紹聖初試手作梅便如迦陵鳥方雛聲已壓衆鳥東坡見之如黃梅視無姓兒便肯之無姓兒今將以衣鉢授嶺南撩豫惜黃梅破頭老人不及見也圓禪者當還舉似乃翁問甘露滅法喻齊否政和五年十一月十二日夜石門精舍題題石龜觀壁余家筠溪之上去城餘百里兒時聞城中塔成欲往觀焉因先君行坐余於力謝三肩上至石龜觀謝三者紿余曰當先拜石龜乃能見塔不然終不可見余曰儻爾汝何不拜曰我已嘗拜之汝既童子又後至法當拜於是再拜入城幸見塔而心喜謝三肯余先也後三十年過焉視石烏龜良無恙摩挲以追繹前事為大笑吾亡友胡汝霖民望生撫之金溪七八歲時隨兄入城忽不知所在使人尋已在寶應寺前看泥力士矣余每以戲之而忘余亦有此患乃以炭書其壁曰須知泥力士不減石烏龜忠子民望里人也書以示之題廬山余十五六時遊北山謁準禪師殘僧三四輩草屋數椽殆不堪其愁準老而喜飲時酹一樽則擊罄禮觀音空階夜雨彌月不止後二十五年余還自海外過此而山川增勝樓閣如幻出大鐘橫撞淨侶戢戢而真隱方開石門法道于此余乃服其老且衰矣重九前三日秋陰皆當時清絶之象而有今日適悅之情遂書此題天池石間成績茂功與德洪覺範道人自虎溪屏人乘入資聖庵少焉歷石門澗錦繡谷窮高陟險遂至天池致敬普見如來獲紫金光明之瑞越翌日齋罷作禮而退聞佛手巖寶林峰之勝一一登覽其上望擲筆峰下瞰聖寺經巖神刻玉削不知幾千仞而江流吞天山接平野雲煙開合一目千里茲實匡廬第一境隱然為天下奇觀也薄晚投宿化城回望杖屨所經蘿徑鳥道杳然在層崖絶壁之上殆非人間之遊也此身儻未變滅要當結廬以終題浮泥壁空印禪師以宣和二年十二月偕余謁從禪師於芙蓉峰纍石於玉淵之上以為塔酌泉賦詩暮夜矣遂宿焉次日從公追余二人杖屨下危峰自關山谷中並澗行十餘里兩山爭倚天煙霏層疊自獻部曲斷續行九地底水聲谼硐如千乘車挽而起仰望晴虛如展匹練既出谷沃野夷曠遂飯于木陰空山暴寒雪意濃甚跣而渡澗者十八九入石門已夕山中之人炬而來迎及寺已二鼓矣秉燭夜話如夢寐中住山宣公云常有虎來月黑踰垣而去空印使余記之遂書題清修院壁昔余庵于湘西與希一為鄰相歡如價密宣和四年冬居一遷于茲山然每會面夜語達旦七年秋余將歸老玉峰之下來謁別為留兩昔言意俱盡而情則有餘桑下三宿前聖丁寧者正針余今日之病曉陰閣雨千掌在有無中出山有不勝言者中秋後二日題題白鹿寺壁希先昔遊公卿間與鄒至完曾公袞蔡子因吳子野厚居自江左還南嶽庵方廣十年叢林高之湘南使者勸請開法此山希先持一鉢欣然而來既至屋老過者疑將壓焉殘僧才十許輩大率如逃亡人家未五白殿閣宇室間見層出如化城如梵釋龍天之宮從空而墮人間此邦之檀信往來之士大夫太息以為勤不知希先蓋遊戲也余自長沙來館余四昔時故人傳彥濟試手作邑攙姦推滑民驚以神當暇日攜僚佐時時舟而至其登高臨遠烹茶賦詩則茲山之風月未至乾沒也題觀音院壁達磨祖師相授法者三世塔廟在淮山從之遊得道者多庵於蒼巖大林之間路由蘄春真身存者無慮八十餘處黃於蘄為接壤太平興國初僧昭信始見琳公於大石之間大安龜頭相繼而出竹瓦之東石尉村有古松兩株參天合抱邦民歲禱雨暘於其下其應如懸響垂拱初耆舊相傳為觀音院嗚呼豈非祖師之門得道出世於茲已嘗建寺毀壞而不可考者乎有僧祖欽投牒疏其事於郡太守待制韓公駒欣然給據付之使中興其院欽敦厚坦夷道俗愛之翕然而成余建炎元年幸經過焉到門卻立縱望雲間萬峰來朝茲地也其興乎

body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編錄毘陵天甯法雲堂校題題華嚴綱要華嚴宗有四種無礙謂事無礙理無礙事理無礙事事無礙夫言事事無礙者非有竺梵震旦之異凡聖小大之殊而講師笑棗柏不辨唐梵又可笑哉此文清涼國師啟毗盧藏之鑰匙也其文簡而義無盡其科要而理融通學者當盡心焉方天下禪學之弊極矣以飽食熟睡游談無根為事而佛鑑乃倡為宗尚之其亦護法憫俗之慈也歟題疾老寫華嚴經瑛公風骨清臞而神觀秀爽措置加於人一等與南州名士遊淡然無營獨杜門手寫此經精妙簡遠之韻出於顏柳予聞一切賢聖皆以無為法而有差別者皆所莊嚴之耳龍勝菩薩以夙智通力誦持之實叉難阤以入世間智力翻譯之清涼國師以達佛知見力疏釋之而瑛公以夙淨願堅固力書寫之予觀其心志端欲候文殊師利之智海普賢之行願海善財童子利生求法精進海十二時皆在現行如善現比丘不動真際現一切色身於十方世界作大佛事顧其措置非加於人乎題光上人所書華嚴經邾城岸大江皆深林大澤自麻城之東多奇峰峻谷輪蹄所不至虎兕所掩建炎元年十月予自漢上南還廬山阻兵於大石山捷徑過鍾山之下有僧舍數椽道人七八輩匝笑如舊識有首眾者道光與其兄道舒鄰房晨香夕燈以禪誦為佛事從之者皆肅如也光嘗呼此經以示予予因再拜跪而讀其篇目謂舒曰耆闍婆面城之醫王也面所見草木土石無非是藥文殊師利童子曰耆婆見草木無非是藥菩薩見境無非是心然耆婆祝之疾燥濕虛實寒病祖病眾生病之方也而光口不忘誦目不忘視手不忘書寫之則隨施無所窒其妙嗚呼耆婆蓋世間之醫而得妙者也則出世間之醫其用自心之得妙者也是經其廣則四天下微塵數偈句其得則震旦所譯十萬偈句光擬之於沙界涼曝得所藏之於毛端寬博有餘至於殊勝功德則非有思議心所能測知經初畢工而盜賊蟻聚所至流血可涉光黃舒蘄衲之間受禍猶酷獨此經所寄東西南北十里之間無犬吠之驚父老男女安堵樂業豈非龍神所護持而然乎光少游方見知識飽參而還以親老不忍去其膝日以研味此文其為知恩精進不言可知矣咨爾鍾山之下護持龍神之眾時朔來朝以祕藏之某題題華嚴十明論顯謨閣待制朱公世英為余言頃過金陵謁王文公於鍾山公以彥里閈晚生有志學道謂曰若讀史見勾踐伍員事乎勾踐保栖會稽置膽於坐臥則仰膽飯食亦嘗膽也伍員去楚櫜載而去昭關至蒲伏行乞於吳市二子設心止欲雪恥復讎而焦身苦思二十餘年而後遂其欲蓋有志者事竟成也然移此心以學無上菩提其何以禦之世英囑予記其言世英歿一年余還自海外築室筠溪石門寺夏釋此論追念平時之語曰嗟乎流轉三界未即棄去其恥亦大矣囚縛五陰未能超出其讎亦深矣以吳楚之讎恥較之其相倍如日劫而學者亦思掣肘徑去然至誠惻怛勇決力行較勾踐伍員特太山毫芒耳豈不惜哉金剛般若經須菩提聞世尊言以恒河沙等身命布施不如受持四句偈為他人說之福於是泣下其心豈不謂學者多以一身味著懈怠故自為障礙乎夫雜華具四天下微塵數偈而其所詮者如來普光明大智一法而已親近隨順此智者戒定慧三法而已以戒定慧觀照方便破滅無明一切眾生彈指實證故金剛藏菩薩曰隨順無明起諸有若不隨順諸有離是謂成佛顯決入法要旨借令三世如來重復宣示深奧不能加毫末於此矣其於利害去取曉如白黑其義理昭著粲如日星不知學者於戒定慧何疑而不隨順於無明煩惱何戀而不棄遺乎孟軻曰今有無名之指屈而不信非疾痛害事也如有能信之者則不遠秦楚之路為指之不若人也指不若人則知惡之心不若人則不知惡此之謂不知類也今之知類者吾特未見耳豈密行暗證隱實顯玼世不得而知歟抑觀力麤浮習重境強多遇緣而退歟余切慕思大智者父子於道能遺虛名收實效三十年間決期現證皆獲宿智通入法華三昧乳中之酪此其驗矣嗚呼安得如南嶽天台兩人者與之增進此道哉政和五年六月十日書題光上人書法華經晉沙門曇諦初夢於其母黃曰我投暫託宿乃以鐵鏤書鎮并麈尾拂為寄母既覺而二物在手於是大驚而生諦逮五齡母以二物示諦諦軒渠笑曰此秦王請我講法華經贈我者爾母曰汝省置之處乎諦罔然不荅而去又建興二年長沙縣西一百里餘有青蓮花兩本生陸地道俗堵觀钁之丈有二尺得瓦棺蓮之根莖自棺之壞處出開視之有髑髏栓索而蓮寔生齒脥間晉有識曰有僧不知名氏誦蓮經十萬部不疾而化遺言使衣紙而以瓦為棺今驛亭故基建寺其號蓮花嗚呼異哉惟此經之力能使授持者卒長物於生死後奇祥於異世驚世殊異之如此蘄州永樂寺僧道光出血和墨寫此經其衡斜點畫勻如空中之雨整如上瀨之魚皆精進力之所成知見香之所熏不然何以莊嚴微妙如此之巧耶光又專精不懈見一纖毫相之間萬八千土於剎那入無量處三昧名報佛恩然隨筆任運經行臥起語默動止莫非授持此經故毫相之間剎那之頃豈有間哉光之為人純素潔忠於事孝於奉親為里閈所敬信法眷所追崇是真比丘也予自北還南留其庵信宿彌日盡獲見其所寫之經無慮十數種觀其施為日夕以與佛菩薩語言詶酢豈復有世閒之心耶華嚴曰念念不與世間心合是大精進光其以之題超道人蓮經南昌饒益院除饉惠超自幼出家誦此經年二十六試于有司以精通得度即受具游諸方事善知識發明心要及還掩關以金為墨書妙法蓮華經政和八年六月四日清晨攜以示予開卷熟視筆墨精到衡斜布列皆有節度非精誠盡力於此法莫能臻是也予聞一切契經皆佛所演而此經獨稱過去諸佛先說法喻雙舉蓮之為喻以三世同時十方同會方其開時即有果方於果中即有因蓮華蓮實蓮密是也諸子雖分布而會聚之未嘗隔斷此其名蓮蓮連也般若曰一切智智清淨無二無二分無別無斷故者以是哉梁大沙門僧祐平生書寫誦持未捨受即身為爛瓜香已捨受即舌本為青蓮華香皆其精進真信之力所成就陳大沙門惠思誦至是真精進是名真法供養如來恍然見靈山一會儼然如昨蓋此經有不思議力入二十五種三昧以大行慈悲入中觀以梵行慈悲入幻觀以勝行慈悲入止觀令一切眾生自然見如是事入菩薩一切色身三昧之旨也今超師壞衣缽食一室枵然與世相忘以精勤之力致工於此法可謂知本矣予將見生身發無垢智光方吾法下衰而超用志如是誰不隨喜願世世同超登內院見慈氏預聞妙義頓捨人法二執證對現色身此予志也甘露滅某謹題題六祖釋金剛經金剛般若靈智妙心者也諸佛與我及眾生類三無差別然諸佛已知而信者我今知而信者唯眾生未知未信則當教導之故世尊以後五百歲持戒修福者能生信心為實然以心信心猶為三法如人不睡而能有夢則知是病故世尊又曰以是信解不生法相如來世尊既以明告顯說以為經祖師從而注釋之恩德可謂大矣而傳布未廣予竊患之故化清信檀越鏤版印施普告大眾云政和五年十月日題靈驗金剛經秘書省校書郎龔德莊初罷官靈壽來歸京師居新門裏時方上元山東劉野夫與德莊善偶折簡來約十四日可盡室往觀君慎勿出略相候欲款語德莊素敬憚其人為獨守屋廬二鼓矣而野夫不至方假寐家人輩尚未還俄火自門而燒德莊但捉誥牒而走一夕而燼數百家明日跡其屋灰炭中得金剛般若一卷略無損處開視明鮮如新德莊少豪逸嗜酒色不甚信內典豈夙世善根不思議力以茲發感悟之歟觀者彭凡鄒正臣劉棐僧希祖德洪政和元年上元後一日題宗鏡錄右宗鏡錄一百卷智覺禪師所譔切嘗深觀之其出人馳騖於方等契經者六十本參錯通貫此方異域聖賢之論者三百家領略天台賢首而深談唯識率折三宗之異義而要歸於一源故其橫生疑難則鉤深賾遠剖發幽翳則揮掃偏邪其文光明玲瓏縱橫放肆所以開曉眾生自心成佛之宗而明告西來無傳之的意也錢氏有國日嘗居杭之永明寺其道大振於吳越此書初出其傳甚遠異國君長讀之皆望風稱門弟子學者航海而至受法而去者不可勝數禪師既寂書厄於講徒叢林多不知其名熙寧中圓照禪師始出之普告大眾曰昔菩薩晦無師智自然智而專用眾智命諸宗講師自相攻難獨持心宗之權衡以準平其義使之折中精妙之至可以鏡心於是衲子爭傳誦之元祐間寶覺禪師宴坐龍山雖德臘俱高猶手不釋卷曰吾恨見此書之晚也平生所未見之文公力所不及之義備聚其中因撮其要處為三卷謂之冥樞會要世盛傳焉後世無是二大老叢林無所宗尚舊學者日以慵墯絕口不言晚至者日以窒塞游談無根而已何從知其書講味其義哉脫有知之者亦不以為意不過以謂祖師教外別傳不立文字之法豈當復刺首文字中耶彼獨不思達磨已前馬鳴龍樹亦祖師也而造論則兼百本契經之義泛觀則傳讀龍宮之書後達磨而興者觀音大寂百丈斷際亦祖師也然皆三藏精入該練諸宗今其語具在可取而觀之何獨達磨之言乎聖世逾遠眾生相劣趣慮褊短道學苟簡其所從事欲安坐而成譬如農夫隋於耰耘垂涎仰食為可笑也吾聞江發岷山其盈濫觴及其至楚則萬物並流非夫有本益之者眾耳有志於道者常有取於此吾徒灰冷世故安樂雲山明窗淨几之間橫篆煙而熟讀之則當見不可傳之妙而省文字之中蓋亦無非教外別傳之意也題法惠寫宗鏡錄龍勝菩薩曰眾生心性猶如利刀唯用割泥泥無所成刀日就損理體常妙眾生自麤能善用心即合本妙余觀世之人疲精神於紙墨者多從事於無用之學皆以刀割泥者也明州翠巖僧法惠獨施力寫永明所譔宗鏡錄一百二十卷與方廣禪寺大法寶藏嗚呼惠師可謂善用其心者也夫能使天台賢首唯識三宗之旨趣大乘深經六十卷妙義西天此土三百家之法句雜傳要說契心之至理鏡為一心心之所緣筆之所及常在現前余以謂此道人即入摩訶衍遍知稱性之海即具普賢一真光明微塵數不思議行門予幸得托名卷末願慈氏大士從知足天來主龍華時同聞此錄知今日自作隨緣其心非謬也題修僧史予除刑部囚籍之明年廬於九峰之下有苾芻三四輩來相從皆齒少志大予曉之曰予少時好博觀之艱難所得者既不與世合又銷鑠於憂患今返視缺然望之則竭不必叩也若前輩必欲大蓄其德要多識前言往行僧史具矣可取而觀語未卒有獻言者曰僧史自惠皎道宣贊寧而下皆略觀矣然其書與史記兩漢南北史唐傳大異其文雜煩重如戶婚鬥訟按檢昔魯直嘗憎之欲整齊未遑暇竟以謫死公蒙聖恩脫死所又從魯直之舊游能麤加刪補使成一體之文依倣史傳立以贊詞使學者臨傳致贊語見古人妙處不亦佳乎予欣然許之於是仍其所科文其詞促十四卷為十二卷以授之題讓和尚傳心之妙不可以語言傳而可以語言見蓋語言者心之緣道之標幟也標幟審則心契故學者每以語言為得道淺深之侯予觀南嶽讓禪師初見六祖祖曰什麼物與麼來對曰說似一物即不中曰還假修證也無對曰修證即不無染污即不可祖嘆曰即此不染污是諸佛之護念大哉言乎如走盤之珠不留影跡也然讓公猶侍六祖十有五年乃去庵於三生石之上時天下尚以律居未成叢席有僧忘其名為總眾事二十年為縣官勘其出納先是寺未嘗藉其資僧方囚自念久已忘之仰祝讓公求助於是一夕通悟盡能追憶二十年間物件不遺毫髮乃得釋故以讓公為觀音大士之應身而讓居庵中未嘗知之予游福嚴與僧讀其事僧疑以問予此何理哉予曰涅槃經云外道妒世尊入其國驅五百醉象來奔世尊垂手示之而象見五指輪中皆出師子於是怖伏遺糞而去世尊曰爾時我指實無師子而是護財狂象自然見之皆我慈善根力故夫世尊慈善根力要不可以有思議心測之而可以無隱藏事證如月在天光遍谿谷初不擇谿谷之濁清而水之澄澈必有月影水之澄澈則月現影而善惡之必有所感乃不見慈善根力哉則讓公坐令其僧獲聰明之辯要不足怪也題洞山巖頭傳雪峰見德山托缽便問鐘未鳴鼓未響托缽向什麼處去德山便歸方丈峰舉似巖頭巖頭曰大小德山不會末後句德山聞之呼巖頭問曰汝不肯老僧耶巖頭密啟其意德山明日上堂舉論大異巖頭拊手大笑曰且喜老漢會末後句天下人無奈此老何雖然如是只得三年至期果化去洞山初見華嚴靜公搬柴把住問曰狹路相逢時如何靜曰反仄反仄洞山曰汝記吾言已後向南住眾一千北住山三百人而已靜初住福州東山一千眾後居都下眾三百人予觀巖頭洞山之語出於信口殆若苟然而德山之化華嚴之眾皆不能逃其言因緣時節弗差毫髮其如蟲蝕木偶爾成文耶亦夙智通力自然前知耶偶爾不可數通力非宗門所尚非授大法顯著於此能無疑乎題斷際禪師語錄禪師初與異僧游天台渡溪方悟其為異也悔不能早識之且將折其脛而後已尋北游值老嫗於洛下與之語多所發藥遂侍以師禮嫗知其非尋常人俾更謁江西大寂既至而祖已化去逾月矣而見其子海公海以所嘗悟明之緣示之公悟大法於言下海曰他日其嗣大寂可也公笑曰是豈義也海歎已而為不及常謂其徒曰吾頃游方無所不問雖草根巖壁中有人必往窮詰其所得又曰馬祖之下得正法眼歸宗耳而牛頭以降皆不可當其意者豈公取舍故欲異於世也亦抑世之人見其不與己合而訴以為異者也古之人所以大過人者信己之專惟信己故不惑世人之言是故所立卓絕非常人所能及也公之器識宏遠剛正自性出其天性豈非以謂道之所在非凡聖男女之間晦顯長少之際而是非取舍不可以苟而已而取人不必以求其全也今之學者既下視天下之士而又工於怪奇詭異之事衒名逐世不顧義理求人必以其全而議論多膠於所愛名為走道其實走名紛紛冗冗皆禪師之門罪人也禪師之所養其峻嚴廣大如此其語言斷斷如藥石深可以治晚世學者之病是知其言蓋所養也卷舒放肆驅逐邪妄開闢正信直明一心以歸合佛祖之言可謂深渺宕肆大哉洋洋乎光明之言也余因手校而藏之又列其所施為者以自警書於卷之尾且以示同學云題百丈常禪師所編大智廣錄余常識老僧知瓊於司命山下瓊湓城人黃龍無恙時客也為余言黃龍住山作止甚詳嘗手校此錄於積翠謂門弟子曰佛語心宗法門旨趣至江西為大備大智精妙穎悟之力能到其所安此中雖無地可以棲言語然要不可以終去語言也故其廣演之語大剔禪者法執而今之五家宗趣皆此錄森列如井之在海其清涼甘滑泄苦濁毒所不同而本則無異質也予誌其言久之偶見洞山藏角破函中多故經往掀攪之乃獲見常禪師居百丈日重編者熟讀驗瓊之言信然校世所傳多訛略因藏之以正諸傳之失又誌瓊之首告也題雲居弘覺禪師語錄悟本禪師設五位法門以發揮石頭大師之妙大率約體用為五法更互主客隱顯相參借言以顯無言然言中無言之趣妙至幽玄故其問荅之貴親正如君臣之貴合於是翕然宗以為洞上玄風出其門下者應機酬詰務以秀麗嚴峻之語相高尚使人放身如覽花葩之開妍煙雲之穠纖而仰拂秋之螺峰染春之鴨波劃刻百出必欲合其法而後已忽其繩墨以登其門者則非吾屬也而雲居弘覺禪師蓋其徒之秀傑者乃獨不然其演法之辨應機之詞朴古自在隨意所劃如世之良醫坐於藥肆中病而詣者信手與之藥至病愈常謂其徒曰佛法無多事行得即是汝但作佛莫愁佛不解語古人純素任真有所問詰木頭碌磚隨意荅之實無巧妙大底渠腳根下穩當苟不如此雖說得如花錦無益也余常怪洞山嗣法者如本寂道全居遁休靜之徒光大於世者三十餘人觀其施為提演宗脈無敢冒規致之外者而膺公乃爾殊異豈所謂得所以言言不必同者歟余追躡其意以謂大法本體離言句相宗師設立蓋一期救學苟簡不審專己臆斷之弊而已法久必壞使天下後世眩疑自退守言而失宗無所質辨為可惜也故其超然法立如此而公之子簡亦相與振成之是知俾明悟者知大法非拘於語言而借言以顯發者也嘗與人論至此其人凌憑其氣而面頸發熱曰醫智百巧志誣先德詬罵而去吁嗟使弘覺不死且聞余之說以為知言者今其道愈陵遲至於列位之名件亦訛亂不次如正中偏偏中正又正中來偏中至然後以兼中到總成五今乃易偏中至為兼中矣不曉其何義耶而老師大衲亦恬然不知怪為可笑也雖然弘覺一矯之則洞山之道不轉顧地而盡寧有今日耶題克符道者偈洞山悟本禪師作五位頌有曰兼中到不落有無誰敢和人人盡欲出常流折合終歸炭裏坐予初以謂坐炭中之語別無意味及讀此偈百餘首有曰儂家住處豈堪偎炭裏藏身幾萬回不觸波瀾招慶月動人雲雨鼓山雷乃知古老宿之語皆不苟然符臨濟真子而悟本自為洞山之宗道本同也而學者不了以私異之惜哉題清涼注參同契叢林故宿相傳謂石頭參同契明佛心宗後輩鮮有深識其旨者獨清涼大法眼禪師注文發明居多故南唐後主讀至玄黃不真黑白何咎處爽然開悟余謂後主所悟蓋悟法不真而已非因其語以了石頭明暗本意也如安禪師破句讀楞嚴而悟句讀且爾矧所謂義味乎然安於心法無疑也予嘗深考此書凡四十餘句而以明暗論者半之篇首便曰靈源明皎潔枝派暗流注乃知明暗之意根於此又曰暗合上中言明明清濁句調達開發之也至指其宗而示其趣則曰本末須歸宗尊卑用其語故其下廣敘明暗之句奕奕綴聯不已者非決色法虛誑乃是明其語耳洞山悟本得此意故有五位偏正之說至於臨濟之句中玄雲門之隨波逐浪無異味也而晚輩乘其言便想像明暗之中有相藏露之地不亦謬乎大率聖人之言不明於後世注疏之家汩之非獨此文也余不可以不辨題香山靘禪師語禪師父事雲庵於予為法兄然予少寔師事之初聞其誦迦葉波偈曰諸法從緣生諸法從緣滅我師大沙門常作如是說乃曰子悟此即是出家予時年十六曉夕以思茫然莫識其旨頃在海外閑居味維摩詰言善來文殊師利不來相而來不見相而見文殊師利言如是居士若來已更不來若去已更不去所以者何來無所從去無所至所可見者更不可見乃追繹香山之語遂深入緣起無生之境將以見之報其發藥之恩則化去已逾年矣其門人文謙以其提誨之語為示并書予願見不果題玄沙語錄右司諫集賢孫公覺莘老守福州日俾僧編集此錄學者以覺悟宗旨厥功茂焉然予獨恨集末附千光王寺沙門義澄重刪三句四機之語議論錯謬何以知之如玄沙綱宗第一句名真常流注與鐵輪位齊力一天下然未有出格之詞猶曰明前不明後無自由分未辨緇素雖得出世間未得入世間恐其墮一如平實無生之見死在句下也則有出格之詞而義澄輒引首楞嚴曰妄為色空及與聞見如第二月又圓覺曰由起幻故內發輕安大悲妙行如土長苗讀之令人搏髀高笑義澄何為者也乃敢指判禪宗哉學者能深觀之則知予言為公昔無業禪師每歎叢林不自揆行解如屠沽而自比佛祖南山律師曉達教乘而不敢自呼大乘師止言律師耳義澄自目未見而指人五色使見宣律師為人定必羞死題谷山崇禪師語予讀澄心堂錄長慶稜公之孫保福展公之嗣谷山禪師之語奇嶮宏妙光明廣大觀其膽氣逸群不在巖頭雲門之下而錄失其名然語多稱報恩傳燈但有潭州谷山句禪師而無機緣其列熙崇兩人機語校句所揭示殆相萬然皆住報恩豈句亦常居之耶予常與超然衝虎游谷山訪其遺事無所考因相對歎息追念東坡之語曰齊魯有大臣史失其名而黃四娘乃得與杜詩不朽事莫不爾作詩曰行盡湘西十里松到門卻立數諸峰崇公事跡無尋處庭下春泥見虎蹤又十年復與超然夏於石門偶閱前詩遂併錄之題韶州雙峰蓮華叔姪語錄傳曰聽言觀道以事觀生死亦大矣而兩人者睨𥌃之不翅如出入戶庭之易然蓋其所養非有以大過人者何以臻此其言具在可信也予觀雲門勘辯舉古皆脫略窠臼方其游戲時亦微見其旨至酬問垂伐則語赴來機瞻之在前忽焉在後令人溟涬然弟之哉夫語赴來機妙在轉處者正中妙協洞山旨趣也豈此老淛亦或用之而欽祥默識其不傳之妙也哉巴陵鑒公常荅問提婆宗曰銀碗裏盛雪荅祖意教意同別曰雞寒上樹鴨寒下水荅吹毛劍曰珊瑚枝枝撐著月云吾以此三句報荅雲門法乳之恩予始誕之今視之良然使雲門而在正當一捧腹耳題輔教編嗚呼正法明夷先佛垂告封文執偽更相是非聖智圓融凡情守隙否極則泰挺生英特則永安禪師其人也握管驅風懸河瀉辯推慈悲於教義會孔墨以流泏巍巍乎晃晃乎寔當世不可得也凡所著集雖不欲傳其在四方好事者之所錄殆九牛一毛耳後之學者至聞其名歎不得瞻容為恨若夫天地之高遠日月之昭明江海之浩蕩想而不可極者蓋若人矣題首山傳法偈諸佛甚微細智以金剛為喻非凡夫麤浮心識所能了達華嚴十定品入剎那際諸佛三昧乃能滅眾生顛倒想宣和元年十月吉日余在湘西鹿苑虎芩堂早作靜坐念曰今日蓋首山生辰追想為人書其傳法偈并汾州無德禪師注釋詳味父子真能入諸佛甚微細智者也題五宗錄性覺本自妙而常明以無性故不自知謂之無明一切眾生以無明迷醉如目有翳善知識如醫師東坡曰翳師但有除翳藥且無與明藥如可與明還應是翳此殆天下之名言也予所集五宗語要如醫師除翳藥方也從前先德用之有驗故樂以傳世書成於宣和元年正月明年有漳南道人崇顗者願求傳錄錄畢相示其筆力詳楷非誠之至志之確不能如此然能併除萬慮燕坐一室追繹先德所行之事研味諸家所示之語以校日用則予之所集不為徒爾顗之精勤不為虛行也題寶公讖記王敦素問予寶公讖語視千百年如一日此何道而至之予曰清明在躬志氣如神有物將至其兆必先者孔子之語也凡夫所見莫非倒想倒想若滅洞見三世寶公豈有倒想者乎敦素拊手曰美哉之論也然滅倒想寧有道乎予曰當不忘正觀曰是眼則不能自見其己體自體尚不見云何見餘物若樹是見復云何樹若樹非見云何見樹現在若有過去未來亦應是有過去未來若無現在亦應是無故雜華曰法眼不思議此見非顛倒敦素瞠然良久曰此語令人溟涬然弟之哉題古塔主論三玄三要法門古塔主著論呵諸方但解知見未明道眼予初駭之及觀其論三玄三要之義援引諸家證左甚明而曰豈特臨濟用此法門殆是三世如來之法式也僧輒問曰師論三玄法門名既有三其語亦異切不相離而臨濟本曰一句中具三玄一玄中具三要有玄有要何以辯明之古氣索良久引金剛般若經云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出又首楞嚴云於一毫端現寶王剎坐微塵裏轉大法輪等義對之曰理性無邊事相無邊雜而不參混而不一何疑一句之中不具三玄三要耶予獨不曉金剛般若首楞嚴等義非知見乎且諸經之旨既具臨濟安得蹤跡之而建立哉古方呵知見而自語相違可笑也盤山寶積禪師曰道本無體因道而求名道本無名因名而立號若言即心即佛今時未入玄微若言非心非佛猶是指蹤之極則向上一路千聖不傳學者勞形如猿捉影盤山蓋形容三玄三要者雲居云譬如獵犬尋香嗅跡而去忽若羚羊挂角時莫道跡香亦無矣同安曰涅槃城裏尚猶危陌路相逢勿定期權挂垢衣云是佛卻裝珍御復名誰木人夜半穿靴去石女天明戴帽歸萬古碧潭空界月再三撈摝始應知又形容盤山之語而三玄三要之旨益微矣古乃又引教乘以解釋之吾無以徵其失將撼臨濟起而使痛叱之乃快也題古塔主兩種自己僧承古與施秘丞論自己有二曰有空劫時自己有今時日用自己學者以其有叢林時舉讀之疑怖曰豈一阿難而成兩佛耶余聞世尊於首楞嚴會上謂阿難曰譬如琴瑟箜篌琵琶雖有妙音若無妙指終莫能發寶覺真心各各圓滿如我按指海印發光汝暫舉心塵勞先起其說不過以善用不善用為異不聞析而為兩種也而古公立二自己過矣祖師之門其論法方徵言語之際略滯疑似者隨而救之如鳥飛空弗住弗著如六祖謂永嘉曰汝甚得無生之意對曰無生豈有意耶又問讓公什麼物與麼來對曰說似一物即不中自是觀之古蓋吾法中罪人而自以能嗣雲門其自欺欺人之狀不窮而自露也題汾州語六祖臨終門人問住持當如何行心用行乃契聖意祖曰設有問佛法者汝對之時莫迷自己性持修道第一莫瞞自心如此則與聖意相應予觀淳化已後宗師無出汾陽禪師之右者味其平生聽其言論如謝安石之知國造次不忘自治宜於曹溪最後明誨為無所愧矣題準禪師語錄石門雲庵示眾之語多脫略窠臼于時衲子視之如春在花木而不知其所從來予每以謂此老人可以起臨濟之仆哲人逝矣切嗟悼之以為世莫有嗣之者湛堂於予為弟昆自其開法未嘗聞其舉揚歿後百餘日得此錄於杲上人處讀之喟曰雲庵之餘波乃能發生此老種性耶政和五年十月七日題題小參如來世尊說般若傳至震旦者無慮數百萬言其要不過曰一切智智清淨無二無二分無別無斷故杜順宏華嚴入法界旨訣終必曰一切智通無障礙古之宗師於世尊之意神而明之獨雲門大師雲門滅百年有雲庵老師握臨濟劍得雲門之旨於說法時如月在千江不借言詮一切見者心得意了自老師之化出其門者皆不足以知此獨湛堂師兄知其意予三復斯語為之歎息使雲門雲庵而在見此語當撫掌一笑蓋其謹嚴如歐陽率更小字端方如顏平原大字秀整姿媚如鍾太傅表章精奇雅麗如王會稽蘭亭記嗚呼何其盛哉題黃龍南和尚手抄後三首予猶及見叢林老成人皆云黃龍南禪師游方時嘗至歸宗寶髼頭方會茶師卻倚而坐寶呵之南書記無骨耶師驚顧玉立如山又至棲賢諟禪師教令坐禪久之得定因誦首楞嚴咒終其身建中靖國元年春修水祖超然出雲庵所蓄此書為示點畫奇勁如空中之雨小大蕭散出於自然予置卷歎曰成德之人其所作為雖點筆弄墨之際亦自卓絕況其不可名者乎某題黃龍南禪師手錄四十二章經一卷筆法深穩莊重而若瘦得顏平原用筆意雲庵老人生平無所嗜好獨秘畜此經偶為人持去十餘年莫知其所與客論字未嘗不搏髀追繹之其師希祖得於筠溪胡氏家出以示予曰君其寶之政使此字不工猶足以為希世之珍矧工如此又雲庵所愛而不忘者乎歐陽文忠公曰論書當兼論平生借使顏魯公書不工世必珍之蘇東坡亦曰字畫大率如其為人君子雖不工其韻自勝小人反此也老黃龍非其以筆墨傳世者也而其書終亦秀發乃知歐蘇之言蓋理之固然石門某謹題題晦堂墨蹟右晦堂大和尚墨蹟三紙佛印蓋公輩流也而其言推敬之至稱為老師退之之與柳子厚歐陽永叔之與楊大年道樞不同而韓歐之稱柳楊唯恐不師尊之議者以謂避爭名之嫌非也前輩傾倒法當然耳公道德冠叢林而器資與公輩一時又名卿且留情吾道者今皆成千古堪師之能畜此帖嗜好大是不凡宣和四年自印福絕湖來出以示其姪因流涕書之題雲庵手帖三首南禪師學魯公字最有工當時歸南公者無不學之然無出雲庵之右者昭默老人嘗與德洪共觀此書歎慕之不已以謂不減楊少師一道人其珍之崇寧五年十月十八日門人某題雲庵和尚與檀越帖一紙伏讀如受訓詞叢林荒寒無復平日此老知不復見況筆畫語言乎門人某流涕謹書右雲庵寄張惠淵偈一首惠淵予不見二十年聞其精進日新真能遵受雲庵之言者也誠上人來自宣梵問其師洎惠淵健否偶記前偈遂書以授誠歸舉似惠淵使較當日之本異同也某書題徹公石刻徹上人詩初若散緩熟味之有奇趣字雖不工有勝韻想其風度清散如北山松下見永道人耳公雖游戲翰墨而持律甚嚴與道標皎然齊名吳人為之語曰餘杭標摩雲霄霅溪晝能清秀稽山徹洞冰雪予視三人者在唐號以詩鳴者尚多有而後世敬愛之者以其知所守而已文字不足道也東坡每曰使魯公書不工尚足以為希世之珍其是之謂耶題觀音贊寄嶽麓禪師崇寧間至東明拜瞻石像作此贊時無際禪師方領住持事及無際遷居嶽麓餘十年生成寶坊于灰燼之中而予以弘法嬰難流落之餘幸復相見問前贊無恙乎無際戲予曰羽化矣暇日因閱文稿乃得舊本忻然錄以寄之曰當善護持無使復為人持去覆醬瓿耳

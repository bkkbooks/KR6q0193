body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校古詩謁嵩禪師塔吾道例一作比孔子譬如掌與拳展握固有異要之手則然晚世苦凌夷講習失淵源君看投迹者紛紛等狂顛韓子亦儒衣倔強稱時賢憑凌作詬語到死不少竣後世師韓輩穴攘一作長猶可憐走一作趨名不自信逐隊工語言譁然皇祐間一作初飛蚊鬧喧闐田衣動成群怒癭空自懸縮頭不敢息兀坐如蹲猿堂堂東山公才大德亦全齒牙生風雷筆陳森戈鋋隱然湖海上長庚橫曉天作書肆豪猛揮斤莫敢前群兒雖貌敬臆論已不專書成謁天子一日萬口傳坐令天下士欲見嗟無緣功成還山中笑語答雲煙我來不及見山水自明鮮入門寂無聲修竹空滿軒永懷翛然姿骨目聳清堅僮奴豈知此住此亦彌年指余以石塔草棘北峰巔再拜不忍去聽此繞澗泉吁嗟末運中那復斯人焉文章亦細事清苦非所便但愛公所守遠相諸祖肩遲遲哦公詩落日滿晴川願攜折腳鐺結茅西澗邊歲時邏松檜來此掃頽磚補東坡遺三首題武王非聖人論後青燈照華髮掩卷成嗟咨事有世共見而意復難知殺父子受封殆非人所為孟津觀兵者非天尚誰欺孔子蓋周人而為殷宗枝欲辨則不敢亟口稱夷齊使彼果聖乎古今無異詞則其罪武王明甚無可疑呶呶與世辨泛濫驚群兒惜不經柳子為一剖擊之知誰千載下擊節讀吾詩食菜羹示何道士窮冬海道絶瘴雨晴墟里何以知歲豐未卯炊煙起先生清夢回科髻方隱几獠奴拾墮薪發爨羹薯米飽霜闊葉菘近水繁花薺都盧深注湯米爛菜自美椎門醉道士一笑欲染指誡勿加酸鹹云恐壞至味分嘗果超絶玉糝那可比鮮肥增惡欲腥膻耗道氣畢生啜此羹自可老儋耳録以寄徐聞阿同應笑喜己卯歲除夜大醉昔聞安期生以術干項羽羽無人君量𦍕狂輒遁去又聞魯仲連舌有濟世具人君欲祿之高視笑不語吁古列仙人萬事不干慮乃肯入世紛豈非以民故翩翩遙增擊悠然知事誤道合人所難一律無今古我生飽憂患晚有二子慕骯髒刺世眼甚宜著間處一篇引一杯舉杯揖黎母次韻李太白我讀謫仙詩句卒意不盡層峰俯絶壑可望不可進忽如登旋雲便覺星斗近濁醪世間義糟粕真典墳先生瓊液口不飲嫌其村只今牛渚春盎盎餘醉魂昔醉過汗漫懷袖揣崑崙爾來頽簷下負日虱自捫次韻蘇東坡先生謫儋耳一葉航渺茫褊心隘世議怒罵成文章昆蟲伏孔垤仰看青鸞翔世欲羈縻之凡慮不自量瓊山繞珠淵寶光夜煌煌我曾至其舍月出波心房追惟對遺編燈火夜初涼麗詞有逸韻文君方小籹便覺胸次間八窗玲瓏光似聞青冥上幢節鳴珮璫先生應過我衣袖識天香餽歲次東坡韻寄思禹兄我來客湘江獨泛無人佐封疆接南越都會列百貨方嗟歲除矣仍喜此月大思歸姑置之且枕曲肱臥餽問亦未能起看燈照座念貧米無舂笑富粉轉磨二者分劣優等是一年過唯有東坡翁作詩今續和守歲除夕自不寐守歲世事杯念此歲月往嗟哉難蔽遮舊歲幸無疾新歲知如何此夕且相守拊掌一笑譁靜聞鬧市中夜鼓不停撾弟兄醉酩酊冠巾墮欹斜我居巖壑中不覺日蹉跎和詩無好句其敢對人誇別歲新歲壓已至舊歲去不遲我尚留不住石火那能追不知歲所在鳧雛喧水涯父老相邀迓年年知此時梅花只落盡又見春水肥我本無欣喜何嘗有戚悲想見君飲酣一舉時一辭春容尚能老此身那不衰仙廬同巽中阿祐忠禪山行好山不知源勝處藏疊嶂興來理清遊意適爭勇往事異傾同識顧語山答響野泉行淺沙脫屨屢植杖相羊木陰下喘坐清相向阿祐華林風媚秀得妍狀忠禪等鵠清精神照冰段住山異比丘韻出羲皇上風度太清臞吐語極豪放撥置形骸外卸裓藉草莽獨余衰退姿面色餘煙瘴勝踐偶獲陪茲樂非夙望一笑粲妍鄙散坐推少長愧無斜川詩苦語出牽強讀之輒自差幸君一拊掌送稀上人還石門海昏石門在深谷排闥千峰如觸鹿崛然獨秀一峰高自與千山作眉目曾摩關西一味禪衆中雜遝多豪賢如今此老成新塔但有樓閣如當年道人今作石門客須眉尚帶芳鮮色冷齋説我舊遊處夢魂夜渡修江碧朝來秋聲發舟樹羡君先我山中去故人問我歸何時試令哦我送行詩寄題彭思禹水明樓議郎詩眼發天藏咄嗟辦樓臨汝水遙知殘夜笙歌散月出東南人獨倚纖雲滅盡光下徹微波不興天著底忽驚白晝在軒窗試數遊魚見鱗尾平生骯髒笑伊優官冷對人言少味但余清境得厭飫天應用此相償耳我當興發竟相覓一拐西風健行李登臨尚能為君賦要使江山增勝氣復次蔡元中韻江樓為誰構想見晴瓦碧夜讀樓中詩終疑筆五色氣方吞劉備和不以口擊麗如傲梁公正恐是花魄君才比西子果識天下白我句陋無鹽筆硯焚欲亟吾家大馮君酒酣頗自適書來誇壯觀盈紙濺醉墨初無萬錢念脫帽見禿筆時時及少年追逐寄夙昔誡勿效寶公清狂挑鏡尺次韻思禹思晦見寄二首新詩夜讀寒更盡兄弟盡容窺所蘊此詩未暇數奇趣談笑先看押難韻家在筠溪白石灘後堂分得玉千竿遙知華屋青燈夜想見對床風雨寒湘山曉學愁眉淺思歸憑高意凝遠貫珠妙語肯寄我暴富人驚呼北阮何時促詔紫宸對草制千言倚馬待才高合在明光宮忍令流落江湖外我漁意不在金鱗湘浦華亭一樣春苑頭佐舟未乾沒問法僧來寂寞濱古師政與人意合有問自應忘所答一波才動衆波隨光遍千燈無壞雜多生垢習消磨盡一念定光空五蘊尚能弄筆戲題詩如鐘殷床有餘韻南臺煙靄隔重灘城廓遙應認剎竿湘西六月失三伏一枕窗風午簟寒年來懶復嫌山淺更欲移庵藏僻遠又思喧寂不相妨臥念當年三語阮鏡裏朱顏豈長對歲月去人寧少待是身已作夢幻觀肯復經營此身外議郎材志堪逆鱗笑談解生寒谷春會看為天作喉舌願聽高風淮海濱要知未必與世合載之詣世世不答譬如瓶中有澠淄雖與世混終不雜戲廓然久不對睿語便覺牙頰強獨行溪山間清鵠失群伴溫軟聞吳音攀翻忽東向試問識睿否客曰甚無恙但遭呂吳興拽手不少放欲使開笑齒説法人天上掉頭掣肘去不顧西興浪登舟翻然行萬衆皆目斷平生勇於道氣韻真邁往安肯逐兒輩低首投世網但恐呂望之追法薛廷望茶鹽以加之趁出白雲嶂要看呵佛祖瘦拳捉藜杖清臣先臣過余於龍安山出群公詩為示依天覺韻隨軒文字海異寶羅周遭忽見張公詩雪浪翻驚濤坐令千巖秋萬壑風怒號如君閲縉紳異材雜蓬蒿我公廊廟姿王室久勤勞只今天下望北斗太山高驗君平生術月脅窺秋毫嗟余人世外靈臺關鑰牢行將侶白鷗浩歌作遠逃已作華亭叟月明水一篙器之喜談禪縱橫迅辨嘗摧衲子叢林苦之有詩見贈次其韻彭侯慣法戰機鋒吸西江衲子畏面目望見投矛鏦叢林真一害斯人喧此邦我雖耐矢石貌抗心已降霜鐘但摩挲豈敢施微撞時來奮棘髯劇談對間窗初見搖心樹久則摧慢幢遂使澆薄態琢磨成敦厖吾志荷大法君欲插手扛從來內外護劉遠名亦雙斯道久破碎百孔而千瘡要當共補綴追配能與龐春去歌杏子生仁桃葉長西園日腳踰女墻墻陰嬌語誰家娘涼涼作隊來採桑玉纖拾礫抵翠羽鶯燕笑語殊不忙吳蠶睡起未成繭肺腸已作金絲光歸來遠山堆莫碧無端野李嬌春色辛夷花零愁更多熏骨真香無處覓贈雲道道人有奇骨野鶴在雞群十年江北南高蹤等浮雲朅來中國生紛埃涴衣裙西山繞漳水玉澗連石門中有唐朝寺禪誦度朝昏正當袖手去坐對柏子焚君看市朝間凍蟻環磨輪何當作高笑視世一虻蚊贈少府每欲一醉竟未嘗今朝杯翠如桄榔須臾耳熱仰天笑氣吞萬里駒方驤何從人間有此客杜門忽見車軒昂興來對我弄絃索妙觀隨指追文王絶學子雲不汲汲頗許叔度能汪汪何當萬事付一笑臥看天雨雲飛翔次韻明應仲宗傳送供老住江上村隨分亦迎送陪堂一鉢飯不得日日共唯無清淨福正坐失修種後身老湘龐惻然施心動妙語俱積香把玩廢吟諷才高氣駿特飛兔不受控且與洗妒慳何止愈頭痛吾聞佛事門同宗而異用甘贄打粥鍋應仲獨送供七月十三示阿慈寺已餘十僧田不登百數何以常乏食強半了租賦今年失布種正坐無牛具六月始分秧江流冒塍路水退秧陷泥經月已無雨枯根折龜兆瘦葉壓勃土鄰家飯早占我方質袍褲此生為口腹夢幻相煎煮阿慈佐井臼事衆耐辛苦今朝質且盡父子屹相覷頽然輒坐睡欠申久不語只箇甘露滅可質請持去豫頃還自海外夏均父以襄陽別業見要使居之後六年均父謫祁陽酒官余自長沙往謝之夜語感而作一昨遊京華壞裓變塵土思歸念雲山夜夢亦成趣故人驟登庸時時宿西府如鳥得所棲倦適忘飛去從中奇禍作失聲驚破釜三年王海南放意吐佳句歸來駭叢林冠巾呵佛祖突兀刺世眼所至遭背數夫子獨凜然高誼照寰宇哀憐欲收拾奮髯排衆怒豈惟子義世獨有孔文舉此恩無陳鮮歲月有今古朅來湘楚遊坐閲六寒暑今年中秋夕水宿青蘋渚誰持一紙書剝啄叩蓬戶呼燈得款識失床喜而舞開書有新詩喜事遽如許麗如春湖曉月映薔薇露筆力回春工倣佛識風度湘江三百里款段沿江路嶽色滿征鞍疾驅那敢顧朝來真見之了非夢時遇堂堂千人英要是幹國具龍蛇吁莫測涔蹄聊蹇寓道固有晦顯會看跨雲雨天下張荊州四海陳合浦當時寂寞濱皆獲陪杖屨今又從公遊楚山更佳處詩成倚峿臺天風吹笑語次韻陳倅二首夢幻有貴賤譬如綿與蘆美惡俱一暖未易相賢愚我少懷毛髮倦禪輒逃儒投老加冠巾舞笏師道吾世事幾時畢雲山何處無何為聚落中滯留如賈胡溪聲替説法聚石為講徒拊手笑遠志甘為小草乎霜清已高揭水清見遊魚橘洲頽晚照屬玉行炯如我窮世不要老並湘江居君獨念故舊時時容借書我亦循陳迹驅莽如磨驢詩成輒自省璧月挂清虛余遊侯伯壽思儒之間久矣而未識季長昨日見之夜歸作此寄之公家兄弟俱秀傑人言不減河東薛鳳皇鸑鷟雖見之聞有鵷雛更超絶周郎坐中見新作天葩奇芬衆口愕君看氣焰遮紳縉想見精神映臺閣我窮歲晚猶奔走小邑那知相邂后堂堂合置明光宮簿書堆中不宜有功名偶然耳是寄故應隨流坎而止且置袖中批誥手下簾絃歌聊爾耳此詩摹寫見標格晴湖無風照春色滄海遺珠果見之邵陽他日如彭澤季長見和甚工復韻答之翰墨場中見奇傑行書半雜歐與薛此詩押韻如射雕應弦而落人驚絶詞惟達意非有作公雖不怪傍人愕嗟余平生事苦吟吟筆今真為公閣渙然成文自湍走如水與風初邂后頎然緑髮映華裾人間此客何從有我誦此生真一寄禪林枝穩容棲止敢將醜惡酬絶倡狗尾續貂堪笑耳坡谷淵源有風格光芒萬丈餘五色吾聞龍蛇所由生必也深山并大澤季長賞梅使侍兒歌作詩因次韻年來稿項皤須髮世眼憎嫌遭棧絶君獨照人如冰輪洗盡宿雲寒皎潔今日層樓空獨倚天高袞袞飛鴻滅掉頭哦此賞梅詩如對北窗香噴雪愛君語妙蛻塵埃道骨自能逃歲月玉兒豈是解清唱想見笑中呵手折嗅看應作小顰嬌關心不與年時別一歡紛然雲雨散落英滿地蛙聲歇可憐城郭都不知新詩一出人爭説和羹他日願如君長紅裊花歌壽闋次韻見贈樓鐘尚殷床密室僧定後窗風鳴摵摵黃落知榆柳蜘蛛忽墮絲燈花亦駢秀人從城郭歸村落聞夜嗾讀詩映簷月兩清俱頓有斯人太白豪醉裏詩千首要宜萬丁帶肘合黃金斗袖藏批誥手卻作僧扉扣玉堂未放君此物君家舊飽永仍父職人望亦天授懸知夜直清應念山中友莫以腕脫俊嘲我飯山瘦季長出示子蒼詩次其韻蓋子蒼見衡嶽圖而作也曉煙幻出千萬峰個中我曾如懶融天公亦妒飽清境戲推墮我塵網中人生萬境無不有道士寧知為老楓去年雪夜宿絶頂笑聲響落千巖風今年千巖在掌握煙雨又復分西東磨錢作鏡照千里必也高人非畫工季長胸中自丘壑吐辭便覺春無功韓侯玩世難共語精神滿腹仍疏通酒闌耳熱眩紅碧醉語撼子崔嵬胸遙知墮幘笑不答但見玉頰回渦紅子偉約見過已而飲於城東但以詩來次韻一杯愁倡低眉峰不平萬事都消融嗟余分身處處有遙知到子談笑中平生蹤迹亦可笑以醜見傳如癭楓而公才大置間地正坐道骨合仙風頗聞少年類豪俠臂鷹走馬王城東爾來閉門看修竹藉甚但傳詩句工懶於能琴稽叔夜癡於戀酒王無功明朝此樂墮渺莽路隔關河魂夢通付子後堂以清夜料理絲竹圍酥胸曲音少誤即回顧笑看杯面微波紅季長出權生所畫嶽麓雪晴圖湘西今日雲生早嶽麓雪晴看愈好朱欄青瑣寄木杪下臨絶壑青松道知誰沙步泊漁舟舟中應容寂音老愛山誰復如君者一幅湘西和我畫分身亦欲看京華要使癡兒驚羽化季長盡室來長沙留一月乃還邵陽作是詩送之邵陽歸去知幾里萬頃斜陽渡湘水一葉扁舟共看山伯鸞德耀俱風味山中信宿不忍去班草松間呼不起波心月出臥不知但愛松風吹醉耳朝來拾得浩蕩春雪英紅雨紛桃李大鐘橫撞山答響遙知有寺藏層翠想見道人出迎客犀顱戢戢三千指王事得從方外樂佳處遲留固其理何當更和宿山詩要看雲泉生逸氣送季長之上都十年不踏黃塵路老盡歸心餘一縷因同夜語想京華歸心百尺遊絲舉前年別我楚山邊解鞍班草弄雲泉今年送公古城北花發水流聞杜鵑眉間秀色照春晚青雲故人紛滿眼門前車馬氣如雲知誰倒屣迎王粲行看腕脫供十吏玉堂風景非人世萬乘扣扉宮月斜夢驚呼燭度窗紗西湖寺逢子偉我行厭風埃日莫休逆旅疲坐捫蚤蝨呼童洗袍褲起尋古招提思與幽人晤忽覺華氣生乃與周郎遇笑談傾坐人我亦為停麈袖中出新詩貫珠穿妙語麗如花林風清甚空階雨坐令羈旅情掣肘棄余去太平疆埸空英雄功業誤如君文武姿其可著間處霸凌舊將軍月黑射猛虎夜歸逢醉尉頗復較勝負丈夫有用同世態度今古何時紫泥書夜半捶門戶邊風吹塞塵千騎紅粧女橫槊賦新詩唾手取黠虜麒麟入圖畫佩劍撚白羽和曾逢原試茶連韻霜須瘴面豁齒牙門前小舟嘗自拏茅茨叢竹依壟畬君來遊時方採茶傳呼部曲江路賒迎門顛倒披袈裟仙風照人虔敬加秀如春露濕蘭芽和如東風吹奇葩馬蹄歸路衝飛花青松轉壑登龍蛇路人聚觀不敢譁詩筒復肯來山家想見戟門兵衛遮湘江玉展無纖瑕但聞江空響釣車嗟豫生計唯摝蝦安識醉墨翻側麻喜如小兒抱秋瓜宣和官焙囊絳紗見之美如癢初爬愛客自試歡無涯身世都忘是長沙院落日長蜂趁衙園林雨足鳴池蛙詩成句法規正邪細窺不容銖兩差逸群翰墨爭傳誇坡谷非子前身耶沅湘萬古一長嗟明年夜直趨東華應有佳句懷煙霞次韻曾嘉言試茶不嫌滯留湘水涯時作新詩誇露芽此篇醉墨翻龍蛇雷鎚雨雹飛塵沙開卷疾讀喜欲譁此郎真是能世家氣如橫槊萬騎遮妙如琢玉無玼瑕縉紳傳觀衆口誇矧余禿鬢纏袈裟崔嵬胸次書五車於人豈止一等加坐令應手開天葩不因筆端夢生花何時詞刃誅姦邪世途嗜好紛萬差風流掃地吁可嗟十年去國道路賒兩手未忍置所拏賈生豈欲從蚓蝦淵明但愛談桑麻湘西有舍如藏蛙年來頗種東陵瓜愛君才宜踐清華妙年聲譽聞童牙君看愛客自煮茶紅粧聚觀爛朝霞撑突萬卷遭搜爬職宜蓮燭燒窗紗不宜槐笏趨早衙未甘終老勤山畬尚能見子昂霄耶想見霧窗煙縷斜次韻許叔溫賦龍學鐵杖歌君不見楚竹虛心徑如鐵上有娥英灑清血歲寒姿含悽愴情亂點餘花涴高節又不見南山紫藤亦清雅過頭標致宜老者一簪華髮烏角巾瘦拳扶之立松下何如我公蓄神物鏗然振之露風骨橫拈倒用驚老禪徑如紫藤節如竹個是雲門真正脈不學芭蕉空指月十方都在此杖頭視之不見纖毫隔説禪遊戲時卓地魔外狐禪俱膽碎仙郎聞是旌陽孫文章自宜掌帝制從來詩句人爭説時出一篇尉衰薾此篇秀如望秋山奇峰自獻晴雲滅朅來酬唱已厭飫與公傾倒良有素豈惟但和鐵杖詩追從已辦登山屨復和答之君不見功名欲致硯磨鐵桑公人間駒汗血五季干戈爭奪中低摧幾不保臣節又不見相如賦工合騷雅九重偶有賞音者及見但為上林令斷國反在淄川下長笑兩事俱外物自憐不是封侯骨獨愛華亭百衲師小艇橫蓑一竿竹久住湘江諳水脈揭蓬慣看湘西月聞道公眠畫戟叢相尋長恨城闉隔去年卜居城北地客心每有悲笳碎慚愧詩筒走老兵病眼那容見新制老來情緒那忍説夙瘴乘之覺疲薾此生夢幻姑置之半掩殘經香篆滅湘中清境享已飫湘山多情尉心素年來更欲學睦州古寺閉門工織屨次韻題顒顒軒睡覺飛蚊繞鬢聲讀書偏愛小窗明梧陰滿地方隱几想見搜詩毛骨清誰教風鑒在人間眉宇淵然如魯山指點虛無數歸雁摩挲香滑寫琅玕舊聞五色筆如椽平生醉裏傲羲軒登軒不解顒顒意幽鳥自啼華不言賈生憂鵬入其居子美亦遭牛酒污仙郎兵衛森畫戟風調特與前人殊杖屨相從年可忘不羞兼葭玉樹旁青眼特開浮世少白頭相逢故意長尚記垂髫秀發時神彩不異崔宗之此生流落天一角敢料長沙再見期贈別不愚首座道人貂蟬後骨面遠瞻視少年憎俗子竟以須髮毀形骸已變盡終不沒豪氣君看談笑時時復出奇偉湘西松下見班草問行李問儂歸何許披須開笑齒名山皆吾家況復生如寄意行吾車馳身止吾駕稅吾生天地間大倉一稊米只今相會面寧知非寄耳思歸固偶然吾詩聊一戲題王路分容膝軒詩眼愛雲泉玉骨含富貴精神畫牒開怒威亦和氣材宜侍至尊廣殿儼劍履胡為簷隙間僅止容膝耳譬如橫海鱣蛣屈見脊尾卷而為一髮寓此涔蹄水何當黑月夕戲逐風霆起懸知王氏軒又補湘中記次韻遊石霜霜華舊遊秋正深澗風落日寒蟬吟斂眸默數曾到處笑看碧煙浮水沉朅來大旆為山至山綰煙鬟三十二當時老宿契新豐坐令衲子如雲萃眼前無復見此公歎息叢林掃地空空餘樓殿出雲雨塗金間碧光巖叢臥聽松風難比擬個中偈句誰宗旨賴公摹寫入新詩公不作詩山愧恥次韻登蘇仙絶頂平生合腰萬丁帶誰使天涯宿溪瀨曉驅部曲上香山路人如堵看飛蓋桂環卷舌嘯雲煙右轄風流是謫仙輞川草樹入畫圖此風頽落今追還散髮巖阿聊一快世議從來嗟迫隘為君戲語敵山光棘句鉤章窮嶮怪詩成便覺王公輕整頓道山歸去情子廉未必山林見市人中有安期生次韻謁子美祠堂心許房次律神交郭元振人品如奇峰橫秋聳孤峻筆陳工斫伐忠義見詞刃仕如上瀨船饒力挽不藎酒狂誇嚴武登高叫虞舜大愛淮南王甘作天廚擯死猶遭謗誣謂坐酒肉饉荒祠叢篠間下瞰湘流浚夫子縛富貴高韻洗驕吝詩清如玉珮中節含溫潤並轡揖此老讓驅不肯進嗟豫固瞪若卻立那敢瞬次韻雪中過武岡今年湘山三尺雪大松夜倒蒼崖冽曉驚誰推華藏界墮我坐前光不滅駝裘右丞鄣泥馬壯士甲趨花灑鐵空齋夜對故人榻妙語霏霏如鋸屑窗寒霧暗日生東恍疑珥筆明光宮蹁躚欲點朱藍袂一聲雲斧山玲瓏明年麥秋歌歲豐夜香橫目祠上穹太平無象天有道塞塵蠻雨長濛濛歸來笑臥北窗下侍兒簇花鬧清夜老尋清境幾成癖一觥滿引酬譏罵應思和月踏層冰快意暗驚夢猶怕詩成字字如貫珠乞與人間不知價次韻連鼇亭危亭為誰小臨此一泓碧晴天戲投餌戢戢見尾脊而以鼇名之相顧愕坐客昔人醉魚海六鼇曾偶得歸來眉目間津津有矜色安知華藏界持取等戲劇納之芥子中不見有迫窄巨細何足較未出是非域夫子欣然笑請以書屋壁同遊雲蓋分題得雲字公才如天驥超絶氣逸群低摧簿書中一笑置勿論我如翦翎鶴俯啄窮朝昏生涯無窖子乞食嘗扣門但為口腹纍乖隔如參辰此夕復何夕共宿湘山雲境清藏勝氣情高發幽欣天風吹笑語乞與人間聞念公翰墨場少年策奇勳世味如嚼蠟喜著磨衲裙裴公師黃檗圓澤友李憕因法偶相逢則以法為親安知我與子夙昔非弟昆吾聞三生石曾歌舊精魂他年葛洪陂相尋定煩君先當理故事過山尋老仁要同夏口村發甕驚前身治中吳傅朋母夫人王逢原之女也傅朋作堂名養志乞詩為作此少節暮年名太重詔書致之堅不動當年捧檄良為親安知坐中有張奉茅容避雨依樹叢旁人夷踞渠獨恭朝來殺雞本供母從教床下拜林宗兩翁高行今誰繼吳侯作堂深措置鏡中勳業姑置之自廣其心養其志傳聞絶似廣陵公從來孟陶風味同未能侯門煩倒屐想見窗戶開青紅夫人年高視聽捷扶持不用如華妾十分金葉壽千齡笑看醉紅潮玉頰

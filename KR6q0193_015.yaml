body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校七言絶句讀古德傳八首間房古寺陳尊宿對石談經生法師萬壑松風一軒月冷齊清夜想豐姿石門冢木團雲雨偶愛車輪煙翠深火種刀耕期飽暖問心求法謾追尋夜冢髑髏元是水客杯弓影竟非蛇箇中無地容生滅笑把遺編篆縷斜糞火但知黃獨美銀鉤那識紫泥新尚無心緒收寒涕豈有工夫問俗人瘦行清坐老垂垂栗色伽梨取次披巖壑形骸雖可畫煙霞痼疾不須醫間中不省歲月改但見四山青又黃指客卻隨流水去笑渠世路未全忘車輪峰作碧螺旋不用招邀自滿軒等是世間無用物故宜相對兩忘言絶知名蹟能妨道正恐師承亦纍人問法沙彌莫饒舌百年逆旅要同塵讀法華五首在宅覓車猶是欲出門露坐始無依載行一獸無名字但愛雪山香草肥火宅縱橫皆暗弊化城觸處是光明子爭狂走欲方熾寶所依然念不生塔解聽經無兩耳佛稱全體有分身寶書讀罷驚清晝葉葉花花總是春慈和自是山林服知見長凝宴寢香要與如來同止宿卻須常拂法空床阿字義深當自讀般舟行苦與誰行人言成辦須三世我欲圓成在此生贈誦法華僧生存異夢傳書鎮骨冷青蓮出瓦棺試看法華精進力兩翁先已為開端合妙齊二首雨過東南月清亮意行深入碧蘿層露眠不管牛羊踐我是鍾山無事僧未饒拄杖挑山衲差勝袈裟裹草鞋吹面谷風衝虎過歸來松雨撼空齊讀大智度論眼不自見寧見物去來不見寧見今萬物只今全體露鏡裏有空無路尋注十明論了知無性滅無明空慧須從戒定生頻呼小玉元無意只要檀郎認得聲汾陽十智同真二首十智同真面目全於中一智是根源如今要見汾陽老劈破三玄作兩邊十智同真選佛科汾陽佛法本無多愛心竭處尋真智面目分明會也麼袁州聞東坡歿於毗陵書精進寺壁三首濁世肯留竟何意玉芙蓉出淤泥中誰謂秋來亦零落病收衰淚泣西風姓名自可磨千古文字收藏付六丁唾霧珠消君勿笑夢回比物鎮長靈才疏意廣孔文舉身健長貧白樂天一代風流今已矣三吳雲水固悠然無盡居士以峽州天寧見邀作此辭免六首吹毛用了急須磨鐵脊師兄舌太多祖佛命根俱截斷笑中驚倒老維摩維摩願力元無盡重現真州宰輔身舌本雷槌烹佛祖筆端和氣活生民四夷八蠻想風采灶婦乳兒知姓名寄語袖中調鼎手未容扶杖獨經行五達衢頭梵剎新著書來喚住山人折松慣掃和雲石披衲難隨沒馬塵亦欲便隨流水出重惟我法付王臣回看坐睡橫眠處折腳鐺兒解笑人龜毛索子衲僧冤闊角關西亦被穿小犢鼻頭無覓處聽渠露地且間眠初到善溪慧照庵寄張無盡五首明月洲頭一笛風暮雲滅盡水吞空倚笻笑語無人問疑是西湖落夢中山勒回流作窟盤翠蘿綰帶結鴛鸞故應此境幽難畫乞與庵僧自在看形勝迥分千里遠地靈還受衆峰朝從來慶澤流無盡異事先看繼八蕭世辨不妨無骨舌好山難絆自由身從教折腳鐺兒笑且欲南來識鳳麟公有自然台輔望與民同樂亦同憂我慚雅思非支遁亦伴東山爛熳游無盡見和復次其韻五首謾說毗耶問疾風主賓信手畫虛空爭如快活月洲老萬事收藏一笑中窗外雲閒如去鶴門前山好似翔鸞此時更有疑情在試借疑情面目看一丘一壑思迢迢莫把山林較市朝江上相逢兩無語夕陽衰草暮蕭蕭公是睡龍今縮首我如江月且分身人間一戲成何事冢外君看半臥麟雖然無證復無修撲破虛空亦可憂欲識老龐端的處飯餘摩腹且閒游又次韻答之十首金篦抉膜去重重露出當時晦昧空撥轉上頭關捩子莫教更墮有無中晚來妙語逼人寒逸氣翩翩棲鳳鸞珍重平生造物手十分拈出與人看擁衾睡美無人喚間憶當年趁早朝今伴赤松聊卒歲後來功業付曹蕭衆生煩惱亂如塵共現如來智智身自笑露腮狂寶志識公天上石麒麟樓閣不勞彈指入衆魔相顧忽驚憂回光卻復思初友從此南詢可罷游此法從來妙莫窮何須癡坐學觀空劈開結角羅紋處攝入圓伊三點中法本無差須揀擇楚雞元不是青鸞當機一鏃三關破覿體分明箭後看雲林一塢正寥寥不把清閒負聖朝歲晚追隨真可畫行人明日馬蕭蕭我亦從來徹骨貧誰知遍界不藏身住山鈯斧勞收取不是青源衆獸麟一笑相看萬事休公無榮辱我無憂挂名入社非難事圓寂光中不厭游孫侯見和復次韻五首仙郎齒頰嚼松風吟處晴巒翠倚空佳句興來渾不惜一時傾出錦囊中我亦聞絃知雅曲松風聲不類鳴鸞相逢意氣須傾寫一任旁人冷眼看歷世興亡皆可數升平不復似今朝野居興味應無限小字明窗拔二蕭未展事功扶聖世幅巾林下且收身善溪廣坐看談笑駿氣駸駸地上麟我固浮雲輕俗眼君真萱草可忘憂婦翁一室藏沙界興發時來把臂游再和答師復五首愛君道骨有仙風人品渾如月在空清論不窮霏鋸屑故應雲夢吐胸中牛渚笑中曾捉月道山歸去亦乘鸞人間尚有餘緣在又把塵編倒摺看吾道如山欲撼搖群兒毀譽漫前朝冷看狂罵黃冠奕卻笑辛酸合爪蕭有味新詩名不得正如仙爪為爬身此時風味無人會想見麻姑劈脯麟八瓊洞口桃花笑失卻塵寰半世憂聞道客亭炊未熟坐看凍蟻夢中游天覺以雲庵畫像見寄謝之老師面目無尋處藏在毗耶丈室中乞與盤山狂弟子背拋筋斗撒顛風次天覺韻二首欲振雲庵出格風直教魔界化成空此邦已屬張無盡二佛難同一化中百千萬億恆沙佛正眼觀來總是空縱有毗耶方丈子為渠權置睫眉中余嘗問無盡居士曰往問悅公參素侍者有何言句無盡居士曰見悅說昔素問無為如何說悅擬開口素大笑悅當有省宣師為侍者余於叢林三見之矣政和元年又會于顯忠寺且欲歸江南作三偈送之青山自在人情外白業空消𡋯土中歲晚一帆江海去群飛爭看刺天鴻素公死後間名在末後句如黃石書殺盡英雄人不見子房兩眼似愁胡無為兩字如何說開口知君病轉深試問舊時宣侍者不言不語笑吟吟次韻魯直寄靈源三首一觥春色紅鱗動數筆海山青玉開耳熱浩歌無說處卻將佳句寫歸來已作閉門稀識面千金爭購暮年書空餘修水連天碧白鳥時來炯自如閲世竟為蝸角事不妨間作虎頭癡平生筆語難傳處獨許靈源大士知了翁謫廉欲置華嚴託余將來以六偈見寄其略曰杖頭多少閒田地挑取華嚴入嶺來次韻寄之十方剎海毫端具一念交參無別路妙明廓徹不依他當念無來亦無去妙極玄微亦昧機須明句裏電光飛眼開做夢圭峰老笑倒鹽官百衲師平生百事耳邊風儘聽人嘲詐啞聾跌著起來還一笑何須半夜上孤峰覷邏牛兒亦久如于今正好撫憐渠但能收放知時節吒吒常教旁屋廬因法相逢一笑開俯看浮出過飛埃湘南嶺外休分別圓寂光中共往來根機饒我三千倍純熟輸君一百籌誰似夢中憂患裏飯餘要睡即齁齁寄華嚴居士三首仰惟陛下實英主鑄印消印如沛公補天正賴女媧手萬物吐氣思春風文章日月不能老忠義姦邪膽自磨公能一念了萬法奈此功名未放何謝公捉鼻知不免整頓乾坤民望深勿嗔禿頭預世事我是同時支道林瑩中南歸至衡陽作六首寄之回雁峰前醉眼醒臥看波影蘸空青起來一笛春風晚萬里無雲月滿汀醉裏南游亦偶然歸來客舍夢初圓袖中滄海煩傾出要看毫端浪拍天喧熱婆羅大火聚無厭足王刀鋸場聞道飽參俱透過來尋初友見清涼爭道頭陀再應緣那知南畝不陳鮮君看提起超情句馬得幡竿尾指天禮拜起來無伎倆拈花笑裏有精神何如眼倦拋書睡一枕雷霆撼四鄰笑看癡蠅遭唾涴絶憐香象截流過歸來兒女團圞坐贏得心如古井波李光祖自了翁法窟來訪余於鍾山留十日方知鼻孔大頭向下既行作六首送之應思靈鷲多年別來作鍾山十日留一句鶻崙難劈破風泉松月夜堂幽南畝頭陀施毒手北山道者起慈心解於糞掃堆頭笑拾得茸穿穴鼻針六根清淨精進力二熱消亡法供真舌本青蓮香不歇色身三昧現塵塵分身可集呈真僞寶塔能言透死生佛眼尚難窺向背謾煩機巧並頭爭一切女人皆障道十分厚味最傷生登床未敢期穿屨見慢須防起現行履稀瘦處卻知肥間物須防獄治之虎穴魔宮同止住寒灰枯木是男兒寄石頭志庵主世途巇嶮鼻先酸折腳鐺尋穩處安誰見睡餘間振策松風吹耳夜濤寒石頭庵主居南嶽僅三十年忽思還江南龍安作此寄之三首厭看瀟湘萬頃山江南歸去臥龍安只將一味無求法留與叢林作樣看龍安聞說好巖叢瘦坐孤行兩頰紅剩得清間無著處一時排遣笑吟中鬧中拋擲亦奇哉句裏藏身活路開生鐵心肝含笑面不虛參見作家來聞志公化悼之三首去年曾陟白雲顛投老相逢亦偶然蟬蛻君今成貼棄春蠶我已作三眠生死已將同夜旦間眠行樂不相妨遙知此日龍安寺蛛網高人夢蝶床捍裘未減春罏暖丈室偏宜道骨寒擺手便行呼不應間名在世試除看次韻超然洞山二首洞山正似鍾山塢慚愧新詩寫得真欲喚定林間相國要看清散岸綸巾油然無定似雲間今在江南盡處山膚寸顧吾真可度奇峰如子未容攀寄嶽麓禪師三首數筆湘山衰眼力一犁春雨隔清談遙知穩靠蒲團處碧篆香消柏子庵飽參衲子一千指古格叢林二十年想見升堂提祖令道容水雪照人天湘南道價獨驚群知是黃龍的骨孫本色住山何所有白鷗春水自當門示禪者能回箭鋒射自己方肯竿頭進步行道得未生前一句始信虛空解講經書太平庵興工願力經營地樓閣咄嗟金碧開滿院青春人不管一庭蒼蘚客間來余將經行他山德莊自邑中馳書作詩見留是夕胡彥通亦會二君于談達旦不寐明日霜重共讀蔡德符兄弟所寄詩有懷其人五首蹇驢尋我亦乘興秋潑空山煙翠時脫帽不知誰主客一燈相對夜彈棋風徑霜清拾墮薪野炊童子解經營翛然放著秋窗晚籬落淒清屋角晴精粗一飽隨緣去林壑諸方到處鄉去住了知無可揀謾煩辭錦照人光旁舍潛夫十年舊會茶時復坐僧氈愛將夷甫雌黃口解說定林文字禪蔡家兄弟好兒郎骨秀同熏知見香好在緑楊隄上路幅巾來往自相羊上李大卿三首臨濟三玄劈不開近來金鎖轉生苔喜公袖手通關捩同在靈山見佛來與人實法土難消道火何曾口被燒拋出秦時𨍏轢鑽突圞如斗兩頭搖不犯鋒芒平正偏分明有語是無言尋思絶處一句好咬破方知百味全與韓子蒼六首雖赴來機少異之箭鋒相直出思惟訥庵言下瞪雙目孔子元來是仲尼從來未悟不曾迷一見庵僧更不疑脫體現前無躲避鼻頭向下少人知盤珠走處無留影百計推尋摸意根酬汝欲心顛倒見哆啝元不是無言但識綱宗無實法為君拈卻眼中塵鴛鴦繡出從教看莫把金針度與人收得訥庵末後句羅敷種性覺風流海壇馬子似驢大失曉山童不裹頭百年應盡便應盡坐脫立亡誇小兒酪出乳中無別法死時何苦欲先知寄道鄉居士三首知有道鄉何處是個中歸路滑於苔萬機罷後見城郭一念不生金鎖開抽身世路崎嶇處掣肘功名逼逐人勿謂老來無伎倆絶蹤跡處解藏身丹霞未見龐居士已有言詞滿四方何似他時親識面未勞語默強遮藏謁準禪師塔同條生不同條死覿露全機誰後先一句鶻崙難劈破一時乞與子孫傳兩僧相繼而化有感二首叢席淍零空斂眉爭鋒唇吻鬥輕肥歎無老宿提綱要時有亡僧為發機賓朋鴛鷺門如市聲價靈延一世驚只有片時人看好死生那解替人行次韻誼叟擇乳鵝王非鴨類影鞭良馬本龍媒正中妙協無人會句裏空驚法眼開雪後寄荷塘幻住庵肓僧四首靈光寂照神通藏意地經營幻住庵已喜眼根今現證何妨要耳作同參表裏洞然無量相晦明無計掩藏伊庵中但見人孤坐門外從教事不知荷塘寺後千竿玉折腳鐺中五合陳靜裏笑看垂釣者夜深方見把針人簷日未通孤坐暖雪雲都放九峰青空階夜滴聞鈴響臥學荷塘耳誦經送覺上人之洞山二首正中妙協諱當頭洞水從教向逆流唱起新豐舊時曲要看躍浪鬥泥牛八角通紅鐵彈丸衲僧未嚼齒先酸笑中拋擲尋常事石火敲時著眼看謝保福寄蜜蜜脾新滿割山房都是諸花知見香味絶中邊深為有待將無舌為君嘗太平有老僧頃見大本禪師掩門久不出乃書其壁跛腳阿師六世孫毗陵古寺獨關門也知祖是陳尊宿平昔高風宛尚存宿慈祥室行智慧心名解脫絶荊棘地號慈祥煙消火冷諸緣盡憎愛化為平等光撫州北景德寺不見古畫第五尊羅漢十八聲聞解倒根少叢林漢亂山門知他何處攞齊去不見堂中第五尊留題覺軒自笑忍飢空畫餅誰期擊竹喪全身休誇魏藥能起死須信金塵解翳人大風雪中迪吉老尋余鍾山二首風聲卷地奔萬馬雪花連空若推下道人軒渠何所來笑裏丹沙不知價萬事信緣安樂法一身隨分實頭禪不知影草聲前句何似和衣粥後眠背塵軒思慮不及猶為物分別未忘都是夢阿難樹見竟難分曹溪風幡元不動次韻廓然送瑫上人營辦勝緣真戲事臨平此偈亦逢場妙無影跡如龍句應笑癡人戽夜塘游南禪智光廣大精進力化作人間釋梵宮我亦生涯無一鉢伴公他日聽樓鐘十生觀音生辰燒香偈示智俱十世為僧生復死今朝生死不相干從來被眼常遮蓋不信如今借汝看題自肯庵諸方說禪炙手熱此庵默坐如冰冷美食不中飽人飧他人不肯我自肯與朱世英夜論玄沙香嚴雲庵宗旨三首子母俱忘脫體看纖毫才動被渠瞞若非豎亞頂門眼那辨紅罏點雪寒言下百骸俱脫盡更無一法覆藏伊亡僧對面分明看卻是禪和眼搭癡睡美春來常失曉日高衾暖懶翻身戲將古寺間房趣誇與鬧中無事人立上人北遊五頂南還畫文殊雲間之相余政和年秋遊翠巖立持以展洪崖橋上時山雲廓清萬峰劍立溪轉雷驚行人悚動忽瞻瑞相如見於岱嶽時余聞文殊為根本智智無不立豈獨現於五頂耶稽首一切智成就譬如一月落萬水乃知洪崖橋上看不離文殊一月體題永安居士軒壁謾說難酬彼上人上人言語未全真世間所有皆虛幻何獨芭蕉可喻身出山寄詮上人孤笻冒雨出山去應與道人增笑聲永愧蕭蕭碧巖下衲衣清散自經行送一萬回當年隨我出西州到處雲山共勝游那料秦淮煙雨裏倚笻看子上孤舟道逢南嶽太上人游京師戲贈其行野外相逢一笑新十年峰頂臥雲人卻將南楚登山腳去踏東華沒馬塵僧從事文字禪三首中郎書異為忠孝右轄詩清付水雲林下一燈長到曉此生真復是知聞一麟衆角失精彩尺璧千巖發耿光借面北人無四目獨餘方寸是慈祥三多授子文章法壞衲酬吾老大心簾卷暮涼煙翠重一聲雲斧覺山深金陵獄中謝人惠茶寶公關鎖尋常事諗老家風氣味長十載故人情外意一杯今日雨前香隨與玫秀七八衲子為辦寒具幽人十月猶絺綌萬瓦霜清木葉號賴有西鄰念衰冷夜窗叢手辦衣袍寄道夫三首臥誦故交風雨散忽驚時序歲時同遙知吏散無餘事只有花枝繞郭紅石渠天祿略上口長嘯簿書欺得人龍卷大身藏一髮兒曹聊爾與相親昭默老禪最高遁孤風聞說不容攀煩君倒用彭澤印折簡招之應出山會廣南因上人我昔南游跨海還夢中常憶海邊山匡廬忽見山中客果笑人間是夢間超然在東華作此招之芒鞋踏破成何事坐榻塵埋只汗顏齊鉢生涯唯澗飲結茅終待老鍾山時余適金陵定居定林超然將南歸從余游以為詩讖也復次其韻袖手對君增白業照溪嗟我減朱顏遙知歲晚歸心急不為江南臥看山圓上人覓詩平生百態不掛眼倚杖看雲慵解包湘水叢林多古格何妨一鉢穩安巢至邵州示胡強仲三首平生厭飫水雲間老境優游剩得間遠謫瘴鄉君勿歎天教更看海南山情緣不斷自消滅浮念欲生無起因多謝鍊磨金出礦敢辭枷鎖夢中身盧能嶺上容君看彌勒樓前借汝觀成佛捷途當舉足不須平地致艱難書資國寺壁行藏獨許青山見議論猶容亂石聞勿謂衲盲貧勝我溪分明月谷量雲送圓監寺持鉢之邵陽叢林職似驚群雁供給情如反哺鳥梅蕊犯寒持鉢去山茶出屋得歸無贈欽上人嫩日柔風春恰曉花光醉人濃可皛到山不必問老師春色為儂都說了與法護禪者手抄禪林僧寶傳暗誦石門文字禪揀得湘西好三角春風歸去弄雲泉示觀上人觀公短小精悍色試手來參五味禪挂起北窗都會取湘江雲水自連天在百丈寄靈源禪師二首暗中樹影平生意水底魚蹤病後機想見道容無住著倚藤間看暮雲歸平昔追隨骨海心暮年粥飯並叢林朅來萬事撩人笑此去青山為我深次韻兀翁漁人寄語兀翁道出沒煙波各有由死見鑊湯如攧浪愛魚心在未甘休次韻空印遊山九首法真有子是彌天派出南屏共一源魯鈍經旬陪夜語浪持短綆汲深淵危徑盤空一線微游人舉足已先疲大圓光透難遮掩不學龍牙眼似眉騰騰兀兀地行仙依約曾參蜆子禪古廟紙錢堆裏睡從教歲月自推遷萬層翠巘玉崔嵬獨自憑闌日幾回知有芙蓉更深秀振笻何幸獲追陪凝佇殘陽眼力微孤雲偶伴野僧歸形容萬古溈山色正賴晴嵐與夕暉蟠龍不許在層淵一句全提賴發宣慚愧兒孫家法在未施聲色透重玄寶塔當煩妙語傳要令此地福人天個中已有全身見何用分身遍大千未言酬倡多佳句半月游山亦自賢我亦生涯無窖子願陪香火餞餘年大溈願力有誰同貫日精神吐白虹我酌軾公泉歎息此源有盡水無窮宗上人求偈之江南川舌一從嘗虜饌山衣三載濕湘雲挑包又過江南去鶗鳺遙知半路聞送範上人乞食衆魔不敵精進力萬行難過平等心持鉢莫辭穿聚落道人隨處是叢林濟上人求偈二首圓通捶碎牢關後古鏡發光金石開穩坐龍安今七日從教山路滑於苔李珣骨已成丘壟仲遜身猶占水雲扶策南來山滿眼實頭鄉話與誰論芭蕉鳳尾爭高照映人玉芽明潔出埃塵也知欲救衆生病其現如來智智身次韻無諍見懷三首韻傾瘦字試鳥絲苦語偏多別後思青巘君能容易去白鷗愧我負幽期數篙雲碧卷晴空無數巖花落醉紅滿袖東風疏雨後卻欣春露一甌同老眼慵看讀過書十年心跡更誰於青松我欲追三徑白髮誰令繼二疏三月二十日夢人持獼猴見贈乞詩口占長臂幽姿要性靈寫經欣得爾添瓶不須睡著惺惺著窗外聞人喚便應三月二十三日心禪餉余新麵白蜜作二首三月東莊新麥熟碾遲羅細玉塵香要看十字開籠餅寄與庵頭老儼嘗老儼年來百不忺最嫌苦淡不嫌甜蜜中有味中邊絶莫笑山居世味添與謙知藏二首老爛叢林四十年平生跛挈但隨緣未言親見雲居老只識歸言亦自賢諸方法席慵抬眼懶懂成群妒忌深此老把茅如覆頂卻能努力悍叢林木上人久游歸宗贈之二首熏蒸聞見有源流詩學寒溪老比丘勿訝談禪太文彩從來虎穴不生彪攜詩過我亦翛然百孔寒光壞衲穿日與廬山對酬酢故應妙語嚼芳鮮游跫然亭道火何曾燒著口問透法身藏北斗當時我若見雲門一杖打殺乞與狗臨濟大師生辰靖康二年四月十眼見耳聞信不及三玄三要都揭開露出法身赤吉力瀟湘八景山市晴嵐朝霞散綺仗天容無際山嵐分外濃風土蕭條人跡靜林蹊花木自鮮穠洞庭秋色秋霽湖平徹底清滄浪隱映曜光輪寒光炯炯為誰好倚岸憑欄興最清江天暮雪長空暝色黯陰雲六出飄花墮水濱萬境沉沉天籟息溪翁忍凍獨垂綸瀟湘夜雨嶽麓甍簷蒼莽中蕭蕭江雨打船蓬一聲長笛人何去蒻苙蓑衣宿葦叢漁村落照目斷青帘在水湄臨風漠漠映斜暉漁郎笑傲蘆花裏乘興回家何處歸遠浦歸帆水國煙光映夕暉誰家倣佛片帆歸翩翩鷗鷺西風急凝盼滄洲眼力微煙寺晚鐘輕煙罩暮上黃昏殷殷疏鐘度遠村略犳橫溪人跡靜幡竿縹眇插山根平沙落雁寂寞蒹葭亂晚風江波斂灩浸秋空橫斜倦翼歸何處一點漁燈杳靄中

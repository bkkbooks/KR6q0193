body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校七言律詩謁靈源塔高帆駕浪過南溟那料歸來掃此亭桃李成陰春老大溪山好在鬢凋零瓦燈已照宮商石卵塔分藏服匿瓶春雪尚能知客意蕩除毛孔瘴煙腥春日會思禹兄於溪堂門前溪水葡萄緑風掠松窗料峭寒忽憶十年同禍福那知今日共盤飧盡籤書策齊幽架已買漁舟泊小灘君會不嫌村落僻乘間來此弄漁竿招夏均父北山深轉青松壑萬疊煙霏空翠堆元亮果堪中路俟子猷那敢棹舟回鳥工魂夢尋公去蟬蛻塵埃出郭來他日荊林談笑處行人應指兩翁臺贈僧欹枕無人夢自驚回廊廣殿午風清已浮春露澆詩膽更炷水沉熏道情憂患撼床聞蟻鬥功名殷鬢作蚊聲欲依淨社陪香火僻處安排折腳鐺資國寺西齊示超然二首對眠偶此風雨夕又近寒嵒槲葉村謝晝未焚風鑑在韋郎不見語言存歲時暗覺持山去憂患空驚斫水痕緑髮雕零心已死成蹊桃李落華分人間炊黍未及熟萬事只今歸缺申已織青駒餞華騮更披白帢稱間身遺編終不求甚解故人但願長相親去年此日瓊南岸漲海翻天探騎塵贈寄老庵僧自憐玉鉢雙峰信來訪牛頭懶比丘山色深濃過夜半月華清亮近中秋已欣境勝如龍阜更覺庵幽占鳳頭夢幻此身猶且在杖藜投老得追遊懷李道夫半篙晚漲緑楊灣接趐鷗歸霧雨殘數疊吳山圓楚夢一番花信釀春寒別時小語依然在隔歲來書展復看補袞胸中五色線只今應作怒霓蟠余所居連超然自見軒日多啜茶其上二首三生事辦吾知要一室香凝獨掩門睡足便驚清晝夜火紅消盡白灰存巷無俗駕蟻紛繞鄰有高人玉粹溫隱比價膺猶可愧會茶時復到幽軒功名今古一雞肋美味那知是禍根掃跡世途龜曳尾僻居煙霧豹埋文如期見訪穿窗月不告而行出岫雲火浴未為無伴助塔吾遺骨尚煩君徐師川罪余作詩多恐招禍因焚去筆硯入居九峰投老庵讀高僧曇諦傳忽作數語是足成之以寄師川師川讀之想亦見赦二首歸來臥起有餘適老去消磨無雜緣門外不知何歲月夢中亦覺在雲泉千年高道誰酬價一世清間我賣錢安得道人江北去此詩先録寄師川古書漫滅字斕斑眼倦頽然整頓間以法為親疏世相視身如幻寄人間業緣有盡今脫手老態無因日上顏已辦一瓢期澗飲要刳余潤到崑山雲嵒寶鏡三昧寶鏡當機不密傳纖毫滲漏墮言詮圓伊三點分賓主妙挾雙明絶正偏暗裏丹青元異色句中涇渭本同川嬰兒索物哆啝耳與物寧瞋語未全過永寧寺已背荒南過永寧犯寒呵手捉枯藤雪如鏡底頷絲白山學誰家眉黛青射影風光知脫離伐冰門巷覺添增故人不用驚風帽我是前身臥像僧十一月十七日發豫章歸谷山急景窮冬一千里筍輿部曲去忽忽候船班草江津岸曝日探簷山店中袖手歸休今日是隔生冤債轉頭空湘西雪後青松徑想見聲盤萬壑風立春前一日雪明日立春今日雪雪中殘響滴虛簷方增謾說寒威在不絶潛知暖氣添客去旋開書對語間多偏與懶相兼湘山自古愁眉淺縱御鉛華不到尖明年湘西大雪次韻送僧吳夜殘陡覺寒生骨夢斷空驚月轉簷瓶響臥聞秋蚓泣火紅起撥白灰添欲酬清景尋儂去更棹扁舟與子兼要倩新詩寫愁絶笑呵凍硯蘸毫尖題清富堂此堂冠絶湘西勝枯木名多道不窮用谷量雲當衣鉢以江盛月展家風買山歸隱真寒乞借竹為軒落笑中緑錦漲連青玉浦剪裁磨琢費詩工湘西暮歸筍輿鼓角背層城湘水涸盡行沙汀嶽麓雪雲獻樓閣橘州煙雨學丹青此生多艱付跛挈投老餘間到寂惺蒼鬣萬身門窈窕歸來風葉掃空庭效李白湘中體夕光江搖魚尾紅何處扁舟開晚篷鴈字初成春有信煙鬟空好雨無蹤荒寒數葦橘洲岸領略半窗湘寺鐘浦口行人已爭渡林下歸僧欣一逢次韻王舍人蘭室起爇清香試返魂松花間泛刷絲紋幽齊事業誰同辦小斛蘭叢手自分家世到今猶玉食交朋強半在青雲笑談麈尾延僧宿要聽清言洗俗氛次韻熏堂無言桃李已垂陰小雨南風自滿襟佳客偶來持茗碗寶書看罷整瑤琴未容絲竹陶間適盡把雲山付醉吟圖畫麒麟他日事不將行樂負初心次韻寄傲軒道夫飛鳥倦知還一鉢安巢又故山無纍自然增逸興有名終恐廢長間背時生計風煙上隨意園林指顧間應笑市朝爭奪者暗驚清鏡失朱顏次韻吏隱堂二首拄笏西山爽氣新萬人如海一間身堂中自蠟登山屐門外從增沒馬塵美祿方辭緣肆志華軒偶羡見清真遺編半掩思標致未必今人愧古人此堂華構面層城意趣追回萬古情落帽被嘲真有道買金償謗亦求名黃庭卷掩凝香縷畫戟門深列衛兵安用山林笑朝市戲將軒冕寄餘生次韻集虛堂從來鮑靚有仙風腦滿方知氣自沖萬事收藏微笑裏十虛俱集一塵中乾城不礙丹青色天女何殊大小空滿地落花春寂寂岸巾時倚曲欄東次韻宿東安淡雲缺月兩微茫獨酌沽來竹葉香已把功名比雞肋更驚世路似羊腸心情老去俱消盡詩律年來覺倍強解誦東坡北歸曲此身安處是吾鄉次韻宿黃沙無計遮攔歲月飛歲除江寺老垂垂自圍紅火堆危坐熟讀黃沙感歎詩已笑因山論肥脊更驚逢水說分離重湖去國三千里想見殘缸夢斷時次韻雙秀堂窗戶青紅花木繁午陰修徑接深關人如巢許逃名跡山學娥英露髻鬟採菊悠然常獨見望雲時復對僧間夜聞松雨驚飛瀑疑宿匡廬黃石間次韻垂金館風簷負日背胡床千顆初驚昨夜霜噀霧香爭和露擘過牆枝作照林光佳名曾用題書尾小字仍呼背藥囊先與兒曹為美兆讀書窗映笏頭黃次韻贈慶代禪師蓮峰千葉吐晴煙玉頰遙知一粲然梅塢雪消香錯莫庵僧老盡氣完全暗驚夢蝶人間世回看醯雞甕裏天誰見清言橫麈尾滿庭風露竹娟娟次韻宿清修寺湘山也學廬山好落瀑聲飛繡谷風正欲求歸向兒說戲將收拾入詩中浪驚醉枕寒松響春滿茶鐺活火紅清景骨飛嗟未到故應唯許夢魂通次韻自清修過大溈亂山間作行盡湘南盡處山愛公高韻不容攀會當拭目瞻雙闕應笑尋幽到百蠻甚欲解鞍休犖確更能揎手弄潺顏定知醉看千嵒曉大字題名石壁間次韻郴江有作持節南來喜欲狂弄舟時得棹清湘然膏獨宿率牛洞枕玉曾眠錦瑟傍未可便尋間作伴不須先以醉為鄉金城馳至陳方略要指先鋒一破羌次韻題罷徭亭聞君新構罷徭亭邂逅河源又報清郡郭不輸天子賦溪山偏協野人情唐虞暇日饒耕鑿秦漢當年浪戰爭風月倚欄如可借待攜斗酒話升平次韻題西林廓然亭堂堂葉脫露遙天自炷臨軒一穗煙貴客獨遊聊爾耳道人相見亦欣然是身已悟浮漚久萬象中觀寶鏡圓寄語橫機莫相試刻舟甘作小乘禪次韻題方廣靈源洞萬峰剔卓起孤峰慚愧靈源與世通花異空懷上林苑夢清疑宿廣寒宮泄雲吐雨遮金地濺雪跳珠落石中忙裏為君成妙語豐碑正欲就崖礱次韻題高臺午梵知藏釋梵宮危臺遙喜石橋通下無俗駕攀緣至中有高人笑語同解執易為摩詰語經行難續德雲風千嵒萬壑吹松雨替說儂家勝義空次韻題上封天柱唯連紫蓋峰路危不與衆峰通瓢沽狹徑疑相值芊火何人想此風借榻醉魂窺凍蟻憑欄詩眼送飛鴻空嗟千偈出山去半摺遺編看未終次韻邵陵道中書懷邵陵山水麗風光游遍歸來夜話長秋翠等間開雉堞驚湍哀怨韻笙簧隨鞍此景憑詩寫他日塵紛一笑忘上閣與誰同小立墜金拄笏說三湘次韻雨中書懷剩雨殘晴暴所長客窗花氣噀餘香每懷追逐雲泉慣無計遮攔歲月忙誰謂伐冰連戚里年來盡室泛沅湘詔書行看椎門至已覺眉間一點黃次韻題化鶴軒當年羅網得雙舄想見胎仙風度幽朱頂顧吾今未識長身意子是其流山家趣味無人共王事經過作意游千里帝城何日去不妨佳處且遲留次韻題淡山嵒華屋張燈展畫屏當年纖手指嵒扃宦游那料重湖隔醉裏空驚疊嶂青繡口詞章人復見筆華聲價夢通靈詩成獨立西風晚滿眼歸心插羽翎次韻游浯溪浯溪山水今無恙浪士曾為爛熳游大字中興餘斷碣小舟空此醉垂鉤詞源不減無雙譽人品當時第一流地坐摩挲增歎息高標想見尚橫秋次韻題南明山淩雲閣獨上淩雲百尺樓欄干一曲一遲留丁丁樵斧空山裏泛泛漁舟古渡頭蔽日緑陰鳴好鳥際天芳草牧青牛回頭城市分塵土堪笑王孫取次游次韻言懷此身已覺此生浮去作雲山老比丘古寺間門人莫問寒綃蒙首涕慵收道林風月心能了子美工夫志未酬為問太原王處士一甌春露可同不次韻宿聖溪莊家聲十輩擁朱輪更畜青牛解鬥奔應念高樓間舞袖故憑山月洗吟魂助春泉落量雲谷輸稅人歸吠甑村被冷夜晴成好夢馬隨香霧入修門次韻拉空印游芙蓉翰墨平生氣吐霓詩成先喜示筠溪山中見客應偏好筆力知公不肯低夜寂據梧飢鼠出嵒空同聽怪禽啼上方聞說非人世更陟緣雲第幾梯次韻縱目亭高情與客憑欄處便覺身藏語笑中已許此生當樂死不辭老去坐詩窮遙知兵衛戎衣盛只缺花輪小袖紅絶境天藏今日獻千峰登睫豈人工次韻游鹿頭山吐詞秀似出盆絲好古幽情八詠思論字來尋魯公碣因詩曾訪少陵祠留題楚俗爭傳去懶賦山靈必有詞定價文章比珠玉此篇不獨慰吾私次韻題清風亭特築飛臺丈室旁便驚形勝發天藏登臨時作一聲嘯已覺翛然兩袖涼待月拭除昏霧色看雲入得野花香君看抖擻鈴幡意欲替禪翁為舉揚次韻法林禪寺聞道高人願力深幽居端與法為林風泉松雨隨宜說密室晴軒共一音意妙故應人不薦地偏還喜我相尋夜闌更入詩三昧消盡平生未死心次韻憑欄有作金殿誰焚南海香靄然芬馥撲回廊數枝銀燭高低照兩箇清螢上下光風度素秋驚宿鳥水春碧澗濯游舫欄干獨倚無人問細細孤吟月滿堂次韻渡江有作棄舟植杖首重回隔岸遙聞津鼓催淮上梅傳春信至江南山逐笑聲來行瞻瑞霧籠雙闕更看神光發五臺王事幸陪方外樂為君點筆走風雷題善化陳令蘭室種性難教草掩藏蒼然小室為誰芳槲培几案軒窗碧坐款賓朋笑語香糝地露英猶潔白快人風度更纖長議郎嗜好清無滓獨有幽蘭可比方快亭大丘作邑付絃歌剩得清間可奈何滿地棠陰驚晝永小亭詩眼覺天多佳眠夏簟便光滑醉耳松風喜再過想見句成書棐几侍兒濃笑出微渦次韻卻子中學句游嶽山攜怪石歸衡嶽乘春著意游詩詞不獨錦囊收又攜峰頂雲房石歸致間齊夏簟秋塵下笑談且同夢胸中涇渭自分流忽驚几案寒層出臥看令人憶故丘和周達道運句題怪石韻愛山心志如君少王事何妨陟翠微怪石方欣典刑在新詩仍寫畫圖歸客來一室煙光滿掌上千嵒眼力稀頗怪周郎賞音者獨於此境尚彈機次韻見寄喜雨議郎詩膽久崔嵬敏句無煩急雨催玉局波瀾嗟已絶少陵風力賴追回蕩晴香霧吹紅藕迥地花茵疊紫苔靜極涼生聞剝啄渡湘知有道人來次韻題方圓庵比物曾聞知姓名樹間斛懸林百升此庵外圓似盂覆其地中方如鏡平善不近名真有道高非絶俗更幽情會當目擊維摩老端作毗耶問法行贈許彥周宣教游嶽彥周參機道者一幅紗巾九節笻翛然生計似龐公孤雲野鶴登空去萬壑千嵒墮笑中岣嶁晴披應獨往懶瓚醉臥與誰同遙知勘破癡禪老想見臨機面發紅次韻游南嶽天迥游絲百尺輕水寒時覺縠紋生琢磨佳句輸吾弟文點春眠付老兄山寺獨來無一事竹軒相對有餘清永懷東院成千古寂子難忘叔姪情次韻彥周見寄二首詩先春色附湘船來與幽人結淨緣句好空驚碧雲合韻高疑在白鷗前君應歸誦陶彭澤我亦南尋率子廉想見江頭同握手採茶時節雨餘天歸思啼禽日夜催寶書臨罷意徘徊榆錢滿地買春去嶽色渡江排闥來行樂風光清夢曉臥披煙雨曲屏開興來敏速詩千首落筆人驚挾怒雷彥周借書湘上清山爽氣浮開軒相對亦風流但工酣寢成疏懶甚拙謀生太謬悠數筆江村供晚望一蓑煙雨助詩愁借書知子能醫國有志常先天下憂彥周法地弟作出家庵又自為銘作此寄之迂闊庵成又自誇要令妙語發天葩未容臨濟終仆地正賴雲門已出家少日浪曾參泐水暮年端合在丹霞贈君革屣游山去勘破諸方一笑譁二月大雨江漲晚晴作三首春寒作意攪吟魂欲出雲濤已濺門入畫瀟湘連雉堞落梅煙雨暗江村依蒲覓句壯心在附火抄書老眼昏一掬幽懷收拾得謾題窗紙與誰論我在湘西畫牒中時高時作送飛鴻事治山翠經旬雨印可春晴盡日風引步幽探聊自適滿懷疏快與誰同東君傾寫無餘蘊都放山茶稱意紅投老歸來楚水濱水清聊可濯衣塵拼心樂事都還汝入手清間不與人尚有笑談消白晝更無情緒管青春暗驚少日王城外走馬爭先看寶津陳大夫見和春日三首用韻酬之詠君好句欲消魂想見朱轓畫戟門解組正當強健日載書歸老水雲村虛堂風撼牙籤響密室嵐蒸畫牒昏偶在湘山最佳處舊游間與野僧論無復搜詩慘淡中便能落筆敏驚鴻高情不在兩疏後句法追回二謝風傾蓋未論桑梓舊忘年先喜唱酬同朱顏長覺清光溢不學東坡是醉紅詩軸來尋寂寞濱把看字字蛻埃塵江南家世休相問陳氏文章不乏人嶽色渡江長自好桃花滿縣不勝春克家有子如麟鳳骨相吾驚是要津過溈山陪空印禪師夜話濃翠濕衣三十里渡溪知背幾重雲忽驚寶構從空墮便覺風光與世分夜久天香凝錯莫庭間花雨自繽紛他生曾伴安禪地此夕樓鐘復共聞空印以新茶見餉喊山鹿蔌社前摘出焙新香麥粒光撼樹師應懷大仰傳甌我欲學南陽要看雪乳急停筅旋碾玉塵深住湯今日城中雖獨試明年林下定分嘗空印見招住庵時未能往作此寄之獨立天衣四世孫作家手段典刑存大溈路峻諸方讓空印風高四海聞有願欲依龍象衆無求羞逐鶩雞群此生一聚灰中骨終葬千峰頂上雲空印見和用韻答之棋布諸方盡子孫道緣渾似雪峰存全提蓋色騎聲句直要臨機以眼聞圍繞千僧名冠世指揮萬象語驚群獨能收此無家客分占溈源一塢雲龍興禪師大陽的孫居枯木堂新植楚竹余愛其家風為賦之門外追奔沒馬塵堂中安頓自由身修筠有淚知誰恨枯木開花為我春隔岸雲山猶可借滿懷風月未全貧小詩勿笑清如晝聊為高人戲寫真題德明都護熏堂占叢濃碧繞虛堂堂上仙郎戲比芳香並蕙蘭終漏泄色同草木浪遮藏過牆山潑軒窗翠吹鬢風生燕寢涼敏豆才高家法在要看落筆擁紅妝題季長冰壺軒間軒清似冰壺水軒上人如元紫芝坐覺秋光漱毛髮客來春色滿談詞寶書讀罷依蒲久玉麈經行曳履遲卷挂一聲林葉動黃昏月出雪消時明應仲出季長近詩二首次韻寄之露葉朝陽沃棗桑暑風吹鬢蕩蓮香已欣點水蜻蜓款更覺營巢燕子忙翠浪舞翻爭漲壟黃雲剖盡想登場小樓楯瓦誰庭院弱柳多情故掩藏偶尋鄰叟問桑麻踏盡山礬糝徑花傳得新辭春爛熳更驚行草醉欹斜遙知小縣少公事想見高情照物華尚念無家甘露滅一蓑煙雨似玄沙和傅彥濟知縣句法疑君每太高湘南山水助揮毫暫臨小邑聊觀政未見全牛可受刀珠玉光難藏瓦礫芝蘭香豈掩蓬蒿坐令百里清如鏡吏猾民姦豈易逃寄題劉居士環翠庵平生不識劉居士想見茅庵枯粹姿百八珠輪紅瑪瑙萬千峰繞碧琉璃笑人經卷鑽故紙彼世金珠似笊籬折腳鐺中誰共過小龐真是出家兒次韻思禹兄見懷刺桐花映野薔薇湘水侵門過客稀此日音書經歲隔何時麈尾對君揮樓高三楚天空闊夜久千嵒月正暉我託叢林如越鳥南枝雖穩亦思歸次韻思禹題方竹不改平生歲寒操近來隨世解方圓知君出異驚群聽顯我循常是一偏但見蒼官遭寵錫那知青士亦超遷水花院落春風晚庭種連蕉怪石前蜀道人明禪過余甚勤久而出東山高弟兩勤送行語句戲作此塞其見即之意衆中聞語識巴音京洛沅湘久訪尋張口茹拳君聚落垂膺拭涕我山林碧嵒花墮鳥飛去蒲坐葉飄針正紝袖裏兩勤大饒舌丈夫聲價老婆心送珠上人重修五宗語要五宗抄語挾風雷佛日將傾賴取回薝蔔花香已零落旃檀塔坐更塵埃鈍根厭看摩挲去妙手端能拂拭開當有異人來荷法叢林因子見奇瑰光上人送墨梅來求詩還鄉南嶽有雲留不住東歸結伴過湘湄解將疏影橫斜句不換垂珠的皪詩臞甚鳶肩寒入畫清哉鶴骨老難醫定知入嶺風煙暮正及追胥餽歲時送瓊大師歸禪寂近聞禪寂似叢林總衆能為世所欽百巧難磨真實行兩塗不改歲寒心衣今椹色如栗色語未吳音變楚音盛夏入城緣底事扁舟湘水獨相尋贈道法師道公膽大過身軀敢逆龍鱗上諫書獨欲袒肩擔佛法故甘引頸受誅鉏三年竄逐心無愧萬里歸來貌不枯他日教門綱紀者近聞靴笏趁朝趨谷山沙彌求詩十里松風長不老一庭秋色為誰間偶逢此日休新夏偏見耆年憶故山貧裏有秋同舉箸法中添口共開顏偶然弄筆成詩句乘興留題屋壁間贈羅道人蛻塵標韻矯翔鸞鬢髮樓颼風露寒脫舄骨飛何日見解衣沐浴萬人看肯來從我翛然住皆說他人屈致難戲作貓聲行聚落自忘身是晉郎官次韻張司録見寄不曾識面已傾倒便覺胸中涇渭分句精不減李長吉才高大類沈休文看山詩眼湛如水拄笏爽氣高摩雲他年竹屋夜連榻妙語懸知過所聞郭伯成榮登快馬東風走帝京歸來門巷緑陰成頃知一第文章貴能致三公袞冕榮子涉風波方箠探我間几硯覺塵生贈詩誰似王摩詰翰墨場中獨策名題天王圓證大師房壁閉戶不妨依聚落開軒隨分有山林殘經半掩世情斷好鳥一聲村意深籬外霜筠森束玉屋頭露橘欲垂金能營野飯羹紅醬渡水何辭數訪尋寄題達軒羊腸世路替人愁袖手歸來事事休只有信緣唯得計不過隨分復何求數聲屬玉滄浪晚一塢黃雲𥝧稏秋寄語封侯塞垣外何如高臥小軒幽題雲嵒筠軒雨葉風枝小徑通拂砧清坐有誰同粉衣香滑秋叢瘦泉珮丁東夜壑空半世已歸彈指內前途都付枕肱中隄防老境猶多事折腳鐺炊腐顆紅逍遙遊山歸見示唱和詩軸口占和之游遍名山過水西夜談奇語盡橫機君如檻鹿猶思奮我似棲禽已倦飛聞道老禪能眷舊更煩諸衲借餘輝欲知勝踐多佳思懷得新詩滿袖歸送誼叟歸北山南臺山淺北山深深處開軒更茂林作夏懸知成契闊扁舟乘興一相尋燈青竹屋風雨夕溪繞石門鄉井心投老都忘身是客坐中談笑盡吳音偶書寂音堂壁三首巾瓶挂壁亦翛然無所營為地自偏句法不能醫老病夢游時解到林泉扶持瘦玉筑隨步堆疊荒雲衲半肩小住間庭數歸鳥從教人作畫圖傳寂音間殺益風流寒涕垂膺懶更收得失是非都放卻死生窮達信緣休湘中戲劇三千首海上歸來十二秋齊罷展單吾自課暮年眠食更何求霜須瘴面老垂垂瘦搭詩肩古佛依滅跡尚嫌身是纍此生永與世相違殘經倦讀間憑几幽鳥獨聞常掩扉寢處法華安樂行蕩除五十二年非

body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編錄毘陵天甯法雲堂校五言絕句余在制勘院晝臥念故山經行處用空山無人水流花開為韻寄山中道友八首山帔蒙霜頂跏趺巖石中夜寒虎痾痒林靜月升空掃徑偶停帚幽懷凝佇間暮樵迷向背餘響答空山數峰橫杳靄空翠疑有無落日誰同看啼猿我欲呼新晴收雨腳宿霧隔花身睡美不知曉啼禽解喚人舍南一曲溪春漲半篙水去作落崖聲雪花濺山翠墮薪行且拾愛此山景幽偶坐欹斜石忽逢清淺流明白庵前路辛夷樹已花竊香知犯律匹練墨翻鴉棐几自香滑寶樹時一開道根九連絡清境更壅培病中寄山中故舊八首室空無侍者唯置一匡床萬事俱衰落但餘常寂光身心俱寂滅想念亦紛紜此是維摩老無生不二門我心若有生夢境堪把玩目前今洞然底處藏憂患雲門達法空玄沙見根蔕兩翁脫生死一味多爽氣心光本無礙慳貪空蓋纏一切但仍舊自然常現前靈源坐癡兀萬事付天真何事禪和子相逢礙塞人臨濟十世孫泐潭克家嗣一唱主中賓不容留意地本色出家兒機輪盤珠走須學老華亭用處無滲漏明白庵六首如來功德力內外悉清淨念起忽隨之自然心無病形與佛祖等道致人天護戒淨福人天心空同佛祖石火機鋒上那容著意根透情名出世離念是知恩瑞鹿吾所慕勇決敢不勉夜來歸夢清疑在啼猿巘老去一庵深聊將自淨心要當酬佛祖終不負叢林歸路山花發欣然折一枝動容揚古路不墮悄然機粹中自郴江瑩中與南歸時余在龍山容泯齋為誦唐詩入郭隨緣住思山破夏歸之句為韻十首哀蟬滿風聽草樹初茂密空齋有奇事屋角寒籐入客來理清言客去依蒲褐道鄉知不遙彷彿見城郭希夷登嶽頂典子相追隨天風落笑語想見對談時子從兩人傑此遊真勝緣他年傳故事一葉共湘川遙知歌座中隨意吐十住海門妙蓮華應逐談詞吐我庵無量相泯跡變清思覺範如新故空華今盛衰松下朅來見依然冰雪顏未須驚世故且復臥看山高誼今照人劇談舊驚座別來如許久一見千愁破無生師子窟僧寶光照夜我如龜六藏一庵聊作夏千峰夕陽外空翠搖煙霏終古無求處相看一笑歸和昭默堂五首相見自完全分明透語言衲僧猶聽瑩入戶不知門道骨清如玉閑拳瘦策時鈍根并鶻眼到此自分岐此堂常說法亦是主中賓無地容啗啄緣渠徹骨貧睡餘供漱盥齒頰帶茶甘兄弟知家法從教鶖子慚倦依蒲褐坐脫體露全機曲篆風窗細煙橫一縷微又次韻五首擬心成剩法況復更隨言試憑堂中几閑看窈窕門智識不到處言詮路絕時欲藏還露骨協帶更多岐瘦容無住著舉手評來賓不是無言說雖窮不諱貧夢裏尋音響教休定不甘忽知眉蓋眼開著替人慚言語皆為病全提卻物機更無遮掩處兀坐笑微微李成德畫理髮搔背刺噴䎳耳為四暢圖乞詩作此四首經月得樓颼頭懶垢不沬樹間一梳理道與精神會痒處搔不及賴有童子手精微不可傳齬齒一轉首呿口眼尾垂欲噴將未發竟以紙用事快等船出閘耳痒欲拈去猛省須用䎳注目深探之疏快滿髮髮余所居竹寺門外有谿流石橋汪履道過余必終日既去送至橋西履道誦笑別廬山遠何煩過虎谿之句作十詩以見寄因和之披雲奇峰稍稍墮危峭百年能幾何萬事付一笑方經脫手春又復送餘熱懸知到故山定與秋風別故山久不歸田園廢耕鉏但餘玉澗碧依舊繞吾廬吾廬亦何有草屋八九間床頭挂濕水枕上見他山夫子固真亮剛勁如何遠玉骨定含秋出語便清婉西齋君去後別緒亂於莎乃知長笑語始奈客愁何我詩水清淺隻鵠浴不煩君才正豪邁霜足擁華軒門前短石橋日日送君過歸來院落間還作北窗臥一從禿毛髮萬事成乖阻貪食等饑鷹酣眠如飽虎與君游戲處箇中無悟迷冰華來脈正不獨是曹谿履道書齋植竹甚茂用韻寄之十首君家清臞生風姿極孤峭我欲為傳真世豈無笑笑笑笑解衣處酒後耳先熱筆端走精神葉葉無差別汪郎工筆耕萬卷供犁鉏我方買牛具賃屋鄰子廬胸中有奇趣詩成談笑間往來無一事城郭似居山曉庭蒲葉翻天涯歸夢遠尚記泊舟時隔水桑婉婉月華潑空壁露顆壓庭莎哦詩欲仙去無計奈君何雖住城隍寺而無迎送煩清風如有素時復到南軒南軒絕低小亦無佳客過相看兩無言徑作對床臥詩狂欲發言因此難韻阻君看短後兒掉臂搏怒虎暫借人間路未達忽如迷石門端不遠歸思亂筠谿履道見和復荅之十首怪君巋如山詩句最奇峭此篇如縛須為作陸雲笑君馭秋風來破我殘夏熱方欣對榻眠遽作虎谿別曾約還康山披蓑共春鉏東林縛我屋西崦置子廬百年駒過隙世事撚指間誰能脫禿帽從我歸故山公詩如淵明語直氣益遠此篇猶可人幽趣更清婉佳人如美玉華裾似春莎百年被束縛奈此青山何所居遠城市已絕送迎煩賴有隔橋子時來過小軒靜聞鬥牛奔閑數群螘過秋風拂庭槐枕書欲酣臥與君居相連長恨笑談阻作詩歌追蹤人笑學畫虎思澀不自勝援筆真欲迷那堪屋漏雨供此不盡谿登控鯉亭望孤山大江自吞空中流湧孤山欲取藏袖中歸置几案間因事太平無事僧死時是今日逢緣不借中無間功不立叢秀軒幽軒如鏡淨峰好嚲雲鬟不用稱叢秀為君名照山次韻曾侯贈庵僧野僧自是閑不復知閑味譬如庵中人不見庵外事次韻履道雨霽見月二首昨夜中庭樹陰寒葉上稠今宵掃疏影寫出十分秋雨洗詩魂健梅梢月色新遙知愁絕處對影只三人次韻資欽提舉二首雅志在丘壑不甘絲竹圍摩挲林下石忽憶釣魚磯爽氣諸峰曉閑心古井波小樓新得句清絕似陰何和珣上人八首生死鏡中像非面亦非鏡像既無起滅心豈纏垢淨不了號無明了知名真智如人因地倒而起亦因地木頭與碌磚拋出無巧妙無寔法於人即是我綱要句下無活路知渠見處偏君看珠走地不定始知圓萬法如有功夢事應存體但知一月真寧許墮非是既了超四句自然絕百非電光石上火不許更追惟毀譽不入念方知心已空魔宮并虎穴還與道場同問訊跛挈師汝今亦知有棒打不回頭乃爾能掣肘六言絕句夏日睡起步至新豐亭觀雲庵墨妙與僧坐松下作五詩明日阿振試沐華矮牋請錄之因序焉五月十六日大熱亭上忽雨如翻盆枕書而寢乃覺日向夕隔墻荷氣俱風而至臥見窗間遠峰點點可數為之詩曰疏牖自分山翠矮墻不隔荷香睡美不知雨過覺來一有微涼要阿振出門山已瞑而煙翠重重一抹萬疊秀峰缺處日腳橫度紅碧相通餘暉光芒倒射作虹霓色微風忽興新秧翻浪如卷輕羅坐新豐亭流目而長吟讀雲庵老人戲墨為詩壁上龍蛇飛動坐中金玉鎗然起望微雲生處一聲相應殘蟬扶杖而東渡五位橋曲折而北松下逢道人賢公喜為之詩曰賢也嶔嵌歷落軒然頤頰開張松下偶然相值立談愛子清狂乃相與濯足於落澗泉語笑不相聞於是聽其聲于習觀亭為之詩曰臥聽石間流水起尋洞口歸雲但願一生如此閑游更復同君須臾月出疊石峰側散坐於知隱橋以遲之余謂二子曰茲遊也與存豁輩何遠所恨倔強嗟不及耳乃詠而歸鐘已絕而廊廡寂無聲為之詩曰月在留雲峰上人行落澗聲中歸去殷床鐘歇滿庭風露濛濛登控鯉亭望孤山水面微開笑靨山形故作橫陳彭澤詩中圖畫為君點出精神悼山谷五首蘇黃一時頓有風流千載追還竟作聯翩仙去要將休歇人間人間識與不識為君折意消魂獨入無聲三昧同聞阿字法門自顧面無四目何止心雄萬夫和得靈源雅曲繡繻更綰流蘇鬚鬢滄浪夢幻江湖厭飫平生一旦便成千古壞桐絃索縱橫平昔馭風騎氣如今夜雨荒丘欲動西州華屋空餘南浦漁舟李端叔自金陵如姑谿寄之五首東坡坐中醉客讓君翰墨風流為作羊曇折意莫年淚眼山丘老去田園可樂秋來禾黍登場相見雞豚社飲諠譁曖熱谿堂數疊夕陽秋巘雨餘眼力衰時可是招要歸思故應醞造新詩月下一聲風笛尊前萬頃雲濤玉堂他年圖畫臥看今日漁舠舉世誇君筆語霧豹渠知一斑莫問人間非是且看醉裏江山戲呈師川駒父之阿牛三首今代南州孺子要是萬人之英安得際天汗漫著此海上長鯨風鑒晴雲霽月衣冠紫陌黃塵勿笑鐸駝長臥起來便自過人阿牛骨相似舅文章定能世家差勝宗武不襪猶作添丁畫鴉陳瑩中居合浦余在湘山三首寄之心在青牛城下身行白鶴泉西何日相逢一笑看君飽食蛤蜊海門何啻千里行人替我生愁遠爾妄生分別閻浮等是一漚聞道希夷處士今居訶梨仙村要看筆端三昧重談醫國法門寄巽中三首屋角早梅開遍墻陰殘雪消遲簾卷一場春夢窗含滿眼新詩文章風行水上歲月舟藏壑中自怪頂明玉缽人疑筆夢春紅舅相決予十載塵埃羨子清閑孤坐定非禪病剃頭猶有詩斑送實上人還東林時余亦買舟東下四首世事但堪眼見此生何殊夢游未倩青山掩骨且牽黃衲蒙頭有客惠然過我疏眉秀骨巖巖且復柔槎凍耳聽君放意高談說盡廬山勝處寂然相對無言東崦峰頭月出依約如聞白猿我已作成行計喜君亦有歸期何日虎谿松下卻說江海別時余游鍾山宿石佛峰下因上人自歸宗來贈之六首曾其故山寒食忽驚廬嶽重陽想見洞庭橘柚纍垂又出青黃世議嗟嗟迫隘白頭相視如新只有淵明似我逢人故面成親君住青鸞谿上我留石佛峰前捉手粲然一笑秋容那更撐天卻度來時危徑斷崖落照孤煙分手更無可奈相看只有凄然已是浮雲身世更餘一缽生涯是處青山可老何妨乘興為家西風夜吹客夢霜清更入鍾山且作跳魚縱壑會看倦鳥知還和人春日三首冰缺涓涓嫩水柳渦剪剪柔風滓色盡情澄曉游絲放意垂空暖壓催花小雨晴宜到面和風鶯舌管絃合調蘭芽雪玉分叢攬衣欲起還眠杜宇一聲春曉家童走報新事山茶昨夜開了山居四首深谷清泉白石空齋棐几明窗飯罷一甌春露夢成風雨翻江鍊盡人間機巧卻能隨處安閑雲深舊迷歸路木落今見他山讀書不求甚解偶爾會意欣然點筆疾書窗紙倚蒲卻看罏煙負日自然捫蝨看山不覺成詩快暖啼禽歸去受風林影參差夏日三首鳥啼不妨意寂日長但覺身閑掃地要延遺照掩扉推出青山軒借誰家脩竹簟留滿眼清秋手倦拋書枕臥一聲殿角風甌掩卷高眠客去望雲乞食僧歸秋近柳陰低瘦年高瘴髮能稀和人夜坐三首句好真堪供佛泉幽欣更同僧閑塵自橫涼簟飛蚊故遶篝燈行道疾於轉馬坐禪危若蹲鴟瓜皮能作地獄荷香解破毗尼忠子定應詩瘦隆禪甘作書癡兩客絕無消息千峰見我棲遲即事三首目誦自應引睡手談聊復忘紛一曲青林門巷數聲白鳥江村茶味尚含春意鳩鳴忽覺村深掃地風能施手過門月解論心妙語欲澆舌本故人忽到眉尖雲薄茶煙索石浪寒竹色侵簾用高僧詩云沙泉帶草堂紙帳卷空床靜是真消息吟非浴肺腸園林坐清影梅杏嚼紅香誰住原西寺鐘聲送夕陽作八首江素塵泥疏遶泉清晝夜澄明氣入茅堂蕭爽潤滋草木鮮榮松榻獨安枕簟紙幃長隔埃塵輝映夜窗明月下藏夢蝶幽人煩擾自茲深隱寂寞相與沉冥淡泊既諧真性恬頤復順生經風月冥搜秀句詩家肺腑同期自古人間俗物此心雖死奚知舍後樹林深秀日中陰影繁濃宴坐時來有籟炎威欲入無從杏實殘籠金色楊梅爛染臙脂氣味新鮮可口清甘喉舌多時源塢似甘西畔精廬於此相鄰迎接喜能忘我住山知是何人林外鳴鴉零亂山頭落日微紅樓臺迥然暝色谷幽已答疏鐘臨清閣二首泯泯下窺軟碧洄洄忽作驚湍時看稚子對浴少陵詩眼長寒邑勢自然藏勝江空表裏含秋夜棹近人明月襄陽應在漁舟贈珠侍者二首我是布毛侍者解藏陷虎鋒機勘破諸方歸去一籐深鎖煙霏一等心華自照不煩春色須開安用翻瀾千偈卻輸枯木寒灰誠上人試手游方二首隨處千巖萬壑一缽雲行鳥飛歲月卻還驚浪蒙頭破衲同歸跡要風蟬蛻殼道愧泥龜六藏面上唾痕莫拭自然知見含香拄杖寄子因二首百節紫藤風骨得自泐潭石門不受雲居勾絡定知臨濟兒孫作伴經游已遍住山尚存典刑寄與毗耶作戲當場攛出驚人分韻得風字鷗寒爭浴暮雨舟閑放縱江風一幅花光平遠誰藏覺範詩中歸九峰道中四五疊峰深處歸去開荒南畝是非不得扶犁春曉一蓑煙雨贈誠上人四首熅火扶持清境篝燈點破黃昏凍耳欣聞軟語冷齋忽變春溫衝雪來尋覺範思時山說靈源此夕蔣陵二老畫出韋郎五言覓句初聞試手吐詞果復驚人夜覺千巖晝永曉看萬瓦生春對書只圖遮眼題詩何必須編且看無情說法群山雪盡蒼然書阿慈意消室風過淵明臥處林閒子厚來時睡起一杯春露壁間數句坡詩愿監寺自長沙遊清修依元禪師興發復入城余口占四首贈之過江問大溈路失腳到小廬山慚愧沒箇虜子滿堂都是鄉關自笑乾陪奉漢人誇熱肺腸僧飯了脫剝打睡椎門擊撼不應秋來又入重城滿腹憨腮驚人只欠一箇布袋便是彌勒化身閑裏雖無白業笑中自有丹沙啜我同遊蓬島箇中棗大如瓜答慶上人三首連日顛風斷渡一番花信催春殘夜華鯨吼粥夢回窗月窺人米嶺脊吞西嶽筠谿尾插漳江興發扁舟尋子夜晴風揭蓬窗雨後哦君佳句華氣如川方增石出水生微渚雲閒山露寒層贈溈山湘書記二首山學春愁眉黛水如含笑花香睡起憑高凝睇淺紅數筆殘陽住山心已老大看雲情轉虛閑東華軟紅縱好無因飛到窗間偶書屋破不至露寢食乏不至餐氈此身投老未死萬事一切隨緣登洪崖橋與通端三首行盡幾重添秀雷奔響落晴空散坐煮茶為別雲間一徑微通雞聲亂人語秀山色涴我衣裳洗盡人間熱惱還君坐上清涼同到洪崖橋上水光射著山寒為君更透妙語乞與西山老端湘山偶書暖壓催花小雨晴宜到面和風鶯舌管絃合調蘭芽雪玉分叢和人二首玉骨解藏歲月飢膚不受塵埃落筆驚鴻掠紙延僧春露浮杯寂寥空山獨夜蕭條古木清秋風月誰家搗練江頭何處釣舟

body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編錄毘陵天甯法雲堂校七言律詩元正一日示阿慈季真少儼三十歲儼入新年五十三疑我滿懷揣佛法解腰抖摟破裙衫大瞻終老同香火小朗平生共石巖深炷爐香待清旦偶聞殘雪落高杉上元夜病起欲寫法華安樂行品無力呼阿慈為錄作此重城車馬氣成霧隔水巖叢冷欲冰昨夜窺窗先有月今宵對語偶無僧臘高鶴骨柴崖露病起霜鬚逐旋增欲寫寶書驚力乏阿慈能為掃寒籐上元後候季長不至作此寄之和風凍雨上元後斷岸橘洲春水生村寺獨歸江路熟竹籬誰繫小舟橫偶成詩句長哦罷漫折梅花一嗅清想見連床成夜語此篇先慰遠來情夏日偶書草樹扶疏夏簟清夢驚鬥雀墮空庭過墻雌竹已數子出屋耄蕉終百齡雷後怒雲魚尾赤林梢剩水鴨頭青都無伎倆酬閑寂謾搭伽黎自誦經與忠子晚步登臺有作僧殘寺僻游人少草滿池塘筍過籬蘆橘帶酸春去後榴花出葉雨晴時一年事辦秧齊遍連日江寒水退遲偶上高臺成遠眺茲游更得子追隨和人鴈字劃然斜去和天曉夜火相驚事已虛春信寫來無款識東君胸次亦恢疏最難讀似成文蠹不亂行如水上魚勿訝羲之筆神駿換鵝瘞鶴是臨書大雪今年未雪今日雪地迥眼新人不囂永巷掃除聞屐響暮林翔集看鴉嬌韻高雒下應難畫興發山陰未覺遙想見茅齋已摧壓曲肱清夢到山椒宣和四年十二月二十四日大雪珠禪客忽至渠以谷山退院來審是否作此示之翻空漸密呵不止刷我當門螺髻峰銀碗滿盛談類墮徑松深覆示藏鋒因徒逃去寧知褊顯自何來不見蹤獨擁衲衣成坐睡地罏瓶泣伴疏慵題鹿苑虎岑堂平生文彩照諸方暗谷行藏草木光要使叢林想高韻故將名字挂虛堂笑拈倚壁過頭杖閑坐當年折腳床進步竿頭如不薦草深門徑未相妨次韻湖山居士見過平昔雲岑在懷抱而今懷抱在雲岑聞泉偶爾成詩句班草相看坐木陰古鼎自然無俗韻朱絃真是有遺音羊欣不肯踏城市背郭江村獨見尋題使園眄柯亭吏散東園勝踐多落花起舞鳥能歌故應毛穎曾同泛不獨龍文慣自磨弄影風枝空掩冉困人天氣近清和倚欄欲去猶回首奈此霄晴月色何題翠靄堂虛簷碧瓦臨無地吐月吞風六月寒簾捲煙光搖戶牖雨餘嶽色墮闌干侍兒自炷真龍腦座客同分小鳳團誰謂太平本無象規模堪入畫圖看迎爽樓危樓華構倚青冥卷盡晴嵐獨自登去鴈橫斜分點點好峰青碧露層層勝游與客同清賞佳處題名在翠筠憑檻不堪衰眼力候船津渡見歸僧送太淳長老住明教三玄三要古難分劈破從教剔突崙父母未生前一笑言詮不到處重論椎開臨濟百年意推出汾陽六世孫何用老婆更饒舌暗中五色自成文送英長老住石谿三玄三要沉埋久正令重煩振此宗陷虎機關須毒手活人眼目貴藏鋒真誠莫負叢林志大願當追佛祖風覆頂把茅休取相同安曾著老黃龍次韻李方叔水宿高視世波增眼寒公如砥柱捍驚湍市中一虎成三口醉裏扁舟過百灘佳處每煩詩句寫勝游宜作畫圖看遙知二老相逢處拾得風前一笑懽次韻曹彥清教授見寄泮宮授道最馳名想見經筵玉麈橫學問有源堪景仰行藏無地受譏評門前江浪銀山攧醉裏詩篇錦段明遠宦不須嗟白眼只今臺閣半書生胥啟道次韻見寄復和之少年翰墨擅時名老愛江鄉翠巘橫聞道異書常自校近來佳句與誰評幽尋湘水映衣碧小寢晴窗潑眼明寄我三詩爭妙麗疑公曾夢筆花生寄黃龍來道者問訊黃龍來道者住山況味定何如齒牢未怯和沙飯眼倦應嫌夾注書但見衣勝寒薜荔不妨心賽白芙蕖都疑生近楂田市時覺淮南語未除禪首座自海公化去見故舊未嘗忘追想悼歎之情季真游北游大梁聞其病憂得書輒喜為人重鄉義久要不忘湘西時訪史資深亦或見尋此外閉門高臥耳宣和二年三月日風雨有懷其人戲書寄之前時無際曾入夢近日真游又得書一味歲寒甘淡薄十分懽喜說鄉間閑尋老儼臺南寺更過史髯湖上居想見朝來閉深閤臥聽簷雨滴階除次韻閻資欽提舉東安道中父老扶攜看使華那知勳業在咨嗟人生安得顏長少歲暮今驚日欲斜漫有清詩敏風雨空餘醉墨走龍蛇應憐妙語如芝菌不吐青林吐臥槎次韻遊福嚴寺下臨煙雨憑危欄游客新辭禁從班露濕衣巾近雲漢風吹笑語落人間曾聞詩律如彭澤想見風神似魯山何日三人成品坐夜窗參論到更闌次韻寧鄉道中夾道傳呼部曲奔遙知秋色動吟魂黃柑綠橘平蕪路剩水殘山夕照村似鏡此心清自迥如雲往事去無痕鐘聲有寺藏煙翠忽見林間窈窕門次韻題雲峰齊雲閣綠玉霜笻喜自提芒鞋初試得攀躋欲窮深谷一區勝更上齊雲百級梯物外名山長好在人間樂事自難齊遙知太息出山去一笑無人悟過谿次韻題必照軒曈曨曉日出蒼涼草木欣欣露葉光千里穠纖上眉睫一區形勝發天藏有詩摹寫江山美無計遮欄歲月忙韻險暗驚才力短坐令毛穎禿鋒芒宿資欽楚山堂故人持節在三湘白首相逢話更長挂錫曾憐道林寺攜衾來宿楚山堂意消忽覺風敲竹夢斷空驚月轉廊常恨出門無所詣敢辭時此夜連床次韻資欽元府判見寄茗碗閑窗不厭過暮年歸計定如何我思杖履游嵩少公輩家山近洛河具茨功名關意少穎皋丘壑賦情多二詩俱可鐫崖石乞與雲煙相蕩摩次韻王覺之裕之承務二首問法能來渾聖凡毗耶丈室未曾關解分缽飯如摩詰欲散天花欠阿蠻屬秥新詩追鮑謝抗行醉墨似楊顏遙知穿市聽歸馭及我昏鴉落照間兄弟令人眼倍明六經心醉幾時醒韻高山嶽橫南極機妙鶤鵬化北溟麗句重逢天下白俊才今見海東青數篇秀色凌千嶂來尉摧頹病掩扃宣和五年四月十二日余館湘陰之興化徐質夫自土山來一昔夜語甚傾倒且日前嘗夢見東坡今復見子何清事相聯耶吾所居有亭名閑美嘗有白燕巢梁間屢見鶴翔舞於層霄囑予為詩紀其事質夫大梁人賢而有文佳公子也徐侯官舍土山邊頗為看書廢晝眠偶見畫梁巢雪乙更驚雲漢舞胎仙致坡入夢殊堪紀與儼忘形亦自賢聞道小亭時縱目江山信美似斜川送丕上人歸黃檗萬身馬鬣轉龍腰十里風聲捲海潮翠靄晴時飛畫梀蒼崖斷處見朱橋老驚鄉井心空在說著巖叢意已消慚愧東風知此恨夜來吹夢到山椒同希先遊石鞏良辰美景古難并且趁身閒稻雨晴鳥語猿歌留我在水聲山色益人清得幽詩句聊題壁遇好峰巒即住程回首十年塵事裏與君今日夢魂驚題胥大夫欣欣堂議郎粹和色無求繞屋江山秀氣浮弱柳嬌眠禽喚起異花含笑草忘憂閉門不放青春去解榻長令佳客留摹寫高情無好句謾橫詩眼付冥搜次韻嘉言機宜幽尋野外興何如蠶市村囂憶故墟煮繭生涯春老大餉田時節意蘇舒吹開麥浪南風至落盡花房小雨餘暫借僧窗聊假寐夢驚身世兩蘧蘧玉池禪師以紙衾見遺作此謝之紙衾來自玉峰前旋坼封題一粲然便覺室廬增道氣不憂風雨攪閑眠就床堆疊明如雪引手模蘇軟似綿擁被並罏和夢暖全勝白疊紫茸氈立秋日偶書秋入紗廚夏簟空頹然瘦坐一衰翁聲涼亂葉紅蕉雨香暗分叢紫菊風清境淨緣慚獨享幽懷佳句與誰同平生垢習消磨盡只有文章氣吐虹游太平古寺讀舊題用惠上人韻步盡長廊覺倦遊叢蕉出屋小軒幽壁間詩在紅埃滿窗下香殘碧縷浮喜有繩床容我借更因茗碗為君留忽驚林杪湘山露誰作江天數筆秋歲窮僧眾米竭自往湘陰乞之舟載夜歸宿橋口寒甚未寢時侍者智觀坐而假寐作此詩有懷資欽提舉老去生涯無窖子隔城荒寺到人稀歲窮百里扣門乞夜棹孤舟載米歸隅坐小僧寒附火聯拳羸僕睡和衣故人醉裏聞薌澤應背銀缸照翠幃正月一日送璿維那之新昌乞春水初生湘岸邊陰晴城郭上元前暖消積雪成簷滴火烈殘香發篆煙念舊十年鄉井夢試新一首送行篇翛然路入江南去想見歸時及杜鵑二月二十一日奉陪季長遊嶽麓飯罷登法華臺賦此法華臺上憑欄久吹鬢東風晚雨晴斷岸平橫千雉堞道林遠在一牛鳴喜餐水餅清明近開遍山茶杜宇聲想見京塵遮便面應思攜手比中行送興上人之歸宗紫霄峰下鸞谿上幻出寶坊金碧開沃野不辭常自獻暮雲無事解歸來永懷香火三生舊想見松風萬壑哀阿上笑中如問我為言詩膽尚崔嵬贈道禪者大河卷浪雪翻風橋壓千艘臥彩虹岱嶽煙雲連絕域北門樓閣礙層空浪遊荊楚重湖外更在溈源疊嶂中水餅槐芽動鄉思近來歸夢與誰同周庭秀愛湘中山水之勝定居十餘年宣和五年夏五月忽思吳中別余於湘上作此送之詞刃平生工斫伐探懷每欲取公侯朅來世事懶經意醉看湘山不轉頭忽憶歸吳泛千里偶然盡室載孤舟卻將揮翰風雷手且釣華亭萬頃秋題悟宗壁到寺回身望眾峰一堂疏快萬緣空槲林曲折通幽徑蓮蕩凋零退晚紅師已灰心增夏臘我今霜鬢撒秋風亦知旁舍多佳士香火他年願此同過陵水縣補東坡遺二首白沙翠竹並江流小縣炊煙晚雨收蒼蘚色侵盤馬地稻花香入放衙樓過廳客聚觀燈網趁市入歸旋喚舟意適忽忘身是客語音無伴始生愁夜歸示卓道人心知家本住仇池傲倪人間老變衰兩鬢京塵初邂逅一尊川語問歸期勸沽何處禽知我含笑誰家花隔籬天水摹胡颶風作夜歸江路月相隨雪詩千巖雨雪黃昏後一室香燈一寢餘此夕鄉關入歸夢明朝雲物記曾書地罏不獨聞瓶泣山果時驚落屋除清境鼎來勞應接暮年生計未全疏題王教授艇齋宴居端若寄虛舟三峽詞源日倒流慣與衣冠游泮水坐看圖史認瀛洲胸中耿耿觀瀾術物外悠悠涉世謀莫謂縱橫止容膝濟川林葉此中求吾山風物如故園而甚僻余居月餘愛之將此卜居二首此生於世已無求況有村原事事幽乞谷住山真素志栽田博飯是良謀別坡筍蕨春兼採遶舍桑麻歲倍收強健自能營飽暖塵埃回首謾悠悠風物淳真似故丘茅茨結處自深幽竹西鄰舍頗相近客至須供良甚謀燈火夜窗衣自補豐登秋畝稻重收安閒有此支餘歲更欲驅馳亦謬悠送楞嚴經珣維那尸羅清淨心清淨寄跡南臺亦偶然室掩香燈見行道壁懸巾屨伴孤禪寶書獨欲煩君誦法力真期迨我先細味此詩如實錄他年僧史定須編謝嶽麓光老惠臨濟頂相瘦骨孤標韻絕倫傳聞宗派出雲門收藏畫裏三玄老分付湘中十世孫罵佛風神疑正怒打僧氣宇尚驚群能言滅卻正法眼不負灘頭毒手恩送珠上人泐潭拜塔泐潭臥龍今不見空有遺珠留世間圓轉自然離礦穢光明聊復祕形山隨師受嚫前身事披掌猶存此日還言不走盤無影跡方知生死不相關題龍王枯木堂異種靈苗著四方謾將名字挂虛堂道林可惜昏嵐掩枯木那知在處芳韶石曾聞傲煙瘴焦山今已飽風霜陽陂且喜根株茂雪裏花開爛熳香送海印奭老住東林湘容嶽色中秋後古寺閑房小寢餘掃徑帚粘新落葉開窗風掩讀殘書吹雲又作他山去種漆何時伴我居洞上閑名猶在世未應容易與人除余至清修別希一禪師津發如老媼扶女外車其義風可以起頹俗將發作此驚風急雨中秋後回首長沙杳靄間迎送初辭大藩府逍遙來看小廬山故人情義千鈞重行客生涯一葉閑明日旅亭勞晝夢孤峰標格不容攀題壓波閣雪玉在躬賢令尹江山約束入宏規驚波濺岸憑凌替傑閣控雲彈壓之霧斂塵清閑縱目蜂爭螘分想當時邦人準擬朱欄外安著他年惠愛碑次韻賈令尹題裴公亭獨憑危欄眼力窮當年勝踐想遺風歌喉雲杪殷餘韻笑靨尊前發醉紅世相難逃朝夕改山容不老古今同議郎筆力回春色摹寫都藏畫牒中余往漢上清修白鹿二老送至龍牙作此別之因法相逢亦一時雲泉所至共娛嬉怪君追送不辭遠知我從來未有期醞造離愁成獨笑欺凌秋色有新詩閻浮掌上訶梨勒去住休纏愛見悲雪夜至明教寄王路分舍人雪夜山中還獨宿地罏深煖紙窗明百年有限身今老一枕無求夢自清弟子分燈成保社故人持節頓江城瘴痾疏快諸緣淨臥聽摧簷瀉竹聲訪雙池老不遇其子覺先求詩為作此芒鞋竹杖快新晴天迥游絲百尺輕沃若柔桑連野綠炯如白鳥照溪明逢山有寺幽欣集對客開軒午夢清曦竟未回憑閣久忽聞高柳子規聲寂音泉水靈有源不知處但見方沼供無窮俯波下看遠山色卷霧忽驚清鏡空危亭快若望霜曉江岸猶如起陰風宜呼此泉作檀越歲致萬斛無凶豐燈禪師出蜀住此山十年為作南食且約同住作此以贈少年出蜀今耆艾十見襄陽浩蕩春山近京畿看愈好食兼虜饌味尤真君今避世成深隱我欲移庵結近鄰相對無嫌太岑寂待添明月作三人襄州亂後逢端州依上人漢上相逢兵火後蒼顏華髮兩摧頹塵清霧斂閒身在螘分蜂爭一笑開志捍叢林山剔卓義規朋友玉崔嵬瓦精決舌休皮相曾見淄州古佛來和濟之通判日夜懷祖穎諸公才高自是萬夫望語妙人疑錦繡腸新事驚嗟入詩律故交契闊付淒傷開書想見湖山好他日懸知夜語長獄屋豈能埋寶劍斗牛長覺射龍光送勻上人謁蔡州使者淮西氣宇蓋三軍絕似平原舊使君今日孤城獨堅守疾風勁草昔傳聞龍蛇戲下唯呼姓翰墨場中亦策勳想見棠陰談我處笑持茗碗辯如雲寄盛群玉平生翰墨到精微盛氏諸郎最白眉氣訐曾窺豪士賦初交先和野僧詩謾勞清夢思相識那料孤蹤晚見知君看臨危用心處何殊晏子解驂時十二月十八夜大雪注蓮經罷有僧來勸歸廬山僧去作此煙凝生怕席簾開快煖偏宜榾柮柴夜久饑鼯嗅空案夢驚鬥虎墮層崖優曇花偈餘殘紙薝蔔杯香自滿齋折腳鐺安莫嫌穩地偏人懶遂幽懷雪中勢密連空若推下隨風起舞不容追門閑走犬無深巷樹暗棲鴉有剩枝旋撥地罏通宿火卻呵凍手寫新詩軒窗秀發驚清晝萬壑春歸說向誰再會莊德祖大夫平昔才名似孟宗暮年一缽並巖叢交朋半在青雲上意氣都消白眼中龐老尚餘靈照在伯鸞應許孟光同君看張柬之為相不害荊州禿鬢翁與蔡楊州五馬東來數月間十州人物帖然安池邊芳草新吟罷樓外遙山晝臥看鈴閣臘煙秋色晚譙門銅漏夜聲寒雖然自是雲林客猶把風流作話端唐生能視手文乞詩戲贈之草蕪門徑過從少那料秋來夜話同屋漏移床時發笑粥稠當飯巧於窮我留癡絕傳身後君見平生似掌中明日渡江應轉首數峰無語晚連空贈麻城接待僧勝上人綠髮凋零白業增住庵隨分有規繩為分一邑人家飯普供十方雲水僧掃徑客來圓笑靨開軒雲破露寒層君看擊桶金牛手坐續山頭柏子燈夏日同安示阿崇諸衲子老眼朅來驚節物閑同諸子話江鄉試茶正要旋烘盞煮餅且令深注湯忽憶海山飧荔子更思湘水劈蓮房夏休便可車輪去菌簟秋肥趁及嘗三月二十八日棗柏大士生辰六首深觀諸佛剎那際三世十方無遁形已盡凡情不顛倒如除目翳自光明意俱大地山河喪心與空花夢幻生垂手遇緣攜法界美髯跣足散衣行二天給侍慈忍象一虎橐經常寂光意處世間離生滅夢中塵劫浪遮藏即真不必冠巾毀絕染何妨棗柏嘗提起超情無比句夜來山雨落花香青春徑去不小住天迥游絲增眼寒想見手提大千界翛然身現一毛端若存情見智山隔但斷攀緣業海乾面目分明今日是敢將棗柏薦盤飧生死鶻崙無背面摩挲把玩久嗟咨悟明必藉戒定慧隨順差成老病衰淨意即空良顯決色身對現出思惟千烹萬鍛知恩德敢忘摩尼在礦時眼蓋人寰撚美髯年年相見晚春前摸蘇緣妄心俱盡揩拭鮮陳念已圜指下琴方纔發越眉間毫相見無邊微塵劫海依今住生死何勞較後先一剎那際入正受互參三世妙難思有情夢境依此住無量劫海不移時任運行藏難掩覆隨疑語默出思惟大哉無比金剛句世罕知之我獨知十世觀音生辰六月二十六日二首十世為僧皆姓楊死生游戲自隋唐鐵身自倒汝邪正寫字無為我道場異跡著於無量壽慈風不減普昭王兩川顯化人皆識今日全身不揜藏曇相禪師第二身蟬聯十世姓楊人女兄慧辯成勍敵弟子悲欣記夙因解使邪迷知有佛自呼名字凜如神平生接物多方便何似今朝一句親蔡藏用生辰非煙雲子釀新晴爭看麒麟墮地行悉達已聞今日誕優曇知復為誰榮已驚久視方瞳碧更覺藏年玉骨清曾伴麻姑家法在願隨風馭到蓬瀛八月二十三日蔡元中生辰纔過中秋今幾日夜來海月上三更夢魂傳得天書至窗戶俱明廄馬驚骨相終當為國器兒聲初已識人英明年慶節山中友金屋憐君夜直清劉彭年知縣生辰清規懿德古難陪秋盡民歌慶節來瑞應草餘雙葉在優曇花適一枝開鶯嬌妙管傳佳句玉膩新粧獻壽盃慈母千齡何所願早看賢子踐三台中廬趙令生辰孟夏南風草木薰民歌慶節喜傳聞今朝雪乙呈雙瑞後夜冰輪滿九分材業牛刀試小邑家聲天派落層雲吞舟豈久容涔足禁殿論思政要君寄黃嗣深使君二首江夏家聲世所聞無雙千頃典刑存肅嚴郡邑霜分曉照映簪纓玉粹溫樓迥峴雲供醉望夜晴漢月洗吟魂行將補袞調羹手卻執元圭侍至尊身世浮雲偶尚存白衣蒼狗與誰論夢中不記金門宿醉裏曾看玉海翻尚有驚魂纏瘴霧已甘華髮老江賓枯荄欲藉陽和暖催發新來雨露恩李道夫母挽辭縉紳家法想清規平昔高風此一時居約雲山夫有道客陪房杜子無疑九原淚濕老萊袂千字碑傳幼婦詞他日欲尋賢母墓北山松雨路人悲鄧循道父挽辭二首苦冰潔檗是行藏一節無求老更剛好在縉紳師儉德尚餘閭里說謙光陰功穩秘天應錄遺訓丁寧世共傷勿謂不身嘗報施故應遺澤在諸郎一生純德無遺恨千字埋名有逸辭墓隧嫩泉誰種玉書齋子硯自生芝音容已作終天痛歲月真成罔極悲擁鼻功名知不免空將淚眼看風枝代人上李龍圖並廉使致語十首後三首慈及二子附竊以引而不發射失中則反諸身安則慮危國雖治而不忘武顧將揖讓而就列當踏規矩而效能凜乎有囊鞬之儀形望之入麒麟之圖畫白衣自表定三矢於天山錦帽突前靡萬人於沙漠自昔聞無雙之伎迄今見逸群之材恭惟判府安撫龍圖忠孝傳家文章命世開畫戟之幕府集珠履之鵷鴻英聲震於九垓和氣浹於千里奉御廉使大夫忠誠許國文武兼資冠縉紳之才能受廟堂之眷倚偃戈臥鼓屬疆場之久空講武開尊適郡庭之無事某等當結髮而工騎射要唾手而取功名幸對華筵敢呈口號射圃閑亭酒半醺手柔弓燥氣超群已驚百步穿楊綵會看雙鵰落塞雲且集旌旗森畫戟未輸文字飲金樽治朝文武須兼用萬壽稱觴祝至尊太平無象樂年豐況值疆場久已空賓主獻酬成雅集江山談笑助清風良辰美景開金斝緩帶輕裘控角弓鼙鼓急摧齊指目大侯的處中飛鴻雨後園林花木新傳聞千騎出城闉異能未中侯中鵠佳氣先浮盞面春畫鼓繡靴筵奏曲紅粧細馬地無塵長沙萬古民爭說賓主人英伎絕倫聞道長沙賢太守漆瞳玉頰照衡湘訟庭散後賓朋集民瘼蘇來禮樂昌且展綺筵陪勝餞何須檀板鬧紅粧曉無探騎傳邊檄願獻君王萬壽觴細柳成陰花滿徑晚來鉦鼓導朱輪河東鸑鷟三英傑天上麒麟兩俊人閑裏笑談清似玉盃中賢聖韻如春引弓一箭驚穿札堵立懽聲快吏民繡衣天使志澄清五馬賢侯見典刑公退鉦聲聞射圃日高槐影覆閑庭共看酒螘浮瓊斝不廢花輪遶畫屏銀燭紅紗侵夜色醉歸明月淡疏星隴西家世到仍雲許國清忠蓋代聞有道風流賢太守無雙才氣舊將軍整弦使者情和易承附諸郎藝逸群便好畫圖收拾取要傳盛事滿湘濱如雲旌騎照湘江千里農桑楚大邦中鵠才高今有武射鵰伎巧古無雙錦袍雅稱黃金帶瓊液尤宜白玉霜笑挽雕弓如滿月萬人驚懾已心降無雙自昔擅家聲春色都還細柳營中的聊為萬人傑飛觥要使百壺傾三湘父老傳風化十郡兒童識姓名武緯文經俱不乏桑弧蓬矢見平生畫鼓曉晴三擊罷如雲兵騎整全威俄聞畫角胡笳斷忽覺華堂羽箭飛一百步中精力巧數重圍內見心機風流太守兼文武扶路爭看踏月歸代夏均甫宴人致語一首并序竊以帶分楚水流萬古之雲濤壁立峿臺上千尋之煙雨號稱雄文妙墨棲宿之地是亦詞人遷居感嘆之墟野迥天多塵清霧斂方群木落盡之景望四山之蒼然送萬里獨歸之鞍慶一尊之偶爾恭惟某人碩大而德貴魁礨而材高以忠義自結主知故姓名長簡睿想立於縉紳之上可謂萬人之英論於君臣之間亦曰千載之遇念故都之下吏寔恩館之陳人有一掬之歸心餘滿簪之華髮嗟孫寶曾為主簿賓朋宣獨至後堂受知不減古人報德尚慚今士敢陳末札少駐行旌玉人成匝座之花輪瓊液薦滿湘之春色相逢一笑不醉何歸九齡風度照峿臺寔寢香凝畫戟開歸國已傾天下耳駐軒宜舉故人盃青天白日心常在附驥攀鱗志未摧累足待公成相業更隨風馭看蓬萊

body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校七言律詩春日同祖賢二道人步雲歸亭忽憶東坡此日詩有懷其人次韻誰家楊柳欲遮門依約東坡醉處村捶地不堪華屋句仰天空記刻舟痕尚餘千載風流在乞與三人語笑溫歸路松風吹凍耳共追前事弔英魂與客論東坡作此東坡醉墨浩琳琅千首空餘萬丈光雪裏芭蕉失寒暑眼中騏驥略玄黃機輪妙轉風雷舌春色濃纏錦繡腸可惜騎魚天上去斷絃空壁暗淒涼京師上元觀駕二首及時膏雨已闌珊黃道新泥曉未乾白面郎敲金鐙過紅妝人揭繡簾看管絃叫月宣和氣燈火燒空奪暮寒咫尺鳳樓開雉扇玉皇仙仗紫雲端閣雨輕寒斂夕氛青牛畫轂已爭奔皇州浩蕩風光裏紫陌喧闐笑語溫冠壓花枝馳萬騎簾垂繡箔卷千門特傳詔語君恩重凝睇天階謝至尊次韻天覺進喜雪萬馬天街聽啓關曉光佳氣潑人寰春生殿閣玲瓏外秀發園林頃刻間為瑞歡聲浮動植爭妍詩句麗江山從教飛上朱藍袂點綴彤墀玉筍斑別天覺左丞童頰清光已渾圓共驚玉骨解藏年庵中篆縷長凝帳門外雲濤欲際天道眼從來無異見微蹤何幸預談禪新詩滿篋江南去又作叢林盛事傳李德茂家有磈石如匡山雙劍峰求詩胸次能藏大千界掌中笑看小重山飛來華嶽一峰失幻出匡廬雙劍間偶觸篆煙雲點綴戲澆硯滴瀑潺顏莫將道眼生分別隨意聊安几案間余昔居百丈元夕有詩後十年是夕過京師期子因不至北遊爛熳看并川重到皇州及上元燈火風光記前事管絃音節試新翻期人不至情如海穿市歸來月滿軒忽憶寒嵒曾獨宿雪窗殘夜一聲猿都下送僧歸閩汴水悠悠去不回緑波垂柳眼初開日邊無意事迎送海畔有山歸去來白卻人頭忙日月緇飄山衲亂風埃此行若到忘情處拂石猿聲後夜哀夜雨歇懷淵才邦基劇笑無因見秀眉勞生會合恨難期永懷京國舊遊處伏枕夢魂初破時戰葉蕭蕭山雨後繞床唧唧草蟲悲明年定復西歸去船尾何妨載我隨寄權巽中摩雲標格久去眼傳得詩詞錦段新雪玉在躬秋滿鬢風雷為舌語驚人留連南浦西山雨棄擲爐鋒繡谷春何日詩肩擁寒帔對床聽我説京塵書承天寺西齋壁半年客食毗陵寺頗厭塵埃污衲裙雖有一身猶外物且將萬事付浮雲忽思放浪佳山水要與頑麻散骨筋涼夜滿庭風露重竹梢微月欲紛紛靈隱送僧還南嶽海隅相識笑談餘清境同疑在玉壺方作靈山棲小嶺又隨苕水出東吳透鬚白雪驚衰老脫手青春入歎吁懸想他年衡嶽寺雨窗相對話西湖宿靈山示月上人地靈形勢自天成山色溪光潑眼明北岫飛來么鳳落東鄰相去一牛鴻霜筠繞寺秋無數璧月臨軒夜更清已約高人結蓮社他年香火寄餘生送僧歸石門曾學雲庵逸格禪別來江柳幾春煙相逢水寺初嘗橘忽憶風簷共擘蓮遙想到山寒食後卻思分首上元前與誰振策西湖路清曉一聲啼杜鵑至西湖招廓然遊春別後西湖長在夢相逢氣韻宛清真劇談要使君頤脫大笑從教坐客瞋淮海飄零方見友湖山秀絶更逢春快當火急追清景莫厭尋幽散策頻廓然得石門信歎其踵席非其人用韻酬之二首相對天涯歲月新石門消息遠難真乘間且覓幾場笑疾惡休生一念瞋襯鷺芙蕖方破暖藏鴉柳色又殘春光陰如此空搔首行誦知歸倦鳥頻頽綱安得見重新紅紫紛紛正亂真已矣無才吾自歎慨然有志子宜瞋間尋陳迹消磨日強作新詩挽絆春振策蘇隄朝復暮路人應笑往來頻廓然再和復答之六首獨立湖邊一笑新紛紛世事信非真竹林逢寺端須往藜杖敲門不怕瞋僮僕見人空自若軒窗幽處亦藏春老僧那識間來興怪我時時過此頻與君藉草湖邊坐聽我論懷句句真慵鬥睡魔強分怯懶酬詩債不須瞋亦知人壽一百歲已識老來三十春相見幾回開口笑憂愁風雨可勝頻湖水行歌鴨緑新吳音清軟十分真但知客子幽情快不管遊人醉眼瞋戈昔曾聞能倒日筆今猶喜解收春剩將詩句藏深篋歸去須知展玩頻處處山川俱勝絶滿村風物自純真橫舟隔岸殊堪喚吠犬隨人不識瞋歸鳥獨飛當晚照鳴鳩相應正深春心期卜築藏幽隱忽笑行行指劃頻湖山昔夢雖非實開睫今遊未必真久客情多空自厭故山歸晚欲誰瞋聊將愁裏十分興更賞湖邊一半春君儻肯來尤所願莫辜日日作詩頻繞舍初晴對意新出門幽鳥語如真催耕布穀殊堪聽勸客提壺卻莫瞋隴麥約風遠有浪海棠經雨忽添春可憐好景無人共回首斜陽太息頻明日欲往龍華瞻大士像廓然和前詩敘其事又用韻答之雙林大士不復見聞説龍華畫像真要向冰霜識風骨願求清冷洗貪瞋空庭再拜儼如在扣几重看喜勝春我亦鈍根期聽法質疑他日故應頻又和前韻二首頭白逢人宛似新自嗟世態不容真君才廓落宜無合我語剛強屢被瞋千里來尋非愛雪一時行樂謾遊春鄰居冷淡應相笑數夕溫然語話頻篇篇俊逸間清新老閲群才始見真秀卻採蓮溪畔態豪吞指壁柱邊瞋肺腸舊信能纏錦文字今知解鬥春筆力肯低容我和詩成無惜寄來頻偶讀和靖集戲書小詩卷尾云長愛東坡眼不枯解將西子比西湖先生詩妙真如畫為作春寒出浴圖廓然見詩大怒前詩規我又和二首居士多情工比類先生詩妙解傳真只知信口從頭詠那料高人作意瞋雲墮鬢垂初破睡山低眉促欲嬌春何須夢境生分別笑我忘懷歎愛頻輕狂舉世誰非偽遲鈍知余卻甚真未把僻懷投俗好且將狂語博君瞋已嗟心折垂垂老忍看花飛片片春滿眼間愁圖不得江南無奈到心頻錢濟明作軒於古井旁名冰華賦此刮地陰風翦玉麈那知此井解藏春折膠墮指嗟時事秀骨溫顏似主人碧甃湛明堪數髮小軒深靜可收身超然高趣真難及浪士愚溪一笑新鍾山悟真庵西竹林間蒼崖千尺歲久折裂余與敦素行山中至此未嘗不徘徊庵僧為開軒向之盡收其形勝名曰兩翁作此水邊修竹才堪數竹外蒼崖已半頽我輩自追方外樂軒窗誰為此間開待邀山月三人共要聽松風萬壑哀坐久篆畦香繞遍碧消煙縷雪殘灰次韻敦素兩翁軒見寄識暗長嗟未燭微坐令歸夢繞嵒扉忽驚塵土登鬚鬢已覺雲山負衲衣孤坐知君扶瘦策此詩慰我脫危機天藏鍾阜一區勝乞與君儕為發揮大風夕懷道夫敦素病覺春寒花信重起來散策夕陽中方收一霎挂龍雨忽作千林攧鷂風淮水粘天雪翻浪吳山吐月鏡緣空二豪詩眼應驚駭覓句遙知與我同宿鹿苑書松上人房二首數峰煙翠疊黃昏忽見松間窈窕門好境未將佳句寫幽懷先與故人論隔林每恨音容阻此夕相逢笑語溫雪意不成應有月夜深同看湧金盆冷齋託宿自攜衾臥聽松風度栗林黃卷青燈紙窗下白灰紅火地爐深夢回清響春嵒溜夜久幽香噴水沈慣作橫刀眠下板為君令有住庵心李師尹以端硯見遺作此謝之歙珍先數刷絲紋那料端溪更逸群已作退間今似我溫然自重尚如君豈宜禪室埋聲價合在文場著策勳忍垢風櫺應有夢夢隨筆陳掃煙雲次韻王節推安道見過雲蓋二首湘山名與故山齊寺在沙村斷岸西繫馬槐根秋雨歇倚欄雲際莫猿啼公宜談笑光臺閣我合摧頽老澗溪袖有新詩如瀉出逼人駿氣不容羈睡起春衫取次披髻雲隨從倚欄時生憎柳底鶯聲巧不分花前日影移伊昔笑來憂易老而今思去恨難追林梢懸挂團團日無語東風玉箸垂宿石霜山前莊夢拜普賢像明日到院見壁間畫如所夢有作十幅蛾眉紫翠寒何人逸想發毫端忽驚瑞色雲間相曾向清宵夢裏看影像不真心自寂悟迷無隔指空彈了然一念非新故我與群生入正觀贈湧上人乃仁老子也照人風骨玉頎然來慰衰途亦自賢肝膽秋光磨洞徹齒牙嶽色嚼芳鮮應傳畫裏風煙句更學詩中文字禪已作一燈長到曉定能百衲不知年道林喜見故人十年一別今重見風度依然照映人韻勝折松秋露骨氣和寒谷夜生春三都君已傳名譽萬事吾今付欠申夢境樓鐘同此聽獨尋陳迹記前身送日上人歸石門三界無家誰適從大千俱集笑談中江南湖外夢到曉宴坐經行月運空狐死懷生正丘首鳥棲知暖擇南風石門今日名天下想見沿崖一徑通靈隱山次超然韻時超然歸南嶽住庵勸之君亦工詩苦入神冥搜物象故應貧客兒亭下才相見巾子峰前便卜鄰夢裏筆期生蕊萼胸中鏡懶拂埃塵何當鈯斧住山去要看青原一角麟湘山獨宿聞雨殷床鐘靜自垂簾庭樹無聲欲雪天山寺淒涼容我宿地爐深暖枕肱眠銅瓶秋蚓為誰泣蠟燭春花亦自妍夜半夢回聞驟雨十年蹤迹一茫然讀三國志無計酬勞夏簟涼遺編枕上閲興亡氣增髯竟從玄德笑裏瞞徒造子將漢鼎未移存北海蜀兵已挫失南陽莫將勝敗論人物忠義千年有耿光妙高老人臥病遣侍者以墨梅相迓高絲才歇轉輕雷無數晴峰笑靨開大士已聞方臥疾小空端遣出山來寶方世路知無隔俗駕山靈故勒回多謝高情餞春色十分渾在一枝梅別李公弱殘紅換得緑陰成隨分間愁取次生須信百年終有別未能一日便無情何時嶽色君同看後夜湘晴我獨行好在西園行樂處為誰依舊月華清贈關西溫上人鐵面關西氣逸群平生蹤迹付浮雲瓜州渡口曾同泛石廩峰前又見君荔子招呼閩嶺外白粳留滯汝江濆拄藤更入西川去要讀豐碑未見文將登南嶽絶頂而志上人以小團鬥夸見遺作詩謝之壑源獨步寶帶夸官焙無雙小月團未作濃甘生齒頰先飛微白上眉端湯聲蜂稚秋窗晚乳面蛾兒春甕寒飲罷為君登絶頂俯臨落日看桃丸題草衣嵒鉏頭當枕草為氈曾與高人説任緣豈料大嫌沽世價未應虛費買山錢間編木葉輕於紙細葺蘆花軟勝綿石室至今增壯觀可知千載得人傳與僧遊石頭庵我攜骨面潛溪子來訪西山鈯斧庵夢蝶人驚猶栩栩藏鴉柳暗已毿毿峰連小閣宜春望水繞重城隔夜談欲喚扁舟尋熟路與君支策上千嵒題還軒老去情枯道自肥大刀破鏡露全機山邊湖水無行路枝上春禽亦倦飛半夜舟移空壑在故鄉家是昔人非炷香閲遍楞嚴義坐看煙消一縷微送曉上人歸西湖白閣所居我憶錢塘雪鬢新三年東望肺生塵那知南浦清湘岸忽見西湖白閣人熟視音姿疑夢寐便驚風物有精神翛然又入千峰去惆悵孤雲野鶴身法輪齊禪師開軒於薝蔔叢名曰薝蔔二首人世百年蝴蝶夢紛紛栩栩逐春繁觀根戲掃旃檀座隨意為開薝蔔園君每據梧深有味我來欲問自忘言叢林何必猶迷照香在枝頭不在軒響石岣嶁峰下寺小軒開處近山房苾芻來問宗風事薝蔔為熏知見香聊復淡然成獨坐從教此語遍諸方鈍根不識金輪轉摘葉尋枝謾嗅芳南嶽法輪寺與西林比居長老齊公築堂於丈室之西名曰雪堂作此寄之法道陵夷賴典刑此堂真有救時心坐令衡嶽為嵩嶽便覺西林近少林面壁高風知獨振薝花細雨為誰深故應弟子分皮髓未愧駒兒善古今送覺先大師覺先參佛照圓通二老浮玉道人雷電舌法雲老師冰雪顏後來事聽諸方外先數君遊二老間只把黑甜酬世味從教螺鬢有詩斑乘秋曳杖歸何處萬疊匡廬是故山宿慈雲門前便是小曹溪只欠孤猿嶺上啼水磨自鳴當濬澮漁舟間泊近沙隄經遊況是間心遠富覽誰能與物齊一宿少留終未足會須移錫向高棲和答素首座勘破諸方剩得間歸來嶽寺掩深關我行淺麓驚回地君在翔鸞杳靄間契闊獨期當再見峻嚴爭説不容攀勿矜出岫無心久弱羽衝風亦欲還道林送鴻禪者江陵乞食一篙湘水碧如螺瑩淨無痕不受磨曉霧有情呵素鏡東風作惡卷纖羅老來談笑追隨少歲晚別離頭緒多浦口送君聊倚杖會看歸棹掠晴波還太首座詩卷料理詩情難復難縈心結思傾毫端奪回天地英秀氣坐令落紙生風寒老猿夜月叫蒼壁孤鶴曉霜疏羽翰精神清韻知幾許付與後來能者看送秦少逸秦郎毛骨玉壺秋望見令人忘百憂便覺宗之未瀟灑肯容如晦獨風流來為南嶽翛然別去作東華爛熳遊想見醉圍紅粉處雪箋佳句挽銀鉤送僧歸筠西津渡口唐朝寺到眼瀟湘厭飫看誰遣松聲環坐榻更令嶽色墮欄干君如鳥倦今知返我與鷗盟久已寒想見若耶溪上路正嘗蘆橘帶甘酸宿臨川禪居寺書方丈壁雨過沙村繫客船行間樓殿帶晴煙夜深霜月涼於水門外雲濤遠際天禾稻豐登如棄土菱蓮甘美不論錢好峰不住猶行役忽憶鍾山掬澗泉朱世英守臨川新開軒而軒有槐高數尺因名之作此聖朝賢佐蔚如林天獨於君著意深喜氣欲傳黃閣信夏窗先露緑槐陰望雲忽起懷親念隱几難忘濟世心他日此軒成故事壁間應載野僧吟世英梅軒平生忠孝兩難忘乞得鄰州近故鄉清白夜晴千里月肅嚴秋回一天霜數行經徹臨清曉半印香消倚夕陽記取東軒談笑處庭梅他日似甘棠送琳上人并序孔子之門弟子三千人咸曰孔子自生民以來未有獨宋司馬桓魋害之欲殺者數矣未濟其欲猶至於伐樹削迹自是觀之則能賢者固難而知賢者亦未易得者琳能口山谷又畜其像別余訪了翁豈可多得哉作此送之然琳曰明年當過谷山遊南嶽諸剎也髯琳身小膽崔嵬嚴冷中藏熱肺懷京洛歸來嘗自説湘山遊遍與誰偕解將骨董藏涪叟又負籚篅訪了齋更説開春南嶽去要尋浯水看磨崖次韻信民教授謝無逸遊南湖春遊每覺客愁消最愛晴湖漲柳橋鴨緑皺寒初拍岸鵝黃照影自垂條惱人風物今如許著意春光已不撩但得與君同一醉何辭日日作詩招思禹兄生日文章瑞世本奇豪風鑒霜天夜月高且袖玉堂批誥手戲來山邑試牛刀意長千里奔赬尾恩重三山壓巨鼇滿薦壽觴何所祝祝公親見折蟠桃崇仁縣與思禹間遊小寺啜茶聞棋平生閲世等虛舟臨汝重來又少留攜弟來逃三伏暑入門拾得一軒秋隔牆晝永聞棋響陰屋涼生見樹幽又值能詩王主簿飯餘春露啜深甌余居臨汝與思禹和酬甌字韻數首後寓居湘山思禹復和見寄又答之涔蹄小邑著吞舟未起風雷更少留饌客酒酣腮玉纈侍兒歌送眼波秋詩成槲葉江村處想見楊花院落幽綺席憶曾蒙設醴預聞談笑把空甌次韻蔡儒效見寄獨宿圓廬意自清夜涼林木寂無聲鏡中白髮今慵剃夢裏浮華已懶爭故國別來空好境舊遊誰共讀題名遙知他日重相見握手應驚太瘦生金陵初入制院依然收付建康獄拴索瓏璁驚市人寄語小兒休嬲相未妨大士戲分身懶於夢境分能所枉把情緣比客塵笑視死生無可棟目前刀鋸若為神寄超然弟深掩圜扉夜向闌夢驚清境慰辛酸臥聞瓦壟集微霰起覺衾綢壓薄寒憂患飽經心老大雲泉歸晚鬢凋殘書空偶爾成詩句寄與西林阿永看初至海南呈張子修安撫南來稍復召驚魂知有留候異代孫未即解衣甘九死試令騎馬賦千言瓊山有月光相射玉海無風浪自翻戲下應傳獲羅什禿頭爭看戴華軒抵瓊夜為颶風吹去所居屋貪看長鯨吸舟楫忽驚嬌蜃吐樓臺朦朧醉憶王城別汗漫遊從海國來夜半颶風攜屋去朝來瘴霧放天回會須橫笛騎雲背笑響從教落九垓出朱崖驛與子修投老南來雪滿顛羈囚不自意生全久為白骨今重肉已臥黃泉復見天報德定應追結草效忠那肯愧飧氈此詩清絶如冰雪乞與江山洗瘴煙別子修二首疆場探騎斷奔埃院落棠陰暗緣苔上疏乞間追鮑靘載書歸老繼吳恢爭懷父母三年化愁見風帆十幅開勿剪青青隄下柳念公遺愛手親栽漂泊孤蹤一轉蓬語音雖在變形容瘴鄉猿鳥今為伍蟻穴王候昔夢封海闊盲龜登木孔山高纖芥落針鋒公歸不得參行馭心折淮南紫翠重蔡州道中北來行盡關山道梁宋郊墟眼力微飲食甘酸雜淮甸語音清軟近京畿黃塵又向九天去稿項新從萬里歸投老不堪行役苦手遮西日想嵒扉余號甘露滅所至問者甚多作此老儼化身甘露滅不妨須髮著伽梨虛舟閲世鴟夷子慧帚掃除王伯齊香火共修心老大樓鐘重聽意淒迷餘生未覺全無纍折腳鐺猶手自提海上初還至南嶽寄方廣首座天風吹笑落人間白髮新從死地還往事暗驚如昨夢此生重復見名山倦禪想見堆危坐知法應拋放縱間初嚼芳鮮動詩思一篇先寄倩君刪陳生攜文見過海外歸來兩鬢秋自嗟無地可逃羞攜笻肯過驚時聽炊黍能為信宿留睡觸屏風譏富貴笑分臠社致公侯遺編家世丹青著鐵硯磨穿未肯休至筠二首乞漿問路到筠溪天氣清和得所宜父老相逢班草坐風光初過採茶時摩挲禪榻營春睡想像齋廚辦晚炊白首不知舟壑走壁間來讀舊題詩偶喚歸舟隔亂溪春山偏與晚相宜自尋熟路懸崖去正是新秧剌水時身健已如秋社燕夢回猶看客亭炊雨窗燈火清相對畫出淵明五字詩示超然秋光滿鬢萬事死慚愧眼明牙齒牢野寺間眠聽風雨海山猶夢渡雲濤事非白傅方驚鼎迹隱庖丁已善刀一徑莓苔三十載未容此老獨奇豪九日去歲重陽瘴海濱病拈霜藥嗅清晨身間已斷思歸夢山好仍逢稱意人卯飯露葵欣旋摘夜窗風栗共嘗新妙年衲子應相笑癡鈍耽源老應真二十日偶書二首春林院落曲欄東小立初迎到面風冰齒寒生花坼信濕梅煙重雨毛空病衰老去登臨倦節物年時氣味同卻掩爐煙閉深閣忽驚西日借窗紅此生早衰坐世故末路易歸驚嶮艱臨事無疑知道力讀書有味覺身間解醫憂患臂三折難隱文章豹一斑永愧峘山赤頭璨不令姓氏落人間陳瑩中左司自丹丘欲家豫章至湓浦而止余自九峰往見之二首鴈蕩天台看得足卻搬兒女寄蓬窗徑來漳水謀三頃偶愛廬山家九江名節逼真如醉白生涯領略類湘龐向來萬事都休理且聽樓鐘噎夜撞與公靈鷲曾聽法遊戲人間知幾生夏口甕中藏畫像孤山月下認歌聲翳消已覺花無蒂礦盡今知珠自明遠壑夕陽殘雨後一番飛絮滿江城次韻李端叔見寄一官遊戲且同塵夢寐江湖亦可人軒冕久知身是寄魚蝦才説口生津解嘲鏡裏蕭疏髮時吐毫端浩蕩春自古浯溪好風月買山終欲與君鄰赴大原獄別上藍禪師平昔巾盂共空璧只今樓觀礙層霄道心針水妙應在俗眼雲泥謾覺遙道路為家身是寄死生如夢意全消明年五頂東遊遍來聽吳音發海潮太原還見明於洪水上藍問明別後嘗寓則曰十年客雲居感歎其高遁作此清軟吳音笑展眉芳鮮猶在雪霜姿十年不下歐峰頂一旦肯來漳水湄湘巘春深重記處風甌雨歇對聞時紅塵未可因藏迹要卜雲泉結後期溫上人自廬山見過雀羅門巷榻凝塵千里相尋駭四鄰好事真誠虹貫日照人清氣水含春忽驚我禍今無比高笑君癡亦絶倫此別遙知想標格淺雲東崦對冰輪荷塘暑雨過涼甚宜之見訪作此居近池塘春意在路穿空翠夕陽多隔林放鹿哀怨語掠水幽禽撲摝過得雨村囂覺風味分秧天氣愛清和莫辭坐穩相尋數酣戰難回指日戈重會言上人乞詩海外歸來五見春梨衣兩識帝京塵此生已覺渾無纍為纍空驚尚有身厚善最憐山解事歲寒更愛月情親鷲峰峰下重相見雪作飛花一笑新誠心二上人見過破夏來尋甘露滅快人如對水晶輪煙雲掃盡詞傳意知見不生情透塵旋縛茅茨吞遠壑偶臨簷隙見歸人露芽便覺如浮雪品坐同分一盞春秋夕示超然殿閣知誰燒夜香矮窗燈火試新涼草蟲對語僧臨砌露葉翻光月轉廊補綴高風三襪已破除午夢一匡床與君遊遍人間世折腳鐺中味最長鞦韆畫架雙裁翠絡偏佳人春戲小樓前飄揚血色裙拖地斷送玉容人上天花板潤霑紅杏雨彩繩斜挂緑楊煙下來間處從容立疑是蟾宮謫降仙

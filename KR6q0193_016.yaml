body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校七言絶句春詞五首映門楊柳未全遮才有柔條自在斜不信春寒猶有雪誤驚飄舞作飛花春到梅梢雪未知橫斜初見過墻枝暗香愁絶無人問一再風前月上時昨夜江村雨一犁白沙江路曉無泥戲波拍拍鳧雛暖掠岸翩翩燕子低曉霽晴湖已拍橋橋邊春色解相撩分疏積雨饒鶯舌拘束東風倩柳條郊原雨歇看春耕繭栗能駝稚子行青杏欲嘗先齒軟海棠開遍恰新晴春日作山前山後花半紅橋頭橋尾柳搖空流鶯枝上未成語始囀一聲來去風殘梅殘香和雪隔簾櫳只待江頭一笛風今夜回廊無限意小庭疏影月朦朦次韻通明更晚春二十七首琴築春流漲淺灘圓吭幽鳥語林端纖蒲水荇空淒寂背立東風整釣竿緑遍西園春正殘青梅小摘嗅仍看單衣初試殊清爽更愛涼風掠面寒花落片片怨春陰霧雨那堪更作霖小院晚春猶惜掃欲穿準擬倩金針散衣行處雨初涼庭院誰家柳暗墻倚杖南軒看修竹快人解籜玉蒼蒼居近幽林復碧江水光林翠到西窗鷓鴣啼竹聲相應鸂鶒眠沙只一雙落英寂寂草離離天氣清和得所宜頭面惺惚快清曉可人惟有海棠枝枝上啼禽毛羽光商量密葉恰能藏路旁垂柳陰堪歇墻外櫻桃小可嘗題詩徑欲晚春還噪吻吟窗禿筆端寂寞卻憐當檻竹嫩黃新嫋出林竿晝永呼童挂北軒青山無數臥披看獨憐杜宇啼聲晚催發芭蕉戰莫寒桃李無言暗淺深曉雲慚愧不成霖化工勝卻耶溪女繡遍園林不犯針去歲春遊愛野棠今年還復出東墻行思往事心猶在卻照清溪鬢已蒼睡魔晝永不能降一夢春晴賞北窗只有敲門漫溪叟也嫌疏懶世無雙山桃噴火柳垂絲野店溪橋處處宜我作春遊亦清散榆錢聊挂瘦藤枝困人天氣渴思漿喜有人家密竹藏稚子不知僧不飲壓糟醇釅勸人嘗春心百種竟衰殘幽事侵尋尚數端清晚間題記新竹粉衣香滑一竿竿清晨花下露團團飛鳥行吟仰面看傑句天資人不及勿嗔島瘦與郊寒壓枝萬朵濃如繡初歇連綿十日霖穿蕊蝶鬚輕似線刺香蜂尾快如針倦行放步臥垂楊誰打鞦韆笑隔墻風物惱人情不淺歸來山色更青蒼夜涼靜話欣同榻春晚分題喜共窗解笑疏狂才莫敵詩禪美譽舊傳雙紅梅真是醉吳姬浴罷偎風事事宜吟次紛紛落紅雨小禽飛去動危枝從遊法侶意何長況更深雲僻處藏共喜春山有新事小窗晴試露芽嘗南來還復見春殘歷亂愁人恰萬端賈誼少年能肆筆太公垂白始投竿楊花滿院掩深關半摺文書偃臥看幽鳥等間回睡眼暖風時復破春寒春寒瘦骨病難禁多謝新晴霽晚霖自補衲衣矮窗下黃鸝聲好屢停針劇笑自知躋奧室好詩安敢望門墻饒君麗句春難敵輸我朱顏鬢未蒼深院無人得散衣海棠經雨更相宜若為化作翩翩蝶繞此扶疏竹外枝清絶新詩寫硬黃著籤端為密收藏自驚短拙知何限愛子高才見未嘗海棠酒入香腮笑未知小粧初罷醉兒癡一枝柳外墻頭見勝卻千叢著雨時和余慶長老春十首野梅官柳不勝春妒面愁眉各鬥新欲作清詩成瘦坐生憎白雨解催人葉欲藏禽花沒腰春愁疊疊覺難消碧雲新月誰梳鬢翠浪柔風自織綃鳧鷗水暖聚圓沙帶雨春湖脈脈斜翠線受風遮徑柳燕脂含雨隔籬花葉雲誰剪芘花身花底何人笑語頻應是流鶯訴心事窺墻欲見恨無因一盞露芽袪睡思半簾疏雨作愁媒似聞池館花如海杖策當為得得來嫩寒清曉欲留春睡足山中樂事新珠玉等間無脛至風流全付茂陵人柳如西子舞時腰飛絮初狂雪未消多謝余郎造化手解拈春色寫蛟銷雨過清流走白沙隔籬紅杏一枝斜可堪風日濃於酒更愛君詩麗似花舊遊新事兩關身花下清晨吉𠸻頻野步尋梅曾共樂夜詩聯鼎願相因人笑才高真禍本自驚詩好是窮媒貪看百尺遊絲轉忽見雙飛乳燕來遊西湖北山二首幽草青青繞竹扉雨餘人在杏園西無端黃鳥驚春夢正向緑蘿深處啼春園南北筍過墻墻下離離草更香啼鳥野花無問處蒼山牢落下殘陽次韻超然春日湘上二首暮年身世極南邊病眼愁看北客船憶著金明池上路寶津晴瓦隔霏煙年少無愁事業新小詩寫得楚江春已知字字愈頭痛可是駸駸解逼人春晚二首方見柳條堪結紐忽驚梅葉解藏禽春歸掣肘徑不住院落殘紅一寸深間愁一寸在垂楊遊絲百尺拖清曉榆錢滿地贖春歸山茶昨夜都開了長春花人間花亦有仙骨卯酉發妝呼不醒醉裏那知更歲月韻高班草臥空庭上巳桃花落盡柳陰成寒食風光小雨晴半掩寶書憑几坐滿庭芳草為誰生題黃山壁夜雨曉晴春盎盎緑愁紅醉思迢迢獨存滋味無人會笑看柔風拂柳條初夏四首嘒嘒新蟬緑葉遮一聲臨晚到山家未應春色全歸去猶有芳叢刺史花野水稻苗青拂岸柘岡麥穗熟分岐前村父老胥歡甚笑指橋邊露酒旗院落寥寥日正長小梅初熟亞枝黃午窗書引昏昏思角簟宜開舊竹床流鶯聲老緑楊中欄檻蕭疏墮晚紅二十四番花信重園林又覺轉熏風南軒南軒日靜小簾開百舌無端喚夢回莫為楊花不相識隨風還解過墻來次韻方夏日五首時渠在禹溪余乃居福嚴殘書半摺立風簷欲步還慵睡未忺忽憶故人談笑處擘蓮嘗芡禦炎炎聲華籍甚浙東西胸次玲瓏絶坎蹊那料南來遭白眼強顏腰作偃松低山縣蕭條早放衙塘蓮無主自開花三叉路口炊煙起白瓦青旗一兩家水閣風微快葛衣沙村返照淡餘暉數聲楚些無情思不似吳中緩緩歸我憶西湖山水清君詩説盡欲歸情何時京口同煙艇柔櫓咿啞短作程嘗蘆橘皮似柿椑髮易剝核如龍眼味芳鮮滿盤的礫如金彈叢手分嘗憶去年新竹琅玕數本倚墻陰新筍均條忽作林昨夜小軒添得境卻煩佳月醉篩金秋晚三首梨杖晚經桑柘塢園林秋盡露人家破籬犬吠柴門掩寒犢自歸山日斜碧雲紅樹晚相間佇立不堪遊子情劃破秋空一行雁斷腸南去兩三聲紫梨紅棗八九樹竹屋柴門三四家機杼聲遲秋日晚繞籬寒菊自開花雪中山茶緑羅架上破紅裙占得春多獨有君那料曉來猶帶雪素衣丹頂鶴成群謝妙高惠墨梅霧雨黃昏眼力衰隔煙初見犯寒枝徑煩南嶽道人手畫出西湖處士詩妙高梅花戲折寒梅畫裏傳便知香爨攬佳眠愛吾花木逡巡有乾笑春風入暮年琛上人所蓄妙高墨戲三首并序淮上琛上人袖妙高老墨戲三本來閲此不自知身在逆旅也妙高得意懶筆而琛公能蓄之琛之好尚蓋度越吾輩數十等也為作三首結林間無塵之緣年年長恨春歸速脫手背人收拾難那料高人筆端妙一枝留得霧中看修葉鬧花增秀色為誰幽徑撒秋香還如此老行藏處不為無人亦自芳一幅湘山千里色碧天如水蓋秋寬磨錢作鏡時一照乞與禪齋坐臥看次韻翁教授見寄仙郎落筆敏驚鴻文字追回兩漢風脫腕舊聞供十吏探懷行看取三公夢中作無賴春風試怒號共乘一葉傲驚濤不知兩岸人皆愕但覺中流笑語高紀夢玉纖金釧隔窗紗醉整殘籹滿鏡花撼地跳珠千丈白骨飛寧復用毛車過小院僧窗有假山絶妙作廬山勢書此廬阜歸心久未降夢魂時復渡湓江忽驚古寺秋庭上翠蹙煙巒對矮窗次韻五首成破須臾知世相雨雲翻覆見交情何時一葉春湖闊塞管橫風夜月清正爾思山想歸路偶行看雪立階除忽驚晝永軒窗迥推抵清寒擁燎罏懷中但自除衣垢面上從教有唾痕負日風簷成坐睡夢隨鷗鷺落江村莓苔遍地榆錢滿院落無人柳絮飛信手翻書香篆冷夕光山翠上窗扉措置已落古人後猛省令人愧衲裙廬山好處軒窗在留眼歸看五老雲次韻巽中見寄四首君才俊卻海東青鼻笑生華筆有靈寄我小詩足風味展開如對鏡中形臥念高人最起豫時時想見秀眉疏石門自古無佳句寄語雲山莫放渠停蓄幽懷萬頃波一傾要及少年時正當清嘯尋君去已辦登山緑玉枝別後夢歸關不住得歸車已走先鋒催詩疥子撈春甕有味難言卻皺容謝人惠蘆雁圖道林煙雨久不到忽見橘州蘆雁行笑裏筆端三昧力坐中移我過瀟湘湓江宿舟中琵琶亭下孤舟宿夜靜風清水四圍胡蝶夢中江月白蘆花鳴笛釣船歸過蕪湖晚望盡日舟中情思疲晚來何處最幽奇沙鷗數隻妝江面雲帶兩條山畫眉東流阻風秋葉叢邊風索索迎賓亭下水瀰瀰蓼花深處老漁父更把床頭羌笛吹次韻孫先輩見寄二首從來佳句出寒餓太白飄零子美窮箸下萬錢如有意作詩遣興不須工長欲探懷取卿相對人信口比伊周安知投老空拳在句法不醫雙鬢秋過湘江題慈雲寺壁慈雲寺在古城隈月閣風軒照水開獨倚欄干秋雨後青山相逐渡江來再遊讀舊題渡頭路入白雲隈斷岸柴門窈窕開忽憶去年曾過此拂塵間看舊題來晚歸福嚴寺淺抹濃堆翠卻煙老松無數更蒼然石梯又入千峰去時見樓臺夕照邊次韻亭上人長沙雪中懷古二首楚國樓臺凌九霄軟風行復弄柔條當年絃管今何處飛雪滿空如舞腰數峰江上曉不見指點先煩楖栗條卻望蒼崖尋折幹偃松梢重壓龍腰書白水寺壁寒巖花木鬥迎春古寺修筠戰雨聲負日晴軒成坐睡朦朧何處鷓鴣鳴過長馬市長馬人家古道旁秋來禾黍已登場池塘水落菱蒲冷籬落霜晴橘柚黃書湛然亭家在匡廬疊翠層雲開倣佛見微稜褰衣欲上千巖去隔岸扁舟喚不應次韻張敏叔畫桃梅二首要看紅雨滴殘春作陳驚飛亂蝶群好在一枝長不死謾煩詩筆掃煙雲玉骨冰姿過眼空卻煩摹刻倩詩工暗香錯莫知誰寫多謝黃昏一陳風送覺先歸大梁二首殘秋千里遊梁去破浪扁舟別我來對坐無言看山月一庭松雨在莓苔間人忙事莫參差各夢同床暗發嗟相值一歡難把玩摩頭輸子看京華題賁遠書房軒上仙郎面如玉檻前修竹翠於蔥壁開他日春眠足應對同僚話故叢李商老自山北道中作詩見寄次韻蹇驢醉頰兀紅酣眼艷秋波望翠嵐長向詩中見風度愛君筆力似黔南初至崖州喫荔枝口腹平生厭事治上林珍果亦嘗之天公見我流涎甚遣向崖州喫荔枝至海昏三首前身定是赤頭璨風帽自欹麻苧衣久客瓊崖看詩律袖中藏得海山歸我老又窮交舊絶姓名面目畏知聞飧痂是病竟不悟褁飯相從獨有君天公無計奈此老時復致之拴索間寄語故人休念我幸因王事得遊山次韻壁間蔣侯詩軒前叢玉是誰種笑裏風姿件件宜耐久節高真不屈此情惟有雪霜知遊石臺寺歲晏身心無一事江山信美又吾鄉去年今日黃河北夜趁明馳上太行永固登小閣老僧乞食城郭去小閣無人獨自登急雨忽來添瞑色諸峰領略露寒層會性之山中二首秋來林下偶相尋松雨風泉一徑深小立聽君臨水語十分知我住山心江山千里笑談中暖熱寒泉出伏龍卻看秋容能拂掠夕陽無語斂眉峰守道太尉醉鄉歡伯平生數往還箇中城郭未嘗關暮歸健倒三四五憑仗酪奴扶玉山世明九客同登滕王閣索詩口占西山出雲青未了九客憑欄一笑時秋天便是一張紙寫取江南覺範詩贈胡子顯八首小縣風光秀句傳太平無象宰君賢雖非社日長聞鼓不是炊時亦有煙作官要自有家法童稚熏蒸飽見聞堆案文書談笑了先將勤政報君恩去年苛政如狼虎盜賊縱橫民散居那料春來見天日抱孫門巷買犁鉏社飲扶攜春日和柘岡麥壟竟相過不因舊歲追胥苦安得春來喜氣多無數花紅霞委地幾重雲碧幕攤空遙知客退西園裏盡落登臨語笑中庭訟凋殘道氣增早衙清罄夜香燈吏人莫作官人看我是南州有髮僧弄晴雨過秧針出花信風來麥浪寒想見豐登民訟少長官行摺道書看煙鬟散亂猶梳月谷口含胡欲吐雲山寺閉門春睡足可憐憑檻不同君何忠孺出芝草三本皆黃色指其小者曰昔登第時産此今重華為作此家山又産靈芝瑞天獨於君著意深層秀已呈重蓋兆色黃更類笏頭金古鼎器分三足真神物具體而微有旨哉我識地靈先獻瑞知公才業足鹽梅舟行書所見剩水殘山慘淡間白鷗無事小舟間箇中著我添圖畫便似華亭落照灣東坡羹分外濃甘黃竹筍自然微苦紫藤心東坡鐺內相容攝乞與饞禪掉舌尋宿芙蓉峰書方丈壁三首二十六猿臂上夜晴引手酌星河忽驚此地羊腸險世路羊腸嶮更多赤髭病客煙瘴面漆瞳道人冰雪容俯檻夜殘看落月不知腳下有千峰人間熱惱不到處一室篝燈到曉明枕臂聊為吉祥臥雪猿聲與夢俱清過寶應訪達川不遇書其壁屋老僧殘湘水濱叢林氣象傲比鄰莫嫌川客貧徹骨滿院青春不借人次韻曾侯分春亭杖梨庭下花如海紅浪顛風急雨時分得春歸無著處都將裁刻入新詩次韻晚起春眠失曉殊可喜紅日曈曨聞喚起平生嚼蠟觀世間一覺夢鄉如此矣次韻春風吹鬢風俱小雨來殘紅掃盡露蒼苔稻畦緑錦無邊幅更欲煩君為剪裁次韻題葆光庵一庵萬事不挂眼孤坐枵然龜六藏漆園摸索太饒舌強為立名為葆光次韻棋堂畫戟叢中小寢驚日長間試道衣輕含風廣廈過微雨賓從時聞下子聲次韻西樓萬古湘江繞故城水光夕照動簷楹行人仰看春風軟吹落憑欄笑語聲三月登湘陰景醇湖山堂時江漲而雨未止煙雨溟濛暗小窗湖山堂下水連江已欣一葉浮千頃更愛飛來白鳥雙又登鄧氏平遠樓縱望見小廬山作倚欄天際數歸帆春在滄州數筆間我與小樓俱是畫雨中猶復見廬山意行入古寺見鄧生之富以谷量牛馬寺舊藉余賦詩清明雨過快晴天古寺尋春亦偶然濃笑春風窮似我也將柳絮當榆錢南嶽會禪師往京口省枯木老禪過余湘上夜語及前詩三絶要謁夢蝶老居士不覺有懷其人若逢夢蝶庵中老為道歸期壓舊年肯施獨龍岡畔地大勝小嶺買山錢會師胡盧而笑曰獨無語以餞我乎因賦此倦臥耆闍峰頂雲呼船間立楚江濆愛師任運如湘月影入千江體不分贈覺成上人雲泉措置萬事外鬚髮凋零伸欠中想見龍城山下路一川秋色稻花風送向禪者省親約三月時復來小雨初晴上元過湘江水生圖畫開江南今日且歸去杜宇啼時還復來次韻惠梅禪師見寄秋日四首客情容易到雙眉乾沒晴湘夜月暉風露滿庭人未寢飛螢故入小簾幃長廊廣殿午風清禪倦何妨曳履行歡喜間中有奇事鑷髭空對紙窗明兌高山水目清暉雨勒孤雲放縱飛多謝炎涼摧溽暑更闌靜極忽僧歸飽霜毛穎泛松煤窗底魚箋自在開琢得小詩清似玉步笻時繞紫莓苔補東坡遺真薑唐佐秀才飲書其扇此生身世兩茫茫醉裏因君到故鄉滄海何曾斷池脈白袍從此破天荒次韻蕭子植承務四首別後時時想見之朅來吐語便能奇夕陽寒帶殊山雨寫出蕭郎醉裏詩萬鍾我欲解帶食雙璧從來賜立談君視新豐獨杯客不因州縣著來簪錦堂聞有傳夫子馬鬣倉官臥夕煙未展玉堂揮翰手卻來從我弄雲泉秀句端如我晚煙白髭畫出石門禪未論翰墨驚流輩只識蕭郎亦自賢英上人手録冷齋為示戲書其尾五鼎八珍非我事曲眉清倡乞人爭一帙冷齋夜深話青燈相對聽秋聲入九峰道中插身在俗熱惱處留眼看山寒翠中修徑掃除知有寺忽驚窗戶濕青紅讀和靖西湖詩戲書卷尾長愛東坡眼不枯解將西子比西湖先生詩妙真如畫為作春寒出浴圖與超然至谷山尋崇禪師遺蹤行盡湘西十里松到門卻立數諸峰崇公事迹無尋處庭下春泥見虎蹤崇山堂五詠為通判大樂張侯賦靜隱堂扶策經行此堂上萬峰翔集漢江津山林未放公深隱只恐功名逼逐人信美亭小停與客登臨處間暇江山又故丘最愛名花每含笑更憐幽草解忘憂致爽亭亭中偶坐悠然見不學王郎拄笏看多謝秋山每傾倒潑雲秀色墮欄干妙觀庵間來禪室倚蒲團幻影浮花入正觀江月松風藏不得大千俱在一毫端崇山堂襄陽林壑精神處此地正如眉目間笑看弓彎弄雲水風流那減謝東山書寂音堂壁永懷焦管愧平生任運無心更道情野火燒廬成露寢暑天因浴亦江行介然館道林偶入聚落宿天寧兩昔雨中思山遂渡湘飯于南臺口占兩絶戲之介然住廬山二十年尚能詳説山中之勝城中信宿無所詣徑作思山破雨歸偶過南臺同野飯聽公放意説巖扉楞伽本在海中央鉢具懸知挂舊房不泛木杯驚俗眼一蓑煙雨渡瀟湘題清芬軒隔屋江梅欲墮飄幽香細細故相撩披衣春曉無人見小立微聞意已消次韻資欽提舉遊浯溪邁往高風不可攀老成今獨見波瀾平生嗜好如漫叟更在浯溪煙水間次韻題德岡鋪舊聞清憲使臨邛今日公能繼此風舍者從教坐爭席玩龜不廢撫焦桐次韻自武岡趨東安道中枕孤衾冷月空斜臥看青燈自委花逸想醉翁非夢語酒醒能道客思家次韻邵州道中斗折清江接暮林墮江殘月水浮金松聞有風自成曲清坐不須重整琴次韻曾機宜遊山湘江晚望貪看江草間江花不覺移舟著淺沙數筆瀟湘春自曉橘叢離落露人家閏三月經旬雨江漲已及舊痕而湖山堂之下船猶著沙二十七日與天寧清修白鹿龍牙開法同赴景醇飯而廣法益陽來遂掇坐入門湖水漲滿其碧勝鏡景醇曰湖山正為公輩甚喜作此湖山景物亦相知豈獨紗巾壞衲師喜我遠來何以見夜來湖水滿平隄巫山圖誰開幅紙如方鏡照見巫山十二鬟若信朝雲是呵霧許愁那復置眉間古詩云蘆花白間蓼花紅一日秋江慘憺中兩箇鷺鷥相對立幾人喚作水屏風然其理可取而其詞鄙野余為改之曰換骨法蘆花蓼花能白紅數曲秋江慘憺中好是飛來雙白鷺為誰粧點水屏風佛鑑興修天寧而大檀越輻湊六月初吉有雙蓮開殿庭之西池作此露井銀床照碧苔地靈獻瑞亦奇哉將成萬壽千楹搆故遣雙蓮一夜開題通判學士適軒小軒只著竹方床散髮陶然夏簞涼手倦拋書成午睡夢回齒頰帶茶香清侍者自長沙歸雲居來辭且乞偈余斂目想見清自遙田莊拄策而上將及到天亭回視諸峰如關種所作廬山夕陽圖到天亭下開春曉叢摺萬峰螺髻青瘦策緣雲上峰頂為誰粧點夕陽屏宿興化寺天陰連日不成雨古寺無人鳥雀喧立盡黃昏門半掩縮肩褁被作猿蹲心上座余故人慧廓然之嗣而規方外之猶子也過豫於湘上夜語有懷廓然方外作兩絶風骨東甌語帶吳見君滿眼是西湖徑山河上今佳否想見年來鬢亦枯十年不得吳中耗凋盡耆年付等間聞道瘦規顏愈少獨餘此老殿湖山寄題勝因環翠亭二首遙知與客登臨處看得雲山到落暉四注小亭清入畫萬竿寒玉碧成圍萬身高節清臞老四座飛簷寒影間門外黃塵吹鬢者有誰見此坐看山次韻夏均父寄曾元素三首溪上江山似故鄉朅來卜築近魚梁會須一葉浮秋浪臥看驚飛白鳥行文章風節冠中朝聳壑昂霄太華高想見山陽賓從上醉圍佳麗寫臨皋孤鳳丹山五色雛人呼身後祕行書高標秀徹如春曉更愛含風萬頃湖廬山雜興六首野徑無人花競芳淡紅疏碧間輕黃不須折向尊前供杖屨歸來已自香山中流水水中山盡日青黎共往還間向僧窗看圖畫不知身在畫圖間幽花疏竹冷梢雲江北江南正小春但得青山常在眼不妨白髮暗隨人別開山徑入松關半在雲間半雨間紅葉滿庭人倚檻一池寒水動秋山白水連空不見村冥冥細雨濕黃昏秋山只尺無由到須信關人不用門秋山木落見遙村取次人家只隔雲一陳西風雨中過數聲笑語嶺頭聞道中二首蒲柳冥冥花已殘水田南北是青山晚村歸路聞啼鳥家住寒雲縹眇間元石無塵處處青一溪花照碧天晴山雲亂卻來時路雞犬惟聞洞口聲奉要勝軒居實居士三首漠漠煙雲映碧流暖風晴日動鳴鳩何當緑葉楓林下杖屨相追結勝遊出御未聞歸北闕角巾長念入西臺林間三月花猶在第恐春風作惡來柘岡陰滿雨初晴野徑無人獨自行一飯茅齋最瀟灑香芽如玉待君烹

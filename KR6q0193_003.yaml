body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編錄毘陵天甯法雲堂校古詩秀江逢石門徽上人將北行乞食而予方南游衡嶽作此送之筠袁唇齒邦一水連清碧朝行筠溪邊莫見秀江色忽聞兒童音乃知身是客獨歸江上寺杖笠倚空壁犀顱會四海香火自朝夕相逢作熟視面數心莫識但記石門時笑頰清光溢驚定喜失聲卒語成小立是時夜氣清隙月金蛇擲念君當北行缽飯從誰乞我雖能少留秋燕社已逼一懽偶然耳分首成陳跡他年何處逢話此空歎惜游南嶽福嚴寺生計居然成脫略投老南來看衡嶽禹谿久留困霖雨低摧悶若翦翎鶴朝來南尋度坡壟針水秧齊鳥聲樂風光融融一都會鬼祠雄深抱山腳梯空延緣止巉絕瘦策扶衰意超豁拂雲蒼杉雜錦石紫藤綠蔓相連絡石橋下視隔人世但覺嵐光翠如潑亭泓無波自紺碧澗草有香空錯莫忽驚梵宇墮林梢寶勢飛翔照深壑欹斜萬礎盤蒼崖十步一樓五步閣冰柱瓊窗不知數旒蘇一一垂簾箔犀顱道人相笑迎冰雪形容無住著午梵清圓林葉動天花細雨無時落憑高且復息疲頸心清別殿鳴風鐸雲開千里上眉睫吳楚江山見濃薄𡺸闍如有女正色春不洗粧秋拂掠紫蓋頎然似矜妒半出晴煙翠稜抹永懷堂堂武津老天骨開張耳重郭三生來游等兒戲靈山一會儼如昨他年遺跡舊巖下拴索猶存眾驚愕解云此山增智力鵬飛天風轉羊角江西駒兒快騰踏青原麒麟亦超卓折足鐺中過一生野蔬數根陳五合故庵遺塔尚依然行誦神交付冥漠影不出山豈難事准擬茅齋就林縛退之南遷曾過此好語誇詞雜嘲噱自謂忠誠動嶽靈望碑字字猶精確但餘佳處不可狀浪禿霜毫秋色闊東坡唾笑成文章山川勝處多奇作莫年亦為儋耳游不一過山山愧怍為君試將說禪口掉頭長吟擁山衲心胸便欲捏荒怪落紙雷搥散風雹要將傑句酬佳景未怕山容作顰頞福巖寺夢訪廓然於龍山路中見之山高夜氣摧煩暑竹風為作南軒雨夢隨柔櫓到西興艤舟步入龍山塢蕭蕭松下逢睿郎問信遠來亦良苦覺來但記談笑歡不省懽時竟何語臥看篝燈一點明嶺海茫茫隔吳楚安得卻如清夢中杖履追隨長爾汝乾上人會余長沙兀坐思歸不舉頭窗風為我翻書葉眾中聞語認鄉里便覺石門寒疊疊雲庵已作白塔新當眼風枝心欲折道人叢林十年舊古寺青燈夜相接失聲方欲問江南忽憶去年淮上別逃空跫然聞足音見子令人解愁結地爐火冷霜月苦一室諠譁終暖熱湘山破曉立俜停秀抹鈆華餘積雪故應山亦為余喜隔岸遙看圓笑靨千巖佳處可同游明日波晴當理楫黃魯直南遷艤舟碧湘門外半月未遊湘西作此招之江夏無雙果無雙子雲賦工未必爾那知一飯在家僧真是潛山癩居士春湖白鷗未入手衣冠林中作蟬蛻平生俯視造物兒兒頑不省猶相戲羅浮舊游今再游一念去來開眼睡泊舟隔岸望湘山應愛煙霏浮幕翠快當著屐上千巖要看松風迎笑齒公雖妍蚩付一目定自胸中有涇渭我非破頭山下人聞絃賞音亦風味知君不傳西土衣一龍一蛇聊玩世魯直弟稚川作屋峰頂名雲巢只今海上青石牛曾臥天子黃金屋下看朱紫如堵墻上前諸公遭牴觸眼高四海鏡面空潛山歸來巾一幅慚愧君家小馮君自是河東真鸑鷟文章五色體自然秋水精神出眉目人間不識但聞名水非醴泉石非玉江南一峰獨高寒時時笑語雲閒宿弟兄出處兩相高故作雲巢對山谷陳瑩中由左司諫謫廉相見於興化同渡湘江宿道林寺夜論華嚴宗范韓醉倒眠荒丘撼之不應民始愁天生公副天下望雷霆聲名塞九州立朝嚴冷傳鐵面坐令鼠輩驚魚頭上前論事傷太直逆鱗投笏來南陬長沙共渡一水碧中流笑語驚沙鷗湘西古寺夜對榻高論自破千人浮華藏法界在掌握遇緣即宗甘自由世驚海隅在萬里我視閻浮同一漚坐中忽舉毗盧印印海印毛皆遍周大哉此法本無礙從公一游容我不贈石頭志庵主陝西道人最聲價自與老南相逼亞常恐清塵補綴難那知乃有如君者爭傳絕似餘杭標十年夢想空飄颻邇來衡嶽祝融下一見便令人意消道骨清閑神秀徹湛湛光風磨霽月高談未了山日斜篆煙已滅灰如雪平生安得情相似可憐投分今如此且作山中盛事傳我忘樸陋君忘年遇如無象於石霜如與睿廓然相好故贈之西湖睿郎最高道思之不已令人老道人相逢吳楚閒聞說絕與睿郎好年來學富身轉貧豈特詩膽大於身法朋半是奇逸者我亦放浪無羈人霜威折綿寒入頰長廊無人風卷葉寒窗誦讀夏日吟和氣坐令寒妥貼筆端解語敏於口網牋時作龍蛇走煩君清哦當少休萬象乞憐爭叩頭石霜見東吳誠上人我尋流水行忽入霜華谷山陰見幽人目帶湖山綠語溫如春風韻秀自拔俗暗驚枯木堂棲此一枝玉遙知夜窗深雪響亂脩竹寶書掩殘缸佳眠正清熟逸想在西興清夢不容逐覺來念行處小詩欲收錄詩成寫烏絲銀鉤奪人目棐几著牙籤興來還自讀洽陽何退翁謫長沙會宿龍興思歸戲之河郎西州來逸氣掃秋晚平生貯書腹中有文武膽材如駱賓王其直亦不減上書論國事忌諱失料揀居然為逐客安免投手板世方例皮相我亦作白眼閉門古寺中一榻聊醫懶邇來偶病渴意緒覺蕭散頗懷當壚人楚岫屢欲鏟我從山中來攜被夜假館地爐擁紅金妙語容細款凜然忠義氣不肯受盤綰正恐復一吐與民作溫煖坐覺舟壑走歲月不可挽人生一夢耳勿作鏡中歎何當結後期相攜游汗漫次韻道林會規方外湘山半夜雨斷我西湖夢臥看讀書燈花作扶頭重曉窗晴潑眼倒桂聞么鳳起尋殿寒梅小立幽香噴柳絲不勝綰筍庭春脈動春色已如許樂事非一種平生所懷人忽此笑語共雲軒為誰停危坐山衲擁眼高空叢林志大骨森聳開懷見赤心亹亹飽談誦坐客鶴腦側我亦快心孔袖中出新詩筆力發豪縱風日麗醇釅黃泥初揭甕舌根有滄海潮辯自掀湧何當橫枯藤齧鏃追兩本吾宗欲顛覆支者例闒茸君能為我起逸足王良控我詩如石田疏理終無用朝來強鉏墾禿筆時呵凍摩挲銅鍱腹博君一笑捧孜遷善石菖蒲溪毛數葉一寸碧風姿底事能清臞戲將紅玉旋螺石共置雪色花磁盂沙泉甘滑見毛髮時時酌以澆根須蒼然棐几明窗下五月秋色磨肌膚已忘身世在南嶽勿覺夢寐遊西湖遙知夏木午陰靜篆畦半破煙舒徐莫翁睡足百事懶相看微笑依圓蒲余作進和尚舍利贊遷善見而有詩次韻進公事業頗拔俗欲憑妙語招遺魂文章種性欠疏理焦芽故態何足論心知高人笑諛墓抱羞無地容逃奔佳章忽來生喜氣風輪載我登崑崙徐觀筆力作波險正與醉素爭弟昆山高水深世聽瑩愛子賞音知道門次韻莫翁豐年斷此山分得僧中龍獨論懸斷今年豐定知胸次有造化是非飽更田舍翁清晨一雨符君說喜如初得丹砂訣精神矍鑠口垂涎一飽可期扶病劣老來百事不如人但願𥝧稏秋如雲莫如往年水車聯龜兆坼出生黃塵莫翁心地絕榛鹵圓中規而方中矩千偈平生如建瓴此詩可意真時雨我詩脫口酬未當只欲與君憑閣望萬頃連天綠錦光舞浪崩騰似春漲喜會李公弱韻如風蟬蛻塵垢氣如春容在楊柳風流翰墨俱細事自是吾家道門友十年契闊挂夢寐一見令人忘白首況在祝融眉額閒青碧連天雪晴後冷齋撥爐聞夜語雪灰消盡紅金斗君才合在臺閣閒簿書堆中不應有且置玉堂風雨筆來試牛刀霹靂手民姦吏滑本有神到君難藏如鼻口臥駝忽起便過人再拜當為乃翁壽此詩乘怒勿示人願君低回為遮醜次韻超然送照上人歸東吳蕭寺霜晴日初吐曦光煙翠橫深塢經行遲立望吳山氣勢飛翔爭入楚山中有客冰雪姿十年不聽吳邦鼓忽然曳杖出山去安禪後夜知何處石龕看月莫降龍栗林暮過應衝虎此生聚散等浮雲可憐俯仰成今古吳江一色軟琉璃有寺正臨江上住他年法眼照人天贈詩詩取南州祖金華超不群用前韻作詩見贈亦和三首超不群翦髮參黃蘗胸中蓄奇為誰吐閑臥湘西雲一塢興來落筆如崩雲五字憑凌氣吞楚我詩望見倒降旗攻之何必更鳴鼓獨對湘山夜色晴萬壑千巖最幽處臥要明月聽松風為君哦此文中虎此生身世付一戲安用聲名照千古知君大用參黃蘗三篾束腰隨處住何當峰頂結茅廬要看掀髯呵佛祖道人秀發蘭牙吐家在金華最西塢不從大士攜畫軸一笻千里來游楚評詩結髮師浣花論字童牙誇石鼓我皆不能但知愛亦似胸中有佳處氣韻翛然松上鶴意態索寞阱中虎卻於翛然索寞中詩句時時出奇古乃知筆力有神助三峽迅流輒於住疑非蓬髮休上人定是禿頭楊德祖赤河沙泉自吞吐北崦疏鐘荅南塢憑欄試誦鵩鳥文洛陽少年亦翹楚當時七國犯謀議睢陽不復聞𮝪鼓時更事往空流水豪魂英魄知何處金華衲子如玉清溫粹愈恭如履虎明章秀句出倉卒慷慨山川弔前古篇篇秀發春欲釅便疑造化毫端住不須眾口誇晝公苕溪君作中興祖復用前韻送不群歸黃檗見因禪師幽尋忽覺暗香吐竹西知有梅花塢一枝試摘與君看念君明日當離楚戛然飛去若驚鴻棄擲自嗟如臥鼓遙知旅枕生清夢夢到江南春好處蒼杉拂雲煙翠深為弔大雄山下虎我識山中因褊頭骨目清堅貌滈古便欲閒提折腳鐺柏子庵邊結茅住行看談笑起雲門海上橫行如迺祖送瑫上人奔母喪黃梅為法去睦州緣母歸兩事世難兼二老其敢違君看去留意日月爭光輝子方童牙中已喜家翠微既長游四方萬里孤雲飛方將追新豐冰雪橫鋒機計音輒僵臥聲吞淚沾衣平生哺烏情棲風無定枝大江浪如山飛棹不可追要當濟安流龍神嚴真威一盃春露香仰薦天地慈更期辦白業慰此罔極悲送朱泮英隨從事公西上文如水行川氣如春在花挾書隨乃翁千里游京華人生少年樂於子何以加上庠閱英俊過目知等差君才固逸群如金渾泥沙明年對殿陛落筆翻龍蛇遙憐綠槐陰絳帳張紅霞金門看躍馬蘆鞭作橫斜滔滔九衢中懽情浩無涯馭吏亦傲睨隱語相嘲誇紅粧鶯燕語拭目興歎嗟知誰乞佳句駿墨字如鴉贈王聖侔教授汝江軟碧搖寒空環江玉色羅五峰神奇融結孕千載於是代出文章公荊公道德輩孔孟致君勳業伊周同君侯才氣真不減行看接武隆休功妙齡人誇好風節氣壓穎汝何其雄曾經大筆戰文陣豪俊莫敢攖其鋒老師碩儒玉堂上爭看灑筆回春工果然一日蓋天下聲名熠燿馳華戎都城立石傳萬口士林矜氣橫長虹巖僧廢棄誰比數亦復誦詠懽填胸跡微自恨不及識向風每覺勞雙瞳天公恤此慕善者固遣識面山水中坐令平昔心變滅譬如塵淨餘清銅自誇問道陝西老道人況亦參禪宗與君於法實昆弟姑留十日游從容拙詩別君無嶮句何從賞我雙頰紅他年揖讓對明主回顧此會成虛空蹄輪冠蓋塞門巷容我劇笑應無從臨川陪太守許公井山祈雨書黃華姑祠臨川富山水井山最深幽愧我今日來自非清散游試問井中龍吾行汝知不高秋嗜酣臥此計非良謀晚稻已及穗一雨足可收曷不躍而起霈然瀉南州要看賢使君放衙擁黃紬寄蔡子因平生閱詩如閱馬自憐雙眼如支遁子因句法馬群空爽氣橫秋太神駿上苑花光纏肺腸西湖霜曉磨風韻較君年少翰墨場賈生仲舒覺寒窘醉中逃禪亦不惡況復機鋒類龐蘊奉身一飯聊自珍富貴功名苦尋趁鳳巢定生五色雛文章從來論種性嗟余索寞臥空山多生垢習消磨盡但餘欲識天下英斃蛇脊尾猶一振歲月去人江浪翻何時仰此摩天峻驟雨雷搥雨骨天為低行雲趨走不敢遲桐英滿地誰拾去花態正顰魂欲飛紫金蛇光誰掣斷墮空萬點跳珠亂須臾井滑紺無泥琉璃骨軟爭道馳亂紅殘萼驚千片可憐憔悴吳姬面林光草色自連天殘香依約知誰怨臨川康樂亭碾茶觀女優撥琵琶坐客索詩小槽橫捧梳粧薄綠羅綰帶仍斜搭十指纖纖蔥乍剝紫燕飛翻初弄撥梨園曲調皆品匝斂容卻復停時霎日烘花底光似潑嬌鶯得暖歌唇滑圓吭相應啼恰恰須臾急變花十八玉盤蔌蔌珠璣撒坐客漸欲身離榻裂帛一聲催合殺玉容嬌困撥仍插雪梅一枝初破臘南豐曾垂綬天性好學余至臨川欲見以還匡山作此寄之我生少小秀不叢題詩落筆先飛鴻一從廢棄脫毛髮乃與石田樗木同平生百慮湛古井無復掀湧波春風尚餘覷書舊垢習終日伏按如啞聾默觀前古忠義輩光明碩大皆人雄聞之恨未目親歷周行四海如萍蓬猛聞君侯富道義浩然養就如嬰童筆端五色藻造化經綸事業羅心胸揚清激濁出天性英聲不減狄梁公一節直走汝水上回首弊帚香罏峰徘徊一月不及見癡坐掩扃知命窮霜清昨夜興飄忽匡山落我清夢中吾身去住本無繫便欲登舟而向東再惟君侯未我識恨遺他日山水重作詩願見亦不惡谷風從虎雲從龍再游三峽贈文上人肉身大士延平公眉毛如雪聲如鐘東坡醉眼亦多耳信口呼作僧中龍坐令玉色煙巒裏晨鐘暮鼓三千指而今骨冷撼不應青燈白塔臨寒水上人談笑有精色聞是延平坐中客紫霄峰下曾相逢別來幾何頭已白地爐夜語尋前事當日交游半生死與君等是三眠蠶浮世百年那免此我尋舊游聊自娛忽然見君懽有餘一笑且從吾所適後會重來知有無泊舟星江聞伯固與僧自五老亭步入開先作此寄之煙霏含空青向晚望逾好欲行落瀑邊俊鶻屢側腦偶攜白髮禪步盡青松道孤鴻聊送目瘦策自扶老甚欲東澗陰縛屋安井灶我亦個中人歸計嗟不早永愧巖上僧松鬣和雲掃會蘇養直方忻望廬山忽見蘇養直向來敗意事捉手一笑失瀾翻誦新詩與山爭秀色歸來對青燈危坐口挂壁翰林謫仙人隱顯吁莫測正恐騎魚去千里作一息贈癩可可師有奇骨吐語愕眾口秀如出盆絲媚若春月柳舊詠雪梅詞便覺落渠後抱痾亦同粲視身一塵垢臥看東溪雲懸瀑激窗牖廬山久無僧殿閣空華構誰知千巖勝竟入此郎手我癡世不要冷落如弊帚但意君可奪獨能容我不福唐秀上人相見圓通廬山萬木春已透滿目春光迎馬首北山攫飯借榻眠一任春山穿戶牖道人聞是福唐來石門曾結游山友相逢未說一笑懽且忻春色濃如酒何當瘦藤上孤絕深谷忽驚如錦繡人生超放當趁健東風已暗藏鴉柳飛來峰意行忽出門欲留聊植杖雲開飛來峰巋然眉睫上氣勢欲翔舞秀色無千嶂萬物皆我造何從有來往大千等毫末古今歸俯仰心知目所見皆即自幻妄如窺鏡中容容豈他人像頗怪胡阿師乃作去來想此意果是非一笑聲輒放且復臨冷泉舉手弄清漲崇因會王敦素眼高四海語英發自應文章有家法金陵地肺山川驕要君詩句時彈壓東來藉甚名譽傳景星瑞鳥人爭先忽驚華氣傾坐客但覺人品春湖前一盃春露容同啜更看歸舟登一葉遙知笑語散驚鷗萬頃煙波上眉睫念君懷中有卿相何時摸蘇一唾掌要看儒林萬口誇文公諸郎能世家聞端叔有失子悲而莊復遭火焚作此寄之一子被奪去囷廩遭火焚冷官寄僧舍僮僕臥朝昏平生五色筆落紙生煙雲文章竟何用袖手聲一吞東坡昔無恙豪俊日填門君如汗血駒膽氣終逸群坡今騎魚去眾客亦繽紛翩然淮海上霜鬢此身存我亦識坡者一見等弟昆乃知水與乳自然和不分心期營一笑發君雙頰溫那知墮機阱面上餘唾痕我公佯瞌睡嘲誚了不聞遙知讀此詩拊手髯一掀七夕臥病敦素報云道夫已至北山遲遲未入城其意耽酒用其說作詩促之去年鍾山今夕晴二豪興發來扣扃開軒咄嗟辦法供一味萬壑松風聲頹然意適相枕臥便覺語笑紛喧爭我方小立倚風檻君忽蹶起孤髻撐今年此樂墮渺莽維摩臥疾毗耶城烏衣郎亦憎俗子閉戶臥看星河橫美髯和易坐畏暑扁舟散髮歌月明遙知君定宿浮玉詩狂欲跨橫海鯨傳聞已至蔣陵塢留滯未歸宜一抨連床夜語久不理硯席忍垢珠網生乃爾彌日復信宿不為萬頃無濁清推擠不去有深意戀此百甕郎官清甕邊被縛真有道酒後耳熱良高情不嫌折簡苦招喚要看款段兀醉酲冬日顯寧偶書二首山舟不肯留白髮日夜益曉窺青銅光乃覺朱顏失故人半雕零行吟百憂集舊山天盡頭歲晏衰眼力高枕此山泉比興復何日百年暗相驚奔忙如瞬息喬松亦已塵仙術無煩乞禮法日荒蕪坦率日增益唯餘枯藤枝起坐不相失山枕孤雲歸林寒倦鳥集愛此亦題詩鈍澀見才力乃知衰老來全殊少年日勞生知幾何萬事歸歎息鈯斧好自用當就阿誰乞和靈源寄瑩中此來漸覺身無累欲學灊溪諱名氏鍾山萬頃獨經行山日松風吹凍耳聞有僧從法窟來當鋒戲作橫機試探懷示我妙伽陀兩翁回互偏中至乃知道德無貧賤故以相求亦相契妙談何日看揮斤此老鼻端有餘地王敦素李道夫遊兩翁軒次敦素韻茅簷分首纔信宿佳句俄驚照雲谷兩翁諠闃姑置之銀鉤勒出鬼神哭識君筆力回春工妙語天成絕雕斸是時秋陰潑庭戶微月瓏璁隔寒竹便覺玉川照映人譬如六月失三伏深雲開軒亦不惡窗戶清紅照林麓方欣杖履日追隨漸喜並崖村路熟平生與山實神會戲語嘲詞雜山綠要當終副此軒名絕境於君豈宜獨懸想青燈夜對床香火淨緣期昔夙此詩煩寄謫仙看要使軒渠笑捧腹奉陪王少監朝請遊南澗宿山寺步月二首朝為北山遊暮作南澗宿此生亦何幸稱心良易足青燈委昏花笑語暖幽獨月出東南峰升此一輪玉開扉發清嘯意行無澗谷勝韻高摩空妙語清到骨親朋萬石門門吏千鍾祿如何飯薇蕨衲子相追逐明年守北屏夜直黃金屋應懷此夕游夢想亦清淑定有寄來篇吳牋煩自錄單衣喜和風詩眼愛空翠野亭亦翛然散坐聊倦倚坐久忽聞樵見視一笑喜那知深林外曲折見流水幽光弄紺碧春色潑秀氣去為千頃澤隄柳相嫵媚月光方下徹浮空見赬尾投礫戲驚之撲摝沙禽起歸途望林壑煙靄隔山寺便如斜川游歲月亦相似浙竹龍孫初長浙江曲疏影蕭蕭濯寒玉平生知愛足風流只有山陰王子猷而今流落蒼崖頂暗換年光鄉路永冰敲雪壓未應衰鸞鳳不棲空故枝堅榦猶堪製長笛最合宮商勝金石為君吹動鏡湖秋驚起雙龍翼小舟觀山茶過回龍寺示邦基北窗賞新晴睡美正清熟竹雞斷幽夢朦朧不能續臥聞故人家山茶已出屋欣然一命駕妍暖快僮僕千朵鶴頂紅染此一叢綠坐客例能詩秀句抵金玉攜過回龍寺掃壁為君錄逸筆作波險欹斜不可讀坐驚殷床鐘暮色眩雙目入關更清興市井亂燈燭人生分萬途稱心良易足時平且行樂餘賓非所欲次韻葉集之同秀實敦素道夫游北山會周氏書房王郎本豪放富貴纏縛之頗復厭絲竹來聽松風悲葉侯須似棘談兵輒紛披恃此文武膽英氣吞北西正直威神鬼動欲焚淫祠道夫憂國心造次常念茲事功未入手憤酒誰共釃正恐追老范一吐胸中奇秀實氣剛大歸宿未易期新詩弄清婉霜曉臨湘湄鍾山冠世境登賞乃所宜林閒見隱者面有無求姿不必問賢否但讀諸公詩我無支遁才敢逐王謝為推擠幸不死豈非憐其癡一昨閱詩戰望見仆旌麾今能犯矢石居久氣自移洪玉父赴官穎川會余金陵迂疏世不要冷落眠山寺空山斷往還落花自流水平生所懷人那料千里至懽極看屋梁通夕不成寐曉從城郭來山亦為余喜登門見眉須已覺增爽氣洪徐皆人龍論議例英偉君於二老閒妙語發溫粹胡為下僚中混此萬乘器攝衣願從君舉步懼推鄙安知出愛忘劇談略勢位便欲攜與東載我以船尾予生分奇蹇事事得敗意獨於天下豪未識已神契天公亦見憐以此厚我耳西湖今古勝前輩風流地風月久乾沒畫舫誰料理行當入君手想見飽風味不得陪清游起坐終夜喟定有湖上詩無辭遠相寄珪粹中與超然游舊超然數言其俊雅除夕見於西興喜而贈之蜀客快劇談風味出譏誚眾中聞巴音必往就一笑道人西州來風度又高妙吾家長頭郎高蹈萬物表平生少推可說子不知了吾初意魁梧一見殊短小篝燈款夜語每每犯吾料貌和華林風氣爽霜天曉坐令岑寂中絕塵追騕褭君看顯與訥出蜀亦同調竟如眾星月聲光潑雲嶠子亦當加鞭歲月一過鳥陳瑩中自合浦遷郴州時余同粹中寓百丈粹中請迓之以病不果粹中獨行作此送之我懷希夷老如啞無處訴忽聞得生還失聲喜能語想見如鏡中仙風拂眉宇欲問華嚴宗忽覺隔吳楚攝衣出從之久疾恐頓仆佳哉蜀道人精爽馳揵武殷勤願偕行得書即徑去我生百無求青山滿門戶公卿一度來掉頭不回顧斯人獨難忘自不知其故夙昔當問佛斯人亦法侶達書理故事已辦住山斧太虛吾斧柄能用以收取

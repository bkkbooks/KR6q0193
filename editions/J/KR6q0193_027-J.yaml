body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編錄毘陵天甯法雲堂校跋跋唐明皇傳初明皇聞元魯山之歌歎曰賢人之言也聞左璫訴道迎宋璟不為璟禮則益知其賢何其明也及聞祿山曰胡家不知有父但知有母便遂信之何其暗也孟子曰養心莫大於寡欲欲少縱之則反易如此然能割所甚愛以寧天下與漢高帝鑄印銷印遲速一間耳此其所以再造唐室也跋狄梁公傳秦攻魏破之殺魏王瑕誅諸公子而一公子不得乃令魏國曰得公子者賜金千鎰匿之者罪至夷公子之乳母節乳之俱逃而魏故臣有識乳母者曰乳母無恙乎乳母曰嗟乎吾奈公子何故臣曰今公子安在吾聞秦令曰有能得公子者賜千金匿之者夷乳母儻知其處盍不言乎乳母曰吁我不知公子處借吾知之終不可言故臣曰魏國正破亡族已滅矣尚誰為乎乳母吁而言曰夫見利而反上逆也畏死而棄義亂也恃逆亂以求利吾不為也遂抱公子藏大澤中故臣告秦軍秦軍追見射之乳母以身蔽矢著身者數十乃俱死秦王聞而貴之葬以卿禮東漢李善南陽李元奴也家疫死止孤兒續始生數旬而貲以萬數奴婢共議謀殺續分其產善潛負續逃亡隱山陽瑕丘界中親自哺養乳為生湩續雖在孩抱奉之不異長者有事輒跪請白然後行之續年十歲善與歸其邑修理舊業鍾離意時為瑕丘令上書薦之光武詔善及續並為太子舍人魏節乳母漢李善古之奴婢也而其所為卓越如此予聞虎生三日其氣食牛駃騠七日而超其母蓋其種性殊特不幸而趣異類中耳若二人者殆功名富貴者事也又可以品類拘之乎唐則天皇后受夫顧託而欲奪以自有哥舒翰提兵三十萬而北面事賊此真奴婢豈寔能功名富貴者乎跋北里誌春秋傳書六鷁退飛石隕五微事也何足書乎先儒曰聖人之意以謂如鷁與石無預於道德性命之理且猶謹嚴詳次如此況道德性命乎北里誌戲劇之文而達道校證藏之豈五石六鷁之意乎舒王曰司馬君實平生大過人者臨事不苟於達道亦云跋達道所蓄伶子于文風行水上渙然成文者非有意於為文也余讀此傳蓋通德娓娓而語子于筆追而書之非有意也然通德所論惠男子殆天下名言吾以謂子于之室有此婢如維摩詰之有天女也達道手校諸書而此本最美非好古博雅何以至是司馬君實無所嗜好獨畜墨數百爾或以為言君實曰吾欲子孫知吾所用此物何為也達道之畜書其亦司馬之墨癖也跋邴根矩傳孔北海年十六時能舍匿山陽張儉事泄兄弟及母三人爭死竟坐兄褎北海因是顯名遼東太守公孫度欲殺劉政政先依根矩矩匿之月餘以付太史子義既而謂度曰政已去君之害豈不除哉度曰然根矩曰君之畏政者以其智也令政已免智將用矣尚奚拘政之家不若赦之無重悲也度乃出之棄又資送政家皆歸故郡嗚呼東漢號多氣節之士其天性哉方張儉劉政之窘而遇北海兄弟太史子義根矩雖困於亨蓋其平生取友護助何所憾焉韓退之誌柳子厚愛其請代劉夢得播州曰嗚呼士窮乃見節義今夫平居里巷相慕悅酒食遊戲相徵逐翊翊強笑語以相取下握手出肺肝相示指天日涕泣言死生不相背負宜若可信一旦臨小利害僅如毛髮比反眼若不相識落陷阱不一引手救反擠之又下石焉者皆是也此宜禽獸所不忍為而其人自視以為得計使聞子厚之風亦可以少愧矣予聞退之之言太過及親嘗之乃知此曹今古一律也借能過之安能已之哉跋魯公與郭僕射論位書魯公作字多擘窠大書端勁而秀偉黃魯直云此所期無不欲高照千載者此帖草略匆匆前所未見開軸未暇熟視已覺粲然忠義之氣橫逆而點畫所至處便自奇勁公嘗謂盧杞曰朝廷法度豈更堪公破壞也於此又曰朝廷綱紀須共存正凜然想見其為人蓋公所遭之時如此而所守之道不得不然故倉卒未敢忘國之綱紀也余私有感於中者因記於此跋杜子美祭房太尉文稿房琯之賢盧杞之不肖讀其傳曉然易分也然睢陽之敗由琯魯公被害杞實使之校二者之設心則終不能優劣而甫稱琯之材雖困蹇以死益堅壯非忠義激烈篤於自信其能爾耶疑史記賀蘭不予南霽雲兵事若不直雖然哥舒翰之臣祿山天子西奔天下怨之而高適乃表雪其事稱舒翰忠義有素而以病奪其明將軍三十萬而低首事賊非叛乎從而文其罪非欺乎而甫亦嘗以舒翰適為賢豈史皆不足憑而甫之稱無不真者耶跋東坡山谷帖二首東坡山谷之名非雷非霆而天下震驚者以忠義之效與天地相始終耳初不止於翰墨王羲之顏平原皆直道立朝剛而有禮故筆蹟至今天下寶之者此也予於雲巖訥室觀此帖皆其海上窮困時自適之語然高標遠韻凌秋光磨月色令人手玩一飯不置若訥當藏之名山以增雲林之佳氣前代尊宿火浴無燒香偈子山谷獨能偈之初見羅漢南公化作偈其略曰黑蟻旋磨千里錯巴蛇吞象三年覺天下衲子聽瑩十年晦堂曰魯直作此有據乎亦意造爾山谷曰吾聊為叢林戲耳晦堂大笑曰豈可以般若為戲論乎山谷始悔前所學未登本色罏鞴乃卜居于庵之旁方知晦堂真不請之友耳今讀此書乃是未見晦堂時語也不然安有吹劍語乎跋東坡與佛印帖東坡騎鯨上天去十九白矣平生文章流落世間者所在神物護持然士大夫罕蓄之多見山人野士之室汝水旼禪者出此帖示予雖其一期酬酢之語而謙光燭人三復之想見幅巾杖屨翛然行儋石水溢間如淵明在柴桑斜川時某題跋東坡平山堂詞東坡登平山堂懷醉翁作此詞張嘉甫謂予曰時紅粧成輪名士堵立看其落筆置筆目送萬里殆欲仙去爾余衰退得觀此於祐上座處便覺煙雨孤鴻在目中矣跋東坡與荊公帖予嘗見東坡與荊公帖謂少游曰願公稱揚之使增重於世又舉魯直自代表曰魁壘之才足以冠絕天下孝友之行足以追配古人是四老俱登鬼錄覽此翰墨尚足以增山川之勝氣也跋東坡老木東坡婆娑林丘如此老木而山谷以筆端之口為形容之華光缽囊中乃一時頓有此兩玉人耶跋東坡𪫤池錄歐陽文忠公以文章宗一世讀其書其病在理不通以理不通故心多不能平以是後世之卓絕穎脫而出者皆目笑之東坡蓋五祖戒禪師之後身以其理通故其文渙然如水之質漫衍浩蕩則其波亦自然而成文蓋非語言文字也皆理故也自非從般若中來其何以臻此其文自孟軻左丘明太史公而來一人而已然予有恨恨其窺夢幻如霧見月雖老而死古今聖達所不免譬如晝則有夜而東坡喜學煉形蟬蛻之道期白日而骨飛竟以病而歿使其如魯仲連之不受萬鍾之位而肆志則寧復有遺恨哉佛鑑能珍敬其書則其趣味乃真是山邊水邊之人與夫假高尚之名心悅孔方道人者異矣跋東坡緘啟東坡海外之文中朝士大夫編集已盡雖予之篤好者亦以為無餘矣佛鑑輒出此帙為示皆中朝士大夫集中所無者山林之人泯泯櫱櫱若無所用而其志好尚亦清絕哉譬如無雲之月有目者皆愛仰之況斯文乎跋東坡書簡王逸少骨鯁顏平原剛正兩公皆有立朝大節而後世以字畫稱予嘗嗟惜之然名德之重故世珍其筆蹟蓋理之固然東坡之於王顏又其逸群絕塵者其法權極可寶秘宣和四年人日覺慈軸以來示予予忻然喜其嗜好若可教也跋山谷所遺靈源書熙寧元豐之間西安出二偉人徐德占一旦興草菋與人主論天下事若素宦於朝黃魯直氣摩雲霄與蘇東坡並馳而爭先二公皆名震天下聖世第一等人也而詩詞所寓翰墨之妙拳拳服膺於靈源大士如此則知彼上人者必有大過人者耳一以達摩正諦不斷才一縷為憂一以願得一雲門為言豈非念其所負不可以蹤蹟者耶高安道人誼叟久從之游蓄此書出以示予予祝之使藏之名山庶百千年之下知江南道德所在未全寂寥也跋山谷雲峰悅老語錄序山谷筆回三峽不露一言雲峰舌覆大千更無剩法昔日龍山父子雖被熱瞞今朝虎溪兒孫應增冷笑咄寒山子道底跋山谷筆蹟山谷為予言自出峽見少年時書便自厭此帖在龍舒時作自然有一種勝氣未易與俗人言也當有賞音耳跋山谷帖山谷翰墨風流不減謝東山而書詞鄭重傾倒於華光如此予疑百世之下有讀之者知華光後身支道林哉跋行草墨梅山谷醉眼蓋九州而神於草聖華光道價重叢林而以筆墨作佛事兩翁並軸如夏口松下見婁師德永禪師像於邢和璞甕中耳跋橘洲圖山谷題詩予棲遲橘洲斷岸甚久別來無夕不在夢偶開軸見之如倚法華臺引鏡也讀山谷語如幅巾相從道林路時跋山谷五觀舒王在鍾山多與禪者游王以宗乘關捷問之莫不瞠若若以膚淺問之莫不聽瑩於是大訝其寡聞嘗問一僧五觀法使誦之往往不能句者嗚呼非施法之過學者亦罪焉以其不能從師授也山谷冠冕道德偉俊聳于縉紳宜其倚花叫飲高追晉宋風流之游方其窮約乃知跏趺而食又作觀法非直己好之且欲移於天下其信道為法之勤可謂透脫情境者耳逢原畜此疾欲以示學者庶幾其有能動心者耳跋黔安書王家父子翰墨流落後世不少而所見皆弔喪問病之帖豈具得意之書已為當時賢士大夫所藏世不得而見之耶弼上人處見黔安青石牛帖皆與村落故人語然其傲睨萬物之意不沒更百年後斯帖當亦貴耳跋山谷字二首山谷初自鄂渚舟至長沙時秦處度范元寔皆在予自三井往從之道人儒士數輩日相隨穿聚落游叢林路人聚觀以為異人今餘二十年予再游長沙山林間往往見其筆扎此帖此簡前嘗見之宣和二年秋八月至法輪竦上人出以為示玩之不忍置魯女有遺荊釵而泣者路人笑之曰以荊為釵易辦女乃泣何也女以手掠髮曰非以其難致也以其故舊耳予所以玩之者實鍾魯女泣荊之情山谷初謫人以死弔笑曰四海皆昆弟凡有日月星宿處無不可寄此一夢者此帖蓋其喜得黔戎有過從之詞其喜氣可搏掬山谷得瘴鄉有遊從其情如此使其坐政事堂食箸下萬錢以天下之重則未必有此喜也跋珠上人山谷酺池詩予紹聖初留都下聞士大夫藉藉誦青石牛詩而此四絕尤著聞恨不見此老閱三年遊石門林下識君實骨面善談笑相從最久時珠禪垢面不襪然已超卓後二十餘年予還自海外而君實化去久矣丁酉坐夏洞上有鴨步而至者問之乃吾向所識不襪公也於是甘吾老矣夏休珠將經行湘山袖此卷來讀之龍蛇飛動凌跨韓柳之氣糠秕王候之韻如其無恙時陰晚坐覺山川增勝爽然忘其孤廢也湘山多高人識青石牛甚眾珠可以示之使其韻摩摶衡霍固不佳哉跋與法鏡帖山谷作黃龍書時與予同在長沙碧湘門外舟中今餘年佛鑑出此以示予曇諦見前身麈尾山谷醉中仙去此帖墮空之垢被也跋石臺肱禪師所蓄草聖少游此詩荊公自書於紈扇蓋其勝妙之極收拾春色於語言中而已及東坡和之如語中出春色山谷草聖不數張長史素道人遂書兩詩於華光梅花樹下可謂四絕予不曉草字開卷但見其雷砰電射揭地祇而西七曜耳吁哉異也政當送與龍安照禪師使一讀之跋山谷筆古德二偈此兩詩唐智閑禪師所作也世口膾炙之久矣而莫知主名豈山谷未敢必誰所作耶覺思示山谷在華光時筆此翁以筆墨為佛事處處稱贊般若於教門非無力者也今成千古為之流涕書之跋山谷雲庵贊雲庵住廬山時山谷過焉相與游鸞溪坐大石上擘窠留題其法喜之游如黃檗裴公乃作此贊後二十餘年得於衡陽毛氏之家持以還長沙開法長老覺慈寔其的孫時年二十三歲即以付之臨濟正脈使流通不斷乃無所媿此贊其敬之哉宣和五年中秋前一日題跋東坡山谷墨蹟予自南來流落山水久不見偉人便覺胸次勃土可掃宣和二年冬涌師於湘西古寺中出以為示如見蘇黃連璧下馬氣如吐霓也跋山谷字山谷翰墨妙天下蓋所謂本分鉗鎚至於說禪自到於三老之後則似攙奪行市奇傑之氣光風霽月如珥立殿陛之下何其照曜哉漳州正道書記於東山雪朝出以相示便覺增清山川精神秀發道雖一枝一缽求實於己者無有然骨董箱有此軸殆可與連城照乘爭價也又詩山谷論詩以寒山為淵明之流亞世多未以為然獨雲巖長老元悟以為是此道人村氣而俎豆山谷靈源之間也已可驚駭乃又能斲評詩之論殊出意外此寒山詩也以山谷嘗喜書之故多為林下人所得顏平原方乞米而山谷已謝得米要之非胡椒八百斛之家也跋叔黨子王子敬童稚時作字行草已超故方引紙著腕右軍從後掣其筆不獲乃歎曰是兒他日名當大成予觀叔黨行草皆蟬蛻墳塵之類筆法通亞乃翁矣惜其早世不秋庸詎不以此郎媲子敬耶邵陽儉上人雨歇攜此帖見過翛然如見父子角巾竹杖行小港榕林之下不勝清絕建炎二年三月十八日跋本上人所蓄小坡字後雞蘇本草龍腦薄荷也東吳林下人夏月多以飲客而俗人便私議坡誤用雞蘇為紫蘇可發吳儂一笑予將發鸞溪上人以此軸為示筆勢飛動皆學坡而未臻坡嶮處者要之如馬巷中逢王謝家子弟步趨狀貌蘊藉風流有自來矣覺範題跋了翁詩仁者難逢思有常平居慎勿恃何妨爭先世路機關惡近後語言滋味長爽口物多終作疾快心事過必為傷與其病後求良藥不若病前能自防右了翁送其姪剛勝柔詩勝柔過南昌出以為示曰伯氏祝曰儻見覺範使為汝說破予曰翁欲汝知口只好喫飯耳跋了翁書宣和二年夏得翁書前去無日矣能復一來相見乎翁平生剛方吐言如刀鋸而此書若悽冷私怪之明年四月遣書走山陽八月人還云翁方發書日下世矣蓋四月九日也聞之酸鼻累日翁視死生一戲耳予重為天下惜此人品翁知國如陸忠公臨大節不奪如顏魯公文章光明贍博如白樂天通達宗教如裴公美然四公者皆享富貴建功名死無遺恨而翁兼四公之長而以一斥不能復遂坐廢三十年予所以追悼而不去心也八月七日方飯僧薦冥福病臥剌然刀畫而南州珠上人攜此軸來讀之而長歎哲人逝矣予何所稅駕乎此去死生一決耳珠包腰一缽苦硬有膽氣而能蓄此書今叢林禪和子以為何種故紙然則珠殆亦有佳處因為流涕而書之跋瑩中帖瑩中竄海上而名震天下不減司馬丞相之在洛中時平生多與山林之人游處處見其翰墨雖戲語亦如雪中春色予觀堪公所蓄答仰山真慧禪師簡重而謹嚴如其為人味其立朝盡節無媿宋廣平陸宣公也跋瑩中詩卷了翁徉狂垢汙不擇香臭而至山水間便能賦山礬墨梅乃爾暴清絕耶予政和春過衡陽道權出以相示如見抵掌談笑時跋江表民願文世尊論學道特言富貴為難表民官為左司風節凜然天下畏仰貴顯矣而與其夫人俞氏一飯奉身清淨自活畢世真如德生童子有德童女豈特求於今為鮮雖從古人中求亦無有也予閱其願文廣大堅固深切著明真黑暗崖之火炬生死海之舟楫為之序者淨慈禪師退然才中人而以大法為己任如雪竇為之跋者延平了翁立朝正色剛而有禮愈斥而愈忠如魯公皆表民之友也而三友者聯翩欲刪去予而自游普賢願海又可乎跋李商老詩予至石門杲禪出商老詩偈巨軸讀之茫然知此道人蓋滑稽翰墨者也又欲入社作雲庵客試手說禪便吞雲門臨濟如虎生三日氣已食牛衲子譁曰甘露滅非錯下注腳跋徐洪李三士詩陳瑩中嘗問予南州近時人物之冠予以師川駒父商老為言瑩中首肯之駒父戲效孟浩然作語如王謝家子弟風神步趨不能優劣商老和之如劉安王見上帝大言不遜豪氣未除獨師川有句在暮山煙雨裏西洲落照中未暇寫也跋蘇子由與順老帖子由每多疾病則學道宜多憂患則學佛宜常坐黨人兩謫高安多與山林有道者語知其為排遣憂患者也順老予時拜之又吾雲庵賢之漓然流涕而書云跋張七詩玉不可種也而孝之至則種玉亦生泉不可呼也而忠之至則呼泉亦洌虎不可使令也而有德者役以橐經乙不可教誨也而有義者致其同室予觀兩張之詩引物連類折之以至理而秀傑之氣不沒讀之使人一唱三歎豈筆端有口之徒歟跋高臺仁禪師所蓄子宣詩曆公以功業著詩律傳者少自廢放山林間與衲子遊其語便爾清熟此柳子厚所謂詩人以窮乃工殆非虛語跋道鄉居士詩道鄉以說禪口談醫國法門雷霆一世初非以詩鳴也而此詩句句有法蓋其胸次如春之盎盎著物成容今既已矣萬人何贖哉儼師題于衡山之麓跋鄒志完詩乃其子德久書道鄉文章種性自然如五色鳳此詩乃浴天池時容光也其雛筆法已能追蹤山谷之氣讀之令人想見蹇驢風帽如宗武扶子美醉吟詩也跋四君子帖秦少游舌頭無骨王定國察見淵魚山谷口業猶在道鄉習氣不除華光不語如雷跋呂鎮公詩右惠照院見太師鎮國呂公留題一首深清雄麗有愛君報國之志時公方尉新昌實生太尉吉甫以道德為神考所敬與舒王上下議論遂參大政文章翰墨雷霆一時福祿壽考逮事三朝天下學者宗之昔李邵以高才博學為南鄭幕門侯吏而其子固為東漢名臣豈所謂隱德報應不身嘗之而及其子孫者乎予於太師鎮國公亦云跋李豸弔東坡文東坡以建中靖國元年七月二十七日歿於常州時錢濟明侍其傍白曰端明平生學佛此日如何坡曰此語亦不受遂化李豸為文以弔之曰道大難名才高眾忌皇天后土知平生忠義之心名山大川還千載英靈之氣士大夫稱其詞該而美今錄以示常道人亦可以舉似山中諸道友也跋養直可師唱和真隱詩予久不見養直時時想見其墮幘醉時忽閱此詩如行野渡春色中雖盎盎醇釅然終有一種清絕氣味可上人語迅快如漱壑夜泉響掃窗春霧空不類菜肚阿師語仲伯連璧士也而皆友吾巽中傳曰觀其所以游因以知其為人吾於巽中亦云跋養直詩宣和三年三月予遷居水西南臺寺初六日顛風攪林東軒小寢俄大雨起步脩廊復坐頹然昏睡南州道崇難者持此軸來隱几讀之如觀飛菟頓塵追風趁日也然其詩詞所及皆予故人而予亦嘗落憫憐中蓋方竄海外時帖也昔曾魯公問予曰蘇養直聞齒少而詩老恨未識之子見其詩否予曰李太白詩語帶煙霞肺腑纏錦繡以予觀養直之詩逮又過之魯公駭予此論今數詩惜公不見以驗前語耳跋謝無逸詩臨川謝無逸布衣而名重搢紳於書無所不讀於文無所不能而尤工於詩黃魯直閱其與老仲元詩曰老鳳垂頭噤不語枯木查牙噪春鳥大驚曰張晁流也陳瑩中閱其贈普安禪師詩曰老師登堂撾大鼓是中那容嗇夫喋歎息曰計其魁傑不減張晁也二詩於無逸集中未為絕唱而陳黃已絕倒無餘惜其未多見之耳然無逸又喜論列而氣長詩尚造語而工置於文潛補之集中東坡不能辯文章如良金美玉自有定價殆非虛語也予方以罪謫海外無逸適過廬山見吾弟超然熟視久之意折曰吾此生復能見覺範乎語不成聲乃背去後三年予幸蒙恩北還而無逸乃棄予而先焉因與超然對榻夜語及之不自覺淚殷枕也嗚呼無逸東鄰有甯生者二十餘以鏤刻為菩薩像每過無逸恬退趨去俄游京師以其役得將仕郎而還華裾細馬閭里聚觀無逸出門值之為避路門弟子為不懌累月嗚呼無逸有出世之才年未五十一命不沾殞傾大命曾東鄰甯木工之不若嗟乎惜哉跋無盡居士帖無盡登庸百僚畏讋坐政事堂德長於兩府諸公自劉中書吳門下皆昆弟畜之觀其退歸山林與衲子游書詞諄諄不翅如骨肉然賢者莫不怪之安知此老人以法為親乎龍安照公倚公之風遂托名不朽其亦老贊公盧玉川希上人之流亞也耶跋蔡子因詩書三首歐陽文忠公嘗非笑肥字而誇杜子美獨貴瘦硬東坡作詩曰杜陵論書貴瘦硬此論未工吾不平豐妍瘦容各有態飛燕玉環誰敢憎予因此帖可謂豐妍者也觀其俊氣橫逸不受富貴鞚勒之韻宜從古人中求宣和元年十月八日臨川瞻上人出以為示便覺神魄飛越於鐵甕城之下瓜洲杳靄之閭文章天下第一數東坡子因蔡氏子弟而飲食夢寐以之其種性妙非習俗所能移使東坡而在見子因當不減張曲江之與李泌也予久不見夢蝶偶得此詩湘西山水間時松風盤空林月滉蕩如顧虎頭對劉琨展其畫像也跋李商老大書雲庵偈二首商老以大父事雲庵以伯父事天寧則予蓋其叔父也仰山曰東院師叔若在惠寂不到寂寞商老寂子後身也然甘露滅固未死而商老與其弟未嘗不啼飢其大言以詬罵魔佛高自許可蓋習氣也近世要人達官其氣焰摩層霄而門可附而炙手者不翅百千然其語言翰墨人見之皆如拒頑百姓見催租文引恚視之不棄擲幸矣商老灌園脩水之上而筆畫一出人爭傳寶以相矜誇吾是知道德無貧賤也覺慈生一十年去年從余而知有商老偶出所畜一軸見嬉喜而書其尾且以雪道向無知之恥云跋韓子蒼帖後蘇東坡伯仲文章之妙無媿相如子雲而其見道之大全則楊馬瞠若乎後子蒼文字師法蘇氏西蜀後來之駿也讀其問照公向上一路後照未見詶語予為代之曰不辭向汝道只恐撞見劉幽求大帽壓耳手提油子蒼他日見之定是無語跋太師試筆帖二首此帖骨氣深穩姿媚橫生其得意時筆也不然何其如行雲流水之閑暇也予臥痁逾月偶閱之覺痁不辭而去乃知檄愈頭風非虛語耳予觀太師楚國公之書骨含富貴積學之至神氣蓋人然付其姪以寶公詩其外護欲傳之子孫為無窮家法也跋公袞帖見蛇鬥而筆法進聞雞聲而遂能神東坡以謂寧有存法與神于胸中而能學書者乎予觀公袞行草既不用法亦不祈其神娓娓意盡則止耳跋三學士帖秦少游張文潛晁無咎元祐間俱在館中與黃魯直居四學士而東坡方為翰林一時文物之盛自漢唐已來未有也宣和四年七月太希先倒骨董箱得此三帖讀之為流涕嗚呼世間寧復有此等人物耶跋蘭亭記并詩宣和四年夏彌月不雨稻田龜兆出予晨興垂頭坐西齋方與造物者游而廚丁聿來告米竭余作白眼久之希先送此軸來索跋欣然見王子敬諸君子忘其廚丁廚丁求與決予曰當以三筏用事正不必逼人也跋荊公元長元度三帖予兒時劇於鄰家見壁間有詩曰是非不到釣魚處榮辱常隨騎馬人今日見此三帖偶憶前句跋百牛圖畫工能為神鬼之狀使人動心駭目者以其無常形無常形可以欺世也然未始以為貴唯犬馬牛虎有常形有常形故畫者難工世之人見其似則莫不貴之畫牛之法徑寸者不刷毛予觀此圖非特入法凡百尾喜怒俯仰小大伏立趨並浮鼻荷痒盡其情狀意非畫師殆高人韻士以寓其逸想耳予老住江村而比道林嶽麓之富其牛每以谷量日夕蓋拾礫追逐叱叱於田畝之中厭飫矣而全美乃以此軸為示何哉予以湘西之雲塢為畫笥則全美必以此圖為怍跋周廷秀詶唱詩宣和二月初吉日予送客松下淺丘縱望廷秀一髯男子但是時湘西雪盡眾峰蒼然我與廷秀皆是畫圖廷秀袖出與張公詶唱之詞讀之便覺與眾峰爭秀豈其媿從聚落中來故以此句彈壓清境耳跋順濟王記東坡昔自定武謫英州夜宿分風浦三鼓矣發運司知有後命遣五百人來奪舟東坡曰乞夜櫓及星江就聚落買舟可乎使者許諾即默禱順濟王曰軾往來江湖之上三十年王於軾為故人故人之失所當哀憐之達旦至星江出陸至豫章則吾事濟矣不然復見使至則當露寢浦漵言未卒風掠耳篙師升颿颿飽炊未及熟已渡楊瀾泊豫章日亭午嗚呼順濟之威靈為江湖之益者不可悉數獨分風送東坡南去此心日月不能老也其英特之風不減李逢吉禮陸宣公也跋李成德宮詞唐人工詩者多喜為宮詞天階夜月涼於水臥看牽牛織女星玉容不及寒鴉色猶帶朝陽日影來世稱絕唱以予觀之此特記恩遇疏絕之意於凝遠不言之中非能摸寫大平藻節萬物讀成德所作一百篇知前人之未工也其收拾道山絳闕之春色刻畫玉樓金屋之情狀使海山瀕海之人讀之如近至尊非其才當世何以治此上元日題

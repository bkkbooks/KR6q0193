body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編錄毘陵天甯法雲堂校古詩謁狄梁公廟九江浪粘天氣勢必東下萬山勒回之到此竟傾瀉如公廷諍時一快那顧藉君看洗日光正色甚閒暇使唐不敢周誰復如公者古祠蒼煙根碧草上屋瓦我來春雨餘瞻歎香火罷一讀老范碑頓塵看奔馬斯文如貫珠字字光照夜整帆更遲留風正不忍掛謁蔡州顏魯公祠堂開元天寶政多暇孽臣姦驕濁清化尺八橫吹入醉鄉國柄倒持與人把漁陽番將易漢官在廷之臣無諫者蟠龍衣錦光照眼更覺霓裳韻和雅叛書夜到華清宮狩呂骨驚天子訝二十四城陷同日長嗟乃爾忠臣寡鬧傳平原城壁堅穴鼻可以牿牛馬譬如灩預屹中流江勢遠來波倒射吾知守職事主耳行藏初不較用捨公時風姿入睿想貫日精誠震天下我行上蔡黃犬門驚風急雪吹平野嬌鴉暮集村不囂古祠窈窕連桑柘聖朝亦旌異代忠軒然眉鬚入圖畫和如戲泚盧杞題儼若夢令希烈怕至今握拳透爪地想見怒詞猶慢罵聲光自與日月爭事之成敗其天也此詩我欲掃東壁入字端宜擘窠寫便覺雲收六合陰春隨喜色生晴野同彭淵才謁陶淵明祠讀崔鑒碑武王既伐紂乃不立微子雖有去惡仁終失存商義夷齊不肯臣甘作首陽死下視莽操輩欺孤奪幼稚汗面亦戴天特猴而冠耳桓公弄兵權劉裕竊神器先生於此時抽身良有以袖手歸去來詩眼飽山翠追還聖之清太虛絕塵滓長恨千載心斷絃掩流水崔子果何人賞音乃知此與君讀此碑相視一笑喜題李愬畫像淮陰北面師廣武其氣豈止吞項羽君得李祐不肯誅便知元濟在掌股羊公德化行悍夫臥鼓不戰良驕吳公方沈鷙諸將底又笑元濟無頭顱雪中行師等兒戲夜取蔡州藏袖裏遠人信宿猶未知大類西平擊朱泚錦袍玉帶仍父風拄頤長劍大梁公君看鞬櫜見丞相此意與天相始終同景莊游浯溪讀中興碑上皇御天功最盛生民溫飽臥安枕醉憑豔姬一笑適薄夫議之無乃甚長安遮天胡騎塵潼關戰血深沒人哥舒臣賊不足惜要臠國忠如膾鱗蒼黃去國食不暇馬嵬賜死謝天下反身罪己成湯心奈何猶有譏之者取非其子又遽忽靈武君臣無怍容何須嗚咽讓袞服自控歸鞍八尺龍誰磨石壁湘江上楷拭雲煙濺驚浪龍蛇飛動忠義詞顏元色莊儼相向與君來游秋滿眼閒行古寺西風晚道人興廢了不知但見游人來讀碑陳氏貫時軒春風著萬物粉飾相明鮮雪霜摧壓之不情如世權問誰不可犯揖此蒼王椽斫頭未易屈槍地猶傲然相逢凋零中秀色披晴煙陳侯我輩人逸氣傾群賢開軒冷相向酬酢忘歲年我來作風聽夜雨雜山泉攜被願假宿與子對床眠洞山祖超然生辰希郎真吾道門友初見忘年今耐久天機深穩道骨清詩句誰令愕人口可憐佳處未全知但見茲篇氣渾厚我生癡魯人所棄洞視胸中了無有但忻所至有青山依倚叢林遮百醜君才一籌勝卻我胡為包腰反隨後人生嗜好調自殊海上舊聞人逐臭江南長憶好雲泉今日雲泉長入手萬頃蒼然几桉間作詩舉以為君壽理毫聊為試冰華小字明窗看揮肘懷慧廓然蕭蕭暑雨過空山成夜晴月出東南峰娟娟風露清飛螢自開合寒蟬亦悲鳴興來忽獨往聽此落䃹聲永懷西湖上絕景玉壺明松際翛然姿振策自經行即欲呼就語忽隔千里程何時徑尋子夜航過臨平呼猿何足道摩雲亦虛名未若擇法眼能識廓然兄應知像教末大法欲欹傾談笑復一出要使萬世驚燈火作朝夕已有相似情願隨人天會仰看辯縱橫同超然無塵飯柏林寺分題得柏字沙村宿雨餘炊煙淡寒色山墟蠶市休野飯漁舟隔忽逢柳際門知有道人宅扣扉山荅響童子出迎客空庭竟何有凍死千歲柏鐘鳴食時至老僧揖就席香粳定宿舂露葵應曉摘羌飢一飯美何啻萬錢直風軒納山翠引手捫石壁愛此玉崔嵬歲久自崩折下有洄渦泉甘涼冰齒頰勿輕一脈微去漲萬頃澤吾行無疾徐住佳去亦得欲收有聲畫絕景為摹刻興來勿復緩轉顧成陳跡次韻超然游南塔遶塔不忍去新涼生早秋不見江西月一水空悠悠龕燈耿晝影遺像青雙眸永懷皇祐間曾此狎沙鷗往事已陳跡豐碣撐高樓公昔從吾祖來往亦風流但餘松菊在井白遺林丘高風不可攀落日令人愁倚杖哦清詩溪風波白頭脈脈不能語歸心浩難收今已不如古無復相綢繆何當效船子華亭從釣舟大雪戲招耶溪先生鄒元佐昨夜顛風吹裂石曉來雪片大如席耶溪先生醉不知擁絮雷霆喧鼻息癡奴搥門呼不膺但聞含糊語呵叱先生行世如行川虛舟觸人無怨言逢人覓錢即沽酒得錢不謝猶傲然我欲看君墮幘醉便覺兩頰微渦旋款段自能馱醉起歸路逆風吹凍耳入門兒女啼飢寒瞪目瞠然作直視送英老兼簡鈍夫靈源道價壓四海骨相正似陳睦州去年龍山同坐夏時君亦來從我游鬧傳詩膽抵身大時吐佳句凌湯休故山歸去恰千里繭足過我不肯留行看海上荔子熟落枝丹顆無人收應共鈍夫行樹下未輸分柿獨風流次韻龔德顏柳帖顏柳以字名畫畫法可究後世何寂寥此輩了無有皆云學未至妙不應心手那知斯人徒德高名往就字工德不修名與身俱朽吾子佳少年俊氣駒方驟新詩作行草開軸龍蛇走坐客口為愕我亦知肯首積墨如陂池積筆高隴阜學之不至顏要亦終至柳此詩聞東坡請君書座右神駒行沙丘牝黃馬已死俗馬千年不能嗣忽生此馬世上行神駿直是沙丘子紫燄爭光夾鏡眸轉顧略前批竹耳雪蹄卓立尾蕭梢天骨權奇生已侶綠絲絡頭沫流觜繡帕搭鞍初結尾決驟意態欲騰驤奔逸長鳴抹千里桐川王野夫相訪洞山既去作此兼簡直夫野夫加於人一等玉骨春容含秀整已驚詞源倒三峽會看聲名重九鼎江南盡處山作堆雨餘青碧數峰開那知萬壑千巖處風帽蹇驢能獨來鳳凰鸑鷟未入眼今識鵷雛猶恨晚興闌掉頭不肯留出門去袂聊一挽君家富貴若騎虎擁鼻未免非虛語何當解帶食太倉時時攜被宿玉堂贈范伯履承奉二子大范風月湖小范煙雨柳清明與秀徹風度隨付受醉闌看落筆已覺風助肘聲名定追尋公卿在懷袖江湖方縱浪第未一唾手乃公幹國器讜論在人口謫居長閉門藥方曾校否著書亦細事用舍付杯酒君看雨園鳩雨晴定呼舊贈汪十四石麒麟兒天上物英姿秀徹氣超忽我非寶公亦識君嘉期半千知一出五色毫端欲飛動萬卷胸中正撐突會當談笑取卿相先看唾手斫月窟詞鋒堂堂無筆陣人笑我頑取纓紱昨日賡酬一百篇遶紙風雷出倉卒我詩拙惡未全貧君語定知窮到骨朝來爽氣西山高倚杖風流如拄笏秖恐與君汗漫游共跨長鯨過溟渤贈蔡儒效我家與君鄰屋居君昔未生先長我君髮齊眉我總角竹居讀書供日課君誦盤庚如注瓶我讀孝經如轉磨長老奇君王佐才拭目顒顒觀長大十三環坐同賦詩出語已能驚怯懦風雷遶紙成千篇棄遺不惜如零唾神思義表文融明清絕如珠不受涴江左相傳紙價增東坡一讀不復和懷高識遠不可屈功成回首破甑墮家貧口眾難自安出圖斗粟充飢餓鬧聞筆陣掃萬人上國英雄膽先破殿前作賦聲摩空盛名四海爭掀播華裾如蔥馬如龍九衢突若流星過我經憂患早衰微生怕虛名招實禍方衣童首住江村飽飯愛尋閒處臥睡餘信手摸書看會意起來行復坐林泉成趣亦題詩年來稿帙成堆垛仙郎開卷面發光誇我雄詞驚李賀相期他日同此遊先買鄰庵山數朵青松白石聞此言共作廬山二十箇豆粥出碓新粳明玉粒落叢小豆楓葉赤井花洗粳勿去其沙瓶煮豆須彌日五更鍋面漚起滅秋沼隆隆疏雨集急除烈焰看徐攪豆才亦趁洄渦入須臾大杓傳淨甕浪寒不興色如栗食餘偏稱地爐眠白灰紅火光濛密金谷賓朋怪咄嗟蔞亭君臣相記憶我今萬事不知佗但覺銅瓶蚯蚓泣十二月十六日發雙林登塔頭曉至寶峰寺見重重繪出庵主讀善財遍參五十三頌作此兼簡堂頭十年懷石門今日石門去雙林動曦光跋河開宿霧力微藉古藤泥軟脫芒履風泉白雲壑夜雨青松路我生百事廢齒髮行衰莫但餘愛山心不逐年華故此山甲天下自昔家吾祖峰如青蓮花千葉曉方吐煙雲浮香色清涼洗肝腑異哉萬木間白塔巋然古此老無恙時超放殊媚嫵萬象供談笑大千為戲具我曾從之游絕塵追逸步誰云今已亡塔開全體露永懷憑妙觀此意竟凄楚那知深林間聊與故人遇電眸霹靂舌咳唾成妙語筆端撼江海千偈浩奔注人間有此客自可忘百慮堂頭百衲師嶷嶷法王輔君看說禪口未肯讓前古夜闌對昏燈豪邁激頑魯相逢俱偶然此生真逆旅何當各努力業已共騎虎詩成對軒渠一笑小天宇留題三峰壁間三峰稜層如削玉一派懸泉瀉寒綠平生山水性貪婪聊與白雲相伴宿松風竹露有餘清夜伴孤月依簷楹神凝氣爽睡無夢不聞樓上霜鐘鳴庵頭禪翁頭雪白麻衣草履提笻策謂予久與世緣疏青眼逢迎喜詩客三峰高兮溪水深造物留之無古今新生松竹不須剪四時風露常蕭森粥罷收盂知我去殷勤乞與題詩句山頭塵土任茫茫白雲自在來時路華光仁老作墨梅甚妙為賦此雪裏梅開何草草欲問清香無處討回看水際竹叢邊寂寞閑愁洗粧早東坡戲作有聲畫竹外一枝斜更好但恐金鬚容易墮額黃雖妙難長保笑笑先生獨愛竹雪壁風梢麝媒掃應為冰姿不可傳醉裏相忘亦顛倒慚愧高人筆下春解使孤芳長不老從來病眼錯黃昏隔霧相看更相惱仁老以墨梅遠景見寄作此謝之二首荒寒掃橫斜稀疏開未遍煙昏雨毛空標格終微見吳姬風鬢亂睡色餘妒面誰令種性香風味極不淺道人三昧力幻出隨意現塞管玉纖寒無勞寫哀怨數筆何處山領略分樹石遠含千里姿間見復層出我本箇中人慣臥蒼崖側借路行人間勃土相欺得那知一幅中見此晚秋色悠然欲歸去遠壑誰同陟旁人笑絕纓捲卷成陳跡上巳日有懷昔從雲庵老人此日山行今年上巳日久客望江南雙林接脩水石路入煙嵐千峰出雲雨空谷吞寒潭蒼杉鬱童童秀色動雲庵不見庵中人青燈耿塵龕空餘行樂處攀翻聞笑談風光與節物觸愁味參參臨高望煙靄衰涕落春衫次韻胡民望小蟲墮耳先生素坦率元日慵拜賀獨從耶溪翁掩門作清坐一尊對喧譁酒酣巾幘墮忘形到挽鬚困倒相枕臥一蟲輒墮耳忽覺風雨過隆隆竟不已亟起呼燈火頗疑含沙流射影陰中禍蟲亦意墮井咨嗟恨坎坷豈曰無意出欲出但未果驚憂發清詩怨語終婀娜夫子英偉姿奇韻出羈鎖那知乘一醉遭此微物挫鬥螘真鬥牛此事古亦夥置之勿復疑自可平物我我詩無好句聊復相唱和恐亦有佳處一笑千愁破贈歐陽生善相薛公衣尚敝飢腸轉鳴雷天子征遼東細君笑靨開吾夫雖奇蹇一本作吾子流落徒要是高世材發必藉時耳今豈其時哉往見張將軍喜曰真吾儕三矢定天山英聲馳九垓房杜未肉食席門蒙積埃但餘王氏子文字相追陪賢哉太夫人智鑑照襟懷嘗自撫其子國鼎真鹽梅但未識其友試與俱而來窺窗見之喜亟使羅尊果見貞觀間相逐登三台予嘗閱舊史至此嘗徘徊數子初未貴踽踽蒿與萊而彼一女子底蘊遭窺猜何知婁師德碩大非栽培譬之萬頃波但見琉璃堆倔強如梁公包撫等嬰孩掩卷發長想鄙吝為崩頹吾今著田衣百念如冷灰功名一破甑掉臂首不回頗怪歐陽生諛語坐差排人生如逆旅歲月苦逼催懸知賢與愚終作土一坏美惡何足道君亦真恢諧愚賢君勿取吾肯罪形骸不肖君謂賢是適為吾咍重輕寧在子意子定癡獃所喜亦清散時時過茅齋明日念當行引紙研松煤詩成極醇釅蒲萄初撥醅贈許邦基邦基今年方十九美如濯濯春月柳龍章鳳姿絕世無金馬玉堂如故有酒闌愛捉玉麈尾玉色正同批誥手高燒銀燭擁新粧看君落筆龍蛇走欲驅清景入秀句萬象奔趨不敢後人疑錦繡纏肺腸不然筆端應有口謫仙風流今復見況亦彷彿外塵垢但恐功名纏縛人未放青山掛窗牖送正上人歸黃龍道人泉南來音姿頗純美觀其略笑語亦自飽風味相看坐終日孤月墮止水但見篆畦間青煙行未已朝來忽去我秋風動衣袂試問安所之笑指千峰裏秋晚當相尋結伴入層翠贈吳世承吳郎氣高明溫然見標格文章當世家風流走上國清談落玉麈醉袖餘詩墨一種富貴韻綠髮映坐客便覺儒生寒枯衰酸凍色解來古招提爐香伴禪寂宗之果瀟灑壁門應夜直歲晏或來歸共理登山屐次韻寄吳家兄弟朱門連屬南昌郡東湖褒賢拔高峻西山卷簾入欄楯富貴遮人不容進我初見之不敢瞬吳家諸郎特風韻戲語嘲之終不慍筆鋒落處風雷趁冰華百番一揮盡紅粧聚看眼波俊一堂喧闐客懽甚大廈吞風簷月近君看渥洼本龍孕俗馬那能著神駿香城懷吳氏伯仲西山遭霧雨形勝久抑鬱雲開誰使令千峰為子出骨瑛淡如秋談笑極強倔扶提登高閣慷慨問陳跡特欣曇顯醉不受澄觀律加額想諸郎豪氣洗寒乞新莊花成輪春生夢蝶室清境乃不游萬壑同稱屈洪崖清不殺笑傲時出沒路逢騎雪精挾以兩橘栗大雪晚睡夢李德修插瓊花一枝與語甚久既覺作此詩時在洞山窮年踏黃塵旅臥每自鄙此山頗岑寂飲食亦清美瘦藤當一折且作終老計曉堂看春雪秀色淨窗几爐暖倚蒲團頹然成坐睡君從何所來會我清夢裏瓊花斜裊帽眸子湛秋水伊予雜懽笑應阿竟何事忽然長揖去驚覺在千里人生孰非夢安有昏旦異心知目所見歷歷皆虛偽他日或相逢何殊開睫寐此詩當見渠一展笑相視汪履道家觀所蓄煙雨蘆鴈圖西湖漠漠生煙雨浦浦圓沙鳧鴈聚今日高堂素壁間忽見西湖最西浦翩翻兩鴈方欲下數隻飄然掠波去獨餘一隻方穩眠有夢不成亦驚顧蕭梢碧蘆秋葉赤青沙白石粉無數我本江湖不繫舟爾輩況亦江湖侶令人便欲尋睿郎呼船深入龍山塢蘇子平汪履道試李潘墨南陽國師古禪伯玉殿以棋聊戲客客雖四海棋絕倫我解兩奩俱用黑侍臣大驚帝微笑客亦袖手吁莫惻黑中優劣自能分正似蘇汪今試墨老潘氣韻淩阿寬二李不平有矜色坐令好事旁舍郎瞠視無言受巾幗我非南陽不能辨以手捫頭空嘆息徑當相攜詣瞽叟夜半一辨須明白隆上人歸省覲留龍山為予寫起信論作此謝之芙蓉阿隆耽兩耳急性天然緩如葦懷親徑歸不肯留少留龍山今月矣新交未數故人稀睡足明窗臨棐几管城落帽為微笑便覺金光走龍尾試校鵝經拂硬黃傳此寶書千餘紙紙光葉葉揭筠膜字工戢戢行凍螘勝公昔讀龍宮文百本妙談此其髓流落人間今幾年此去西天十萬里我寄閑房古寺中聞風著氈自當止自非道人三昧力此書何以能至此炷香一讀萬緣空海印發光初按指願君垢盡雞出燖亦於此法信根起生生要續無盡燈照了無明癡種子送元上人還桂陽建轉輪藏趙州飽叢林懶惰亦慣便起步作欠伸藏經終一遍投子猶可駭手足未舒展但於數字中演出五千卷兩翁古禪伯措置令人羨安知塵塵中法輪常自轉無數妙章句函匭金碧眩芥子琉璃瓶歷亂齊發現頗怪老龍華底事別營建幻出諸鬼物奇狀分百變疾馳並推轂過目等飛電萬眾初錯愕熟視生悲戀譬如觀寫照筆下出眉面爭貴紙上容活者反棄賤乃知像教末妙理蔽浮淺要令齒髮輩種性受熏煉元禪今南歸酬此夙所願我作送行詩敗墨磨破硯詩成一大笑相顧春風軟會看出談笑錯落照深殿想見午梵清隨喜時遶漩贈淨上人金華上人牧羊伴來尋江南好山看西湖毛骨漱秋光野鶴精神照冰段嗟余塵事苦相羈槁項蒼顏老路歧二年來往南州浦古寺閒行三見之生涯初不受塵垢到客跏趺聽秋雨玉軸已閒經半掩銀葉未寒煙一縷雲泉佳處包當解未暇從人覓錢買不嫌高笑常垢汙與子俱載歸東吳贈器之禪師器禪鄱水來一缽自笑傲偶然家此山十見青林槁寒骨聳詩律枯筆作行草韻如絳闕容日月不能老伊余曾聞名再見遂傾倒情高付無求語妙知有道茲山得君居便覺山愈好何時卜東巖鄰徑雲共掃時時從君游吐詞覓遺稿秀上人出示器之詩川原積雨收餘陰閣新晴一宿古蘭若歸夢有餘清清辰起危坐笑看煙縷橫讀此阿師詩秀絲出盆明中有眾谷髓氣和李騎鯨遙知落筆處遶紙風雷生世無歐陽公意氣相倒傾豈當棄置此終老黃茆坑雲居道疑大上藍持簡精藉渠一笑起頹綱相拄撐秀也舊不識一見氣不矜索詩亦不惡寫此抑鬱情持以示流輩試令俗眼驚送雷從龍見宣守并序韓子蒼少時從雷從龍先生游子蒼已入館而從龍尚高臥廬山之下六喪未葬特詣宣城謁知府舍人劉公袞公袞僉判在府中作此詩送之子蒼布衣昨日脫今日便校秘閣書勿驚韓雷相隱顯今來古孫名姓俱君看守道已華國先生徂徠猶把鉏嗟君六喪寄空館富人滿前那可揀壞衣懸鶉無一錢想像郭公四十萬青雲故人氣如春解令寒谷生和珍江浦買舟春水生片帆何日到宣城府中若見空青老從渠為覓詩遺稿予在龍安木蛇庵除夕微雪及辰未消作詩記之二首終夕不自寐老逐客愁長寒威正折綿歸夢不成往蕭驚聞打窗氣勢頗舂撞地爐對殘缸瓦溝集清響起看雪覆砌秀色動屏帳歸來簷溜滴生席初未暖乃知春草微已出嚴凝上但餘薝蔔林落花和月賞元朝喜見雪一室譁少長新年方下車故歲已長往和詩如奕棋時時作頭撞知誰徑尋我東墻屐齒響正當穩靠蒲移几就紙帳宿硯已生冰呵筆藉和暖一片忽飛來墮我詩卷上為置石鼎烹茗飲聊同賞龍安送宗上人游東吳淮水送君春雨餘刺舟斷岸歸匡廬江南別我秋天遠輕囊瘦策游西湖君去復來如社燕我獨留滯如賈胡牽衣覓詩亦不惡怪君兒戲忘髭須平生千偈風雨快約束萬象如驅奴飢來一字不堪煮乃知弄筆輸耕鋤不如尋我舊游處武林清境天下無耐清不得卻來此作詩送君游上都送充上人謁南山源禪師老源縛屋磯山側廬山對門江水隔單丁住山二十年一等栽田博飯喫諸方說禪如紡車我口鈍遲無氣力屋頭枯木自安禪生鐵脊梁釘樁直我昔東游曾見之兩頰溫然笑渦出到今持夢渡楊瀾浪花漫天浩無極紛紛衲子飽眠臥面如梔子衣領白年年江北與江南誰肯端來尋此客愛君今人肺腸古毛骨含秋眼睛碧能知此老端往尋處處好山留不得作詩贈君終自愧君去我留空歎惜

body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編錄毘陵天甯法雲堂校古詩臘月十六夜讀閻資欽提舉詩一巨軸青燈映窗山月西讀遍穎皋居士詩四蹄雷電駿騰躍萬丈光芒豪放詞古錦濯江有餘麗夜光走盤無價珠韻高不受富貴縛眼蓋縉紳說林壑一語不合即拋卻太華摩雲森剔卓一往歸心如鳥工十分風味似相同沉溟山水柳子厚撥置形骸龐德公攬轡不當分此輩珥筆合在明光宮天床長哦起曳履旋呵凍筆吐機鋒寄語公家王坦之為編乃翁詩集尾次韻游南臺寺青原生下一角麟單丁住山須底物試垂一語傳不朽阿師鈯斧成乾沒憑欄小立與僧語浮雲卷盡千峰出永懷倔強韓退之南遷正坐譏訶佛山雲開遮良偶然自詫精神費詩律閻侯愛山得雲饒勝處遲留多記述慕韓每每手加額見詩未讀壁先拂此公文不數他人微詞天姿含宋屈次韻讀韓柳文穎皋韻秀徹如春在楊柳清遊每見刪題詩無與敵此篇如用兵曹瞞破張繡神遠付一快奇變愕眾口猶如含至美醇釅兵廚酒柳文馬頓塵驕嘶不忘驟置於是文中碔砆雜瓊玖同時公與侯富貴可炙手人驚風雲會自矜時命偶一懽難把玩忽焉成老醜居然成斯集纍纍增培螻兩公獨如在並驅讓先後文章有耿實言語置坐右我老坐詩窮奔走營升斗時能吐佳句英華出枯朽次韻新化道中形骸寄簪紳趣味在林麓楚國富山水下車已心足昨聞入層翠超放等奔鹿情高如謝安舉手弄落瀑恰如紅粧女弓彎雙屈曲登高發清嘯餘響動林木名山冠東南佳處數天目以比衡霍勝家雞例野鶩歸來渡湘江水作鴨頭綠應懷絳翠山歸期何日卜次韻題貯雲堂雲蹤不容挽乃曰堂可貯知誰愛嶽色欲以遮藏故嶽山冠世境自昔廬諸祖道德無鮮陳世相有今古君看馬駒兒乃是僧中虎次韻題明白庵鼻端有餘地世議嗟迫窄君看閻夫子廣莫以為宅去宦游人間面有無求色酒闌愛松風醉眼眩紅碧俊爽類王濟端復有馬癖何當食萬錢四海蒙惠澤湘潭紫翠間松下偶相逆袖中出新詩苦語涼肺膈夜半來床前且以慰窮厄豈真謫仙人何其似太白和宵行不眠盥漱罷和衣肱再曲村落雞未鳴部曲炊已足露行逢遠火盲龜值浮木馬上續殘夢不復較遲速故鄉夫豈遠隨分有松竹自種橘千奴大勝五斗祿次韻題子厚祠堂元和八司馬子厚獨奇偉謫官無以敵妙語淩山翠山以囚自名谿以愚為字醉心谿山間勝處無不至至今永州祠大類羅池祀生存伍猿鳥遠像土偶侍經遊香火罷感歎追前事才高出不容起坐終夜喟和茶陵夢覺索燭見懷聞弦能賞音公獨知雅曲易親復難忘終期老林麓公如追風驥未見所歸宿嗟余老摧頹翩如啄苔鵠遙知雙泉上頗亦蒔松菊何時聞夜舂並齋著茅屋慧觀友李源高風當補續便覺雒秀間杖履笑追逐今非茶陵夢猶欲更秉燭愛公押難韻敏若方破竹次韻偶題鈍拙無人著眼看一庵睡快如梁端那知高軒肯過我終日笑語成盤桓畏公筆力不可敵坐令三峽回奔湍威稜王節照湘楚誇聲眾口鋒刃攢此篇意氣更傾寫句法超絕風格完許令賡酬亦不免但恨語帶儒生酸苦嫌絲竹圍醉枕臥看煙縷凝雕盤雙泉雲樹時到夢神武門前思挂冠朝來清事亦稠疊野飯蓬窗分小團人間曲屈多敗意莫辭時此同幽懽寄題雙泉閻公立朝時凜然古遺直孤忠捍世波砥柱屹挺特一旦成千古埋玉秀山側至今山中泉實以配公德欲知其源深下漲千頃澤沙渠走清快石井湛紺碧譬如澠與淄相去無尋尺日光每下徹山影必倒植倚欄應忻然遊鱗見尾脊知誰念純孝滿掬種白石粲然生玉英冥感吁莫測泉旁有精舍聞多登覽適何時同二老追逐扶瘦策詩成坐假寐夢歷秋山赤想見環珮清繞除餘響滴次韻夏夜隱几群動寂池塘浮夕光瓦溝急雨過熏風滿南堂飛螢忽點衣小立聞荷香東南喜見月微雲復遮藏長哦穎皋詩清語涼肺腸勁氣終不屈莫邪淬光芒高懷寰宇間蠢蠢奔炎涼斯人古遺直天質自溫良茲夜發遐想易親復難忘歸田無別意難以枘入方和遊谷山穎皋擘窠書棐几玉勒銀鉤照林麓山堂聚觀雜賢鄙人人歡然如所欲獨餘耆年視凝遠就觀尚如隔羅縠筠床瓦枕試新涼小雨南風正清熟岸中一笑山荅響我亦為君聊捧腹晚晴軒檻亦何有隔屋茶煙度修竹呼童索紙賦新詩詩成字字清如玉人間何從有此客滿腹精神真可掬我慚衰老亦作詩譬如菌芝生朽木和曾倅喜雨之句清狂平生笑李赤詩慕謫仙名烜赫尤勝曲影傍權門愛其炎炎手可炙袁絲若至晁錯逃熱中未老嗾與嗷猶勝怒及水中蟹不合郭縈持雙螯何如一庵聽松雨潑眼晴窗發茶乳更無俗子作白眼但有水沉橫碧縷長愛朱生論不卑神明不欺寧自欺買金賞誣豈不美尚笑世俗今澆漓玉川作詩曾救月退之抵掌誇奇絕公今又賦喜雨詩詩成肯寄甘露滅氣吐虹蜺辭吐雲才大端如梁與棼麗如宮華蜀錦色駿卻千檣萬馬奔屈宋宗枝君得髓江左風流復興起試手作詩君勿笑毫忽增之至弓秭長哦月出湘淹東翰墨場中久策功千篇翻水不足道絕愛風味如醉翁次韻過醴陵驛解鞍成小寢部曲營夜炊此生一寄耳夢幻相拘縻風飧雜舍者水宿依江湄何時步八塼壓犀簾幕垂三湘在圖畫開屏供臥披公宜宿玉堂明甚無可疑今復聊爾耳間作虎頭癡次韻先生絳闕姿名字占仙籍妙年取榮名翰墨乃其職而云賦歸歟戲語吾不逆醉翁昔仙去人間暫休息文字頗橫流士氣久不懌公實不出後議論有精識冰壺含青春不容一塵隔吐句如善射字字皆中的佳麗增奇峭欹側多醉墨高辭敦故舊讀之氣橫臆閱深似退之頓挫雜拋擲如春飾萬物妙用無罅隙故人困長哦其節不容擊自昔聞公家諸郎居連璧道學進未艾慶澤流無斁紛華脫髮棄酌古分陰惜汎觀得其要雲升復川益孝友如機雲爭攘笑丕植聞風方對食不覺起投筴神交夢成趣意合氣自激廬陵在何許縱望手加額那知湘江上握手笑墮幘妙處無陳鮮傾蓋如夙昔歸來看屋梁喜極心更惕弟兄定世家富貴已尋逼而我世憎嫌莫景桑榆迫相從可忘年頑魯幸勿責一懽難把玩轉顧成陳跡閉門工寢飯且復適吾適遙知不吾詫頗嘗有此客次韻游南嶽退之倔強遷揭陽道經衡山愛青蒼逸群駿氣不可禦頓塵初控青絲韁朝雲偶開豈有意妙意放浪高稱揚我生少小善詩律讀之坐令身世忘朅來結友本上座南遊私喜初心賞橘洲看雪已清絕更櫂野航浮碧湘忽驚萬峰上雲雨走棟飛檐雲雨旁知誰憑欄俯落日跳丸一笑千巖光紫金雞含一粒粟磨塼作鏡傳遺芳小庵自披慈忍服十方普熏知見香巉巉玉骨撼不應但誦妙偈聲琅琅只今般若臺前路過者拳拳加敬莊我尋遺跡恍自失譬如一葦航渺茫三生為掃坐禪石往事令人思建康紹隆佛種有神足九旬妙義談汪洋當年以法施窮乏無數珠璣曾斗量而今但有樓觀好再拜顧瞻空涕滂我公王事獲勝踐自謂此樂非尋常情高賦詩亦感慨十年出處何明詳竹軒莫涼暑雨過風簷把玩情激昂初如冰輪湧東崦漻漻雲幕方高張俄如奇兵出不意鐵衣雪刃森堂堂細窺如春在花柳芳心皺眼開包藏魂驚豪氣立毛髮風檣駕浪奔龍驤韻如玉色映晴晝清如碧瓦粲曉霜適如醉鄉識歸路醇如燒春浮玉觴意公前身是太白醉貌宜披雲錦裳芳津浣匙飯雲子美液澆齒嘗瓊漿吾聞高辭殆天得寧論結髮翰墨場酸寒鳥跡無足道坐令藉湜仆且僵皆言筆端有五色不然古錦纏肺腸夜闌掩卷耿不寐空庭曳履心彷徨譬如三伏黃塵道坐令炎燄欣清涼又如病鶴長側腦仰看千仞孤鸞翔嗟余膽大亦欲和韻險恍疑登太行何時坐隅乞詩稿襟量懸知容攫攘吾恐斯文將斷絕長哦披髮下大荒兒曹乃欲犯矢石洪鐘何異施莛芒公如珠玉在淵石榮輝草木皆煌煌讀其詩律似仙曲不雜人間笙與簧我非賞音空嘆息擬欲學之嗟未皇遙憐與僧登絕頂意適暗驚人世忙詩成氣燄如項籍叱吒千人誰敢當自嫌白髮世不要萬回歌舞聊佯狂盤珠豈有影跡露霧豹不欲文彩彰那知湘上偶邂逅氣岸欣逢許子將霜鬢須面一破笑城隅古寺眠閒房心知貴賤不同調且復抵掌談江鄉稍待暇日陪杖履對公豈敢談文章茲遊正類羊叔子湛然與山俱不忘次韻曾英發兼簡若虛大曾秀發如層顛小曾秋水隨方圓二豪說詩氣壙逸而我老坐如蹲猿弟兄駿氣驥墮地自憐老欲蠶三眠一庵收身萬事外但有壞衲長堆肩會看連璧登集地腰間纍纍金印懸分緣自是公家事安知不秉卿夫難平生忠義要活國濃笑東川無杜鵑古城野寺香鑪裏白灰已燼餘凝煙瘴痾未損方曲臂靜如鴻鶴相倦攣清詩寄我忽驚矍秀對白鷗春水前長哦曳履吐佳句餘韻發越鳴朱絃坐令萬象受控勒知君有筆真如椽細看字字有根蔕滿掬明珠誰為穿詩檀從此不休息受降君已臨中堅復次元韻君家廬嶽蒼崖顛睡足茗碗浮輕圜十年不歸空蕙帳夜鶴哀怨驚曉猿朅來湘尾寄城寺夏簟清涼便晝眠扣門剝啄誰過我上騰火色仍鳶肩軒然辯論雜今古不覺前席心旌懸以身徇國愛子布塞門以土推孫堅雖云詩窮少陵老飢寒正坐拜杜鵑遙知鈴齋賓謁主贈以紫硯浮松煙作詩寄我對岑寂為散頑麻雙腳攣弟兄高才當濟世會看笑揖人主前嗟余百念已灰冷倦易斂翼為虛弦粥魚齋鼓日課辦仰屋臥看三條椽管寧木床五十載好事空傳膝處穿何如斂目十年坐道樹身同金石堅贈別若虛殘暑霽嚴威新涼釀歸思夢驚聞松聲兩鬢到萬事中情怯離別此別仍對子追惟初識面寧復計有此明朝舟洞庭驚浪銀山起醉眼失湘楚妙語凌淮泗我如浮水葉遇坎當自止行將看荊山歸老鹿門寺今不欠無言但是欠一死淮山有奇逸要是天下士若問寂音老煩君一舉似和陳奉御游梁山公詩自雄放故我甘雌伏韻高霜月苦洗盡瘴霧毒游絲映明窗小字為公錄便覺春爭妍勝氣增林麓永懷矍鑠翁論兵到精熟子陽井底蛙提耳論禍福歸來得真主簡易心屈服才高犯眾忌薏苡致謗讟梁生付一笑何必較直曲山僧亦何知魚鼓聽齋粥陳侯金閨彥論清如屑玉南游興未已甚欲乘桴木湘西獨何幸旌旆先見辱松間偶相值論交一言足雲山久乾沒賴此佳句贖次韻曾韻句游山夫子謫仙隱於儒仲連太白真其徒栴檀林間法檀度翰墨場中行秘書譬如山川有珪璧光被草木蒙碔砆又如羽毛有麟鳳瑞照百鳥藏鶚鼯玉堂金馬未入手公不自嘆旁人吁猒看朱門森畫戟暇日聊為山水娛下車褰衣卻部曲縱望林壑情忻愉朱陵洞口見落石引手匊雲跳明珠詩成萬象在掌握磨琢無玷如瑾瑜旁觀十吏不駐足一日萬口傳荊湖南山道人紛紜至摹寫磬石煩丹朱歸來盡以錄寄我意句不盡情有無為公長哦立風檻明月滿軒時卷舒吾聞駿馬日千里未遭剪拂隨鹽車嗟余駑鈍世鄙笑分甘垂耳同騾驢世間安得支遁眼畫作嘶風神駿圖次韻游南嶽題石橋飛梯上雲雨猿臂攀層巖天風吹鬢須茲行非人間幽泉不知處但聞鳴珮環嶮艱礙清快洄渦走平寬澗壑落萬仞濺雪驚潺潺懸崖忽見寺白晝方掩關境令人遐想坐久生清寒山空寂無人鳥啼花不言雲披獻青嶂風檻爭卷簾和游南臺筍輿翩追隨頓撼雜搖兀蒙騰穿聚落超放上巉絕山腰轉巇嶮部曲失行列身世逐雲輕眼力與天闊撞鐘千指集樓殿寄林末同來久倦局相向懷抱豁市朝昏利欲走鹿不忘渴公獨蛻塵埃風蟬妙脫骨盤桓拊孤松松粉落金屑誰卷青帝雲推出銀蟾闕和游福嚴雲開見樓閣峰頂知有寺眾峰讓高寒蓋是出其類媧山下僧譚笑走魔外戲忽於一毫端集此大千界曹溪正脈深不斷蓋如帶流而至衡霍百川蓄匯澮迺知般若臺自昔分燈地清游亦不惡俯仰憶前事寶構出灰燼人逝時亦異永懷韓潮州夜與千峰對仙去三百年音容浮如在妙語落人間斷碑臥榛檜公亦潮州裔聲勢翩已似低摧夙昔心慘憺經游意林高句天成容貌鄙組繪刻之蒼崖陰與山增勝概次韻游高臺蒼杉三十里不復逢川原忽然在林杪萬峰延目觀長崖有積雪松聲雜風泉是時春正深風威猶折綿君堇金閨彥而有清淨緣和雲掃車轍引手酌靈源山空破岑寂笑語荅雲煙魯僧作鷹顧驚此佳少年何以比人品白鷗春水前既非山澤儒亦非地行仙諧峰堆重疊千葉開青蓮景淨若有得茲遊良偶然部曲亦欣羨諠譁下層顛歸來念清境依約聞啼猿次韻見贈已甘老死長松下賞音乃有如公者謬當大匠許才能名器從來豈容假但欣一笑說江鄉意氣平生要傾瀉先生之詩自豪放寒陋心知鄙東野此篇粹然有精思百鍛良金方出冶汗顏縮手置袖間對公誰敢言騷雅自憐華髮住江村地偏心遠過從寡茆簷捫虱鳥聲寂故絮懸鶉成磊苴右耳已從前月聾更欲忘言到瘖啞多生垢習磨未盡公詩又欲臨窗寫何當看公醉岸幘約束萬象閑揮洒眼寒獨立梁宋郊一尾追風睇奔馬讀罷新詩發長歎春色驚回阿練若浪禿宣毫和不成自笑才慳真注瓦次韻曾機宜題石橋公才受斧斤鼻端有餘地一官游人間窮達置度外著屐登名山眺覽吞眼界倒傾蛟龍室聊為翰墨戲搏取華藏海几間日相對石橋亦何有萬峰作階陛平生冠世境勝踐得君輩壞壁題新詩一洗俗眼眥我本箇中人久負未歸債我自負名山名山豈余棄和游南臺老思垂一足飯想成沙纕頓斧盤石上分燈續螺江坐令遺蹟地咄嗟成寶坊永懷青松下睡快欣明窗曾侯有逸韻詩律挾風霜重來拜白塔前身疑姓龐山僧作巴音聳肩頎而長願施筆供養普熏知見香吾觀三公子凜然萬夫望何當吐佳句刻石照沅湘寶月偶值報慈坐中走筆十年塵土中厥狀浸成俗坐令眠雲衣化作征人服此行欲買舟尋我舊山谷識君御水傍笑齒璨明玉肅靜鶖子儀脩拔孝基目殷勤撫道義祖道欲傾覆賴子今妙年真風跬可續聞之厚自愧所趣在幽獨君言如不欺是亦含生福須臾讀君詩氣韻麗可掬心胸何玲瓏多能吾所伏春流日夜急歸心難管束良會故已述妙談何日復吳山嘉有餘為君置茅屋頭白早歸來暮雲無使矚和忠子牛車注經宗兩角那問虛舟移夜壑竹間掃除聞擊聲戲作伽阤歌獨腳心波不興類古井情緣脫盡如遺籜高笑癡兒倚富貴危如乳燕方巢幕已辦山藤待湖月不把芒鞋穿聚落安知沙門自有體全象紛然眾盲摸要之行藏不屬人手自安然隨展握和堪維那移居世路驚風波山林知歲寒君看爭奪中忽覺深渺漫歸來湘西寺兀坐依蒲團摩挲折腳鐺規以穩處安湘山亦多態扶杖時游觀偶逢林下人班草一笑懽霜風水痕落歲月難遮攔但覺頷髭白不知知歲殘堪公故園舊義膽見急難相逢開肺懷傾倒無餘殫所居隔聚落日喜成媻媻作詩誇我賢寧知如玉冠遂分湘山翠茅簷相對看往事都莫理有求真禍端飯罷口挂壁時往發長歎暮寒因有雪爐暖且檀欒送元老住清修湘水有廬山蜀僧有吳韻無塵而俱清雪月夜相映書癡喜借人香癖出天性垂涕撥黃獨糞火曾發哂三年我東鄰家顛開小徑一飯必招呼嘲之終不慍明朝趣去我歲逼青陽近子已飽叢林件件無遺恨贈子湘源春山窮春不盡和杜司錄嶽麓祈雪分韻得嶽字歲晚湘水濱黃塵似河朔江流涸欲盡缾罌汲餘濁鬧聞雙旌出千騎爍山嶽雪雲卷山去天宇獻遼邈嬌鴉集風枝凍鶴時俛啄譚兵杜牧之賦詩果橫槊山雖非故人識面亦已數文章固餘事正爾全三樂太丘令國器讜議久揚榷長吉有美材嶄然見頭角君看分韻詩夭力那容學嗟余老山林輩流殊齷齪寧料寒窘中見此三卓犖和詩無傑句鈍澀費磨琢窮略似孟郊必劣追韓偓贈鄒處士長沙人物秀而雅爭如絕致名天下率更之書更古今鍾王筆蹟遭凌跨藏真草聖夢英篆齊已詩篇洞青畫易生寶覺未暇數邇來鄒敦最聲價巨公要人邈已遍戲畫寂音老尊者繩床壞衲氣深穩霜須瘴面情閑暇平生剛褊語忤世定知見此遭譏罵涼都貴人如玉叢富貴熏天光照夜凌煙風姿劍拄頤妙手當煩為圖寫鄭南壽攜詩見過次韻謝之碔奔世既以為玉芝蘭那知不為蕕人間萬事醉不理攜被來為林壑游雪花成山過驚浪五展暮天開橘洲篙師絕叫風掠耳蕭蕭兩鬢空颼飀松聲盤空上煙翠顧陟佳處每遲留袖中出詩愕坐客涔蹄乃爾容吞舟東坡句法補造化山谷筆力江倒流兩翁連聯竟仙去暮年見子忘百憂念當明日江南路幕阜倚天佳氣浮故人問我今何似為道摧頹如慧球次韻漕使陳公題萊公祠堂萊公少年日逸氣生雲泉定策清東宮天子為矍然奇豪不世出獲一以當千親征功第一尚記破虜年想見和易姿垂柳春風前我公嗣前列剛特才亦全方持使者節眉宇秀而淵高樓獨自登愛公能補天高情弔陳跡妙語吐新篇如風行水上渙然成漪漣乃心在王室何時朝日邊正坐霖雨手豐年自留連何必羨遺蹟公自當濟川次韻經蔡道夫書堂書堂山崦西微路經桑柘婉婉綠陰中傴僂牽羸馬須臾將平川時過幽谿瀉源深人家稀落日耕釣罷過墻傍脩竹深處開茅舍池塘遠軒窗秀露風清夜盃盤燈火裏笑語茆簷下白酒瀉新糟醇釅如壓蔗酒酣面發赤箕坐談王霸排斥出忌諱怪語令人怕野僧舊不懽癡坐相嘲罵但作鶴腦側思歡殆無暇夜闌乞新詩自愧非作者張燈掃西壁把筆強驅駕萬景每騷縱此夕偶相借遂令諸人懽一一如圖畫吳子薪重慶堂吳氏季子世不乏子孫魁壘特秀發人言才業任世重更覺文章有家法奉親作意構華堂想見青紅濕窗闥堂中二老鬥康強夫婦承顏薦壽觴朅來兒姪俱登第舉族請名重慶堂富貴鼎來推不去道德照人閭里光富公玉食由及養范公諸郎盡卿相親養子榮兼有德家聲置公范富上虛簷風月夜未央靘莊成輪發清唱金鴨香清碧縷飄燈前玉頰醉紅潮一尊滿勸何所祝盛事要看追八蕭題嶽麓深固軒湘西峰頂寺樓閣藏煙翠危臺占家顛小軒寄幽致游人常不到石壁照溪邃於世復何求此生眠食耳翛然亦何有蒲團空曲几憑高俯城郭車馬環磨螘城郭望諸峰時見孤雲起贈別通慧選姪禪師選本住山人精進激惰懶規模如乃翁鐵喙石肝膽豈特七閩英蓋亦叢林揀子少長庚曉我老碧雲晚相親出數面別袂聊一挽是非一言足勃窣百事辦分攜青蘋灣相對秋滿眼中秋夕以月色靜中見泉聲幽處聞為韻分韻得見字夜清成水宿月出波灩灩那知是中秋老眼欲淒眩此生天地間飄泊如蓬轉朅來泊湘瀕此月凡七見冰輪上天衢萬里不知遠夜深渡明河輪側明河淺西樓欲吹笛餘聲落哀怨魂靈到月脅寒露紛滿面林光潑流泉天大微雲卷阿崇具紙筆橘亦磨破硯詩成月華清幼婦與黃絹鄧循道分財贍族湘陰諸老賦詩同作卜式與弟貲如塞無底竇其愛止弟耳親舊竟何有二疏得賜金盡以散親舊但可施一時安能繼其後然於簡編中耿光白如晝鄧侯功名姿穎脫蓋天授分財贍族人約券規永久君看純孝心履狶先履瘦紛紛窶人子懸鶉露兩肘雨雪抱兒女扣門易升斗鄧氏豈無貧炊煙滿蓬牖安知寒微中不復生奇秀陰功雖無形報應捷於口此風起頹俗能使薄者厚作詩附家傳想見為拊手贈陳靜之仙郎如驚鸞風格殊秀整文章體自然五色麗雲錦紛紛少年場英氣橫筆陣家聲盛漢魏未暇數唐晉元龍特豪偉太丘苦剛正相逢黃卷中崔嵬山嶽峻君當世其家已見逸群駿笑談不自覺滿坐湖海韻富貴率致身華裾宜綠鬢功名偶然耳何必以身徇未近翠雲裘先看班玉筍弔性上人真漆瞳照人韻拔俗平生直性如劈竹世情好惡我不知是是非非一言足昔年訪道辭七閩丹青生此身外身要將留悅倚門意此心亦是酬慈親慈親未老身先逝夢境悲歡成一戲展開覿體露全機偪塞虛空何處避宣和七年重陽前四日余自長沙還鹿門過荊渚謁天寧璋禪師留二宿作此孤城渺湖天長隄篆湖水柳衙行未窮已過沙頭市連檣來萬艘荻叢出千雉節物近重陽風日正清美忽驚樓閣開寶坊墮平地璋公十年舊出迎一笑喜昨夜及相山歲月入歎喟茲行歸鹿門已作終焉計不辭信宿留愛子多故意說禪有家法翻手了千偈鐵脊敵魔外宗風永零替我留固隨緣思歸亦偶爾為君賦新詩萬象困朝戲去留未用較吾生真一寄瞻張丞相畫像贈宮使龍圖天下張荊州乳兒識名譽醫國陸宣公護法崔元度平生風雷舌咳唾作霖雨隔闊餘十年一旦成萬古羊曇欲作慟生存華屋處支遁亦傷心路偶經姚塢賴有克家子春色連眉宇君看談笑時亦是榦國具會看如乃翁獨立無喜懼文章有種性家法致工主此詩公應聞想見笑掌拊初到鹿門上莊見燈禪師遂同宿愛其體物欲託跡以避世戲作此詩上莊俯漢江古木雜桑柘槐衙陰廣陌麥浪漲平野連雲對囷廩用谷量牛馬我來二月破解鞍綠陰下縱望煙霏中領略見楯瓦耆年骨柴崖迎客意傾寫干戈爭奪餘身在相驚詫山空啼杜鵑龕燈自清夜斂眉問儋州亟口談江夏以余遊二公老大知識寡暮歸逢醉人往往遭捶罵鹿門有餘地賢矧如君者為連修竹林規以構茅舍伏春舊所能犁鉏當學把相見水過膝蓑苙清入畫游白馬寺逢安心上人繖蓋山前曾卓錫晉安王初造禪室水火定成人未知部曲不前馬辟易床邊臥虎如睡犬王雖及門不敢入冰雪親瞻道德容再拜平生願心息兩泉俱出雌雄龍玉殼靈龜蛇五色聰禪笑傲賢王喜魚龜乃能就掌食高風乾沒五百年依舊雲山如夙昔雨中來遊春已老忽見江南少年客坐中偶生鄉井心想見禪山倚天碧清境幽閒欣可名偶然得句因題壁雪夜與僧擁罏僧曰聞唐劉義賦雪車冰柱詩為退之所賞願聞其詩予曰忘矣僧請續之口占以授雪車比毛車弱水誰欲度飄然凌空去中疑載青女朔風為通衢走轂不容馭大勝短轅犢更煩長柄塵直達廣寒宮構基非下土天公亦薄相鏤冰以為柱傍皆是銀床誰與揮玉斧仙妃倚之笑疑是漆室女佛歷二千九百四十八年紀次辛酉陰歷九月初一日竣工中華民國十陽十第一號常州天甯寺刻經處出資刻此全部經理清鎔謹識湖北陶舫溪刊

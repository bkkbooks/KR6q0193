body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編錄毘陵天甯法雲堂校贊釋迦出山畫像贊并序秦越人之於醫望見知死生老潘之於墨摸索知精粗蓋其不傳之妙無地寄語默也歐陽文忠公曰小字遺教經雖不著書者之名然非羲之莫能作也予閱錢樂道家所蓄釋迦文佛出山像雖不主名然非道子莫能作也以其筆意之著也樂道人品甚高鐵書血食之後其沉信痛敬所致像之寄寓決非苟然拜手稽首贊曰遍大海味具於一滴盡法界身足於纖埃佇思則燈王之座不能入毗耶之室斂念則彌勒之門彈指即開惟我鼻祖釋迦和尚初出雪山即示此像以百千億微塵數身九十七大人之相頓入毫端三昧而幻此一幅之上垂手跣足頂螺頷絲超然靜深出三界癡如浩蕩春寄於纖枝如清涼月印於盆池鏤冰琢雪我作贊詞關空鎖夢夫子其牢蓄之漣水觀音畫像贊并序大觀四年春二月戊子之夕病比丘德洪纍然臥縲絏之中夢至一處庭宇闃然有僧導入室中舉燭視壁間有鍾山寶公菩薩之像意欣然欲得之而像輒自墮手中復展視之則化為十二面觀音慈嚴之相心大驚異遂覺已三鼓矣三月甲辰南州德逢上人以書來訊且曰吾以衣缽遣僧詣漣水畫觀音像至其莊嚴妙天下之手德洪追憶前事問其遣僧之日乃其得夢之夕因自感歎菩薩以大悲等慈哀憐照臨如是昭著其恩何德以報之惟以筆舌言詞喻海之深誇日之明耳謹稽首為之贊曰稽首淨聖甘露門無量勝身遍沙界應諸眾生心所求譬如春色花萬卉西方肅殺憂愁地故住寶陀落伽山此方教體在音聞故稱名者得解脫一切眾生殺心盛癡暗不見不發心故現鷹巢蚌蛤中亦作畫師畫其像菩薩豈有種種心皆其悲願力如是何人毫端寄逸想幻出百福莊嚴身屹然欲動于光集譬如將回紫金山瞭然欲瞬眾生好譬如欲圻青蓮花蠻奴水王來獻誠想見細雨天花落眾生五濁熱惱中色欲愛見所熏炙忽然睹此寶月相一切毛孔皆清淨成此不思議功德皆因上人心所獻願我早熏知見香願我常披慈忍服願魔障山速崩裂願大智慧常現前心精遺聞證圓通自然靜極光通達我當定如觀世音一切眾生願如我栴檀四十二臂觀音贊并序予蓄四十二臂觀音菩薩之像如護目睛今以授其友李天輔又為之贊曰汝意有言枯杌作鬼我心不生髑髏則水乃知妄覺一法成二湛然圓明百千一耳稽首大士應物而形隨其小大如谷荅聲千臂執持千眼觀照以無心故受用俱妙臂如青春藏於化身隨其枝葉疏密精神唯此瑞相四十二臂不越徑寸莊嚴畢備清涼寶月或慈或威如欲舉足花輪乘之碧螺之間有佛儼容如蟭螟蟲巢蚊睫中隱於石間顯出蚌蛤以無礙慈不擇清濁我觀震旦種性猛利由聞思入甘露滅地願加被我障盡心開如觀世音無礙辯才我說此偈萬象合掌何以無礙敲空作響華藏寺慈氏菩薩贊并序金陵華藏禪院栴檀慈氏菩薩像相好之工妙天下而神異靈感未易以一二數居景德寺之後殿舒王嘗夢像求易居甚切既覺而忘之已而復夢理前事公夢中固留之像則泣下起而視之真有淚零因大驚異即迎至華藏之大殿俄景德寺火一夕而燼嗚呼三災彌淪大千滅壞像豈得久留人間世而痛自躲免為此兒戲狹劣相耶是蓋護法諸天以像之靈瑞佑之則然非菩薩意也其不可以不辨稽首為之贊曰何人寄逸想游戲浮漚間以如幻之力刻此旃檀像坐令眾妙好秀發千花中天冠束紺髮銖衣絡華鬘種種妙莊嚴成此功德聚當時億萬種感極則悲號樓觀出談笑祕護百寶攢如登睹史天如集龍華會嗟哉像教末羽嘉成百鳥棘生薝蔔林龍神為悲慟王臣實外護異夢非意思願推明月輪出此蓬勃煙願回紫金山安置清涼處至今百福相儼然臨人天神力吁莫測拜起涕汍瀾我諦觀十方實無心外境自然離依他及與遍計執即今目所見非有亦非無如像現鏡中非鏡亦非像願入此三昧識心自然明於十方國土而作大佛事稽首大慈尊證我如是說泗州院旃檀白衣觀音贊并序筠州太平泗州院僧元鑒所蓄觀音菩薩之相慈嚴妙麗靈異殊勝如上天竺所見者問何自得之鑒曰始有客舟載而至傳數家家輒禍至滅亡者皆畏不敢迎獨吾迎事之而無異焉余曰昔廬山文殊師利之像不肯留寒谿而喜隨遠公歸東林金陵彌勒像不肯住景德而現夢於舒王永居華藏今此像乃獨樂寓於鑒是皆與菩薩有大因緣不然聖心豈有所擇而避就之耶為之贊曰我聞菩薩昔因地所供養佛名觀音從聞思修入悟心心精遺聞而得道見聞覺知不可易譬如西北與東南而此乃曰聞可遺令人罔然墮疑網龍本無耳聞以神蛇亦無耳聞以眼牛無耳故聞以鼻螻蟻無耳聞以身六根互用乃如此聞不可遺豈理哉彼於異類昧劣中而亦精妙不間斷況我自在慈忍力無畏解脫獨不然鐘鼓俱擊聲不同知其不同是生滅而二種聲不相參即是同時寂滅法稽首淨智功德聚廣大莊嚴悲願海憫我心明力不逮時時種子發現行如人因酒而發狂戒飲輒復逢佳醞願滅顛倒癡暗障願獲辨才智慧藏游戲十方微塵剎亦施無畏利眾生凡曰有心能聞者同入圓通三昧海靖安胡氏所蓄觀音贊稽首淨智甘露門稽首無礙悲願海稽首紫金光聚山稽首心精遺聞地願賜威光加被我摧滅一切夙障山令我一切剎塵中見此百福如月面菩薩常念諸眾生譬如慈母憶憐子子若晝夜常念母母子百劫必相見如針之契諸磁石如雷之文於象牙皆即自然如是應非諸心識可思量鷹巢現形蚌中出化為畫女并魚師皆隨眾生心所變一一成辦無遺餘妙哉三十二應身一十四種無畏力願於一念淨心現譬如秋月現止水一切眾生見者聞皆入圓通三昧海潭州東明石觀音贊并序長沙馬氏時一夕東城雉堞間光屬天達旦不滅州人按其處有石臥古井旁半為土所吞其色青瑩相與發之即大悲觀音之像挹水灌沐妙容慈相忽然顯露如蓮花之出泥大眾歡呼愛慕之極又如嬰兒之見母於是建寺號東明初以律興餘百年民恃以為福田元祐初長老遷公以禪易之未幾棄去今海禪師自溈山來宴坐於室不蓄粒米倚此像以飯四方來者崇堂邃宇又加麗焉余聞菩薩之悲願於濁惡世一切眾生之用處化身為魚米為肉山以足其欲心今夜半光耀乃其一戲遂與無窮之眾園林花觀飲食臥具充足耶謹拜手稽首對像說偈曰大悲智光本無礙於一切處常發現豈特夜半瓦礫間始復爛然上霄漢此邦眾生共勝業時節成熟故如是譬如日月行虛空水無穢潔皆照臨灰沙若沉波自寒圜影於中迥殊特稽首妙智光世音是娑婆界真教體應機而現為說法信心起處說法竟我今見境得成就亦同音聞獲圓通六根遲速雖不齊要是一精明所現我知暗相不能昏與彼心精遺聞處眾塵隔越妄分別常真實中無是事死生之變尚不改豈有根塵乃能蔽願令持此妙法門於此剎土為佛事一切聲色熱惱中與眾生作清涼處皈命救世大悲者願賜威光加被我令我獲無作妙力令我亦名無所畏令我具無礙辯才令我入一切種智我及一切諸有情皆如觀音得自在空生真贊并序漳南僧慎修游吳中得此畫於敗垣破壁間拂除埃翳神觀靜深如維摩大士得心解脫時出以示余為之贊曰以空寂身無所倚依而捉杖藜以靈知心不在散攝而玩貝葉不舍色聲而證真空與我日用能所心同於一切處寂入法海如風行空無所妨礙但離二執圓成普會當慎以修入此三昧祐勝菩薩贊并序祐勝聖容菩薩僧也航海而至自北天竺頓息此山為邦人福田其靈感如呼谷響應捷而至是其善慈力稽首為之贊曰雷發春曉象牙有花是何因緣而使然耶一切幻物感以無心不思而合如磁石針況我大士慈善根力不起於座沛然甘澤千峰青碧環如長城經今幾時殿閣崇成咨爾邦士時朔薦拜稽首真慈是甘露海繡釋迦像并十八羅漢贊并序吾友羅彥勝之室鄒氏嘗得重疾幾死夢群沙門來慰之已而少瘳乃發心繡十八大士像則頓愈彥勝以武洞清模本為之格凡五年而成夫人精思天巧曲盡其妙可以目識不可以言諭也政和五年秋七月余臥痾石門彥勝室攜十八軸并釋迦如來像來求贊余自顧貧無以為世尊諸大士供乃以筆語為之供名曰筆供養云釋迦佛指以心運茸以針通針針是佛佛佛皆茸十分月滿萬國春同稽首真慈生女巧中第一賓度羅跋囉墮闍尊者霜筠雪竹石磴下安青猊妥尾徐行仰看師則跏趺顧視空几吐詞如雷侍者無耳第二迦諾迦伐蹉尊者蒼髯紫鱗上有懸錫玉像金瓶層置立石蠻王跪看爐煙上直手掐珠輪心境俱寂第三跋釐墮闍尊者神觀靜深合爪欽視誰設華輪前置淨几髯王捧塔自何而至中有全身勿安舍利第四蘇頻阤尊者石床之外老松挺拔玉瓶之中山花自發手持如意默而說似梵帙不看知離文字第五諾距羅尊者樹亦求法身當床坐鹿有施心供以山果雪眉許長舒綰在我默而識之未用驚破第六跋阤羅尊者兩鬼投書與僧聚語師竊聞之抱膝回顧我心均平等視諸趣一念捨心即離五怖第七迦理迦尊者身如蕉虛心如兔止師慈如和侍者笑視毒龍難降我試彈指便升缽中喜見眷尾第八闍羅弗多羅尊者坐依胡床手把笻竹偏袒右肩而收一足小僧滌器師視而笑主伴則殊日用同妙第九戍博迦尊者此琉璃瓶中迸五色是功德聚善慈根力僧俗儼然殊跡同道即事之理一體三寶第十半託迦尊者手雖有拂境以無塵出三毒夢乘五色雲霜露果熟慈忍現身以空為地立處皆真第十一羅怙羅尊者閑提數珠背坐危石捉錫山童越樹而劇象銜藕花來獻法供六根妙同鼻能致用第十二那迦犀那尊者苾芻捧塔示空寂身於菟對我示心境真手把寶書而不展玩又示解空文字不斷第十三因羯阤尊者情無住著袒而憑几侍僧擊磬狻猊臥戲石屏倚天下迸流水水聲觸眼石光到耳第十四伐那波斯尊者縱倚箕踞莫不是定毒既止息邪亦自正缽花自香蒲扇閑把目視雲霄我相未捨第十五阿氏多尊者巒奴鶴立盆花置前倚杖屈足頷髭蚪然了世間空獨游理窟石上軍持是吾長物第十六注茶半託迦尊者心花開敷行象明潔翛然宴坐秀目豐頰萬象之語六根之功以手搏取置不言中第十七難提蜜多羅慶友尊者風度凝遠支頤而倦看此寶塔至身出現戲蠻弄毬引此稚獸萬用不藏如日之晝第十八賓頭盧尊者夷奴碾茶愚中有慧走鹿臥地動中有止而師持塵閒坐俯視曾見佛來法法如是放光二大士贊并序高安龔德莊出畫軸有二比丘像皆梵帔相好上有化佛下布兩花熟視之有光影滅沒如日在蒼蒼涼涼之間於是大驚自失德莊曰始僧繇畫於漢州德陽善寂寺之東壁自是有光世傳神異唐麟德中有僧摸之亦有光以授資州牧王紀紀奉之舟行風濤覆他舟而紀舟進止自若夜泊津次舟人聚語嗟異有商婦孕踰兩年不乳聞之從紀求摹像禱之一昔而乳垂拱三年則天迎置內道場光尤猖狂中宗嘉嘆此為我家瑞唐祚其昌乎今朝治平丁未嘉禾陳舜俞令舉為湖州獲之作贊藏為家寶政和六年春獻於京師有詔摸傳禁中而光猶益奇變京師爭售之畫工致富者比屋然傳以為地藏觀音之像當有據耶余曰是觀世音得大勢至像也受記經曰過去金光師子遊戲佛時有國王威德從禪定起見二童子生蓮華中一名寶意二名寶上說偈發願而釋迦如來前身威德王也觀世音得大勢寶意寶上也於未來世成等正覺則觀世音號普光功德寶如來得大勢號善住功德寶王如來皆以次補無量壽故作雲間跏趺之像僧繇殆非畫師也德莊撫手笑曰當為我贊之人趣可學道乃為婬事苦生那落迦中方無婬欲樂眾生如犛牛愛此貪欲尾異哉兩童子藕花中化生對天龍鬼神作大師子吼我若從今始起於貪欲心是則為欺誑十方一切佛以是因緣故證色身三昧我亦於今日復作師子吼若從今日始不斷貪欲心是則為滅絕十方三世佛願如二大士持心等虛無太虛有殞壞眾生界有盡我此願不盡稽首平等慈廣大同體悲於剎剎塵塵證我作是說杏殼觀音菩薩贊并序龍舒演上人持鴨腳殼中銀杏木所刻觀音像莊嚴妙麗如無邊春隨好光明塵塵具足稽首為之贊曰對現色身色身三昧如無邊春透塵透海使諸眾生道與神會知寂滅法不以身礙隨欲觀者非小非大此銀杏殼纖穠向背百福莊嚴千花自在稽首大慈如大地載如皎空月無所覆蓋舍精進幢如堅剛鎧太虛殞消我願不退李伯時畫彌阤像贊并序政和八年五月十五日宜春黃先之攜李伯時所畫阿彌阤像來東山為示余觀伯時畫多矣大率顧陸之意意不盡態故不施五色而伯時知之耳問其所得曰李仲元仲元中為裒法官以遺所厚善者先之苦求得之余諦視其筆跡非今輩所能為其為伯時之筆審矣稽首為之贊曰以慈為室以忍為衣法空為座示同體悲四十八願為世所歸如日沒時鳥接翅飛大哉甘露妙法總持令我觀門洞開坦夷諦見自心妙絕知思是皈依處真不思議律我意馬使不妄馳光明現前見白蓮池不假中陰屈伸頃時欣然化生如八歲兒何以至此請審思之皆我精進想力所持稽首妙湛不動巍巍令一切眾絕癡暗疑有同願者但瞻導師脫然蟬蛻出五濁泥漣水觀音像贊并序世傳漣水賀生所畫觀世音像不減唐吳道子晚以法授其婿陳守安守安遂以其畫名世政和七年五月初吉佛鑑大師因公出其畫示余精深之工曲盡其妙可以目追心數其巧要不可以言得也謹拜手稽首贊曰聲音語言形體絕何以稱為光世音聲音語言生滅法何以又稱寂靜音凡有聲音語言法是耳所觸非眼境而此菩薩名觀音是以眼觀聲音相聲音若能到眼處則耳能見諸色法若耳實不可以見則眼觀聲是寂滅見聞既不能分隔清淨寶覺自圓融以無執故則有光雖有千臂如兩手以無分別故寂滅雖有千手如一身既無分別亦無執雖有千眼兩目同故稱光音寂靜音及觀世音三種異稽首對現妙色身遍一切處如虛空妙哉此像非筆畫厭足佛子欣慕心藕絲銖衣春霧白覆此隨好光明聚一切眾生熱惱滅我手方捨甘露枝唯佛子因心清淨如水澄澈月清亮借於畫工百巧伎如暗室眼以燈見了知此畫非工有謂燈能見其可哉我無此像乃能贊如眼見物不自見自能說偈不蓄像眼有見矣燈亦可願持此大解脫門施眾生作無所畏世世得無礙辯才稱贊觀世音功德印上人持觀音像來乞贊余曰率伯時畫也為作此贊稽首淨勝光明聚無礙慈忍精進幢清淨圓滿萬星月分身如影分千江佛子心如涔蹄水隨其清濁現影耳從來但聞一月真是影何從有非是寒松瑟瑟哀霜風愛此贊辭章句同佛子正當以身讀即滿追求顛倒欲衡山南臺寺飛來羅漢贊并序舊說太平興國初武牢沙門惠了游廬山宿於雲居寺中夜聞呻吟甚苦及旦視之有僧雪眉而臞臥腥臭中見了涕泣指其瘡曰當奈何了惻然憐之為留五日洗摩傳藥甚有恩惠踰年瘡愈謂了曰我家南嶽子他日遊湘中當過我於石崖峰下探懷出紙裹付了了送至西嶺訣別而還視裹中乃瘡痂為屏除臥處亦皆瘡痂也心惡之俄成熏陸投諸火中有異香了心駭異之明年春南來果逢雪眉於國清山路間倚杖而笑曰來何暮也相與坐青林之下語笑歡甚了問石崖峰安在雪眉以手指之俄失所在於是了乃悟其為聖賢也悵恨彌日至方廣寺入羅漢堂而雪眉乃在十六像中了殊大驚喜躍逗留久之後至南臺見昔同學道普者為敘說其事有童子方掃除聞之停帚參立曰今日添香殿廡間羅漢輒剩一身了亟往視之即方廣所見雪眉塑像自是號飛來羅漢了後還雲居以瘡痂葬西嶺為壇其上今號羅漢壇如來世尊曰如今世間曠野深山聖道場地皆羅漢所住持故世間麤人所不能見夫豈不然哉皇祐間泉南僧谷泉隱居芭蕉菴有異跡嘗自後洞負石僧像至南臺而像無慮數百斤後人誣此僧為飛來羅漢非也余不可以不辨宣和元年春余與大梁郭中復彥從來遊彥從問像所從得因為敘之而長老昭公請為書之贊曰惟毗尼藏稱性之印印一切法無有少賸而此尊者跏趺不瞬外寂中空幻滅都盡諸佛子等勿故起妄於是像中作去來想昔本不來今亦焉往即一切法離一切相如一月真無二無別於眾水中同時見月像非異同月豈生滅以應緣故光影清絕鍾山眾泉石井異味靈隱眾山小嶺異翠此嶺此泉皆飛而至示根境法其實同體如此大士諸法成就南嶽廬山宴坐馳走而事藏界隨處而有雖證無生亦不滅受無為山十生觀音贊死生二法了無實相世駭異之墮顛倒想公獨不然十生一念化緣之跡皆可考驗一切聲音當以眼聽俱不相參以本寂靜要如菩薩色相對現何以必之我有大願第十五祖真贊并序迦那提婆尊者為十五祖傳佛心印猶以眾生不能信受其言為憂乃訴於大自在天像曰願神賜我使言不虛設嗟乎道之難行非獨今也稽首贊曰石彪肉醉木駒夜嘶我此三昧非識情知應緣而現不落思惟是故缽水以針投之如仲尼韶如子期琴又如蕭何而識淮陰無言可寄無跡可尋粲然現前傳之以心穴像之目我豈慢神指樹之耳我知其因物我如是所立皆真隨其妙用見我全身稽首真慈為僧中王如萬星月見者清涼尚以眾生不信為傷蓋盲者咎非光掩藏六世祖師畫像贊并序余竄海上三年而還館於筠之石門寺悲叢林之荒寒念祖師之標致不自知涕流也作六世祖師贊錄以寄昭默禪師以見其志云初祖妄想無性證不滅受前聖所知轉相授手風煙花開器界以形霜露果熟王子乃生護持佛乘指示心體但遮其非不言其是嬰兒索物意正語偏哆啝之中語意俱捐二祖頂峰朝露神光夜生堪任單傳荷擔上乘自尋其心不見歸宿如視環輪求其斷續用獄除間履瘦知肥婬坊酒肆盡其塵機雪中斫臂願續佛壽兒孫聞之豎毛呵手三祖六道暗昏不礙明潔毫釐弗差證甘露滅但赤頭顱特諱名氏離見超情欲盡世累潛谿海山麻衣風帽翩然往來被褐懷寶精一其誠聲名俱捨後世丘墳猶無知者四祖破頭峰下龍象雜遝衣付小兒道傳嬾衲乃爾相違求人為法天書至門堅臥不荅念諸眾生捕風捉影十地治之猶未蘇醒師發笑曰何必眩瞑但勿強名自然無病五祖觀前後身兩鏡一面左右對之三者頓現今非昔是增金以黃昔非今是謗沉無香已絕死生豈纏老少全機現前常明而妙夜江佐舟吾今渡汝句中之眼如水有乳六祖是風旛動眼自遮護非風旛動心則顯露是謂曹谿顯及要旨欲證之者勿留汝意暫時斂念妙寂了然汝自受用密非我邊負石春糧趁獐逐兔鏡中之空欲尋無路寶公畫像贊水月道場嚴淨久空華人世落殘餘骨埋龍阜誰名寶卻在鷹巢不姓朱棗柏大士畫像贊道之深妙不可以義得故設彖象以盡其旨心之精微不可以言傳故指事法以傳其妙惟棗柏大士深入此三昧故謹稽首為之贊曰鬚眉如畫頎而美風神如秋氣奇偉平生歸宿東北方長勞動中寂而止翛然跣足散衣行智智用中不乖體帝王家生得自在壽量不書絕終始虎受使令心境空女為伴助憎愛棄冠巾傳心即俗真方隅示法即事理只將棗柏薦齋缽我來閻浮非著味自然光明生齒牙我談辭章皆實義佛子授汝以顯訣一言便足超十地隨順無明起諸有若不隨順有離異聖賢酪生凡乳中只由觀照戒定慧是謂大士同體悲令我頓入一切智作大佛事遍塵剎華藏界中容頓轡以空為坐禮十身以願為舌說千偈如以花說無邊春如以滴說大海味稽首世間妙蓮華願常清淨出泥滓永嘉真覺大師真贊并序永嘉尊者初閱維摩經發明心要欲定宗旨遂造曹谿印可於祖師一宿而去世咸以一宿覺名之余讀其歌辭究其履踐如尺圍鑰合未嘗不置卷長嘆想公之為人碩大光明壁立萬仞而視今之學者寒酸瑣細紛紛蠢蠢宗教興衰於此可知矣贊曰情根無功意識無作現量圓成見聞知覺如鏡受燈光無壞雜烈火焚燒河流湍逝谷風怒號大地依止俱無知思亦復如是此涅槃門如鼓塗毒曹谿撾之聞者僵仆以椎授公萬像驚縮光明之語粲如日星精嚴之行清如玉冰唯不傳者與空相應我初學道如握與拳晚乃覺之如手安然有時而用搏取大千百丈大智禪師真贊并序馬祖大寂禪師已化塔於海昏之石門師廬其旁既久衲子相尋日增於是厭山之淺乃沿馮水而上至車輪峰之下與希運惟政火種刀耕而食遂成法席余崇寧四年春至山中獲瞻遺像雖冰枯雪老若不勝衣而神氣峻邁如未度世謹拜手稽首為之贊曰以實問荅空可青黃以意求道神落陰陽陰陽不測脫略陰界青黃摸畫果因不昧我有大機佛無密語如師子王露地方踞稱性文字隨分叢林如以妙指發和雅音同世之波壽九十二護持心宗諡曰大智大達國師無業公畫像贊并序余初讀公之語悚然異之及考其行事若尺圍鑰合然於是自恨不生公時與之游又恨公不並生於今以見大法將季之際其徒有大可愍笑者拜其像而贊曰以如是觀覺知見聞性等太虛卓然而存示其身世如空忽雲應緣上洛寄名李氏在齠齔中儼大乘器坐必跏趺行必直視十二落髮二十受具能於諸佛放身命處解衣磐礡從容笑語江西指佛即心最的初亦不然回首乃識如眼照物了證無惑燕坐并汾聲動天壤有所問詰戒莫妄想兩朝致敬累召不往終不得已別道以行蓋視死生洞若戶庭出入去來物莫能嬰眾生拘囚如蠅唾污公如香象卓立回顧擺壞韁鎖自在而去公之所養一至於茲人英僧傑龍章鳳姿諡曰大達憲穆之師赤眼禪師畫像贊并序士之學必有功名之羨方其銳於立也平居議論展拓所畜若可以唾手而取及其臨事能卓然不外其言者蓋鮮矣豈天下之事論之必易而成之必難也哉蓋中人之情喜榮樂而厭勞苦惟其如此故其志不足以經遠功名難事也勞苦易厭者也遭易厭之勞苦而取難事之功名又非上智之姿而成之鮮蓋亦無足怪者傳曰志者事之竟成也士之不足以知此故疑眩敗亡如此赤眼禪師志於道者也初人視師目有重瞳其貴不可言師大懼因昧其目選遁巖石間如禍之在己嗚呼從事於功名者咸以榮樂勞苦為異而忻惡交戰於胸中禪師以從事於道故不知榮樂勞苦為異而得擲於身外自非真誠以大悲智為眾生依者疇能及之吾故仰其風而恨異世不得與之游乃為之贊曰森森禪林公特秀出輕世急道不可跂及遺風至今秋霜烈日我初瞻像再拜稽首一室嚴冷如虎方吼嗟余寡助乃生公後忍視大法陵夷末運奴婢小人利欲迫窘冀公一吒腦破膽隕嗚呼公乎再見無由冗欀方熾何時云休願起公死從之以游破灶墮和尚贊并序余閱傳燈愛老安之子所謂破灶墮者深證無生恨不與之同時而生也紹聖中再游廬山見其像而贊曰嵩山屋老灶有神民爭祠之日宰烹師與門人偶經行即而視之因歎驚此唯土瓦和合成是中何從有聖靈以杖敲之輒墮傾須臾青衣出笑迎謝師為我談無生言訖登空如鳥輕門人問之拜投誠伏地但聞破墮聲君看一體情非情皎如朗月懸青冥未證據者以事明鞭草血流石吼升涅槃門開見戶庭老安憐兒為作名金屑雖貴翳眼睛永明禪師真贊二首并序永明智覺禪師乘悲願力示生震旦傳佛心宗為法檀越其宏名辨才學者依以揚聲議論言句浩如山海余漁獵其間餘二十年至其妙處輒能識之如鵝王擇乳無有遺餘蓋嘗自志其鄙陋直欲追禪師逸駕為之伴侶以游十方國土作大佛事尚未晚也謹再拜稽首為之贊曰三界種性有萬妍醜生順死逆夢夜想晝往復無間聲度垣牖皆依末那戲論成就而末那體無作無受譬如空花實無而有一念了知光明通透我如是見無有錯謬是為心宗祖佛授手孰振頹綱秀傑奇茂稽首永明月臨星斗以公風神為我律度交神見之是真保護陳尊宿贊雲門臨濟一龍一夔嗣存參運皆公使之叢林米嶺眾不滿百僉一典客覺有難色即袖手去古寺閒房織屨養母自含其光欽其遺風秋滿鬚髮唯不少貶是真弘法臨濟和尚贊一句中具三玄一玄中具三要腦後見腮村僧向上更有一竅長沙岑大蟲真贊并序余游長沙至鹿苑見岑禪師畫像想見其為人昔如來世尊語阿難曰汝元不知一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體龍樹菩薩曰諸法不自生亦不從他生不共不無因是故說無生以佛祖之辯談法之妙其清淨顯露如掌中見物無可疑者而末世眾生卒不明了者蓋其迷妄之極非其所聞之習故也禪師憫之故於所習之境譬之曰若心是生則夢幻空花亦應是生若身是生則山河大地森羅萬象亦應是生大哉言乎與首楞嚴中觀論相終始也禪師大寂之孫南泉之子趙州之兄開法於長沙之鹿苑當時衲子倔強如仰山者猶下之而呼為岑大蟲為之贊曰長沙大蟲聲威甚重獨眠空林百獸震恐寂子兒戲見不知畏引手捋鬚幾缺其耳大空小空是虎是你如備與覺可撩其尾嗟今衲子眼如裴旻但見其彪安識虎真我拜公像非存非沒百尺竿頭行塵勃勃清涼大法眼禪師真贊并序余元符初至臨川承天寺寺基宏壯可集萬指而食堂蕭然殘僧三四輩而已因讀舊碑乃知為大法眼禪師開法之故基影堂壁間畫像存焉神宇靜深眉目淵然而英特之氣不沒豈荷負大法提挈四生者其表故如是耶稽首為之贊曰非風幡動非風鈴語見聞起滅了無處所何以明之俱寂靜故此光明藏平等顯露由本無明愛欲慳妒如隔日瘧痛自遮護有能了者即同本悟索爾虛閑隨緣靜住一切仍舊自無染污為物作則嶮崖之句不可犯干如大火聚玄沙宗一禪師真贊根門有功則是心外見法用處換機則是問時有荅問荅交馳摸索大道心法對峙破碎真如異哉此老超出兩途亡僧面前波全露水猛虎須畔光自照珠衲僧不識如井覷驢雲門匡真禪師畫像贊二首并序富鄭公家所蓄雲門匡真禪師像僧元靜移寫其本藏於鍾山大觀三年六月余獲拜觀焉稽首贊曰見流滔天公峙如山壁立萬仞捍其狂瀾可望而卻不可覽攀犀顱虎眸美髯繞頰雲辭電機霹靂為舌邪宗墮傾魔膽破裂須臾清明光風霽月叢林驢騾蹴踏龍象不可系羈逸氣邁往我不得濟大地是浪忽然現前清機歷掌阿羅漢有三毒捺落迦沒杷柄咄哉黃面淛子一生喫著不盡南安巖主定光古佛木刻像贊并序僧彥珣自汀州來出示定光化身木刻像平生偈語百餘首皆稱性之句非智識所到之地真雲門諸孫也珣求贊辭力甚謹再拜為之贊曰秦時𨍏轢如刀口希廓然見前石火莫追法於是中不著思惟舉既不顧咦之而往天中函蓋目機銖兩久雨不晴清機歷掌孰傳其要絕塵逸群深明二子詳豁諸孫維定光佛出豁之門以真如用使令萬象反易黠魯縱奪雨暘洗癡暗目回顛倒想示汝語言一切智畏如月入水如風行空無所妨礙贈以之中我復憐汝智愚未識方其死時謂是生日如光照珠如甜說蜜毛氏所蓄巖主贊此像為誰天中之尊道傳雲門為四世孫白帽蒙首鬚髯繞頰見之清涼洗煩惱熱以偈為檄指撝造化詩迺辦兩出於咄嗟以境惟心往復無間是故死時亦生之旦怒猊乳虎亦生敬虔何以致之真慈則然南率古巖形如側罄稽首定光千江月影佛歷二千九百四十八年紀次辛酉陰歷九月初一日竣工中華民國十陽十第一號常州天甯寺刻經處出資刻此全部經理清鎔謹識湖北陶舫溪刊

body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編錄毘陵天甯法雲堂校行狀雲庵真淨和尚行狀師諱克文黃龍南禪師之的嗣陝府閿鄉鄭氏子生而穎異在齠齔中氣宇如神人與群兒戲輒相問荅語言奇怪聞者駭愕不能曉則復軒渠笑悅而去奕世縉紳既長喜觀書不由師訓自然通曉事後母至孝母嚚數困辱之親舊不忍視其苦使游學四方旅次復州北塔寺長老歸秀道價方重於時詞辯無礙因側聆坐下感悟流涕願毀衣冠為門弟子秀笑曰君妙年書生政當唾手取高第榮親乃欲委跡寂寞豈亦計之未熟耶對曰心空及第豈止榮親又將濟之委跡寂寞非所同也秀奇其志而納之服勤五年如一日年二十五歲試所習為僧明年受具足戒即游京洛翱翔講肆賢首慈恩性相二宗凡大經論咸造其微解帙捉塵詞音朗潤談辯如雲學者依以揚聲燕居龍門山偶經行殿廡間見塑比丘像蒙首瞑目若在定者忽自失謂同學者曰我所負者如道子畫人物雖曰妙盡終非活者既焚其疏義包腰而南平易艱險安樂勞苦諸方大道場多所經歷自重其才以求師為難嘗至雲居謁舜老夫機語不契不宿而去又至德山應禪師方夜參雌黃先達有六祖不及雲門之語失笑黎明發去聞雲峰悅禪師之風兼程而往至湘鄉悅已化去歎曰既無其人吾何適而不可山川雖佳未暇游也因此行寓居大溈夜聞僧誦雲門語曰佛法如水中月是否云清波無透路豁然心開時南禪師已居積翠徑造其廬南曰從什麼處來曰溈山南曰恰值老僧不在曰未審向什麼處去也南曰天台普請南嶽雲游曰若然者亦得自在去也南曰腳下鞋是甚處得來曰廬山七百錢唱得南曰何曾得自在師指曰何曾不自在耶南公大駭參依久之辭去至西山翠巖長老順公與之夜語自失曰起臨濟者子也厚自愛而師亦神思豁然德其賞音及南公居黃龍復往省覲南公嘗謂師曰適令侍者卷簾問渠卷起簾時如何曰照見天下放下簾時如何曰水泄不通不卷不放時如何侍者無語汝作麼生師曰和尚替侍者下涅槃堂始得南厲語曰關西人真無頭腦乃顧旁僧師指之曰只這僧也未夢見在南公笑而已隆慶閒禪師與師友善方掌客閒問曰文首座何如在黃檗時南公曰渠在黃檗時用錢如糞土今如數世富人一錢不虛用自是為同時飽參者所服南公入滅學者歸之如雲所至成叢林熙寧五年住筠州大愚太守錢公弋來游怪禪者驟多眾以師有道行奔隨而至錢公即其室未有以奇之翌日命齋師方趨就席有犬逸出屏帷間師少避之錢公嘲之曰禪者固能伏虎反畏犬耶師應聲曰易伏隈巖虎難降護宅龍錢公大喜願日聞道乃虛聖壽寺命師居之師方飯於州民陳氏家使符至遁去錢公繫同席數十人將僧吏求必得之而後已有見於新豐山寺者即奔往陳氏因叩首泣下曰師不往吾黨受苦矣師曰以我故累君輩如此因受之遂闡法焉未幾移居洞山普和禪院元豐之末思為東吳山水之游捨其居扁舟東下至鍾山謁丞相舒王王素知其名閱謁喜甚留宿定林庵時公方病起樂聞空宗恨識師之晚謂師曰諸經皆首標時處圓覺經獨不然何也師曰頓乘所談直示眾生日用現前不屬今古只今老僧與相公同入大光明藏游戲三昧互為賓主非關時處又曰經云一切眾生皆證圓覺而圭峰易證為具謂譯者之訛其義如何師曰圓覺如可改則維摩亦可改也維摩豈不曰亦不滅受而取證夫不滅受蘊而取證與皆證圓覺之義同蓋眾生現行無明即是如來根本大智圭峰之言非是公大悅因捨第為寺以延師為開山第一祖又以神宗皇帝問安湯藥之賜崇成之是謂報寧歲度僧買莊土以供學者而自撰請疏有獨受正傳力排戲論之句者敘師語也又以其名請於朝賜紫方袍號真淨大師金陵江淮大會學者至如稻麻粟葦寺以新革室宇不能容士大夫經游無虛日師未及嗽盥而戶外之屨滿矣殆不堪勞於是浩然思還高安即日渡江丞相留之不可遂卜老於九峰之下作投老庵紹聖之初御史黃公慶基出守南康虛歸宗之席以迎師師曰今老病如此豈宜復刺首迎送為我謝黃公乞死於此其徒哀告曰山窮食寡學者益眾師德臘雖高而精神康強康山自總祐二大士之後叢林如死灰願不忘祖宗赴輿情之望不得已乃行先是黃公嘗望見師於丞相廣坐中師既去丞相語公曰吾閱僧多矣未有如此老者故公盡禮力致之廬山諸剎素以奢侈相矜居者安軟暖師率以枯淡學者困於語言醉於平實師縱以無礙辯才呵其偏見未期年翕然成風三年今丞相張公商英出鎮洪府道由歸宗見師於淨名庵明年迎居石門崇寧元年十月示疾十六日中夜沐浴更衣趺坐眾請說法師笑曰今年七十八四大相離別火風既分散臨行休更說遺戒弟子皆宗門大事不及其私言卒而歿壽七十八臘五十二茶毗之日五色成燄白光上騰煙所及處舍利分布道俗千餘人皆得之餘者尚不可勝數塔於獨秀峰之下師純誠慈愛出於天性氣韻邁往超然奇逸見人無親疏貴賤溫顏軟語禮敬如一主持叢林法度甚嚴有犯令者必罰無赦以故五坐道場為諸方所法得游戲三昧有樂說之辯詞鋒智刃斫伐邪林如墮雲崩石開發正見光明顯露如青天白日人人自以謂臻奧至於入室投機則如銅崖鐵壁不可攀緣性喜施隨有隨與杖笠之外不置一錢行道說法五十餘年布衣壞衲翛然自守於江西有大緣民信其化家家繪其像飲食必祠嗣法弟子自黃檗道全兜率從悅而下十人餘此其平生大概也至其道之精微皆非筆墨可能形容竊嘗論之其棄儒冠而入道類丹霞奔經論之學而穎悟類南泉尋師之艱苦凜然不衰類雪峰說法縱橫融通宗教類大珠至於光明偉傑荷擔宗教類百丈此非某之言叢林學者之言也嗚呼兼古宗師之美而全有之可謂集厥大成光於佛祖者歟崇寧二年十月十五日門人某謹狀泐潭準禪師行狀公諱文準興元府唐固梁氏子生始幼見佛像輒笑張牙不喜聞酒胾金仙寺沙門虛普乞食至其家師唐門酬酢如老成時年八歲即辭父母願從普歸授以法華經伊吾即上口元豐僧檢童子較所習以藉名先後度師藝精坐年少不得奏名陝西經略范公過普廬普臘高應對領略師侍其旁申辯詳明進止可喜范公欲攜與俱西師辭曰登山求玉入海求珠人各有志本行學道世好非素心范公陰奇其語度以為僧剔髮既往依梁山乘禪師呵曰驅烏未受戒敢學佛乘乎師捧手曰壇場是戒耶三疊結磨梵行行阿闍梨是戒耶乘大驚師笑曰雖然敢不受教遂受具足戒於唐安律師遍游成都講肆倡諸部綱目即棄去曰吾不求甚解大法師曇演佳其英特撫之曰汝法船也南方有亞聖大士有若溈山真如九峰真淨者知之乎宜往求之師拜受教與同學志恭出詣溈山久之不契乃造九峰見真淨於投老庵問曰什麼處來對曰興元府曰近離何處曰大仰曰夏在什麼處曰溈山真淨展手曰我手何似佛手師罔然左右視真淨呵曰適來句句無絲毫差錯靈明天真才說箇佛手便成隔礙病在甚處師曰不會真淨曰一切現成更教誰會師服膺就弟子之列餘十年所至必隨紹聖三年真淨移居石門衲子益盛凡入室叩問必瞑目危坐無所示見來者必起從園丁壅菜率以為常師每謂公曰老漢無意於法道乎莫能測也一日舉杖決渠水濺衣因大悟方見老人平日用處走敘其事真淨罵曰此中乃敢用磊苴耶自是跡愈晦而名聲愈著自其東游淮淛所至衲子成叢林顯謨閣待制李景直守洪州仰其風請開法於雲巖未幾殿中監范公帥南昌移居泐潭方是時禪林以飲食為宗以軟暖為嗜好以機緣為戲論師悲歎之師槌柫之下常三百人而宿戶外者又百餘許求入室就學師難之乃謂之曰十方無壁落四面亦無門闍梨從什麼處入對皆不契每曰我只畜一條柱杖佛來也打祖來也打不將元字腳涴汝枯腸如此臨濟一宗不到冷落學者莫窺其奧然升堂說法辯如建瓴不留影跡一時公卿大夫宗向之以政和五年夏臥病侍者進藥餌師泛然如無意誡須忌食毒物師亦未嘗從有問其故曰病有自性乎病無自性則毒物寧有心乎以空納空吾未嘗顛倒而汝輩欲吾昏迷耶七月二十二日更衣說偈而化閱世五十有五坐三十五夏闍維得舍利晶圓淨光不壞道俗千餘人皆得之門弟子等收塔于南山之陽嗚呼雲庵之神悟於南公之門超軼絕塵者也予每疑嗣之者難及觀師之風格殆所謂家名辯才氣宇逸群者耶謹狀花藥英禪師行狀代臨濟九世之孫雲庵真淨之嗣師諱進英字拙叟出於羅氏其先吉州太和人幼孤母憐之性慧敏齠齔中日誦千餘言通詩禮大義與群兒嬉游侮玩之氣出其上親舊愛敬之使著縫掖為書生輒病至於死鄰母泣曰吾始娠夢有乘空而語曰而出家則疾有瘳矣於是擊鍾梵放誓於佛前乞以為僧洞隆童子而藉名於善集才年十八試所習得度受具戒即欲經行諸方以觀道報劬勞之德其母有難色於是庵於母室之外名曰精進士大夫喜其為人賦詩為贈多佳句螺川父老迨今道之母歿心喪三年修白業為冥福即游淮海所至少留當時號明眼尊宿遍謁已雖未契而嘗識多賢者晚謁雲庵夜參聞貶剝諸方以黃檗接臨濟雲門接洞山機緣為入道之要擿其疑處以啟問師恍然大悟如桶底脫佛印禪師叢林號大宗師有盛名慎許可獨以師為俊彥師有爽氣喜暴所長以激後學三十年一節不移故佛印呼為鐵喙初開法住長沙之開福十年之間殿閣崇成又五年棄之翩然北游五臺遍覽聖蹟乃南還庵梁山天下衲子益追崇之政和甲午衡陽道俗迎住花藥之天寧勸請皆一時名公卿師以教外別傳之宗授上根以漚和般若化道俗老益康強精進不替嘗中夜禮佛作息飲食不肯與眾背叢林信其誠民人化其教得法而為一方領袖者不可勝數搥拂之下嘗二千指龍象雜遝方進而未艾也其激揚大事游泳語言備存三錄曰報慈曰鴈峰游臺盛行於世宣和三年冬謝事復庵梁山越明年臘月示疾蟬蛻嗚呼若人已矣予竊為桑門惜之參學稟淳一日泣訴於予以予知其師之深者欲干其狀而求銘故為書云耳長沙孫承之謹狀傳十世觀音應身傳并贊唐大菩薩僧寬公出於益州孝水楊氏方其娠也母失常性卻酒胾有慧辯及其生也無痛苦聞異香忽然在前即能言言我名慧寬有女兄信相亦神異年相聯於齠齔中終日論說聽者一不能曉其父瑋以符咒為兩川道俗所歸而不知有佛經人錄其所論百許紙時懷龍山會禪師聞其異至瑋舍瑋出示之會驚曰與佛經合不測人也俄有異比丘入火光三昧於淨慧寺特召信相信相至曰此室皆火聚其可入哉曰以水滅之可入信相即作水觀而入於是異比丘化其父母使出家父母曰許娉矣奈何鄉里爭出財贖之公因信相亦俱依慧空寺慎公避太祖御諱剃落焉公時年十三從會公授經律會畏之如神反從質疑天姿謙敬未嘗怒懷龍眾三千指皆躬力作公獨閑適人以為言會曰此吾先師也昔周滅吾法吾從曇相禪師隱于終南山及隋教復興吾辭而歸蜀曇相囑曰汝當領徒大作佛事有童子名慧寬者善視之此其後身眾因不敢復言公年三十乃還綿竹廬于無為山以神異化而全蜀爭師事之如淮泗之僧伽七閩之定光公嘗赴江陵大會朝發夕返荊州府前有拳石含五音天下聞之公取以歸今置定身龕中什邡陳氏施園為寺公以竹標其中曰以此為基拔去竹泉泫然而出掘之得巨石石下有寶瓶舍利公作禮乃放光永徽四年夏六月二十有五日歿於淨慧寺閱世七十坐五十五夏贊曰予讀無為山廣錄公始發心日誦觀世音名十萬遍生五天十世為居士生震旦十世為比丘皆出楊氏又瞻其畫像天骨秀特和敬之威望之肅然是所謂真比丘也鍾山道林真覺大師傳梁大菩薩僧寶公以宋元嘉中生於金陵之東陽民朱氏之婦上巳日聞兒啼鷹巢中梯樹得之舉以為子面方瑩徹如鏡手足皆鳥爪七歲去依鍾山大沙門僧儉為童子儉名之曰寶誌長而落髮專修禪觀坐必越旬久之忽無定居多往來𤾂山劍嶺之下髮而徒跣著錦袍飲啖同於凡俗恒以鏡銅剪刀鑷屬挂杖負之而趨經聚落兒童譁逐之或徵索酒殽或累日不食嘗從食鱠者求鱠食者與而心笑之即起吐水中皆成魚相傳始驚異時時題詩初不可曉後皆有驗建元間異跡甚著丞相高嵩為武帝言之以禮自皖山迎至都舍於陳征虜之家輒自釐其面分披之出十二首觀世音慈嚴妙麗傾都聚觀欲爭尊事之武帝忿其惑眾收付建康獄旦夕咸見游行市里既而檢校猶在獄中其夜又語吏門外有兩輿金缽盛飯汝可取之果文惠太子竟陵王送供至建康令呂文顯以事啟帝帝迎至禁中俄有旨屏除後宮為家人宴公例常與眾出已而猶見行道於景陽山比丘七輩從其後帝怒遣使至閽吏曰公久出在省中吏就視之身如塗墨然武帝聞之大驚陳顯達鎮江州大司馬段齊之從行往辭公公無他語但引紙畫鴉畫畢授之曰緩急可用此顯達叛齊之遁去顯達大怒遣騎追之將及齊之窘甚見鴉喧暮林即匿其下鴉翔集自如騎既失其蹤但見鴉林必非人所寄遂去齊之方悟公意也鄱陽忠烈王飯公於私第顧左右覓荊枝有折以獻者則以安門上而去俄有旨以王領荊州衛尉胡諧臥病以書哀訴幸以屈臨庶幾疾有瘳公題其書尾曰明屈翌日果卒僧法平欲以衣獻公不知所寓遣使遍求之龍光罽賓兩寺皆曰夜宿此黎明去矣又嘗所厚善厲侯伯家侯伯曰公夜行道於此今睡未興使人視之笑去公在華林園忽重著三布帽亦不知自何得之俄而武帝崩文惠太子豫章文獻王相繼崩齊亦於此年終矣靈味寺沙門寶亮欲以衲帔遺之未及有言公忽來牽帔而去蔡仲熊嘗問仕何所至公不自荅直解杖頭左索繩擲與之莫之解仲熊果至尚書左丞永明中住東宮後堂平旦門中出入末年忽云門上血污衣褰裳走過至鬱林見害果以犢車載屍自此門舍故閹人徐龍駒宅而帝頭血流於門限焉建武中明帝害諸王高士江泌憂念南康王子琳以訪公問其禍福公覆香爐示之曰都盡無餘後皆如其語徐陵兒時其父攜詣公公拊之曰天上石麒麟也陵果名譽顯於世又文惠太子迎釋僧惠至京師惠過公公拊其背曰亦龍子也慧終以辯才顯聞其徒屯騎桑偃有不臣之心公見之戟手詬曰若乃欲反耶奈斫頭穴胸何偃汗下不敢仰視遁去梁武帝受禪尤深敬事前朝以超放動輒禁錮至是下詔釋之嘗問曰弟子煩惑未除何以治之荅曰十二又問十二之旨在何荅曰書字時節刻漏中又問何時得淨心修習荅曰安樂禁之又問年祚遠近荅曰元嘉元嘉帝欣然以為享祚倍宋文之年天監五年冬旱雩祭備至而雨不降公謂左右曰吾病不差就官乞活儻不奏白官應得禍即上啟願於華光殿講聖鬘經請雨帝即命沙門講之終夕雨公又以刀橫水盂良久又雨帝初繁刑公假以神力令見高祖受極苦於地下自是省刑詔畫工張僧繇寫公像藏禁中僧繇下筆輒不自定叩頭哀懇公笑曰毗婆尸佛早留心直至而今不得妙帝偶與公臨流縱望有物泝流而上公舉杖引之隨杖而至蓋紫栴檀也詔供奉官俞紹雕公像頃刻而肖神情如生帝大悅命置內庭為子孫世世福田法雲寺雲光師講經天為之雨華帝意其證聖夜於含光殿焚疏命公雲光僧儉傅大士齊翌日獨雲光不至公嘗聽法雲講妙法蓮華經至假使黑風問風果有否荅曰世故有第一義諦故無公曰若體是假有此亦可解耶法雲默然公則自為主客辯難鋒生一坐盡傾然莫有解者帝嘗從容問國祚有留難否公但指喉示之侯景之亂尤追繹公言也有僧浮杯來謁帝帝方與客棋吟曰殺之棋罷命僧侍衛奏曰適蒙旨已殺之矣帝嗟悼不已以問公公曰陛下前身蚯蚓也僧嘗為薙草者誤殺之今償夙債耳天監十三年公移華林園金像置所居房帝聞之曰師將去我耶是歲十二月忽命奏絲竹徹晝夜至六日終於興皇寺臨亡然一燭以付後閣舍人吳慶以聞帝歎曰大師不復留矣燭者將以後事囑我乎帝昔與公登鍾山之定林指前岡獨龍阜曰此為陰宅則永其後帝曰誰當得之公曰先行者至是念公以此言以金二十萬易其地以葬焉皇女永康公主薨盡施其粧奩建浮圖五層于其上置以無價寶珠仍建開善精舍敕陸倕製銘于塚內王筠勒碑於寺門處處傳其遺像焉畢工駕御寺公忽現於雲間萬眾歡呼聲振山谷敕諡廣濟大師公顯跡之著數可五六十許及終亦不老莫測其年有徐犍道者年九十三自言是公外舅弟小公四歲計其時九十七矣李氏有國日諡曰妙覺公作四柱記五公符十二時偈璧記心鏡圖數千言傳于世本朝太平興國七年舒州民柯萼者遇異僧於歲山下以杖指松根令萼钁之得瑞石一篆文皆讖聖宋國祚無疆萼進其石于京師太宗皇帝遣中使置齋於鍾山詔自今不可以名斥以顯尊異賜號道林真覺大師祭文祭雲庵和尚文我生九歲則知有師寤寐悅慕想見形儀識師新豐等父母慈欣然摩頂使執軍持長游大梁薙髮而歸省於九峰凜然德威霜雪雨露物以茂滋師成就我妙如四時紫霄之下泐水之湄前後七年龍起雲隨今古一律妒毀陷擠愛憐收拾終不棄遺我昔出山師則有辭子幼英發終必有為顧吾老矣見子無期指其二子藉汝教之譴呵皆可不可相離德音在耳星霜八移師成新塔我亦陳衰昔師既化品坐對啼僉遣本明遠乞銘詩事濟而還僵仆於地山川隔阻久絕音題獨攜希祖千里來辭一酬夙心死無憾悲師之平生累德巍巍必興其後在我無疑敢不激勵上荅恩私祭昭默禪師文政和八年二月初六日甘露滅致以香羞之奠祭于佛壽靈源真歸無生之塔寶覺以拳授法宗綱區別背觸天非蒼蒼如履虎阱非愚則狂公少奇逸發硎劍鋩橫機試之切玉無傷體露情盡凡聖兩忘溈仰機辯如珠走盤父喜自匿暴子所長追還此風名聞諸方臨濟法道始於南昌大於汝穎盛於衡湘黃龍三關建無勝幢奕世護持不離覺場天魔愁怖走仆且僵剪拂流輩高師門牆庸有匪人賣公自揚騏驎種性自異犬羊狠觸怒疾夫豈知量儼臨清泉精嚴激昂如萬星月如百谷王高明廣大洞徹汪洋成就法器堅趐飛翔下視毒龍命將滅喪劃海為兩摶而取將老則移疾古寺閑房聽萬象說以默自藏猿鳥厭見天下想望我初見公駿氣騰驤溟涬弟之但加敬莊人以謗掩公慰愈光置麝溺器更增其香取而有之簏于藥囊坐交時埋甕于南荒零落苦李人棄路旁公犯世忌愈益稱賞萬人浮議泳消其湯既幸生還陸沉故鄉豈不願見恃公康強計至失聲事出倉皇中流欲濟俄喪楫航夜淚殷枕起喟失床我憂禪學終背教綱造論導之排斥否臧公聞乃曰彼自無瘡以書教誡欹傾數行至言吐鳳自然文章馬鳴龍勝論著精詳文字於道疑不相妨索珠層淵採玉崇岡人各有志鹹酸異嘗但餘此意拜未敢當嗟吁惜哉巍巍堂堂遂成千古叢林荒涼然觀斗柄陰晴晦彰示有出沒夫豈真亡祭妙高仁禪師文孤鳳兩雛名著諸方我初識譽未識華光政和甲午還自南荒夜宿衡嶽草屋路旁僕奴傳呼妙高大方連璧而來驚喜失床高誼照人笑語抵掌瀟湘平遠煙雨孤芳舉以贈我不祕篋箱追繹陳跡云更幾霜去年中秋宿師雲房為留十日夜語琅琅曰我出吳游淮涉湘今三十年倦鳥忘翔偶如慧曉懷思故鄉想見明越雲泉蒼茫已遣阿湧先渡錢塘不見半年嶺谷想望計至驚定淚落沾裳思歸之念夫豈其祥嗚呼師乎忠義激昂高風逸韻仁肝義腸縉紳相志遠公支郎此生逆旅已熟黃糧夢中吳楚寧能取將唯方廣譽躬至影堂如我致辭而炷此香清淨法身敗橐膿囊光透毛孔不可掩藏昔日非在今未嘗忘如水中乳莫逃鵝王則我與譽何用歎傷祭覺林山主文惟靈簡易似放閒靜似懶以法為林滴水為限夜歸村落投枕再鼾灶黔無煙童僕啼飯而兄直視為一笑莞然三十年事事成辦我愚且鄙少去故鄉豈不懷歸路脩且長遂成永隔死生相忘念俱事師落髮游方如宿逆旅各夢同床聞訃一年乃奠靈几觸目悽慟語訖酸鼻嗟乎人生有恩有義薦此缽飯淚墮如洗祭幻住庵明師弟文子少棄家從我游嬉三十一年如夢頃時於此夢境憂患半之我竄萬里白骨重肉子臥一庵亦失雙目心知餘年再見不復敢料來歸先館子廬即視模索認聲驚呼我亦念子形神已枯百不如人謂當壽考心期惻然正爾難保如臨崖樹先自枯倒不見兩月果以訃聞既通世契久同師門臨終之語骨須我焚攜法兄祖疾馳三日瓦燈晝昏寂然空室相視以慟薦此缽食祭鹿門燈禪師文維皇宋建炎元年歲次丁未五月庚寅朔二十日特敘復僧某謹以茗果之奠敢昭告于燈公禪師之靈明安宗風續佛壽命幾絕而存至師大振芙蓉東去隨至磻陽如道吾智而有石霜定惠既化遷住鹿門如青林虔而繼新豐雖牧萬僧如數三四觀其規模寶覺是似重和改元髮僧宮寺褦襶之師包羞惜死諂諛之極遂拜黃冠師笑視之泚其面顏蘇嶺之下寶坊幻出何以致之蓋其願力既孝其師又悌其兄有光叢林不負佛恩凜然風神今成萬古薄奠在盤淚落無所祭五祖自老文古人尚友不短千載苟曰氣合何必面對崎嶇遠來僥倖為會坐未歡禪師不少待如人噬臍不及何悔掩淚莫陳意折心碎十方現前去來無礙師豈真亡覿露妙在祭郭太尉文公起徒步絲絇人侍遂斷國論危言讜議在妒忌中剛而有禮天子敬之愛等昆弟雖無知名民陰受賜如漢子房如唐陸贄人眾勝天覺中妒忌公笑徑去道固如是一斥不復而又早世姦邪色矜天下隕涕我初聞計中夜而喟公之精神與天終始宜終功名宜身富貴乃歿瘴鄉又寓旅邸人之奇禍至此極矣唯德是輔殆虛語耳天定勝人果不容偽妒忌伎窮反自相噬邪正日分曉如涇渭今餘十年歸骨萬里我昔觀光混跡都市游公卿間如梁寶誌公每延禮忘其勢位我亦徑造必至臥內兵衛如雲不敢呵止愛憎相奪有萬贊毀坐嘗厚善囚我棘寺幾失頭顱終禦魑魅敢期白髮奠于湘水世相新奇習為巧士教訓諂諛鉤取祿利貌雖光澤行可愧恥聞公之風面熟顙泚吾聞陰德榮亨必至不身嘗之當在其子格言不欺果見偉器沐浴道德冠冕仁義定世其家行矣是似則公之生亦何嘗死祭朱承議文吾聞明珠白璧石韜水藏山川草木被其容光臨川之民共此盱上如湘老龐道德光華照映兩邦吾儕微蹤雲浮四方眷此不去是亦故鄉歎公杖履人群軒昂忠信豈弟易親難忘忽厭夢境高蹈八荒公有賢子如麟鳳凰王室柱石吾法垣墻終大公後公豈真亡想聞此語抵掌脫冠未忘世禮聊薦積香祭許先之文維公於國盡忠於家盡孝豈特天資亦學之效德富才高川增嶽秀薦登清華出縉紳右用舍進退有命有義一斥而終料豈及此聖恩不貲五日而至公獨不沾陽城陸贄嗟余惷鄙於物多迕幸不終窮有公知遇屋歸山丘舟逃夜壑寓詞一觴心折涕落祭趙君文惟靈忠信恭敬耀於西州不為無聞年餘七十笑傲林丘不為無壽生有令子派佛祖流不為無慶有一於此足以忘憂而況三者兼有之耶茲山弗嗣麋鹿所遊十年之間百廢具修凡以令子德義之優故也余聞之鳥巢南枝狐死首丘彼亦何知能恩厥由矧輕勢急道超然特立者乃肯為之羞乎嗚呼計來萬里物故越秋等視閻浮譬如一漚公之云亡非去非留薄奠告焉世禮則由雖神魂竟無不知也尚能為之歆不瑫上人祭母文我生頑鈍雀息鳩視不歸庸人亦幸而已矧墮三寶高出塵累儼臨人天福田于世坐推其因何以至是皆吾母慈念極心碎我昔東游志亦勇銳訪道名山酬此恩爾身雖四方心挂漳水豈不懷歸料豈及此三月甲寅計來千里棄杖南奔露行草止天降荼毒乃不及己呼天泣血奪我母氏今何能為中扃亂矣昔每歸省迎門笑喜堂今闃然瓦燈塵几慈和粹溫竟作川逝撫柩長號淚迸如洗杯露罏香區區世禮天地有終此恨無既祭通判夫人文代竊聞漢王霸之室有智識而柔懿然子孝而不學夫雖賢而弗仕又聞唐王珪之母閱房杜而知子及珪身登三事則其母又已即世唯夫人之高風特有異於是二者矣夫有霸之賢而為熙豐之名臣子有珪之材而名冠縉紳壽閱諸孫而視聽敏捷孫能酌古而心醉六經蓋功名之念如雲之必雨富貴之盛如川之方增寔清規之所訓祭景慕之遐想懿德必光於史牒計夫人雖死其何憾乎祭文七首代我聞如來世尊將般涅槃自披其胸紫磨黃金卍字之相而告大眾曰汝等各各瞻仰令足無生後悔及已掩棺迦葉後至又出雙趺以示眷憐嗚呼如來世尊正傳法嗣覆蔭此邦三十餘年凡在道俗上與清眾下與奴隸若親若疏若小若大皆受餘庇今以入塔攀戀無已精明之溫豈弟之容不可復見柔軟之音慈誨之語不可復聞宗乘微論差別之義不可復解言念至此意折心摧嗚呼禪師葬靈骨於九原想音容於萬古雪雲方慘兮悲風飄颻松聲蕭瑟兮哀聲連朝陳微誠兮以薦薄奠望慈雲兮其不可招嗚呼哀哉我來淮山寒暑九遷傾誠於師遂爾忘年比鄰追隨合并周旋每一會語莫不歡然法屬之故無時造膝師嘗顧我笑指坐席曰終當主我此丈室謂師為戲不敢怒嗔今日何日果繼後塵血指汗顏不善斧斤而師旁觀教之諄諄今既逝矣夫復何云先德遺訓何敢不遵法侶現前聊薦溪蘋禮雖不腆情無鮮陳因法相逢以法為親非子則姪繩繩詵詵傾囷倒廩不祕珠珍煖其孤寒賞其賤貧自師退居其德日新諸方奇衲川輸雲屯大法將頹謂必中興不見一夕遂以訃聞如方欲渡遂迷要津中夜起喟棄床失聲慈和粹溫永失依怙香羞在筵淚落無所東山真子白雲的孫迅機妙辯褒然逸群黃河流天太山吐雲無有窮極莫知津垠師罷住持其道益尊酣歌自樂晝常掩門世不得見言豈得聞檻撰積香罏焚室熏今既非去昔亦豈存此意昭然即曰全真道大德高名聞諸方禪林耆艾覺苑鳳凰三十餘年化行此邦我輩晚生幸登覺場聞金石誨熏知見香譬如珠玉山韜水藏而其草木亦被餘光今既云逝撫心悼傷嗚呼師乎巍巍堂堂遂成千古天豈真亡念昔侍坐恭聞誨言辭親出家是大因緣本出生死期離蓋纏求師之難自古則然如芥子針如鸞膠絃我等何輩萃此法筵如海之大而會百川教誨成就長養撫憐如物發生雨露無偏又霜雪之使其氣全恩有四種報效當先百未一施師我棄捐師之道德如月在天譽月之明何以加焉恭陳薄奠儼如在前情斷志訖淚落九泉天姿曠達純素任真妙年出蜀汎愛親仁淹通宗教廣見精聞我亦何幸早獲相親義為朋友法為弟昆於師父子兩為比鄰周旋之久三十餘年懷我宗伯宗門鳳麟不幸早逝殞此偉人謂師英氣可續芳塵今又已矣撫淚沾巾嗚呼禪師夢幻視身而視生死如夜與晨十方現前孰亡孰存我獨何為浪自酸辛無忘世禮薄奠聊陳祭老黃龍諡號文代崇寧四年四月某日住山某敢昭告于南禪師之塔竊聞巢由穡者夷齊餓夫初若無求於一時終必有稱於百世觀其措慮深遠蓋亦維持化風故知德澤之在民是乃聲名之不捨又況荷擔大法提攜四生者乎恭惟禪師家于此山名落天下起臨濟於將仆傳少室於無窮厥集大成有光先覺乃者明天子沛流殊恩大昭懿德特旌普覺之號用勵後學之徒仰惟覺靈祇此榮福嗚呼春葩華於萬物而不自以為功日昭明於四方而不知以為德凡所以歌詠和氣褒贊高明者皆天下之至情然則禪師於此豈曰不然耶崇仁知縣赦後祭神文唯三代之訓夏至日恭祭地祇斯古先哲王之懿德禮也而歷世堙沒不嗣今天子力舉而行之致禮既畢奇祥薦興歡聲和氣充塞天地猶以名山大川廟貌所在有功血食於民者未克躬至則以守令使告行吏其敢不肅虔哉謹用某日特具牲酹以奠于祠下神之聽之祇此榮福祈雨文仍歲饉凶民之艱食亦以眾矣而菜色喘沫者猶並首以望有秋如痿者之不忘起也春夏之交風雨時若方將奮躍似有生意而比日毒暑益熾四無雲陰車鴉夜鳴田龜晝坼饉凶之憂恐在朝夕傳曰亨牛而不鹹敗所成矣又曰行百里者半九十為不克終豈神之賜昌其始而終奪之邪吏以不職上天降罰吏躬任之民其何辜而神亦坐視其病哉謹率丞佐群趨並走致恭于祠下雀息以俟休荅神其哀憐之謝雨文比日以來民以不時霣雨望天焦勞蓋飢饉之餘情易驚擾如禽傷弦念痛於曲木如稚驚雷失聲於破釜是用率丞佐上瀆神聰香火未收雲氣已布連日繼夕霖雨霑足嗚呼雖父兄之所哀憐其必從何以迨比舞翠浪於山原兆黃雲於囷廩歲登訟簡民樂吏閒荷神之賜孰大於此式奠昭告豈不休哉佛歷二千九百四十八年紀次辛酉陰歷九月初一日竣工中華民國十陽十第一號常州天甯寺刻經處出資刻此全部經理清鎔謹識湖北陶舫溪刊

front:
  text: 石門文字禪序夫自晉宋齊梁學道者爭以金屑翳眼而初祖東來應病投劑直指人心不立文字後之承虛接響不識藥忌者遂一切峻其垣而築文字於禪之外由是分疆列界剖判虛空學禪者不務精義學文字者不務了心夫義不精則心了而不光大精義而不了心則文字終不入神故寶覺欲以無學之學朝宗百川而無盡歎民公南海波斯因風到岸標榜具存儀刑不遠嗚呼可以思矣蓋禪如春也文字則花也春在於花全花是春花在於春全春是花而曰禪與文字有二乎哉故德山臨濟棒喝交馳未嘗非文字也清涼天台疏經造論未嘗非禪也而曰禪與文字有二乎哉逮於晚近更相笑而更相非嚴於水火矣宋寂音尊者憂之因名其所著曰文字禪夫齊秦搆難而按以周天子之命合遂投戈臥鼓而順於大化則文字禪之為也蓋此老子向春臺擷衆芳諦知春花之際無地寄眼故橫心所見橫口所言鬥千紅萬紫於三寸枯管之下於此把住水泄不通即於此放行波瀾浩渺乃至逗物而吟逢緣而詠並入編中夫何所謂禪與文字者夫是之謂文字禪而禪與文字有二乎哉噫此一枝花自瞿曇拈後數千餘年擲在糞掃堆頭而寂音再一拈似即今流布疏影撩人暗香浮鼻其誰為破顏者明萬曆丁酉八月望日釋達觀撰石門文字禪目録卷一之八古詩卷九排律五言律詩卷十之十三七言律詩卷十四五言絶句六言絶句卷十五之十六七言絶句卷十七偈卷十八之十九贊卷二十銘詞賦卷二十一之二十四記序記語卷二十五之二十六題卷二十七跋卷二十八疏卷二十九書塔銘卷三十行狀傳祭文目録終

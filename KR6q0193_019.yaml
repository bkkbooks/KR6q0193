body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校贊小字華嚴經贊并序蜂房於梁間以漆液固其蒂鵲巢於木末纍百日而後成彼曾何知而經營之妙積纍之功若習藝之神蓋其靈明廓徹不思議之力雖昧劣飛搖之中而具足成就弗差毫末況首出萬物應物而能言者乎昔有梵僧來自五天見晉宮闕崇麗歎曰是與忉利天何異但彼道力所成而此直業力耳余竊笑之是安知我此妙力出生太虛容受寰宇曾何天上人間樓觀之足云哉道人栖公憫世迫隘就其所欲書大方廣佛華嚴經於方冊中其輕妙可以一掌置開編蠕蠕如行蟻熟視之其橫斜曲直重交反仄曲盡其妙不翅如擘窠大書觀者填門歎未曾有佘欲稱贊是無作之功乃說偈曰我聞尊者龍勝師應供曾入娑竭海龍宮微塵妙章句目所一瞥輒能誦流於五天及震旦為熱惱中甘露門唯道人棲出其後願力猛利思精特能於方策紙墨間書此大經十萬偈誦於蝸舍巢庵中了然如在龍宮見觀者種性有差別愛慕皆生殊異想要當諦觀一塵中亦有無邊妙經卷昔有智人破此塵十方世界一切說以名塵故非斷空而可破故非實有了此兩宗妙法門亦攝一切契經海譬如困臥俄頃際夢中所歷更千載乃知一念圓古今真實際中法如是一微塵妙不可測當知一一塵亦然譬如天帝網明珠珠體瑩然俱照徹一珠具足諸網珠一一珠中同遍入我今以此金剛句壞滅彼衆下劣想使悟塵中含此經奚方冊中乃驚異咨爾山君河樹神各各當憶本願力要當勇猛勤守護勿令邪念輒蠹侵毗藍風吹須彌盧劫火焚燒大千界為攤此經一切處使其涼曝各得所我此現前佛子等作是觀者名正觀稽首十方調御師剎剎塵塵為作證小字金剛經贊并序瓊上人以飽霜兔毫數莖束為筆其鋭如麥芒臨紙運肘快等風雨書金剛般若經於兼寸環輪中望之團團如珠在薄霧間即而視之其行如人挽髮作煙鬟自非思力精微何以臻此哉為之贊曰昔有佛子根猛利能觀空性則是色欲顯空色不思議仰空書此金剛句至今風雨被原野諸樵牧者集其下乃知肉眼不能見譬如水中有鹽味唯道人瓊思精奇能觀色性即是空視此纖管大如椽揮翰如行九軌道故於兼寸環中備足廣大言說身世人可見不可讀譬如嬰兒親崖蜜我於此經能證入初中後善三法門忽然落筆如建瓴不復現行生倒想由色空觀入諸境奏刀肯綮無全牛盡持此法施群生甚微細智願同證臨川寶應寺塔光贊維寶應寺律師寶覺大士慕寂修大殿之崇成妙天下之壯麗有光夜現于塔萬衆為之作禮光雖不言而意傳蓋旌功德之殊異客疑余之言曰光不言則是光嘗言塔意傳則是塔有意寧有是理余曰佛以光為舌說華嚴之法門又以塔為耳聽法華之妙義所以明根塵之同源而情與無情之不二也嗟衆生之顛倒分色身之臭味苟返流而證真遺六用而俱棄非特塔光而已一切諸法皆如是故葵藿向日而回旋磁石與針而冥契空桑能孕賢聖山嶽解呼萬歲夫豈不然哉客曰塔廟之在震旦者不知其幾胡為皆無光見而此塔獨爾耶於是甘露滅笑曰譬月之在天影落衆水水濁則月隱水澄則月現月故常明而以水之濁清故見不見爾吾以是知此邦民信心清淨所以致此奇瑞我作贊辭非止見聞隨喜又以為翰墨之游戲也東坡畫應身彌勒贊并序東坡居士游戲翰墨作大佛事如春形容藻飾萬像又為無聲之語致此大士於幅紙之間筆法奇古遂妙天下殆希世之珍瑞圖之寶相傳始作以寄少游卿上人得於少游之家二老流落萬里而妙觀逸想寄寓如此可以想見其為人余還自海外見於湘西謹拜手稽首為之贊曰唯老東坡秀氣如春游戲翰墨撾雷翻雲偶寄逸想幻此沙門了無一事荷囊如奔憨腮膰腹行若不聞衆生狂迷以利欲昏如一器中鬧萬虻蚊吾未暇度駝臥猿蹲傲倪一世隨處乾坤出檀衣贊二首古佛身上衣佛佛相付授慈母愛兒心針針自成就是故吾雙峰自少至白首護惜如鏡奩一塵不敢受何以出檀名此時無別慮如持油鉢行如躡獨木渡永懷毗尼藏一旦成萬古紛紛五群衆來觀亦頂禮平時放逸心化作額間泚將見衣匣前泚流似江水咨爾淮山神守護當奉職無使塵涴侵無使雲潤濕諦觀不敢瞬心折三歎息此出檀衣慈母授我不敢手撲矧敢覆臥五十餘年儼臨清衆寒暑不易盡形受用師後當知商那和老於母腹中披九枝草傳衣閣贊達磨信衣轉相傳付四傳至今今以付汝受授惟艱命如懸絮法遍沙界此衣乃住想見峰前父子相語唯僧行月以閣其處坐令朱欄環達雲雨栽松道者真身贊生死變滅如漚在海無有處所浩然茫昧而此老人游戲自在出死入生初無限礙譬如壯士脫袍著鎧令鎧與袍儼然相對是故山中兩身俱在凡夫衆生為眼所蓋為抉其膜使生光彩定身巖贊淮山深處容我卓錫樹下經行巖間宴寂六十餘年脅不至席天子三詔掉頭不應知不可致南向加敬山搖海驚天空地迥後代兒孫則反於是如乳中蟲貪嗜世味我尋其跡為隕涕淚五祖慈覺贊龍湖山上霹靂馬駒潭畔門庭千聖莫能窺測十地望崖震驚霜露果熟推出白蓮峰下芬馨不受聲名控勒逸群勝氣英靈試問是何宗旨東山雲霞空青海堂室中神穎汾陽直下雲仍癩可贊父伯固兄養直父超絶兄豪逸家世風流稱第一二祖名三祖疾名是虛疾是實詩成舌頭翻霹靂醉僧贊我愛龍眠老居士筆端談笑了萬事君看一時拈破筆畫作醉僧醒時意此是沙門絶妙門不妨隨處有乾坤曚滕流涎枕臂臥破柱疾雷殊不聞石霜普照珂禪師贊漆瞳照座骨相巉巖橫拈麈拂寒擁雲衫五住名剎道振湘南是誰之子親見雲庵疏山仁禪師贊古老衲住山多託物寓意既自游戲亦欲悟人如紫胡之畜犬道吾之巫衣端笏獨雪峰歸宗西院皆握木蛇故雪峰寄西院偈云本色住山人且無刀斧痕余元符間至疏山見仁禪師畫像亦握木蛇嘗有問者曰和尚手中是什麼物答曰是曹家女因歎其孤韻超拔能清涼熱惱為作贊曰三支習氣其毒熾然熏蒸識心盤屈紏纏衆生不明橫生疑怖忽然見之輒自驚仆空花世間本離生滅廓然十方露其窘穴唯矬師叔是大幻師與奪萬法自在娛嬉乃知大千皆公戲具手中木蛇是曹家女汾陽昭禪師真贊維摩杜口釋迦饒舌動容顧瞻非默非說雖宣一字不露點墨稽首汾陽千聖同轍翠巖真禪師真贊我方涇渭同流笑中軟頑滑頭為君人境俱奪鬧裏白拈巧偷如水洗水相樓打樓從來脫略無窠臼接得南泉嗣趙州慈明禪師真贊并序鍾山僧遠庵居五十年而二十年掬澗而飲長安窺基三車隨行而一車酒胾逍遙羅什口析妙義而畜靡嫚之倩曰吾有欲障清涼澄觀已任大教而畏五色糞且以十願律身是四比丘者舉人類精奇風流相映何其制行乃爾相戾耶蓋知其所同者道所不同者跡故其所履正權異救時存道皆非苟然使其無權時之智則教之延遠要未可必也傳曰神而明之存乎其人非特為教者為然則傅大士其悲智所施亦然也故吾慈明禪師汾陽昭之嗣黃龍南之師南之玉立有清涼之風昭之精嚴挺鍾山之操而公獨平等逆順嬉戲垢污甚於基什而其道能支臨濟與日月爭光真不纏凡聖超然不測人也自公化去六十年而余始至其廬拜其塔瞻其像稽首為之贊曰緣生諸法名體絶如空字身水魚跡是無相門緣寂宗一切智智差別海公於是中如法船泛然出沒無所畏使諸游者心泰定種種驚怖成虛空平生神兵雙不借玄機不動萬象驚而公宴坐不言中諸有求心如古井鈍根阿師終聽瑩法味迷醉如惺惺矍然奮迅為一戲句裏明人揳出揳紫金鎖骨眠空山吁嗟音容不可覿當知其聲如雷霆稽首慈明常出現郴州乾明進和尚舍利贊并序余觀崇進和尚舍利於南嶽福嚴寺炷香臨盤以箸點之隨箸而升如露之將零投于脆瓶倣佯而行如魚之在淵又觀其畫像方頤揕口神情靜深若不可犯干者門弟子惠覺謂余言吾師衡陽伍氏子早依南臺正悟然禪師落髮焉受具游方餘三十年所至以荷衆稱福嚴長老保宗新其寺殿閣宏壯妙天下師實董其事郴州以乾明寺命師居之而弗演法或問之曰我第與衲子作粥飯主人耳其敢荷此事而天姿直亮寡言笑道具余不置一錢牧衆以公攝物以慈以故道俗歸之如雲退客香山元符三年五月十二日順寂壽七十有七臘五十有五臨終謂衆曰我即死達旦便當火之以灰投江中勿稽留也魔事將戲汝曹矣言訖而寂衆不忍留兩夕梵唄郡吏遽至責以慢禮悉拘系其衆因相視驚異魔事之言有徵也荼毗之日天地清明燼餘得舍利甚多觀者爭分之至漬汰所焚之地有得之者筠溪曰生有志行神化不亂可也火風壞滅殊異發生可也而一官吏至乃能前知豈偶然也哉乾明所養至此弟子又能事之如生久而不忘有古高僧之風為之贊曰李廣射虎石為之穿耿恭祝井涸為之泉忠孝所致如響答焉公亦何為飢餐困眠人初莫測公豈自言戲為火浴朽者明鮮舍利粲粲玉碎珠圓乃至所養蓋其云全天全之妙非粗不傳如春在花如意在絃嗤嗤橫目氣凌雲天死未及寒化為腥膻矧投于火不作腥煙安有萬手收此精堅維德之一垔所拳拳死生之大卒莫能遷公初設心唯此是專不祈人知人趨如川終必有驗理之固然我作贊詞豐碑以鐫南嶽彌阤和尚贊與之食則食與之衣則衣無衣衣木葉無食食土泥為人汲樵牧僅存骨與皮其道不可致天子南向師出家有如子我亦著伽梨宣律師贊并序余游總持寺基大師以宣律師像為示旁有多聞天王太子上足玄暢唐咸通三年筆也基求贊贊曰此毗尼藏三世完堅願王手封款識具全死生之烈不能變遷何以至之正知則然何人逸想以筆墨傳跏趺俯視頽然深淵天神護持弟子敬虔我拜稽首淚滴九泉法道陵夷障雲蓋纏乃於是時瞻此釋天嵩禪師贊歐陽之學師宗於世其徒喧闐攻我以喙童首儒林氣索力屈公於是時粹然一出天縱之辨武庫縱橫璜璣捍我如護目睛義如串肉理如析薪一時名譽聳動縉紳世尊舉身毛孔俱笑如公語言筆下皆妙六物不壞未易致詰豈其踐履明驗之力宗教之衰河壞山摧冠巾緇衲其寒如灰拂拭塵翳見冰雪容拜起而喟涕落無從雲庵和尚贊三首并序雲庵出黃龍之門為臨濟九世孫種性殊勝契悟廣大指示心要辨如曹溪決擇教乘論如棗柏作為偈句辭如寶公履踐明驗精如永嘉退居雲庵時已七十餘幻滅都盡惠光渾圓可以想見其遺風餘烈門人德洪謹拜手稽首為之贊曰於自住境見與見緣如夢能所如蜜中邊惟具正眼入此三昧如妙蓮華出緣生海祖師活意如來密機成就衆生如鶤鵬飛使其自化不由他悟秀出叢林光于佛祖趨滅陝右誕生江南暗中五色天下雲庵槁容而毳衣殆不逾於中人而於祖道顛危之秋勃然而中興知我亦何幸自幼及壯出入其戶庭俯仰其藩籬而其道德之精華未能略窺其毫微譬如戴天履地於終日而其高明深厚所不能知惟聞孔子之歿一百年而生孟子釋迦之寂二千歲而有禪師拜手稽首堂堂乎三界之依者耶三玄銓量設選佛科邪師壞之付授外訛以陷虎機擊其頽波不動聲氣怖走天魔潛庵源禪師真贊三首十年積翠侍立學得眼橫鼻直平生氣壓叢林問著左科背聽一庵深藏霹靂舌從教萬象自分說百非四句無處蹲孤風照人衆星月僧求潛庵贊德臘俱難及一庵江寺隈敢稱少室後親見老南來鬢雪殘零盡心花爛熳開若言只這是九尾似黃能游龍山斷際院潛庵常居之有小僧乞贊戲書其上趙州只有一個齒潛庵一個恐不趐雖然下下都咬著鹹酸自分鹽醋味龍興古寺曾閉門斷際雲孫第十世勸人莫信馬大師一口吸盡西江水靈源清禪師贊五首辨如玄沙有邊幅韻如睦州出風骨默然而說心自昭八荒光明寄毛粟獨立南榮山嶽峻臨濟欲傾不敢覆笑橫玉麈氣如春一堂嚴冷天魔哭衲子無處摸索畫師筆筆畫著山僧醉眼難憑付與衆人彈駁似則打殺靈源不似幀子燒卻魔外如驚濤大願真砥柱生與海衆同沒與海衆處兀然引帶笑不言從教大地山河語風度凝遠杳然靖深如春在花如意在琴雖甚昭著莫可追尋蹶起臨濟如磁石針披衣肯來奔百川而地喘袖手歸去碧一天而電收閉門無個事兀坐青兩眸喝月倒行前日令呼山入坐上簾鉤雲蓋智禪師贊洞徹汪洋高明廣大如天蓋空如月出海宴坐一室不動客而使衲子望崖而退此其整臨濟頽綱之大概也至於不得已而有言則若邵平瓜甜而根蒂苦羅生隱身而露衣帶欲得靈妙常令不暗復不昧此余見之而必再拜也雲蓋生日三月初七報慈僧持真求贊平生脊骨生鐵鑄就關門理鉏揎起兩手禪者見之立不敢久問未及答已欲返走如老黃龍機鋒如英邵武健叟如雪峰之嶮如百丈之壽末後報慈寺中笑中打箇筋斗試問是何宗旨代云合取狗口黃龍草堂清禪師贊黃覺晚子死心季弟住黃龍山為十二世青春無背面空花有根蒂欲識晦堂背觸拳寒到黃河凍連底香城瑛禪師贊黃龍三關初豈拒人見者佇思剩卻法身祐公掉臂直截悅公追之絶塵維瑛實兩公之後觀其滿腹精神木床足折續之以薪則三十年後當令天下聞之甚富見之甚貧也龍城智公真贊奉持毗尼圭璧無玷研味般若金剛有焰有萬其衆感以無心如象牙雷如磁石針住持此山垂三十白殿閣化成兒孫戢戢高明廣大不可形容稽首寄老後身寶公石頭志庵主贊自住石頭老無氣力一回上山一回氣急禪流相見問宗風一日兩度鉢盂濕華藥英禪師贊以鐵作喙名無有雙老住回鴈道冠湘江神機之妙如鐘在撞為功德林為精進幢不動聲氣天魔自降懷我雲庵黃龍的嗣說法如雲縱橫放肆孰知此老膽氣相似大法付授良亦在此是名關西克家之子寶峰準禪師贊洞庭無蓋虛空有口步水東山藏身北斗石門壁立萬仞踞地一聲哮吼驚得四序回旋喝下須彌倒走是謂湛堂老人不落威音之後芙蓉揩禪師贊望之翛然冰枯而天粹即之淵然雲間而水止意坐石而情無住著故杖瘦藤而欲起人言即俗復即真出塵之相加冠巾非因引法忤聖主我宗僧俗兩不存五位正宗將仆地以手挈之閲人世屹然萬仞捍狂瀾荷負大法當如是紛紛鄙夫拜公像譬如螻蟻見龍象驚魂已化千微塵豈特形容先沮喪火刀直裰誰得之醉李故時魚捕師嶺梅已熟莫咬破核子乞與寧馨兒妙高仁禪師贊春風入其肺肝秋色漱其毛骨名飛縉紳之間身臥雲泉之窟嶽頂鳳之真子僧中龍之的孫吹徹風前無孔笛露香和月落紛紛道林枯木成禪師贊揚廣山頭種性雷衡洞裏根苗法雲明暗體露道林知見香飄試問春風吹不起何如黃河凍連底十分似九不欲全一身兩號只這是大千戲以一塵攝又譬此塵取空劫置於掌間剔突圞撾鼓升堂普請看佛印璵禪師贊臨濟正宗有楊歧會化四十年叢林精彩唯端精神辨博無礙克肖其家溈仰猶在後出舒勤骨面氣概始自太平遂游智海如法中龍游戲三昧璵也其後斫額前輩要識當年栗棘蓬白藕火中香不改溈山軾禪師贊天骨巖巖美髯玉頰冰雪在躬霹靂為舌軒昂萬僧衆星中月視其心胸山包海容大溈小興振其家風叢林百世見者肅恭報慈宣祕禪師贊二百員衲子領袖三十年叢林耆舊所至樓閣森然自然眷屬成就諸方度腳買鞋報慈就身剪裁莫嫌此老無巴鼻曾見西堂古佛來臨平慧禪師贊二首釘空露痕跡補雲留罅隙目機銖兩中思慮所不及象王卓立回旋師子翻身跳躑眼光常蓋人天對面識與不識識則火外有熱不識則水中無濕劈破雲門一字關個中乾燥如瓊液㘞氣秋腴雪秀目椹口其骨臨濟其髓雪竇袖手儼然不落滲漏一千龍象之冠七世雲門之後君看一句當機笑中脫略窠臼上藍忠禪師贊一法能知一切法應機全不差毫髮如是知見如是解於一切法中對待平生脊梁硬如鐵衲僧尋思心智絶城中一室冷如冰篆煙滅盡灰如雪雙峰演禪師贊三關洞開無鎖扃汝自艱難起戰兢師過此關悉閒暇掉臂徑趨呼不應如春消冰自渙釋如鯤化鵬誰使令歸來笑搭出檀服依舊淮山千萬青雲庵和尚舍利贊并序政和七年五月戊申法侶集于寂音堂佛鑑大師淨因以小玉瓶跪注于盤鎗然有聲璀粲五色謂余曰此汝師舍利也於是矍然再拜悚觀小大如米豆瑩明淨圓然其色多如玉者因嘗親見其火浴道俗觀者數千人皆得之哀慕之聲震山谷後月餘兒稚汰其灰猶有舊者自近世南州大士之化其靈驗奇瑞彰大殊異如雲庵者以一二數嗚呼尚忍言之將畢世護持作隨身叢林依歸老則求有道而能文者銘之藏名山使後世知臨濟九世之孫傑大偉奇如此因之志可佳也門人德洪謹再拜稽首為之贊曰是身夢境一塵垢分段苦業所成就折旋俯仰誰使之皆汝一念顛倒想若言此身非念倫云何想中可傳令乃知妄想融通趣如露如幻如雲影念清淨則身光明念雜想則身垢穢君看火力初無情聖凡僞真俱發夢雲庵偏得老南道粹然一出支臨濟平生慈悲喜捨力及樂說辨智慧光大願所熏精進幢上契佛祖超情見至妙要非粗不傳憫世狹劣示小者稽首作贊示同學千載叢林有耿光死心禪師舍利贊并序余不識禪師靈源以為法門畏友山谷以為禪林奇秀以靈源山谷之慎許可而詩詞禪偈相多如是則叢林未識未見者何敢疑哉雅尚座出舍利為示謹為之贊以結他日法會歡喜之緣贊曰地水火風動暖堅濕是中何從出此堅實蓋衆生心引大法力化為光明圓粹五色稽首死心罵人老賊寂音自贊四首竄朱崖軍而生還遭黃茆瘴而復活陷於采石而不死囚於并門而自脫夜行有披袖神光露臥醉厭糟醇濁魔外熟視之無如之何佛祖不得已與之酬酢兩眼入鬢頭髼鬆手中木蛇毒如藥三玄綱宗壁立崔嵬攀緣路絶熱惱心灰如化鯤鵬不借風雷蓋自化耳寧有法哉汾陽此祕寂音揭開手提大千毫端往來不似成背似其成觸隨汝顛倒直中有曲拋在言前剔鶻崙擬議令渠總滅門平生活計無窖子真是汾陽五世孫隨緣放曠索爾虛間未埋白骨且看青山毛女贊并序毛女者秦始皇宮嬪也二世時逃入華山遂得道季子圖之書室請余為之贊贊曰不嗅梨花而撚紫芝不穿雲袖而披槲衣何以風神洞如冰雪使人見之眼寒心折如麝有香以缶覆焉透塵透風種性則然又如煙雨過孤山宅於荒寒中微見春色圖之壁間是真過秦季子好德白髮日新唐李侍中畫像贊余觀李侍中秀骨開張英氣橫逸想見蔡州雪晚縛吳元濟時公平元濟如舉捶逐鼠無難事唯不殺用李祐鞬櫜見裴度使市不改肆如乃翁此公之所養真足以卓絶有唐之名將矣嗚呼賢哉解空居士贊空若不解即是斷空解若不空即是法執是故居士獨號解空窠臼不立凡聖豈存是誰宗旨臨濟仍雲東坡居士贊家孝友以為鄉孰道德以為基橫忠義之徑氣吐剛方之談辭視閻浮其一漚而寄夢境於儋耳開胸次之八荒而露幻影如蛾眉此其大凡也屬熙豐之勃興追舜禹之有為常一出而事誤則袖手悠然而去之如鳳如麟而瑞冠一世非雷非霆而名震四夷造裨販之中傷嗟妒忌之何知方其茹拳而微醉以翰墨為娛嬉則倒用祖師之印檄萬古而疾馳如河漢之流無有窮極如煙雲之出無有定姿欲録之以藏則懼六丁之竊取要當以日月為字而天為碑可乎山谷老人贊蓋九州以醉眼而其氣如神藻萬物以妙語而應手生春排黃龍之三關則凡聖之情不敢呵止豎寶覺之一拳則背觸之意不立鮮陳世波雖怒而難移砥柱之操詩名雖富而不救卓錐之貧情如維摩詰而缺散花之天女心如赤頭璨而著折角之幅巾豈平章佛法之宰相乃檀越叢林之韻人也耶華嚴居士贊遍界難藏而應緣震旦通身是眼而現形宰官粲如景星矯如翔鸞販夫灶婦欣聞悅觀醫國法門筆端三昧奮迅出入遊戲自在居然不容世議迫隘夢游海南御風騎氣覺來浙東有口如耳且置是事聊觀其一戲以稱性印印毛印海光生佛僧沮卻魔外惟我可與此道人遊乎大華嚴毗盧法界也李道夫真贊眼蓋九州韻高一世儼玉山富貴之豪洗士林寒乞之氣挫萬化於筆端置八荒於胸次邁往不屑不可犯干意輕邴吉情追謝安軒特秀發乃爾禿巾椹褐婆挲步趨合在玉堂金鑾山澤不可窺測所以納垢汙麒麟不可繫羈所以異犬羊正恐橫風月之笛披雲錦之裳騎元氣之背而游無何有之鄉蔡元中真贊德以退為進謙以後為柄跡以暗而彰麝匿缶而香視夫子之胸次若螻蟻其侯王方罾繳而去之登千仞而翱翔與夫蒼顏槁項論博南策未央者殆各夢而同床乎王宏道舍人贊翛然無纍之神見此有道之器韻收一代之風流骨含奕世之富貴節臨事而不奪貌甚威而常喜方其少壯則酒闌說劍橫槊賦詩名動塞壘及其倦也則浮沅湘上衡霍盡室行於山水至於醉心翰墨傾倒肺懷則有王右轄吳武陵之風味馳至金城而忠欸乃著罷歸玉關而功名自至者皆非壯歲庸詎知此老人獨不如是乎同達道通判贊韻出縉紳秀見眉鬚矯絳闕之風度宜玉堂之步趨有人所盡有無人所當無而乃袖補袞之手而弄雲泉以自娛也余安能探其歸宿獨見於皮膚蓋神於酌古僻於譽書求於古人則謝幼輿王子敬之徒歟韓廉使奉御贊幅巾椹衣杳然深靖坐蘚石床橫玉麈柄松聲度曲笑作風聽是故有琴絃索不整人徒見其神和氣平頽然委順至於垂紳正笏守法奉命則活人之色嚴毅徑正特不受富貴所吞而有山林之韻究其心胸山包海容表裏不隔八窗玲瓏蓋遊戲人間之出世扶持洞上之宗風者也毛季子贊季子逸群矯難控御跡寄黃塵名在紫府觀此風鑑無以為喻但見其清卻梅林之風秀等蘭叢之露妙文章之吐鳳視功名其破釜我欲醉袖之旁更畫凌波之女使其他曰歸道山渡弱水而驂風馭曾逢原待制真贊冠冕道德被服文武所臨有聲最宜荊楚果於去惡發姦破柱為國金湯折衝尊俎廣平南海乖崖西蜀如雪中春和而嚴肅名聞乳兒威被草木能作豐年茂我百穀筆下煙雲胸次丘壑風流餘韻與世酬酢至於談禪氣壓諸衲戲以法界玩于掌握補袞之線調鼎之手笑而不言置之懷袖咨爾邦民再拜稽首潭非久留歸相明后夢蝶居士贊二首俯看人世一漚起滅失腳來游夢入蟻穴前身後身獨臨兩鏡左右見之不雜其影眉目秀發嫩木含春風度凝遠霽月洗雲葉屋花房玉堂金宇我視睨睨渠方栩栩余觀此老神光渾圓道骨粹剛唾零功名眼蓋候王何為鬚髮滄浪被此朝章乎豈非如茅容殺雞毛義捧檄但欲致慈母之一笑安知有佳客之在旁也所以袖補天之妙手祕醫國之奇方獨游戲於富貴如蝶棲宿於花房占百年之間適寄一夢於幽香千花百卉金馬玉堂麗風日之醇釅遍雨露之恩光遙增擊而栩栩亦何異一丘一壑之相羊耶潘延之贊毗盧無生之藏震旦有道之器談妙義借身為舌擎大千以手為地機鋒不減龐蘊而解文字禪行藏大類孺子而值休明世舒王強之而不可神考致之而不起此天下士大夫所共聞然公豈止於是而已乎郤子中贊師黃叔度以𡎺太平之基追韓退之以策翰墨之勳故語妙如其渾厚論高如其精神超然挺特華裾逸群富貴之氣已如透花之春色功名之志又如欲雨之層雲禿巾折角置之巖石亦不以為屈長劍拄頤圖之凌煙亦不以為伸蓋虛以閲世不可得而疏親也耶李運使贊風度凝遠和氣如春緑髮授道精敏絶倫名冠縉紳挺然忠義知國知兵如唐陸贄頃者天府奉使江南晝錦之榮父老聚觀頓節西州盜發江浙提師百萬蕩其窟穴凱旋而還口不言功但欲使民生於死中重臨南楚化行郡邑如春在花不見痕跡恢躁坦夷相親難忘視其胸次山包海藏宜宿玉堂宜在黃閣跬步可待昂霄聳壑長沙之民自懷其私龕此畫像飲食必祠簡緣居士贊言似簡緣公法身有比並不似簡緣公法身有少剩平生赤吉歷兩眼光迥迥拾得大士打門椎掣肘歸去叫不應開箇鋪席在街頭有藥只解醫禪病瓦瓢贊并序南昌西山有異人年三百餘面有孺子之色多往來蒲城弋陽之間童稚呼以為萬公宣和二年重九歿於朝奉郎宣驥駿元之家以大甕二口合而葬之後圃十月弟子簡素先生用臨川隱者馬安道之語來發甕但餘瓦瓢斃履而萬公不見蓋尸解也明年十月簡素客湘西之南臺寺追繹其師之懿行潛德出此瓢以相示戲為之贊異哉此瓢修吭矬身弗生瓜蔓生陶家輪我疑其中藏十洲春昔有列仙雜于市人屋簷懸之自旦及申輒入其中偃仰而臥而樓居者見之膽破遂從之游推擠莫可挽而同登相向而坐如四老人會商山果唯簡素公道貌天容豈其人歟出處略同道山巋然弱水之東何時來歸泠然御風而以此瓢挂之瘦笻我作妙語天葩粲紅許彥周所作墨戲為之贊異哉土蛇登樹而怒怒見脊尾口眼可懼王孫地坐氣讋毛豎欲去不敢攀枝而顧豐狐行藏心常愧負見之而走敏若脫兔孰能傲然如此老樹與之相親不驚不怖問何能爾以無我故酒色海中有萬奇趣不出二種猜疑掉舉蓋無常蛇終不赦汝居士圖之以警未悟覺範一見笑掌為拊

body:
  text: 宋江西筠溪石門寺沙門釋德洪覺範著門人覺慈編録毗陵天寧法雲堂校記畫浪軒記建中靖國改元夏余客洞山禪悅堂之東齋中無長物唯置一床覆以蘧蒢架書數卷於枕間傃南開軒以納衆山之勝眼倦拋書坐臥惟山之接山容無盡而樂亦無猒也三伏大熱坐榻皆溫林陰拂掠不足以剪畏日有蜀道人得孫知微活水遺法為余壁間作崩掀渺漫之圖以來涼氣解衣磐礡奮筆而成余驚定歎曰異哉一堵之間須臾之頃而足江湖萬頃之勢肚波怒渦窪窿千狀而有不窮之變陰風徐來毛骨震掉忽焉如舟洞庭而望霜曉也能復有險畏神速於此者乎道人舉杖指以謂余曰龍驤萬斛逶迤而進如欲濟如慎畏有如明公卿任大責重思所以濟民而報國者也舳艫銜尾追逐上下如行如留有如仕路之紛紛方進而未艾者也魚龍變化更相出沒有如賤而忽顯貴而忽棄者也一葉之艇傲顛風而舞澎湃超然自得有如道德奇逸雜市人而無辨者也世波之神速險畏其有以類此故吾圖之至於白鷗沙禽泛泛隨流若無所與者又如我輩宅青山而侶白雲然猶思高飛遠引不能與之涉也余捫其洶湧起突之處點畫穠纖之間語之曰果有生滅變易否乎曰無有也夫天地萬物之盛備古今寒暑之往來是非榮辱相尋於無窮而死生憂患追逐之而不赦錯綜歷亂如蜜房如亂絲者如此畫浪初未始有生滅有變易而其顛倒妄自驚怪者如子自畫之而又自畏之也古之大聖人皆能遊戲於此故曰是法住法位世間相常住又曰一切法常靜無有起相震旦駒兒子之鄉老也而亦曰如畫水成文不生不滅何遽忘之也耶於是道人顧余而笑曰願從子遊因名其軒曰畫浪又為之記潭州開福轉輪藏靈驗記長沙楚之大藩民俗殷富可也而山水之富亦擅名天下千雉垣疊萬井喧闐而嚼嶽色之芳鮮飲湘流之甘寒寶坊精舍樓觀追逐煙雲蔽虧梵放酬酢如錢塘之西湖伊洛之嵩少開福在郡城之北基構雄誇盡占形勝昔馬氏植福之地也弘法聚徒皆當時之望士號大叢林名鎮諸方馬氏嘗命苾芻智光建東藏奉安法寶欲增妙麗規法忉利諸天光以意造不合教乘議者曰惟徑禪師隱居嶽中三十年得心法之要而淹通三藏異迹甚著厚禮致之徑果來於是布地文石為雲濤之狀以象海琢石雲濤之上以象須彌山建大輪山之顛而輔以小輪四棋布峙立如人聚五指翔空為朱欄青鎖間見層出以象忉利宮闕光之徒頗相折難徑博引樓炭等經瑜伽俱舍諸論證尤甚明會尊者室利嚩囉者來自五天是徑之説而藏乃克成為湖湘第一政和之初長老道寧開東山法道食堂日五千指百須頤指可辨門人法圓實陰相之圓宜豐人短小精悍而材能任事寧使牧衆典金穀道俗歸之寧剋日而化潭帥以大長老智公黃龍高弟時年九十餘可嗣其席遣令佐即雲蓋迎之智以老辭令佐曰太守請飯乃不赴貽法門之咎智至即鳴鼓問其故曰請師住持也心知墮其計中受之未幾以職事付其嫡子文正避昊天諱正本色飽參有局量克肖前懿圓不以新故二其心唯集諸功德成就勝緣三年化衆檀鍾瑜等翻修藏殿五年秋將畢工九月己卯夢合抱之木半空而止圓蒲伏疑將壓焉呼曰誰為此木危人如此乎有答者曰此藏心也黎明覬州男子程俊來謁願施木以修藏如夢中自是施者日填門十月癸丑使木工張詢梯其顛施斧鑿得木鏤讖文其略曰吾成此藏魔事極多不踰二百年有吾宗法子革作轉輪此其基也住持者荊山寶也法子者月望也匠者弓長也自偽天福癸丑至宣和改元己亥蓋百九十餘年夫豈偶然也哉余獲拜觀遣十輩下推其轂五輪俱旋其上塗金間碧電馳風繞莊嚴之麗惟見者心了而言所不能形容也圓自言其巧非木工所能皆夢中若有指授者凡費緡錢五百萬六年而後成且求文以記其事余聞三世如來教法有微塵數偈句藏於龍宮祕於五天者太山毫芒爾而流傳中國者才五千軸然衆生癡迷且不聞其名況義味乎雙林大士以平等慈行同體悲廣攝異種為此方便如疲軍聞梅林雖未及見而渴心止如病夫入藥肆雖未及飲而病已除況於見之而獲飲者乎雖若簡易然不猶賢於未知者耶晉道人惠受嘗宿王坦之園夢以園營精廬既覺訝之假寐復理前夢以語坦之遂果其事已而又夢得剎柱明日行江亭獲隨流之木唐法師曇彥居越州龍興寺大殿隳壞衆請彥修之彥曰非貧道力也卻後三百年有非衣檀越來興此殿及期太守裴肅果符其讖嗚呼圓退然寒窶一鉢行人間而已夢如惠受而非有王氏之園為之資讖如曇彥而非有裴公之力成其願乃能不起于座出雙林之橫枝續光明之千焰必有大過人者可無書乎五月日記潭州大溈山中興記崇寧三年十一月大溈山密印禪寺火一夕而燼住持僧海評移疾郡以子方者繼焉未幾而棄去寺規模宏大而經營者非其人歲移三霜才辦法堂大殿寢室而已然又苟簡齋庖垣廡皆未具上雨旁風無所蓋障故禪學者分處山間林下蜂房蟻穴百丈大雄之風陵夷至此極矣大觀三年潭帥曾公孝蘊聞之曰溈山南國精廬之冠非道行信於緇衲名譽重於縉紳者莫能振興之吾聞天衣懷禪師在嘉祐治平之間五遷法席皆廢殘荒寂處而懷能幻出寶構化成禪叢今空印禪師軾公者蓋懷四世之孫而吳江法真之嗣方説法於廬山之下學者歸之如雲挺然有祖風烈當能整大圓真如已墜之網於是厚禮遣人致之越明年三月空印來自歸宗山川改觀叢席增氣登殿拜起周顧太息曰冠世絶境大佛應迹而殿宇卑陋堂室狹小何以嚴像設而致吉祥震潮音而集龍天哉皆廣其基構而增修之使其壯麗稱山雄深傳曰鐘聲鏗鏗以立號號以警衆也寺鐘不足以光焰四海選佛來者於是聚銅神運倉之下穴山為爐鐘成萬斤塗以黃金建閣館于殿之東廡佛菩薩之語藏於龍宮傳自五天學者所當盡心所以資智證之妙而盡細微之惑即室五千軸者藏於殿之西廡又明年增廣善法堂之後為雨花堂含風而虛明吐月而宏深夜參既罷繽紛滿庭自兩廊之左繞以復屋建庫院所以總庶務也自祖龕之右翼以修廊建堂司所以牧清衆也又明年重修僧堂廣博靖深冬溫夏涼曰僧者天人之福田佛祖之因地十方如來同一道故出離生死曠野深山聖道場地皆阿羅漢所住持世間粗人所不能見既以廣延其所見則所不見者敢不敬乎又刻五百尊者之像閣而供事之又明年得異木於絶壑斷而為三大合抱長倍尋刻淨土佛菩薩之像莊嚴妙麗千花照映如紫金山並高爭峻建殿于天供廚之南又特建閣于寢室之前緑疏青瑣下臨風雨奉安神宗皇帝所賜御書閣成而東南傾師默計曰增萬牛莫能挽且天章宸翰之所在山君水王之所宜謹藏而衛護之今職弗修是神羞也言卒而風雷挾屋山嶽憾動俄而閣正萬人歡呼昔大圓禪師開法此山也有衆千人碩大而秀出者有若大仰寂子香嚴間禪建兩堂為學者燕間之私而名其東曰香嚴名其西曰大仰方欲廣攝異根則修淨土觀法不以宗門為謙及其成就法器則以寂子間禪期學者蓋其方便應機而設教譬如大海蚊虻阿修羅飲者皆得飽滿又明年重修大三門宏壯傑立鏤金鏤碧寶翰飛動於千巖萬壑之上而太師楚國公為書其額卻望形勝衆峰來朝如趨如俯如屹立如蹈舞有臺自獻其前以寶積靈牙舍利葬臺之中而建塔其上千尺九層蕩摩雲煙微風徐來塔鈴和鳴比丘來往旋繞作禮望之如開牒疑師以三昧力摶取梵釋龍天之宮置於人間不然何其幻怪神異如此其多耶唐元和中僧曇敘開基則有緒言曰地靈甚不可葬葬且致禍今三百餘年僧物故莫敢塔塔于回心橋南十里師曰事無大小而斷於理從違不可苟也僧火化衆俱臨先聖令不可違也禍福之來以智避就之不可從也遂建普同塔于寺之西又修大圓禪師之塔而峙立兩亭以覆古今碑刻部從者以其威靈奏賜真應禪師塔曰淨惠聖溪莊壟畝為比鄰所吞數世且百年莫敢誰何師云此唐相國裴公施以飯十方僧者橫目何德以堪之不直而歸是陷人入泥犁遣掌事執券證諸官竟還二百畝歲度一僧上資睿算有玉泉住持僧死于龍牙山山中之人不容其葬弟子抱骨石涕師哀之使於溈山擇地建冢塔叢林義之師之潛行密用之懿時時見於與奪然皆本於仁義道俗化其德政和六年敕補住鎮軍之焦山師雅意不欲東解住持事力辭之歸庵鸞溪之上俄詔聽還之溈山自其始至中而還八年之間百廢具興非乘願力何以臻此雪竇天衣之道至師大振叢林歸心焉興修蓋其遊戲也今嗣法者自南臺定昭了山法光而下詵詵輩出棋布名山方進而未艾也法義謂余曰溈山之雄夸非空印老師莫能辦之精神非文字莫足以傳願求文以昭後世不得辭系以辭曰有異比丘清而狂相山趼足窮衡湘黃才掬溪行嗅嘗笑云水作青蓮香梯空杙險屢仆僵寢宿霧露衝虎狼水與石鬥聲舂撞誰挽千乘行羊腸霄然洞開雲水鄉橫峰側嶺爭回翔咨嗟曰此古道場山靈乃今發天藏泥草吟嘯久倣徉無人告語空夕陽翩然曳杖還江南道經新吳山鬱蒼登山作禮僧中王骨面氣宇凌八荒侍其側者矯鸞皇祐公傑出尤堂堂袖中肉山傾置旁瓶錫一笑戲取將懶安寂子尤敦厖佐于耨耕立禪房九世沉溺為津梁分燈延聯世相望既絶復續暗而彰軾公貌臞中方剛漆瞳照人儼而莊食堂十年折繩床有大長老續遺芳派出天衣嗣吳江燼餘為子整頽綱機峰擊電誰敢當宗風回顧已舉揚以印印空成文章凜然面目如冰霜令人望見折慢幢叢林邇來頓荒涼反袂拭面空歎傷而師聲價重四方力能咄嗟辦寶坊又取佛日重洗光芙蓉峰峻溈水長功德之利建我皇願同山呼壽無疆重修龍王寺記祝融占南極其高蓋四千八百丈與中原相直其平如衡故名衡嶽嶽之北崇岡峻嶺如奔如伏晴嵐夕暉星螺掩玉百里而至陽陂翔為奇峰呀為深谷峰之顛有大穴泉滿石裂攧雷濺雪夏冬弗竭蓋神龍之所蟠蟄故名龍山唐貞元間馬祖傳曹溪心要隱于嶽中從之遊者多得道散處林壑之佳處老死而世不聞矧見之乎洞山悟本禪師價公遊方時與密師伯者偕行嘗經陽陂迷失道路見溪流菜葉知有隱者並溪深入叢薄間有茅茨僧出迎貌臞而老索爾虛間謂價曰此山無路闍梨自何而至價曰無路且止老師自何而入曰我不曾雲水價曰住此山多少時曰春秋不涉價曰老師先住耶此山先住耶曰不知價曰何以不知曰我不從人天來價曰得何道理便爾歇去曰我見泥牛鬥入海直至于今無消息於是價班密師伯之下拜之拜起問如何是主中賓曰青山覆白雲問如何是主中主曰長年不出戶問賓主相去幾何曰長江水上波問賓主相見有何言説曰清風拂白月價心異之求依止僧笑曰三間茅屋從來住一道神光萬境間莫作是非來辨我浮生穿鑿不相關即焚其廬而去莫知所終故龍山又名隱山今祖堂王英諸禪師書江西宗派亦著隱山之號光化中有奇比丘名師信不知何許人庵于隱山之故基一衲宴坐異迹顯著龍衆皆易形為王者服從之聽法歲旱民祈雨輒響應馬氏據有荊楚欽事之不敢名斥賜號雨禪師而增名為龍王山自信之化世為禪林號西禪寺太平興國改賜今額宗教下衰師法大壞至以大福田之衣蒙市井無賴而茲山十世宣和四年夏潭帥大學曾公盡禮致前住道林雲禪師來領院事雲孤硬飽參精嚴臨衆洞山十世之孫而焦山枯木之嫡嗣也人望翕然師解包之日顧嗟太息因發其形勝增廣其基構而鼎新之聚材鳩工以歲入輸租飯僧之餘助成之不專取於檀信以謂檀法以信而發心為淨施止增一草獲福不資不然雖側布但名住相人徒見雲法勞熏役而不知遊戲也有無諸道人上白實陰相之且從余求文記其事曰價公參道於此山而雲禪師嗣其法以興修之疑非偶然余曰隱山單丁住山把茅覆頂刀耕火種而食兩客及門焚其廬而去之今雲公不起于座使緑疏青瑣以棲千柱飛甍畫棟以粲萬瓦層樓傑閣以蕩摩雲煙虛堂廣殿以吞吐風月撾鼓升堂千指圍繞雲屯川增方進而未艾也視其迹若相遠然其道實相須如來世尊蓋嘗曰不住無為不盡有為金剛般若開空法道也而曰持戒修福者名發信心開空法而修福無住無盡之旨也隱山之焚廬滅迹與雲公之幻出樓閣託斯文於不朽殆得如來世尊之遺意於是為疾書之宜和六年春公生明齋記隋朝感應佛舍利塔記唐僧史曰同州大興寺者般若尼寺故基也隋文帝以魏大統七年六月癸丑生於寺中赤光照室紫氣滿庭如幻出樓閣而其色赭人之衣妳母覺時炎熱以扇扇之栗然暴寒幾絶不能啼有尼自外至謂太祖曰兒乃那羅延也蓋天佛所祐不可令處穢雜間當為養之於是太祖以兒委之不敢名問而闢館以延尼通門往來一日皇妣闞尼在不就抱持之忽化為龍鱗角已具驚仆于地尼歸見之怒曰乃敢妄觸吾兒致晚得天下文帝七歲尼告之曰像教堙滅一切鬼神皆西兒當父母天下而教法賴兒而興之年十三乃令還家四十餘年足不越閫周既廢教尼隱皇家文帝踐祚教果重興尼名智仙神異不可測河東蒲阪劉氏女也七歲出家其師一旦失之意必墮井俄見坐殿楯瓦上世號神尼嘗以舍利一掬授文帝曰以此福蒼生仁壽二年出以示僧曇遷置掌而觀數數有盈縮遷曰吾聞法身過於數量非智所及此未可量乃分而為五十三分詔於五十三州名山福地以建塔塔下圖神尼之象有銘其略曰維年月日菩薩戒佛弟子大隋皇帝堅敬白十方三世一切三寶弟子蒙三寶福祐為蒼生君父思與民庶共建菩提分布舍利諸州供養欲使普修善業同登妙果者特請兩京名僧將命奉安之日皆有祥瑞長沙嶽麓寺之前澗陰之上石浮圖其一數也山中僧道安嘗為余曰隋朝舍利塔事極奇偉而五季烽火之餘銘碣焚毀道俗遊觀無所質問余曰豈直此而已晉建興二年長沙縣之西一里二十步有千葉青蓮華兩本生於陸地掘之丈餘蓮之根莖自瓦棺而出發棺而視但紙衣拴索而蓮實生頭顱齒頰間有銘棺上曰僧不知名氏唯誦妙法蓮華經已數萬部既化遺言以紙為衣瓦棺葬于此郡以其事聞朝廷有旨建寺其上號蓮華今長沙驛即寺故基也西城之譙門與湘江之潭皆以蓮華名之者以此然邦人無有知者安請余併書以示道俗宣和七年二月住山道人法光與安化馬章彥達登澗陰問建塔之因光乃以余文示之彥達踊躍願施錢刻石山中上巳日除饉某記潭州白鹿山靈應禪寺大佛殿記靈應禪寺天人師殿者無諸沙門用澄之所建而邦之大檀越劉革之所施也寺占巖腹臨清流發一區之形勝規模宏大營建偉傑緑疏朱闥吞飲風月飛簷楯瓦蕩摩雲煙寶鈴和鳴珠網間錯像設釋迦如來百福千光之相文殊師利普賢大菩薩大迦葉波慶喜尊者散花天人護法力士又環一十八應真大士序列以次莊嚴畢備道俗拜瞻其無以異登忉利諸天至普光明最吉祥地欽奉慈嚴親聞圓音也其費緡錢三千萬而不聽餘人增一草鳩工於宣和元年而斷手於七年之秋余過襄沔謁方禪師於潮音堂而澄前請為之記余聞百丈大智禪師之訓曰世尊遺教弟子因法相逢則當依法而住飲食服玩經行宴坐必為叢林營建室宇必先造大殿以奉安佛菩薩像使諸來者知皈向故晝夜行道令法久住報佛恩故又聞德山鑒禪師之語曰比丘行腳當具正眼誦經禮拜乃是魔民營造殿宇又造魔業且天下惟奉一君一化豈容二佛所居撤去大殿獨存法堂嗚呼百丈德山皆祖師一則建立一則掃蕩安所適從折中哉方禪師黃龍雲居之仍孫必知其要乃以問之方曰如醫師之治病應病與藥今人病寒必投以丹砂鳥喙設或病喘必投以紫團白朮寒疾愈則所謂鳥喙丹砂者姑置之可也喘疾既去則雖常服紫團白朮庸何患然無病則焉用藥哉衆生無明崢嶸業海橫肆莫知津涘而以佛為彼岸則殿宇之建像設之嚴所當然矣余拊手曰臨濟之後善説法要如此因取以文次為之記澄公外枯而中秀耐煩冗甘淡薄十年不解其志非止為此殿而已要將咄嗟辦一梵剎可也九月初吉記重修僧堂記湘南號為山水之國故佳處多為得道者所廬自唐貞元間馬祖石頭卜鄰於衡嶽學者散止巖叢本朝康定間慈明禪師中興於石霜望馬祖為十世嫡孫兒孫遍天下而長沙尤盛元豐元祐之間角立傑出者比比領名剎諸方指以為道之所在今三十年禪林下衰以大福田之衣自標識而號分燈嗣法者例皆名愧其實蓋族大口衆不肖之子乃生固其所也龍圖閣曾公之帥長沙慨然驚嗟曰吾祖楚公識雪竇顯公於行間擢置人天之上遂為雲門中興吾親受大和尚圓照印可今而坐視非雪竇圓照所以付祝之意於是刪去其甚無狀者老病物故懼讋而宵遁者時或有之遴選諸方之名德十餘輩所以扶其顛整其傾靈應方公乃其一也方既至問其地利之所出度不足以瞻衆則化淨檀為油麥庫以生財役力事衆未有效勞者則合衆力建度僧之庫越兩年而告成又化邑之賢者鍾世高修僧堂五間鳩工於宣和六年十月明年秋九月落成之而余適至方偕余遊觀其高深壯麗塗金間碧香霧為帳秋水為簟粥魚齋鼓戢戢而趨合爪而集會四海而不為混跏趺而禪休萬緣而不為滅余曰此曾公發之而其利如是博也方笑曰曾公發之而成之者乃賢令尹賈公也自公下車盜賊衰息風雨時若民以是安吏以是畏風雨時若則連歲有秋盜賊衰息則夜戶不閉歲豐時和則民樂施故吾堂成於談笑使令尹不賢民且離散矧所謂沙門乞士者乎余愛其言理而明喜為之記十月初吉除饉某記五慈觀閣記古之仁人將有為於世必特立獨行自行其志漢將李陵之降虜致武帝疑其臣屬於是蘇武奉使不屈牧羊海上十九年起居必仗漢節宣帝以智力御世君臣凜然既殺蓋寬饒於是疏廣父子袖手而去使人主知區區爵祿不足驕天下之士豈激頽波而獨往冒衝風而孤騫者歟豈惟世之仁人如此出世之聖師亦然三祖璨公既得法隱於淮山悼學者枯禪縛律以地位證修為歸宿不信達摩別傳之宗故作信心銘又名其弟子曰道信造次顛沛語言寢息必以信自心為勸嗚呼吾祖之於法道深切著明可以想見其餘風遺烈東山住持沙門宗致者臨濟十一世之玄孫而泐潭準禪師之嫡嗣也骨面嚴冷英氣逸群以荷擔雲庵法道為己任説法有辨慧護教有便行卑叢林以宗旨爭溝封以語言爭非是紛然諸方方熾未艾名為走道其實走名射利裨販無所不至而正宗微矣欲棄之而弗忍欲導之而弗從於是為室於方丈之東名曰慈航又自名其號曰慈覺猶以為未也建閣于大門名曰慈觀蜀僧居竭者傾長財一百五十萬以助成之竭生平自奉甚約所得檀信之施毛纍寸積四十年之藏一旦舉以施之人以為難南晉僧子照者有實行自然之智如人信手斫方圓皆中繩墨慈覺使總院事事無巨細談笑而辦閣經營照實董其事垢面龜手不憚霜雪伐山相材運土拾礫與蒼頭短髮進退凡半年而落成竭以財施而慈覺之志乃克成師弟子之於宗皆無所愧賢矣哉余與雙峰祖印禪師仲宣來遊遂登是閣晚望淮山萬疊自獻雪盡蒼然卻立周視朱欄碧瓦蕩摩雲煙苾芻往來午梵方奏疑其身世之在諸天也祖印問余曰慈覺之慈宗師之慈其與佛菩薩之慈奚若余曰如恆河女子抱嬰兒欲渡兒墮水中女子與之俱死此愛兒之慈也滿慈子曰人罵辱我我則自幸曰罵辱非拳驅也設或拳驅又自幸曰拳驅之酷不猶愈杖擊兵刃乎此忍力之慈也曹溪六祖夜為男子張行昌所謀將施刃六祖笑曰止負汝金不負汝命以金贈之使去人無知者行昌感涕願落髮為比丘所至輒訪道復至曹溪而祖授以法要使分燈于江西冤親一揆是謂等慈也提婆達多每欲害佛以毒置十指爪中見佛接足佛笑曰未毒我足先毒汝手又勸國驅千醉象以衝佛駕象來佛垂手示之於是象見十指皆有師子怖駭遺糞而去此謂大慈也若慈覺則不受諸慈管攝擊塗毒之鼓死卻偷心鎔凡聖之銅不存情見如勝熱婆羅之火聚無猒足王之刀鋸使一切衆生觸其焰蒙其刃皆獲無分別智此蓋真慈也夫豈不然哉祖印笑曰道人固菩提園中之耆年何其辨慧乃爾驚群耶龍舒禪鑑大師無學犯衆而言曰閣成而老師適至似非苟然願為記之余曰唯建炎元年十二月記資福法堂記資福禪院在金沙斗方之北奇峰峻岡環繞以掩映風林雲壑祕邃以曠平自非逃世絶俗忘軀為法者無因而至崇寧間蜀僧文慧嗣百丈九肅禪師説法此山求心之所決擇發趣之所歸投凡叢林之所服用寺宇之所宜有者十八九矣建炎元年十月住持沙門九琛以書抵印曰寺僧紹恂者無諸人惠公之高弟有行業淮山道俗愛敬之惠公以政和五年遠化諸大檀越重修潮音堂一所俾知法上首臨衆演法以上祝天子之萬壽恂欣然從之於是遠近聞之富者輸財貧者輸力藝者輸巧勸者輸語越明年七月而堂克成凡用緡百萬有餘乃設無遮大會飯凡聖僧而落成之未有文以記其事公為我記之印曰自後漢摩騰竺法蘭來自五天館于洛陽鴻臚寺有經而未有精舍至吳赤烏中康僧會入建康架茅茨與其徒以行道有精舍而未有僧三日男子朱士行最初落髮有僧而未分禪律逮唐之朝禪律並行曹溪獨號禪宗而律學乃不敢與之抗行元和中百丈大智禪師方建叢林廢蜂房蟻穴之衆為九州四海而建大法堂以總衆至於天下禪席宗之知比丘因法相逢以法為親主者升座而坐學徒鴈序而聽示尊法也恂能化衆檀以成斯堂其知本者歟資福院為此邦之福田道俗男女貴賤老幼者䡆授之者得長老升堂布法雨以滋灌之令善種福芽叢生而並茁其為惠利豈有既乎不可以無書雙峰正覺禪院涅槃堂記大江之北夢澤之東萬山走趨屹立兩峰蟠岸千楹寶勢翔空煙雲開遮戶窗青紅天花墮飄舞雨旋風疑登梵釋龍天之宮大鐘橫撞山空玲瓏犀顱戢戢步趨肅雍祖印禪師蓋其長雄寬而邊幅壯而疏通謙以自牧衆所追崇如海下之百川則宗論其世家非侯則公棄之恥言安樂巖叢與彼假我染衣妄庸垂涎富貴忘其頂童雀盧自誣者則若不同也余自襄沔南歸新豐道由淮上託宿山中欣然見我如舊遊從日陪杖屨摧頽兩翁偶立小語又指役工紛然斧斤聲雜鼓鐘坐僧日多其來無窮庸免包藏衰老篤癃跛盲失心不祥之凶作堂館之工行告終矣要余即之周行廡廊入門疏快密室虛窗搴幃設簾宜溫宜涼濯衣柵榻負喧橙床藥爐茶鼎可劑可湯頤指如意失其異鄉即戲問之欲資抵掌豈有少年如邃青狂法戰不勝舁入此堂者乎豈有垂死如剖倔強而敢橫機摩疊大陽者乎豈有英靈如黃涅槃杖擲病者隨起激昂者乎豈有病愈枵然空房而嘗臥處尚多痂瘡以火燒之皆熏陸香者乎豈有頭陀以紙為裳而其迅機石火電光方酬洞山言訖而亡者乎祖印愕然視余嗟咨如子精敏亦迷怪奇甘棄坦塗而行嶮巇子知太平無象可窺雨露霜雪自然四時我廩既高里無呼追雞豚社飲老幼扶攜安用鱗鳳之與菌芝耶昔維摩病臥毗耶離教誨天魔使令艷姬手提大千戲而擲之世尊有疾則異於是背痛乃臥須乳作麋而已何嘗變化怖駭群兒乎余聞其説乃加敬虔而僧祖稱祖印所賢而余里閈又掌寺權婆娑獻誠願拾此言丐余文之為記以傳夫千里水濫觴其源若合衆流遂成大川則知此堂衆檀成焉增土為阜增毛為氈兩尼勤勤佳其精專同其調度所費緡錢蓋六十萬淨願乃圓有僧道齊以身率先雜衆工中唱叫挽牽十方之多道俗嗟羡咨爾堂衆諦觀病緣此四大軀無可肇堅生死之趣愛見所纏雖相扶持終各棄捐當令以觀常自現前授與此疾非人非天是我自業成熟則然受盡還無如雞出燖此心自住如珠在淵觀苦進道諸佛憫憐歲在丁未建炎改元季冬初吉集者駢肩敘多率衆二百九員領衲景修守珂守詮至其綱維又揀耆年辦衆法欽牧衆法璉叢林精神照映雲泉祖印為誰住持仲宣而作記者寂音老禪合妙齋記無盡居士真拜之明年大晟樂成詔試於西府余適在焉無盡曰聲起於日而律起於辰四十有一而陽數全三十有六而陰氣備如黃鐘之律九寸而為宮增之毫釐減之杪忽則其音不應宮苟適其和是謂之雅熟視其理蓋大遍無外細入無間余曰諸佛衆生日用無以異於此其體本自妙而常明因緣時節不借語默其義自見違時失候則擬議而動其義自隱諸佛知此者也故善用而合本妙首楞嚴豈不曰雖有妙音若無妙指終不能發如我按指海印發光哉衆生昧此者也故不善用而成粗大智度豈不曰猶如利刀惟用割泥泥無所成刀日就損哉余涉世多艱困於憂患後三年華髮海外翩然來歸依資國寺乞食故人而老焉晨香夕燈經行晏坐翛然靜住索爾虛間追繹大晟樂之和雅而庶幾善用其心以合本妙之意也遂以名其齋曰合妙又為之記政和四年二十五日書信州天寧寺記江南山水冠天下而上饒又冠江南自昔多為得道者所廬鵝湖龜峰懷玉號稱形勝而靈山尤秀絶蓋唐義武初西平周王發其天藏也初建精舍名興聖神符天子改賜普明沙門德延以講學聚徒甚盛弟子德熙者有智略實陰相之崇寧二年詔革以為禪林賜田度僧聽遇天寧節進功德疏太守周公邠命長老德延為第一世而以僧正德熙董其事也三人者敘立顧瞻而歎曰寺以群居而自為戶牖犬牙相接如蜂房蟻穴非相臣所以建請集禪衲演祖道上延睿算之意於是蟬蛻其卑陋而一新之也入門縱望序廡翼如而進層閣相望而起登普光明殿顧其西則有雲會堂以容四海之來者為法寶藏以大輪載而旋轉之以廣攝異根也顧其東則有香積廚以辦伊蒲塞饌為職事堂以料理出納特建善法堂于中央以演法開毗耶丈室以授道又閣其上以像觀世音示以聞思修令學者入道也粥魚茶板霜顱螺頂鳧趨而集寂無人聲餘履聲而禪齋密室冰懷雪慮株枯而坐不見心相惟身相也嗚呼西平王郡太守雖異世而姓氏同前以講後以禪而領袖者雖異趣而名號同也吾聞浮圖未成故裴公美為玄度之後身千尺像畢而僧護為僧祐道宣之前身古今所傳不可誣也宗衍禪師出自白牛法窟中來嗣延公之法席分照覺之祖焰道行孤峻為邦人所欽然人但見其能集前人之大成幻出樓觀而不知其遊戲也政和元年八月又詔以天寧萬壽名寺七年三月遣僧慶瑫來乞文以記其事余雖未獲覽山川之佳氣披華構之雄誇然能系而為之詞也辭曰群峰寶勢爭岧嶢雲收眼寒空翠搖靈山獨受王水朝跨水誰作朱飛橋蒼官馬鬣低龍腰谷風吹空翻海潮忽驚寶坊礙層霄天花細雨紛墮飄草衣大士唾霧消定力持之日劫超太霞仙子坐可招夜晴往往聞吹簫西平賢王想風標長劍拄頤氣勇驕擅此興聖開前朝宋興和氣彌宇宙佛宮道祠恩益厚初以毗尼相講授易為禪林冠江右大鐘橫撞午梵奏紫金光聚世福祐苾芻千指聚拜手太平天子千萬壽切雲樓閣誰所搆臣子淨願力成就白牛乳犢師子吼虎溪嫡孫氣奇茂學者趨之俯並首我作銘詩招爾後斯文與山俱不朽高安城隍廟記城隍廟者故使君應侯廟也應侯世高安諱瑱陏季政荒天下盜起李密起鞏王仁德起鄴皆稱公李子通起海陵邵江海起岐州薛舉起金城竇建德起河間皆稱王劉武周起馬邑劉元晉起晉安林士弘起豫章皆竊尊號高安豫章屬邑也侯時以布衣募兵烏合而擊之士弘卻隱去因嬰城固守唐武德元年五月甲子唐公即帝位五年十月己巳林士弘殄滅嗚呼方是時賊兵浩如海孤城眇如塊微侯之忠勇義武則民魚肉之久矣朝廷旌其功授以刺史符於是千里親之如仰父母既沒贈尚書左僕射廟食此邦蓋五百年而書功烈者詞不達意余嘗歎息之政和六年九月十六日因請福許銘廟念文字陳陋又罪廢懼瀆神聽稿成復壞者數矣越明年二月二十六日夜夢有客過余甚都雅曰向許我詩當以示我夢中問公誰氏曰我唐人居湖中既覺三鼓矣坐而假寐又夢理前事旁有贊者曰應侯君也於是起呼燈火洗心為銘銘曰煬帝南遊江都湄唐公集兵禱晉祠連和突厥人戶知傳檄諸郡稱義師豫章邈在江之西殺氣熏蒸喧鼓鼙芟民如芻救者誰應侯忠勇英特姿精誠貫日如橫霓振臂大呼老幼隨空拳烏合當新羈賊鋒為卻氣少衰守城泯默天助威賊雖猖狂其敢窺民甘九死侯生之不然蕩滌無孑遺故宮下瞰緣錦溪過者肅趨不敢馳功德之大山嶽巍惜其粉飾無雄辭心許作文恨陋卑夢中索之不呵譏俾侮神者讀此詩知神威靈不可欺
